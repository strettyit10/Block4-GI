<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GI Disease Study Guide — USMLE Step 1 Prep</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:Georgia,'Iowan Old Style','Palatino Linotype',serif;background:#faf8f3;color:#1c2e23;line-height:1.7;font-size:15.5px;overflow:hidden}

/* LAYOUT */
.app{display:flex;height:100vh}
.sidebar{width:280px;background:#f3efe7;border-right:1px solid #e6ddc9;display:flex;flex-direction:column;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* SIDEBAR TOP */
.sb-top{padding:14px 14px 10px;border-bottom:1px solid #e6ddc9;background:#ede6d6}
.sb-brand{display:block;font-family:Georgia,serif;font-size:12.5px;font-weight:700;color:#14532d;letter-spacing:0.15em;text-transform:uppercase;text-decoration:none;padding-bottom:6px;border-bottom:1px solid #d4c9ad;margin-bottom:8px;transition:color 0.12s}
.sb-brand:hover{color:#0f3a1f;text-decoration:underline}
.sb-title{font-family:Georgia,serif;font-size:18px;font-weight:700;color:#14532d;letter-spacing:-0.01em;cursor:pointer;transition:color 0.12s}
.sb-title:hover{color:#0f3a1f}
.sb-sub{font-size:11px;color:#6b7b6c;margin-top:2px;font-style:italic}
.sb-search{margin-top:10px}
.sb-search input{width:100%;padding:7px 11px;border:1px solid #d4c9ad;border-radius:4px;background:white;font-size:12.5px;font-family:Georgia,serif}
.sb-search input:focus{outline:none;border-color:#14532d;background:#fffef8}

/* SIDEBAR PROGRESS */
.sb-progress{padding:8px 14px;background:#ede6d6;border-bottom:1px solid #e6ddc9;display:flex;align-items:center;gap:10px;font-size:11px;color:#4b5b4c}
.sb-progress-bar{flex:1;height:5px;background:#d4c9ad;border-radius:3px;overflow:hidden}
.sb-progress-fill{height:100%;background:#14532d;transition:width 0.4s}

/* SIDEBAR LIST */
.sb-list{flex:1;overflow-y:auto;padding:6px 0}
.cat-group{margin-bottom:2px}
.cat-header{padding:7px 14px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.9px;color:#14532d;cursor:pointer;user-select:none;display:flex;align-items:center;gap:6px;background:transparent;transition:background 0.12s}
.cat-header:hover{background:rgba(20,83,45,0.05)}
.cat-chevron{font-size:9px;transition:transform 0.2s;color:#8a9b8b}
.cat-group.collapsed .cat-chevron{transform:rotate(-90deg)}
.cat-count{margin-left:auto;background:rgba(20,83,45,0.1);color:#14532d;font-size:9.5px;padding:1px 6px;border-radius:8px;font-weight:700;letter-spacing:0.3px}
.cat-list{display:block}
.cat-group.collapsed .cat-list{display:none}
.dz-item{padding:5px 14px 5px 26px;font-size:12.5px;color:#3c4d3d;cursor:pointer;display:flex;align-items:center;gap:7px;line-height:1.35;border-left:3px solid transparent;transition:all 0.1s;font-family:Georgia,serif}
.dz-item:hover{background:rgba(20,83,45,0.06);color:#14532d}
.dz-item.active{background:#14532d;color:white;border-left-color:#fbbf24;font-weight:600}
.dz-item.active .dz-check{color:#fbbf24}
.dz-check{font-size:11px;color:#a0a79e;flex-shrink:0;width:12px}
.dz-item.learned .dz-check{color:#16a34a}
.dz-item.active.learned .dz-check{color:#86efac}
.dz-name{flex:1;min-width:0}

/* MAIN TOP BAR */
.main-top{background:white;padding:11px 24px;border-bottom:1px solid #e6ddc9;display:flex;align-items:center;gap:10px;flex-shrink:0}
.main-top h1{font-family:Georgia,serif;font-size:17px;font-weight:700;color:#14532d;letter-spacing:-0.01em;flex:1}
.main-top .meta{font-size:11.5px;color:#6b7b6c;font-style:italic}
.btn{padding:6px 12px;background:white;border:1px solid #d4c9ad;border-radius:4px;font-size:11.5px;font-weight:600;color:#4b5b4c;cursor:pointer;font-family:Georgia,serif;transition:all 0.12s}
.btn:hover{border-color:#14532d;color:#14532d}
.btn.print{background:#14532d;color:white;border-color:#14532d}
.btn.print:hover{background:#0f3a1f;color:white}
.btn.excel{background:#107c41;color:white;border-color:#107c41}
.btn.excel:hover{background:#0b5a2e;color:white}

/* CONTENT PANE */
.content{flex:1;overflow-y:auto;background:#faf8f3}
.content-inner{max-width:1200px;margin:0 auto;padding:42px 64px 120px}
.reading-inner{max-width:820px;margin:0 auto}

.cat-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#8a9b8b;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.cat-dot{width:8px;height:8px;border-radius:50%;background:#14532d}
.dz-title{font-family:Georgia,serif;font-size:34px;font-weight:700;color:#14532d;letter-spacing:-0.025em;line-height:1.15;margin-bottom:16px}
.dz-oneliner{font-size:17px;color:#3c4d3d;line-height:1.55;margin-bottom:28px;padding:14px 18px;background:#ede6d6;border-left:3px solid #14532d;border-radius:0 5px 5px 0;font-style:italic}

.sec{margin-bottom:28px}
.sec h3{font-family:Georgia,serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#14532d;margin-bottom:10px;padding-bottom:5px;border-bottom:1.5px solid #d4c9ad;display:flex;align-items:center;gap:7px}
.sec p,.sec ul{font-size:15px;color:#1c2e23;line-height:1.75}
.sec ul{padding-left:22px;margin-top:4px}
.sec ul li{margin-bottom:5px}
.sec strong{color:#14532d;font-weight:700}

.callout{margin:20px 0;padding:14px 18px;border-radius:5px;font-size:14.5px;line-height:1.7}
.callout h4{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.callout ul{padding-left:20px;margin-top:5px}
.callout li{margin-bottom:4px}
.callout.hy{background:#fdf4d3;border-left:4px solid #eab308;color:#713f12}
.callout.hy h4{color:#78350f}
.callout.hy strong{color:#78350f}
.callout.mn{background:#ffe7d6;border-left:4px solid #ea580c;color:#7c2d12}
.callout.mn h4{color:#9a3412}
.callout.mn strong{color:#9a3412}
.callout.trap{background:#fde3e3;border-left:4px solid #dc2626;color:#7f1d1d}
.callout.trap h4{color:#991b1b}
.callout.trap strong{color:#991b1b}

/* FOOTER NAV */
.footer-nav{position:sticky;bottom:0;background:linear-gradient(to top,#faf8f3 60%,rgba(250,248,243,0));padding:24px 52px 22px;max-width:720px;margin:0 auto;display:flex;gap:10px;align-items:center;border-top:0}
.nav-btn{flex:1;padding:11px 14px;background:white;border:1.5px solid #d4c9ad;border-radius:6px;font-size:13px;font-weight:600;color:#4b5b4c;cursor:pointer;font-family:Georgia,serif;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:6px}
.nav-btn:hover{border-color:#14532d;color:#14532d;background:#fffef8}
.nav-btn:disabled{opacity:0.4;cursor:not-allowed}
.nav-btn.learn{flex:0.8;background:#14532d;color:white;border-color:#14532d}
.nav-btn.learn:hover{background:#0f3a1f;color:white}
.nav-btn.learn.learned{background:#16a34a;border-color:#16a34a}
.kbd{display:inline-block;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.25);padding:1px 5px;border-radius:3px;font-family:ui-monospace,Menlo,monospace;font-size:10px;margin-left:4px}
.nav-btn:not(.learn) .kbd{background:#f1f5f9;border-color:#cbd5e1;color:#64748b}

/* EMPTY STATE */
.empty{text-align:center;padding:80px 20px;color:#8a9b8b;font-style:italic}

/* MOBILE */
.menu-toggle{display:none;padding:8px;background:#14532d;color:white;border:none;border-radius:4px;font-size:14px;cursor:pointer}
@media(max-width:720px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:100;transform:translateX(-100%);transition:transform 0.3s;box-shadow:0 0 20px rgba(0,0,0,0.15)}
  .sidebar.open{transform:translateX(0)}
  .menu-toggle{display:block}
  .content-inner{padding:24px 20px 120px}
  .dz-title{font-size:26px}
  .footer-nav{padding:18px 20px}
  .main-top .meta{display:none}
}

/* PRINT */
@media print{
  body{overflow:visible;background:white;font-size:10.5pt}
  .app{display:block;height:auto}
  .sidebar,.main-top,.footer-nav{display:none!important}
  .main{overflow:visible}
  .content{overflow:visible;background:white}
  .content-inner{max-width:100%;padding:0}
  .dz-entry{page-break-after:always;padding:20px 30px;break-after:page}
  .dz-entry:last-child{page-break-after:auto}
  .callout{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .dz-oneliner{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}

/* SCROLLBAR */
.sb-list::-webkit-scrollbar,.content::-webkit-scrollbar{width:8px}
.sb-list::-webkit-scrollbar-thumb{background:#d4c9ad;border-radius:4px}
.content::-webkit-scrollbar-thumb{background:#d4c9ad;border-radius:4px}
.sb-list::-webkit-scrollbar-thumb:hover,.content::-webkit-scrollbar-thumb:hover{background:#14532d}
</style>
</head>
<body>
<div class="app">

<aside class="sidebar" id="sidebar">
  <div class="sb-top">
    <div class="sb-title">GI Disease Atlas</div>
    <div class="sb-sub">USMLE Step 1 · 75 diseases</div>
    <div class="sb-search"><input type="text" id="search" placeholder="Search…"></div>
  </div>
  <div class="sb-progress">
    <span id="learnedText">0 / 0</span>
    <div class="sb-progress-bar"><div class="sb-progress-fill" id="progressFill"></div></div>
  </div>
  <div class="sb-list" id="sbList"></div>
</aside>

<main class="main">
  <div class="main-top">
    <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
    <h1>GI Disease Study Guide</h1>
    <span class="meta">↑↓ navigate · space = learn</span>
    <button class="btn" id="prevBtn" title="Previous">◀</button>
    <button class="btn" id="nextBtn" title="Next">▶</button>
    <button class="btn print" id="printBtn">🖨 PDF</button>
    <button class="btn excel" id="excelBtn">📊 Excel</button>
  </div>
  <div class="content" id="content">
    <div class="empty">Select a disease from the sidebar to begin.</div>
  </div>
</main>

</div>

<script>
const DISEASES = [
// ═══════════════ CONGENITAL / DEVELOPMENTAL ═══════════════
{id:"meckel",cat:"Congenital/Developmental",ck:"cong",emoji:"👶",name:"Meckel Diverticulum",
oneLiner:"True diverticulum from persistent vitelline (omphalomesenteric) duct. Most common congenital GI anomaly. Classic 'Rule of 2s'.",
path:"Failure of vitelline duct to obliterate in week 7 of gestation. Contains <strong>all three layers</strong> of bowel wall (true diverticulum). Often has <strong>ectopic gastric mucosa</strong> (acid secretion → ulceration of adjacent ileum) and sometimes pancreatic tissue.",
clin:"<ul><li><strong>Painless lower GI bleed in child &lt;2 yr</strong> — classic melena or brick-red stool from ectopic gastric mucosa</li><li>Asymptomatic in most (found incidentally)</li><li>Can mimic appendicitis (diverticulitis)</li><li>Lead point for intussusception or volvulus</li></ul>",
dx:"<strong>Tc-99m pertechnetate scan</strong> ('Meckel scan') — tracer taken up by ectopic gastric mucosa. Can also cause false-negative if no gastric tissue.",
tx:"Surgical resection if symptomatic.",
hy:["Rule of 2s: <strong>2%</strong> pop, <strong>2 ft</strong> proximal to ileocecal valve, <strong>2 inches</strong> long, <strong>2 types</strong> of ectopic tissue (gastric, pancreatic), present by age <strong>2</strong>, M:F = <strong>2:1</strong>","Painless bleeding in child = Meckel until proven otherwise","Ectopic gastric mucosa is the troublemaker"],
mn:"<strong>'Rule of 2s'</strong> — the most tested mnemonic in all of GI.",
trap:"Don't confuse with other causes of painless pediatric bleeding: juvenile polyp (rectum), vascular malformation."},

{id:"hirschsprung",cat:"Congenital/Developmental",ck:"cong",emoji:"👶",name:"Hirschsprung Disease",
oneLiner:"Congenital aganglionic megacolon from failed neural crest migration. Most common cause of colonic obstruction in newborns.",
path:"Failure of <strong>neural crest cell migration</strong> into distal colon wall → <strong>absence of Meissner (submucosal) + Auerbach (myenteric) plexuses</strong> in aganglionic segment → tonic contraction of the affected bowel → functional obstruction. Almost always begins at the <strong>rectum</strong> and extends proximally. Associated with <strong>RET mutation</strong> and <strong>Down syndrome</strong> (2–15%).",
clin:"<ul><li><strong>Failure to pass meconium &gt;48 h</strong> in newborn (hallmark)</li><li>Bilious emesis, abdominal distension, refusal to feed</li><li>Chronic constipation, failure to thrive in older kids</li><li>DRE: empty rectum + explosive <strong>'squirt sign'</strong> of stool when finger is withdrawn</li><li>Complication: <strong>Hirschsprung-associated enterocolitis</strong> (C. difficile-like) — can be fatal</li></ul>",
dx:"<strong>Rectal suction biopsy is GOLD STANDARD</strong> — shows absence of ganglion cells. Contrast enema shows narrow aganglionic segment + proximal dilation ('transition zone').",
tx:"Surgical resection of aganglionic segment (pull-through procedure).",
hy:["Failure to pass meconium + Down syndrome = think Hirschsprung","Transition zone on contrast enema","Biopsy shows <strong>NO ganglion cells</strong>","RET proto-oncogene"],
trap:"Contrast with <strong>Meconium ileus</strong> (cystic fibrosis) — thick meconium blocks terminal ileum; NOT aganglionic."},

// ═══════════════ OBSTRUCTIVE / MECHANICAL ═══════════════
{id:"bowel-obstruction",cat:"Obstructive/Mechanical",ck:"obs",emoji:"🚧",name:"Intestinal Obstruction",
oneLiner:"Blockage of bowel lumen. SBO (small bowel) >> LBO (large bowel). Mechanical vs functional (ileus).",
path:"SBO causes (in order): <strong>Adhesions (#1) &gt; Hernias &gt; Tumors &gt; Crohn's</strong>. LBO causes: <strong>Cancer (#1) &gt; Diverticulitis &gt; Volvulus</strong>. Mechanical: physical blockage. Functional (paralytic ileus): no peristalsis (post-op, meds, hypokalemia, sepsis).",
clin:"<ul><li>Colicky abdominal pain (in waves)</li><li>Bilious vomiting (proximal SBO), feculent vomiting (distal SBO/LBO)</li><li>Abdominal distension (more in LBO)</li><li>Obstipation (no gas/stool)</li><li>High-pitched bowel sounds → absent (late)</li></ul>",
dx:"<strong>Upright AXR</strong>: <strong>'stepladder' air-fluid levels</strong>, dilated bowel loops. CT confirms level + cause. LBO: colon distension ± 'coffee bean' (volvulus) or 'apple core' (cancer).",
tx:"NPO + IV fluids + NG decompression ('drip & suck'). Surgery for strangulation, ischemia, closed-loop obstruction, or failed medical mgmt.",
hy:["Adhesions are the <strong>#1 SBO cause</strong> in post-op patients","Hernia is the <strong>#1 SBO cause</strong> in patients who've never had surgery","Closed-loop obstruction (both ends blocked) → ischemia → emergency","Strangulated hernia → bowel necrosis"],
mn:"<strong>SBO = 'SMASH'</strong>: <strong>S</strong>urgery (adhesions), <strong>M</strong>asses, <strong>A</strong>bscess, <strong>S</strong>trictures, <strong>H</strong>ernia."},

{id:"hernia",cat:"Obstructive/Mechanical",ck:"obs",emoji:"🚧",name:"Hernia",
oneLiner:"Protrusion of organ/tissue through a wall defect. Key: inguinal (indirect > direct), femoral, umbilical, hiatal.",
path:"<ul><li><strong>Indirect inguinal</strong>: Through deep inguinal ring → canal → scrotum. <strong>Lateral</strong> to inf. epigastric a. Patent processus vaginalis (congenital). M &gt;&gt; F.</li><li><strong>Direct inguinal</strong>: Through <strong>Hesselbach's triangle</strong>. <strong>Medial</strong> to inf. epigastric a. Acquired weakness. Older men.</li><li><strong>Femoral</strong>: Below inguinal lig, medial to femoral v. Women &gt;&gt; men. High strangulation risk.</li><li><strong>Hiatal</strong>: Sliding (95%, GE jxn herniates) vs Paraesophageal (5%, stomach beside esophagus).</li></ul>",
clin:"Bulge worsened by Valsalva/standing. Incarcerated = irreducible. Strangulated = ischemic (severe pain, systemic signs — emergency).",
dx:"Clinical. US or CT if uncertain.",
tx:"Surgical repair (mesh). Emergency if strangulated.",
hy:["<strong>MDs don't LIE</strong>: <strong>M</strong>edial = <strong>D</strong>irect, <strong>L</strong>ateral = <strong>I</strong>ndirect","Indirect hernia in female = look for testicular feminization/AIS","Femoral hernia: highest risk of strangulation","Sliding hiatal hernia → GERD; paraesophageal → can strangulate"],
mn:"<strong>'MDs don't LIE'</strong>"},

{id:"adhesions",cat:"Obstructive/Mechanical",ck:"obs",emoji:"🚧",name:"Adhesions",
oneLiner:"#1 cause of SBO in developed countries. Fibrous bands from prior surgery or peritonitis.",
path:"Post-surgical or post-inflammatory fibrous bands tether bowel loops. Can kink bowel → obstruction or twist → volvulus.",
clin:"Crampy abdominal pain + vomiting + distension, usually post-surgical patient. May recur.",
dx:"CT: transition point without obvious mass; 'bird-beak' tapering.",
tx:"Initially conservative ('drip and suck'). Surgical lysis (adhesiolysis) if fails.",
hy:["<strong>#1 cause of SBO in developed world</strong>","Post-surgical patient + SBO = adhesions","Laparoscopy &lt; open surgery for adhesion formation"]},

{id:"volvulus",cat:"Obstructive/Mechanical",ck:"obs",emoji:"🚧",name:"Volvulus",
oneLiner:"Twisting of bowel around mesentery → obstruction ± ischemia. Sigmoid (elderly) or cecal (younger).",
path:"<ul><li><strong>Sigmoid volvulus</strong>: Most common in elderly/nursing home, chronic constipation, high-fiber diets (Africa, Russia). Long sigmoid mesentery twists.</li><li><strong>Cecal volvulus</strong>: Younger patients, congenital failure of cecal fixation.</li><li><strong>Midgut volvulus</strong>: Infants with malrotation — surgical emergency.</li></ul>",
clin:"Acute abdominal pain, distension, obstipation, vomiting.",
dx:"<ul><li>Sigmoid: <strong>'Coffee bean'</strong> or <strong>'bent inner tube'</strong> sign (LUQ) on AXR; <strong>'bird beak'</strong> on contrast enema</li><li>Cecal: 'Coffee bean' sign in LUQ (displaced cecum)</li><li>Midgut: 'Whirlpool sign' on CT</li></ul>",
tx:"Sigmoid: endoscopic detorsion + elective resection. Cecal: surgical.",
hy:["<strong>Sigmoid volvulus</strong> = elderly, nursing home, LUQ coffee bean","<strong>Cecal volvulus</strong> = younger, congenital fixation failure","<strong>Midgut volvulus in infant</strong> = malrotation → EMERGENCY surgery (Ladd's procedure)"]},

{id:"intussusception",cat:"Obstructive/Mechanical",ck:"obs",emoji:"🚧",name:"Intussusception",
oneLiner:"Telescoping of one bowel segment into another. <strong>Most common cause of bowel obstruction in infants (6 mo–2 yr)</strong>.",
path:"Proximal bowel (intussusceptum) invaginates into distal (intussuscipiens), typically at <strong>ileocecal junction</strong> in kids. Can compromise blood supply → ischemia. <strong>Lead points</strong> (in older kids/adults): Meckel diverticulum, polyps, lymphoma (HIV patients), HSP purpura bruise, recent rotavirus vaccine.",
clin:"<ul><li>Episodic severe colicky abdominal pain (child draws knees to chest)</li><li><strong>'Currant jelly' stools</strong> (blood + mucus — late sign)</li><li>Palpable <strong>'sausage-shaped'</strong> RUQ mass</li><li>Lethargy between episodes ('dance sign')</li></ul>",
dx:"<strong>Ultrasound — 'target' or 'bullseye' sign</strong>. Contrast (air or barium) enema is both diagnostic AND therapeutic.",
tx:"<strong>Air or contrast enema</strong> — reduces 80–90%. Surgery if fails or perforated.",
hy:["<strong>Currant jelly stools</strong> + <strong>sausage mass</strong> = intussusception","<strong>Target sign</strong> on US","In adults → always look for a lead point (tumor!)","HSP + abdominal pain = classic intussusception trigger","Recent rotavirus vaccine (historical)"],
mn:"<strong>'CRAMP'</strong>: <strong>C</strong>urrant jelly, <strong>R</strong>educe with enema, <strong>A</strong>ged &lt;2, <strong>M</strong>ass (sausage), <strong>P</strong>ain (colicky)."},

// ═══════════════ VASCULAR ═══════════════
{id:"ischemic-colitis",cat:"Vascular",ck:"vasc",emoji:"🩸",name:"Ischemic Colitis",
oneLiner:"Hypoperfusion of colon, classically at watershed areas (splenic flexure, rectosigmoid). Elderly + hypotensive.",
path:"Watershed areas between SMA + IMA territories have dual, marginal blood supply. Hypotension, AFib, atherosclerosis, post-AAA repair, cocaine, or severe dehydration → ischemia of mucosa/submucosa. Unlike <strong>acute mesenteric ischemia</strong> (SMA embolism → small bowel necrosis, high mortality), ischemic colitis is typically less severe.",
clin:"<ul><li>Acute onset <strong>crampy LLQ or periumbilical pain</strong></li><li><strong>Bloody diarrhea / hematochezia</strong> within 24 h</li><li>Often self-limited</li></ul>",
dx:"CT: <strong>'thumbprinting'</strong> (submucosal edema/hemorrhage). Colonoscopy: pale, friable mucosa with hemorrhagic patches at splenic flexure.",
tx:"Supportive (bowel rest, IV fluids, antibiotics if needed). Surgery if necrosis/perforation.",
hy:["<strong>Griffith's point</strong> = splenic flexure (SMA ↔ IMA watershed)","<strong>Sudeck's point</strong> = rectosigmoid junction (IMA ↔ internal iliac)","<strong>Thumbprinting</strong> on CT","Contrast with ACUTE MESENTERIC ISCHEMIA (SMA, whole small bowel, 'pain out of proportion')"],
trap:"Ischemic colitis ≠ acute mesenteric ischemia. Colitis = colon, less severe, often resolves. Mesenteric ischemia = small bowel, SMA, deadly."},

// ═══════════════ MALABSORPTION ═══════════════
{id:"malabsorption",cat:"Malabsorption",ck:"malab",emoji:"🧪",name:"Malabsorption Syndromes (General)",
oneLiner:"Failure to absorb nutrients → steatorrhea, weight loss, fatigue, deficiencies of fat-soluble vitamins (ADEK).",
path:"Causes span 4 categories: <strong>(1) Mucosal</strong> (celiac, tropical sprue, Whipple, lactose intolerance), <strong>(2) Luminal</strong> (pancreatic insufficiency, bile salt def, SIBO), <strong>(3) Structural</strong> (short gut, Crohn), <strong>(4) Infectious</strong> (Giardia, tapeworm).",
clin:"<ul><li>Steatorrhea: bulky, greasy, foul-smelling, floating stools</li><li>Weight loss despite normal intake</li><li>ADEK deficiency: night blindness (A), osteomalacia (D), neuro + hemolytic (E), coagulopathy (K)</li><li>B12/folate → megaloblastic anemia</li><li>Iron def → microcytic anemia</li><li>Calcium/Mg def → tetany</li></ul>",
dx:"<strong>72-hr fecal fat collection</strong> (gold standard). <strong>D-xylose test</strong>: abnormal in mucosal disease, normal in pancreatic insufficiency. <strong>Sudan stain</strong> of stool for fat droplets.",
hy:["D-xylose normal → pancreatic (give enzymes)","D-xylose abnormal → mucosal (celiac, Whipple)","Short gut (&lt;200 cm) → TPN-dependent"],
mn:"<strong>'I Get Smashed Weekly'</strong>: <strong>I</strong>nfection (Giardia, TB), <strong>G</strong>luten (celiac), <strong>S</strong>hort bowel, <strong>M</strong>ucosa (Whipple), <strong>A</strong>lpha-chain dz, <strong>S</strong>prue, <strong>H</strong>ypolactasia, <strong>E</strong>nzymes (pancreatic insufficiency), <strong>D</strong>iabetes, <strong>W</strong>hipple."},

{id:"celiac",cat:"Malabsorption",ck:"malab",emoji:"🧪",name:"Celiac Disease (Celiac Sprue)",
oneLiner:"Autoimmune T-cell reaction to <strong>gluten</strong> (gliadin peptide) → villous blunting of duodenum. HLA-DQ2/DQ8.",
path:"Gliadin deamidated by <strong>tissue transglutaminase (tTG)</strong> → T-cell reaction → cytokines → <strong>villous atrophy</strong>, crypt hyperplasia, intraepithelial lymphocyte infiltration (&gt;25/100 enterocytes). Primarily affects <strong>proximal small bowel (duodenum, jejunum)</strong>, sparing distal ileum (so B12 usually spared early; iron + folate worst).",
clin:"<ul><li>Chronic diarrhea, steatorrhea, bloating</li><li>Weight loss, failure to thrive (kids)</li><li><strong>Iron-deficiency anemia</strong> (classic adult presentation, even asymptomatic)</li><li>Osteoporosis (vit D def + Ca malabsorption)</li><li><strong>Dermatitis herpetiformis</strong> (pruritic vesicles on extensor surfaces, IgA deposits in dermal papillae — pathognomonic skin finding)</li></ul>",
dx:"<strong>IgA anti-tTG</strong> (first-line, most sensitive). Anti-endomysial (most specific). Anti-deamidated gliadin. <strong>Duodenal biopsy</strong> (gold standard): villous atrophy + intraepithelial lymphocytes.",
tx:"<strong>Lifelong gluten-free diet</strong> (no wheat, rye, barley — 'WRB' — rice + oats usually OK).",
hy:["<strong>HLA-DQ2</strong> (95%) and <strong>HLA-DQ8</strong>","Anti-tTG IgA first (check <strong>total IgA</strong> to exclude IgA deficiency, which is common in celiac!)","<strong>Duodenal</strong> biopsy (NOT ileum)","Increased risk of <strong>Enteropathy-associated T-cell lymphoma (EATL)</strong>","Dermatitis herpetiformis = treat with dapsone + gluten-free"],
trap:"Anti-tTG IgA can be falsely negative in IgA-deficient patients (10× more common in celiac). Always check total IgA level.",
mn:"<strong>Celiac skin</strong> = <strong>D</strong>ermatitis <strong>H</strong>erpetiformis; <strong>DH = double H</strong> — very itchy vesicles on the extensor surfaces."},

// ═══════════════ INFLAMMATORY (IBD) ═══════════════
{id:"crohn",cat:"Inflammatory (IBD)",ck:"ibd",emoji:"🔥",name:"Crohn Disease",
oneLiner:"Transmural inflammation, anywhere mouth-to-anus (often terminal ileum), skip lesions, non-caseating granulomas, fistulas.",
path:"Th1-mediated (IL-12, IFN-γ, TNF-α). <strong>Transmural</strong> inflammation. <strong>Skip lesions</strong> (patchy). <strong>Cobblestone</strong> mucosa. <strong>Creeping fat</strong>. <strong>Non-caseating granulomas</strong>. <strong>Strictures, fistulas, abscesses</strong>. Classic location: <strong>terminal ileum + proximal colon</strong> (rectum often SPARED). NOD2 gene. Smoking is <strong>RISK factor</strong>.",
clin:"<ul><li>Crampy <strong>RLQ pain</strong> + chronic diarrhea (± blood)</li><li>Weight loss, fatigue, low-grade fever</li><li>Perianal disease (fistulas, abscesses, fissures) — highly suggestive</li><li>Oral aphthous ulcers</li><li><strong>Extraintestinal</strong>: migratory polyarthritis, episcleritis/uveitis, erythema nodosum, pyoderma gangrenosum, <strong>kidney stones (calcium oxalate)</strong>, <strong>gallstones</strong> (from bile salt loss in terminal ileum)</li></ul>",
dx:"Colonoscopy + biopsy: skip lesions, cobblestone, non-caseating granulomas. <strong>'String sign'</strong> (terminal ileum narrowing) on barium. <strong>ASCA+</strong> (anti-Saccharomyces cerevisiae), pANCA−. ↑ CRP, fecal calprotectin.",
tx:"Mild: 5-ASA (limited), budesonide. Moderate-severe: steroids, immunomodulators (azathioprine, MTX), biologics (<strong>anti-TNF</strong> = infliximab, adalimumab; anti-integrin = vedolizumab; anti-IL12/23 = ustekinumab). Surgery is NOT curative (recurs at anastomosis).",
hy:["<strong>Transmural</strong> (vs UC mucosal)","<strong>Skip lesions</strong> + <strong>cobblestone</strong>","<strong>Non-caseating granulomas</strong>","Terminal ileum → <strong>B12 def + gallstones + kidney stones</strong>","<strong>ASCA+, pANCA−</strong>","Smoking makes it WORSE","Surgery NOT curative"],
mn:"<strong>'CHRISTMAS'</strong>: <strong>C</strong>obblestones, <strong>H</strong>igh temp, <strong>R</strong>educed lumen, <strong>I</strong>ntestinal fistulae, <strong>S</strong>kip lesions, <strong>T</strong>ransmural, <strong>M</strong>alabsorption, <strong>A</strong>bdominal pain, <strong>S</strong>ubmucosal fibrosis.",
trap:"Crohn <strong>spares</strong> the rectum; UC <strong>always</strong> involves rectum."},

{id:"uc",cat:"Inflammatory (IBD)",ck:"ibd",emoji:"🔥",name:"Ulcerative Colitis",
oneLiner:"Continuous, superficial (mucosa + submucosa) inflammation starting at <strong>rectum</strong>, ascending. Colon only.",
path:"Th2-mediated. <strong>Continuous</strong> lesions (no skip areas). <strong>Mucosa + submucosa only</strong> (NOT transmural). <strong>Pseudopolyps</strong> (regenerating mucosa). <strong>Crypt abscesses</strong> (neutrophils in crypts). <strong>Lead pipe colon</strong> (loss of haustra on AXR). Rectum ALWAYS involved; can extend proximally. Smoking is PROTECTIVE.",
clin:"<ul><li><strong>Bloody diarrhea</strong> + tenesmus + urgency (hallmark)</li><li>LLQ pain (less severe than Crohn)</li><li>Extraintestinal: <strong>primary sclerosing cholangitis (PSC)</strong> — highly specific for UC; arthritis, uveitis, EN, PG</li><li><strong>Toxic megacolon</strong>: life-threatening colon dilation &gt;6 cm + systemic toxicity (emergency)</li><li>Perianal disease is RARE (vs Crohn)</li></ul>",
dx:"Colonoscopy: continuous, rectum-up inflammation; pseudopolyps; lead pipe colon. Biopsy: crypt abscesses, no granulomas. <strong>p-ANCA+</strong>, ASCA−.",
tx:"5-ASA (mesalamine) is backbone. Steroids for flares. Immunomodulators/biologics for refractory. <strong>Colectomy is CURATIVE</strong>.",
hy:["<strong>Always starts at rectum</strong> (vs Crohn spares rectum)","<strong>Continuous</strong> + <strong>mucosa only</strong>","<strong>Crypt abscesses</strong>, <strong>pseudopolyps</strong>","<strong>Lead pipe colon</strong>","<strong>PSC association</strong> (anti-smooth muscle or p-ANCA)","Smoking is <strong>PROTECTIVE</strong>","↑↑ colon cancer risk after 10 yrs (annual surveillance)","Surgery is CURATIVE","<strong>p-ANCA+</strong>"],
mn:"<strong>'ULCCCERS'</strong>: <strong>U</strong>lcers, <strong>L</strong>arge intestine only, <strong>C</strong>ontinuous, <strong>C</strong>olorectal cancer, <strong>C</strong>rypt abscesses, <strong>E</strong>xtends proximally from rectum, <strong>R</strong>ed diarrhea, <strong>S</strong>clerosing cholangitis."},

{id:"ibd-general",cat:"Inflammatory (IBD)",ck:"ibd",emoji:"🔥",name:"IBD — Comparison & General",
oneLiner:"Crohn vs UC side-by-side. Shared features: extraintestinal manifestations (EIMs) + treatment ladder.",
path:"Both are chronic immune-mediated. Both have a bimodal age distribution (15–35 and 55–65). Both have EIMs. Both increase colon cancer risk (UC &gt; Crohn).",
clin:"<strong>Shared EIMs (MSK/Eye/Skin/Liver)</strong>: Migratory arthritis, ankylosing spondylitis, uveitis/episcleritis, erythema nodosum, pyoderma gangrenosum, aphthous ulcers, PSC (UC &gt;&gt; Crohn). <strong>Tx ladder (both)</strong>: 5-ASA (UC &gt; Crohn) → steroids → immunomods → biologics → surgery.",
hy:["<strong>Crohn</strong>: Transmural, skip, granulomas, terminal ileum, ASCA, fistulas, surgery NOT curative, smoking WORSE","<strong>UC</strong>: Mucosal, continuous, crypt abscesses, rectum, p-ANCA, no fistulas, surgery CURATIVE, smoking PROTECTIVE","Both → ↑ colon cancer risk (surveillance colonoscopy after 8–10 yrs dz)","PSC strongly linked to UC (anti-smooth muscle antibodies)"],
mn:"<strong>Crohn = 'CHRISTMAS'</strong>; <strong>UC = 'ULCCCERS'</strong>. <strong>'Crohn's = cobblestones; UC = crypt abscesses.'</strong>"},

// ═══════════════ DIVERTICULAR ═══════════════
{id:"diverticulosis",cat:"Diverticular",ck:"div",emoji:"🕳️",name:"Diverticulosis",
oneLiner:"Outpouchings of colonic mucosa + submucosa (pseudodiverticula) through muscularis at sites of vasa recta entry. Usually <strong>sigmoid</strong>.",
path:"Low-fiber, high-pressure colonic lumen → mucosa + submucosa herniate where vasa recta penetrate muscularis (weak points). Common in &gt;60 yr. <strong>False (pseudo) diverticula</strong> — only mucosa + submucosa, NO muscle layer.",
clin:"Usually <strong>asymptomatic</strong>. May cause <strong>painless hematochezia</strong> (most common cause of painless lower GI bleed in elderly). LLQ fullness.",
dx:"Colonoscopy or CT.",
tx:"High-fiber diet. Surgery rarely.",
hy:["Most common cause of <strong>painless lower GI bleed in elderly</strong>","Sigmoid colon, false diverticula","Low-fiber diet → high intraluminal pressure"]},

{id:"diverticulitis",cat:"Diverticular",ck:"div",emoji:"🕳️",name:"Diverticulitis",
oneLiner:"Inflammation/infection of a diverticulum → 'left-sided appendicitis'. Fever + LLQ pain.",
path:"Fecalith obstructs diverticulum neck → stasis + bacterial overgrowth → inflammation ± microperforation. Polymicrobial (E. coli, Bacteroides).",
clin:"<ul><li><strong>LLQ pain</strong> ('left-sided appendicitis')</li><li>Fever, leukocytosis</li><li>Change in bowel habits (constipation or diarrhea)</li><li>Complications: <strong>perforation</strong>, <strong>abscess</strong>, <strong>fistula</strong> (colovesical → pneumaturia, fecaluria; colovaginal), <strong>stricture</strong>, obstruction</li></ul>",
dx:"<strong>CT with contrast</strong> (gold standard — shows pericolic fat stranding, bowel wall thickening ± abscess). <strong>AVOID colonoscopy acutely</strong> (perforation risk) — do after 6 wks.",
tx:"Uncomplicated: bowel rest, IV/PO antibiotics (cipro + metronidazole, or amox/clav). Complicated (abscess &gt;4 cm): drainage. Perforation/fistula: surgery.",
hy:["<strong>LLQ pain + fever</strong> = diverticulitis","<strong>Pneumaturia</strong> = colovesical fistula","Avoid colonoscopy in acute setting","AAA can mimic — rule out in elderly"]},

{id:"fap",cat:"Genetic Syndromes",ck:"genetic",emoji:"🧬",name:"FAP (Familial Adenomatous Polyposis)",

{id:"lynch",cat:"Genetic Syndromes",ck:"genetic",emoji:"🧬",name:"Lynch Syndrome (HNPCC)",

clin:"<ul><li>Early-onset CRC (usually before 50)</li><li>Right-sided colon cancer (not polyp-rich like FAP)</li><li><strong>Endometrial cancer (2nd most common cancer in Lynch — females)</strong></li><li>Ovarian, gastric, urothelial, small bowel, pancreatic, brain cancers</li><li><strong>Muir-Torre variant</strong>: Lynch + <strong>sebaceous skin tumors</strong> + keratoacanthomas</li></ul>",

hy:["<strong>Interstitial cells of Cajal</strong>","<strong>c-KIT (CD117) positive</strong>, <strong>DOG-1</strong>","<strong>Imatinib</strong> = first-line for advanced","Most common GI mesenchymal tumor","Stomach &gt; small bowel","<strong>NF1 association</strong>","Carney triad: GIST + pulmonary chondroma + extra-adrenal paraganglioma"]},

{id:"carcinoid",cat:"Neuroendocrine",ck:"gastric",emoji:"🔹",name:"Carcinoid Tumor",
oneLiner:"Neuroendocrine tumor from enterochromaffin cells. <strong>Appendix (most common, benign)</strong>; <strong>ileum (most common malignant)</strong>. Serotonin secretor.",
path:"Enterochromaffin (EC) cells secrete <strong>serotonin (5-HT)</strong>, histamine, kallikrein. Gut hormones → vasoactive symptoms only after <strong>LIVER METASTASIS</strong> (otherwise liver clears serotonin first-pass).",
clin:"<ul><li><strong>Carcinoid syndrome (only with liver mets)</strong>: episodic <strong>flushing</strong>, <strong>diarrhea</strong>, <strong>bronchospasm (wheezing)</strong>, <strong>right-sided heart valve fibrosis</strong> (tricuspid regurg, pulmonary stenosis — because lung MAOs destroy serotonin, sparing left heart)</li><li><strong>Pellagra (niacin deficiency)</strong> — tryptophan diverted to serotonin: <strong>3 Ds — Diarrhea, Dermatitis, Dementia</strong></li><li>Ileal carcinoid can cause intussusception</li></ul>",
dx:"<strong>24-hr urine 5-HIAA</strong> (serotonin metabolite). Chromogranin A. Octreotide scan / Ga-68 DOTATATE PET.",
tx:"Surgical resection. <strong>Octreotide</strong> (somatostatin analog) for symptoms.",
hy:["<strong>Appendix = most common site</strong> (usually benign; incidental)","<strong>Ileum = most common malignant</strong>","<strong>Right-sided valve fibrosis</strong> (tricuspid, pulmonary)","<strong>Pellagra (3 Ds)</strong> from tryptophan depletion","Urine <strong>5-HIAA</strong>","Octreotide treatment","Needs <strong>liver mets</strong> for carcinoid syndrome"],
mn:"<strong>Carcinoid = 'R' heart valves (TRICUSPID REGURG + PULMONIC STENOSIS — TIPS)</strong>."},

{id:"malt-lymphoma",cat:"Lymphoid",ck:"gastric",emoji:"🔹",name:"MALT Lymphoma",
oneLiner:"<strong>H. pylori-driven</strong> marginal zone B-cell lymphoma of stomach. Often <strong>regresses with H. pylori eradication</strong>. t(11;18).",
path:"Chronic H. pylori antigen stimulation → B-cell lymphoid tissue proliferation. <strong>t(11;18)(q21;q21) — API2-MALT1 fusion</strong>. Low-grade.",
clin:"Dyspepsia, similar to gastritis. Often asymptomatic until advanced.",
dx:"Endoscopy + biopsy. IHC: CD20+.",
tx:"<strong>H. pylori eradication FIRST</strong> (many regress). Rituximab/radiation if no response or t(11;18) present (unlikely to regress).",
hy:["<strong>H. pylori → MALT</strong>","Low-grade B-cell","<strong>t(11;18)</strong> = won't regress with H. pylori tx","First-line: H. pylori eradication","Can transform to DLBCL"]},

{id:"dlbcl",cat:"Lymphoid",ck:"gastric",emoji:"🔹",name:"Diffuse Large B-Cell Lymphoma (GI)",
oneLiner:"<strong>Most common primary GI lymphoma</strong>. Aggressive but curable. Stomach most common.",
path:"High-grade B-cell lymphoma. Can arise de novo or from transformation of MALT. <strong>BCL2, BCL6, MYC</strong> translocations.",
clin:"B-symptoms (fever, night sweats, weight loss), mass, GI bleed, perforation.",
dx:"Biopsy. IHC: CD20+.",
tx:"<strong>R-CHOP</strong> (rituximab + cyclophosphamide + doxorubicin + vincristine + prednisone).",
hy:["<strong>Most common GI lymphoma</strong>","Aggressive but curable","<strong>R-CHOP</strong>","Can come from MALT","CD20+"]}
];

// ═══════════════ STATE ═══════════════
const state={currentId:null,learned:new Set(),search:"",collapsed:new Set()};

// ═══════════════ CATEGORY GROUPS ═══════════════
function groupByCategory(){
  const map={};
  DISEASES.forEach(d=>{
    if(!map[d.cat])map[d.cat]={key:d.ck,emoji:d.emoji,items:[]};
    map[d.cat].items.push(d);
  });
  return map;
}

function getVisibleDiseases(){
  const q=state.search.toLowerCase().trim();
  if(!q)return DISEASES;
  return DISEASES.filter(d=>{
    const hay=(d.name+" "+d.cat+" "+d.oneLiner+" "+(d.path||"")+" "+(d.clin||"")+" "+(d.dx||"")+" "+(d.tx||"")+" "+(d.hy||[]).join(" ")+" "+(d.mn||"")+" "+(d.trap||"")).toLowerCase();
    return hay.includes(q);
  });
}

// ═══════════════ SIDEBAR ═══════════════
function renderSidebar(){
  const visible=getVisibleDiseases();
  const visibleIds=new Set(visible.map(d=>d.id));
  const groups=groupByCategory();
  const list=document.getElementById("sbList");
  let html="";
  Object.entries(groups).forEach(([cat,info])=>{
    const visibleItems=info.items.filter(d=>visibleIds.has(d.id));
    if(!visibleItems.length)return;
    const collapsed=state.collapsed.has(cat)&&!state.search;
    html+=`<div class="cat-group ${collapsed?"collapsed":""}" data-cat="${cat}">
      <div class="cat-header" onclick="toggleCat('${cat}')">
        <span class="cat-chevron">▼</span>
        <span>${info.emoji} ${cat}</span>
        <span class="cat-count">${visibleItems.length}</span>
      </div>
      <div class="cat-list">`;
    visibleItems.forEach(d=>{
      const active=state.currentId===d.id;
      const learned=state.learned.has(d.id);
      html+=`<div class="dz-item ${active?"active":""} ${learned?"learned":""}" data-id="${d.id}" onclick="selectDisease('${d.id}')">
        <span class="dz-check">${learned?"✓":"○"}</span>
        <span class="dz-name">${d.name}</span>
      </div>`;
    });
    html+=`</div></div>`;
  });
  list.innerHTML=html||`<div class="empty" style="padding:30px 14px">No matches.</div>`;
}

function toggleCat(cat){
  if(state.collapsed.has(cat))state.collapsed.delete(cat);
  else state.collapsed.add(cat);
  renderSidebar();
}

// ═══════════════ MAIN CONTENT ═══════════════
function renderContent(){
  const content=document.getElementById("content");
  if(!state.currentId){
    content.innerHTML=`<div class="content-inner"><div class="empty">
      <p style="font-size:18px;color:#14532d;margin-bottom:14px;">Welcome to the GI Disease Atlas</p>
      <p style="max-width:400px;margin:0 auto 18px;">Choose a disease from the sidebar — or start with Meckel diverticulum to work through everything alphabetically by category.</p>
      <button class="nav-btn" style="display:inline-flex;max-width:240px;margin:0 auto;background:#14532d;color:white;border-color:#14532d;" onclick="selectDisease(DISEASES[0].id)">Start with ${DISEASES[0].name} ▶</button>
    </div></div>`;
    return;
  }
  const d=DISEASES.find(x=>x.id===state.currentId);
  if(!d){content.innerHTML='<div class="empty">Not found.</div>';return;}
  const learned=state.learned.has(d.id);
  const visible=getVisibleDiseases();
  const idx=visible.findIndex(x=>x.id===d.id);
  const prev=idx>0?visible[idx-1]:null;
  const next=idx<visible.length-1?visible[idx+1]:null;

  content.innerHTML=`<div class="content-inner">
    <div class="dz-entry">
      <div class="cat-label"><span class="cat-dot"></span>${d.emoji} ${d.cat}</div>
      <h2 class="dz-title">${d.name}</h2>
      <div class="dz-oneliner">${d.oneLiner}</div>
      ${d.path?`<div class="sec"><h3>🔬 Pathophysiology</h3><p>${d.path}</p></div>`:""}
      ${d.clin?`<div class="sec"><h3>🩺 Clinical Features</h3>${d.clin.trim().startsWith("<ul>")?d.clin:"<p>"+d.clin+"</p>"}</div>`:""}
      ${d.dx?`<div class="sec"><h3>🔍 Diagnosis</h3><p>${d.dx}</p></div>`:""}
      ${d.tx?`<div class="sec"><h3>💊 Treatment</h3><p>${d.tx}</p></div>`:""}
      ${d.hy?.length?`<div class="callout hy"><h4>⚡ USMLE High-Yield</h4><ul>${d.hy.map(x=>`<li>${x}</li>`).join("")}</ul></div>`:""}
      ${d.mn?`<div class="callout mn"><h4>🧠 Mnemonic</h4>${d.mn}</div>`:""}
      ${d.trap?`<div class="callout trap"><h4>⚠️ Exam Trap</h4>${d.trap}</div>`:""}
    </div>
    <div class="footer-nav">
      <button class="nav-btn" onclick="navigate(-1)" ${prev?"":"disabled"}>◀ ${prev?prev.name.slice(0,30):"Previous"}<span class="kbd">←</span></button>
      <button class="nav-btn learn ${learned?"learned":""}" onclick="toggleLearned()">${learned?"✓ Learned":"Mark Learned"}<span class="kbd">Space</span></button>
      <button class="nav-btn" onclick="navigate(1)" ${next?"":"disabled"}>${next?next.name.slice(0,30):"Next"} ▶<span class="kbd">→</span></button>
    </div>
  </div>`;
}

// ═══════════════ NAVIGATION ═══════════════
function selectDisease(id){
  state.currentId=id;
  // expand category containing this disease
  const d=DISEASES.find(x=>x.id===id);
  if(d)state.collapsed.delete(d.cat);
  renderSidebar();
  renderContent();
  document.getElementById("content").scrollTo(0,0);
  // close mobile sidebar
  if(window.innerWidth<=720)document.getElementById("sidebar").classList.remove("open");
  // scroll sidebar to selected
  setTimeout(()=>{
    const el=document.querySelector(`.dz-item[data-id="${id}"]`);
    if(el)el.scrollIntoView({block:"nearest",behavior:"smooth"});
  },50);
}

function navigate(dir){
  const visible=getVisibleDiseases();
  const idx=visible.findIndex(x=>x.id===state.currentId);
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=visible.length)return;
  selectDisease(visible[newIdx].id);
}

function toggleLearned(){
  if(!state.currentId)return;
  if(state.learned.has(state.currentId))state.learned.delete(state.currentId);
  else state.learned.add(state.currentId);
  renderSidebar();
  renderContent();
  updateProgress();
}

function updateProgress(){
  document.getElementById("learnedText").textContent=`${state.learned.size} / ${DISEASES.length}`;
  document.getElementById("progressFill").style.width=(DISEASES.length?state.learned.size/DISEASES.length*100:0)+"%";
}

// ═══════════════ EXCEL EXPORT ═══════════════
function exportExcel(){
  let html=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="UTF-8"><style>
    th{background:#14532d;color:white;padding:8px;font-weight:bold;text-align:left;border:1px solid #0f3a1f}
    td{padding:6px 8px;border:1px solid #e2e8f0;vertical-align:top}
    tr:nth-child(even) td{background:#f8fafc}
    .cat{background:#dcfce7;font-weight:bold}
  </style></head><body>
  <table>
    <tr><th>#</th><th>Category</th><th>Disease</th><th>One-Liner</th><th>Pathophysiology</th><th>Clinical</th><th>Diagnosis</th><th>Treatment</th><th>USMLE High-Yield</th><th>Mnemonic</th><th>Exam Trap</th><th>Learned</th></tr>`;
  DISEASES.forEach((d,i)=>{
    const strip=(s)=>(s||"").replace(/<[^>]+>/g," ").replace(/\s+/g," ").trim();
    html+=`<tr>
      <td>${i+1}</td>
      <td class="cat">${d.cat}</td>
      <td><strong>${d.name}</strong></td>
      <td>${strip(d.oneLiner)}</td>
      <td>${strip(d.path)}</td>
      <td>${strip(d.clin)}</td>
      <td>${strip(d.dx)}</td>
      <td>${strip(d.tx)}</td>
      <td>${(d.hy||[]).map(strip).join(" • ")}</td>
      <td>${strip(d.mn)}</td>
      <td>${strip(d.trap)}</td>
      <td>${state.learned.has(d.id)?"✓":""}</td>
    </tr>`;
  });
  html+=`</table></body></html>`;
  const blob=new Blob(['\ufeff',html],{type:"application/vnd.ms-excel"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download="GI_Disease_Study_Guide.xls";a.click();
  URL.revokeObjectURL(url);
}

// ═══════════════ PRINT ═══════════════
function printAll(){
  // Build full content with every disease as a section
  const content=document.getElementById("content");
  const original=content.innerHTML;
  content.innerHTML=`<div class="content-inner">${DISEASES.map(d=>`
    <div class="dz-entry" style="page-break-after:always;margin-bottom:40px;">
      <div class="cat-label"><span class="cat-dot"></span>${d.emoji} ${d.cat}</div>
      <h2 class="dz-title">${d.name}</h2>
      <div class="dz-oneliner">${d.oneLiner}</div>
      ${d.path?`<div class="sec"><h3>🔬 Pathophysiology</h3><p>${d.path}</p></div>`:""}
      ${d.clin?`<div class="sec"><h3>🩺 Clinical Features</h3>${d.clin.trim().startsWith("<ul>")?d.clin:"<p>"+d.clin+"</p>"}</div>`:""}
      ${d.dx?`<div class="sec"><h3>🔍 Diagnosis</h3><p>${d.dx}</p></div>`:""}
      ${d.tx?`<div class="sec"><h3>💊 Treatment</h3><p>${d.tx}</p></div>`:""}
      ${d.hy?.length?`<div class="callout hy"><h4>⚡ USMLE High-Yield</h4><ul>${d.hy.map(x=>`<li>${x}</li>`).join("")}</ul></div>`:""}
      ${d.mn?`<div class="callout mn"><h4>🧠 Mnemonic</h4>${d.mn}</div>`:""}
      ${d.trap?`<div class="callout trap"><h4>⚠️ Exam Trap</h4>${d.trap}</div>`:""}
    </div>`).join("")}</div>`;
  setTimeout(()=>{window.print();content.innerHTML=original;renderContent();},300);
}

// ═══════════════ WIRING ═══════════════
document.getElementById("search").addEventListener("input",(e)=>{
  state.search=e.target.value;
  renderSidebar();
});
document.getElementById("prevBtn").onclick=()=>navigate(-1);
document.getElementById("nextBtn").onclick=()=>navigate(1);
document.getElementById("printBtn").onclick=printAll;
document.getElementById("excelBtn").onclick=exportExcel;

// Keyboard shortcuts
document.addEventListener("keydown",(e)=>{
  if(e.target.tagName==="INPUT")return;
  if(e.key==="ArrowLeft"){e.preventDefault();navigate(-1);}
  else if(e.key==="ArrowRight"){e.preventDefault();navigate(1);}
  else if(e.key===" "){e.preventDefault();toggleLearned();}
  else if(e.key==="ArrowDown"||e.key==="ArrowUp"){
    e.preventDefault();
    const visible=getVisibleDiseases();
    const idx=visible.findIndex(x=>x.id===state.currentId);
    const dir=e.key==="ArrowDown"?1:-1;
    const newIdx=idx===-1?0:idx+dir;
    if(newIdx>=0&&newIdx<visible.length)selectDisease(visible[newIdx].id);
  }
});

// Init — all categories collapsed by default except first
Object.keys(groupByCategory()).slice(1).forEach(c=>state.collapsed.add(c));
renderSidebar();
renderContent();
updateProgress();
</script>
</body>
</html>
