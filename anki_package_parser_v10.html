<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anki Package Parser</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; max-width: 1100px; margin: 2rem auto; padding: 0 1rem; background: #fff; color: #111; }
  .page-title { font-size: 20px; font-weight: 500; margin: 0 0 2px; }
  .page-sub { font-size: 13px; color: #777; margin: 0 0 0.75rem; }
  #drop-zone { border: 1.5px dashed #aaa; border-radius: 12px; padding: 2.5rem; text-align: center; cursor: pointer; background: #f7f7f5; margin: 1rem 0; transition: background 0.15s; }
  #drop-zone:hover, #drop-zone.drag-over { background: #e8f0fb; border-color: #4a7fcb; }
  #drop-zone input { display: none; }
  #drop-zone p { margin: 4px 0; font-size: 14px; color: #555; }
  .hint { font-size: 12px; color: #888; margin-top: 6px; }
  .config-grid { display: grid; grid-template-columns: auto 1fr; gap: 8px 12px; align-items: center; margin: 0.75rem 0; max-width: 600px; }
  .config-grid label { font-size: 13px; color: #555; white-space: nowrap; }
  select, input[type=text] { padding: 6px 10px; border: 0.5px solid #ccc; border-radius: 8px; background: #fff; color: #111; font-size: 13px; width: 100%; }
  .preview-block { grid-column: 1 / -1; background: #f7f7f5; border-radius: 8px; border: 0.5px solid #ddd; padding: 8px 12px; }
  .preview-label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .preview-tag { font-size: 12px; font-family: monospace; color: #111; word-break: break-all; }
  .seg-matched { color: #777; }
  #status { font-size: 13px; color: #555; min-height: 18px; margin: 0.25rem 0; }
  .status-err { color: #c0392b !important; }
  #summary { display: flex; gap: 10px; margin: 0.75rem 0; flex-wrap: wrap; }
  .stat { background: #f7f7f5; border-radius: 8px; padding: 0.6rem 1rem; }
  .stat .val { font-size: 20px; font-weight: 500; }
  .stat .lbl { font-size: 12px; color: #555; margin-top: 2px; }
  .tab-bar { display: flex; border-bottom: 1px solid #e5e5e5; margin: 0.5rem 0 0; }
  .tab { padding: 7px 16px; font-size: 13px; cursor: pointer; color: #777; border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .tab:hover { color: #111; }
  .tab.active { color: #111; border-bottom-color: #4a7fcb; font-weight: 500; }
  .panel { display: none; padding-top: 0.75rem; }
  .panel.active { display: block; }
  .toolbar { display: flex; gap: 8px; margin: 0 0 0.75rem; flex-wrap: wrap; align-items: center; }
  #search { flex: 1; min-width: 180px; padding: 6px 10px; border: 0.5px solid #ccc; border-radius: 8px; font-size: 13px; }
  button { padding: 6px 14px; border: 0.5px solid #ccc; border-radius: 8px; background: #fff; color: #111; font-size: 13px; cursor: pointer; }
  button:hover { background: #f7f7f5; }
  button.primary { background: #e8f0fb; color: #1a4fa0; border-color: #a0bce8; }
  #table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
  col.col-chapter    { width: 160px; }
  col.col-subchapter { width: 160px; }
  col.col-mapped     { width: 180px; }
  col.col-count      { width: 80px; }
  col.col-tag        { }
  th { background: #f7f7f5; text-align: left; padding: 8px 10px; font-weight: 500; font-size: 12px; color: #555; border-bottom: 1px solid #e5e5e5; cursor: pointer; user-select: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  th:hover { color: #111; }
  td { padding: 7px 10px; border-bottom: 0.5px solid #eee; vertical-align: top; overflow: hidden; }
  td.chapter-cell, td.subchapter-cell, td.mapped-cell { text-overflow: ellipsis; white-space: nowrap; }
  td.mapped-cell { font-size: 12px; color: #555; }
  td.mapped-cell .mapped-num { font-family: monospace; color: #999; margin-right: 4px; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f7f7f5; }
  .tag-cell { font-size: 11px; color: #777; font-family: monospace; word-break: break-all; }
  .count-cell { font-weight: 500; text-align: center; }
  #empty { text-align: center; padding: 3rem; color: #aaa; font-size: 14px; }
  .tree-toolbar { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .tree-toolbar button { font-size: 12px; padding: 4px 10px; }
  .tree { font-size: 13px; line-height: 1.7; }
  .tree-row { display: flex; align-items: baseline; gap: 6px; padding: 2px 4px; cursor: pointer; border-radius: 6px; }
  .tree-row:hover { background: #f7f7f5; }
  .tog { font-size: 10px; color: #aaa; width: 12px; flex-shrink: 0; }
  .t-resource { font-weight: 500; color: #111; }
  .t-subject { color: #555; }
  .t-chapter { font-weight: 500; color: #111; }
  .t-subnum { font-size: 11px; color: #aaa; flex-shrink: 0; min-width: 34px; font-family: monospace; }
  .t-subchapter { color: #555; }
  .t-tag { font-family: monospace; font-size: 11px; color: #999; word-break: break-all; }
  .t-arrow { color: #ccc; font-size: 11px; flex-shrink: 0; }
  .tree-children { padding-left: 18px; border-left: 0.5px solid #e5e5e5; margin-left: 5px; }
  .tree-children.collapsed { display: none; }
  .leaf-row { display: flex; align-items: baseline; gap: 6px; padding: 2px 4px; flex-wrap: nowrap; border-radius: 6px; }
  .leaf-row:hover { background: transparent; }
  .leaf-block:hover .leaf-row { background: transparent; }
  .leaf-indent { width: 12px; flex-shrink: 0; }
  .leaf-block { border-radius: 6px; }
  .leaf-block:hover { background: #f7f7f5; }
  .leaf-extra-tag { padding-left: 56px; }
</style>
</head>
<body>

<p class="page-title">Anki package parser</p>
<p class="page-sub">Extract chapter / subchapter / card counts and hierarchy from an .apkg file</p>

<div class="config-grid">
  <label>Third-party resource</label>
  <select id="prefix-select" onchange="onConfigChange()">
    <option value="#AK_Step1_v12::#Bootcamp">Bootcamp</option>
    <option value="#AK_Step1_v12::#B&B">Boards &amp; Beyond (B&amp;B)</option>
    <option value="#AK_Step1_v12::Pathoma">Pathoma</option>
    <option value="#AK_Step1_v12::Sketchy">Sketchy</option>
    <option value="#AK_Step1_v12::Physeo">Physeo</option>
    <option value="custom">Custom…</option>
  </select>
  <label id="custom-resource-label" style="display:none">Custom prefix</label>
  <input type="text" id="custom-resource-input" placeholder="e.g. #AK_Step1_v12::MySource" style="display:none" oninput="onConfigChange()">
  <label>Subject <span style="font-size:11px;color:#aaa">(must match tag exactly)</span></label>
  <input type="text" id="subject-input" placeholder="e.g. Endocrinology, Reproductive…" value="Endocrinology" oninput="onConfigChange()">
  <div class="preview-block">
    <div class="preview-label">Matching tags that look like:</div>
    <div class="preview-tag" id="tag-preview"></div>
  </div>
</div>

<div id="drop-zone" onclick="document.getElementById('file-input').click()" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
  <input type="file" id="file-input" accept=".apkg,.zip" onchange="handleFile(this.files[0])">
  <div style="font-size:28px;margin-bottom:8px">📦</div>
  <p style="font-weight:500;color:#111">Drop your .apkg file here</p>
  <p>or click to browse</p>
  <p class="hint">Anki package files (.apkg) only</p>
</div>

<div style="display:flex; align-items:center; gap:10px;">
  <div id="status" style="flex:1"></div>
  <button id="reset-btn" style="display:none; color:#c0392b; border-color:#e0a8a8;" onclick="resetAll()">Reset</button>
</div>
<div id="summary" style="display:none"></div>

<div id="results" style="display:none">
  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('table')">Table</div>
    <div class="tab" onclick="switchTab('tree')">Hierarchy map</div>
  </div>

  <div id="panel-table" class="panel active">
    <div class="toolbar">
      <input id="search" type="text" placeholder="Search chapters, subchapters, or tags…" oninput="renderTable()">
      <button onclick="exportCSV()">Export CSV</button>
      <button class="primary" onclick="exportTSV()">Export for Google Sheets / Excel</button>
    </div>
    <div id="table-wrap"></div>
  </div>

  <div id="panel-tree" class="panel">
    <div class="tree-toolbar">
      <button onclick="setAllTree(true)">Expand all</button>
      <button onclick="setAllTree(false)">Collapse all</button>
      <button onclick="exportHierarchyText()">Export as text</button>
      <button onclick="exportHierarchyJSON()">Export as JSON</button>
    </div>
    <div id="tree-wrap" class="tree"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fzstd@0.1.0/umd/index.js"></script>
<script>
let allRows = [], sortCol = 0, sortDir = 1, cachedNoteRows = null;

function label(s) { return s.replace(/_/g, ' '); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function getChapterNum(chapterRaw) { const m = chapterRaw.match(/^(\d+)/); return m ? parseInt(m[1], 10) : null; }
function getSubchapterNum(subRaw) { const m = subRaw.match(/^(\d+)/); return m ? parseInt(m[1], 10) : null; }
function formatSubNum(chapterNum, subNum) {
  if (chapterNum === null || subNum === null) return '';
  return `${chapterNum}.${String(subNum).padStart(2, '0')}`;
}
function stripLeadingNum(s) { return s.replace(/^\d+\s*/, ''); }
function mappedLabel(chapterRaw, subRaw) {
  const num = formatSubNum(getChapterNum(chapterRaw), getSubchapterNum(subRaw));
  return num ? `${num} ${stripLeadingNum(label(subRaw))}` : label(subRaw);
}

function getResourceBase() {
  const s = document.getElementById('prefix-select').value;
  return s === 'custom' ? document.getElementById('custom-resource-input').value.trim() : s;
}
function getResourceName() {
  const s = document.getElementById('prefix-select').value;
  const map = {'#AK_Step1_v12::#Bootcamp':'Bootcamp','#AK_Step1_v12::#B&B':'B&B','#AK_Step1_v12::Pathoma':'Pathoma','#AK_Step1_v12::Sketchy':'Sketchy','#AK_Step1_v12::Physeo':'Physeo'};
  return s === 'custom' ? (document.getElementById('custom-resource-input').value.split('::').pop() || 'Resource') : (map[s] || s);
}
function getSubject() { return document.getElementById('subject-input').value.trim(); }
function getFullPrefix() {
  const b = getResourceBase(), sub = getSubject();
  return b ? (sub ? `${b}::${sub}::` : `${b}::`) : '';
}

function updatePreview() {
  const base = getResourceBase() || '#AK_Step1_v12::Resource', subject = getSubject() || '<Subject>';
  document.getElementById('tag-preview').innerHTML =
    `<span class="seg-matched">${esc(base)}::${esc(subject)}::</span><strong>&lt;Chapter&gt;</strong>::<strong>&lt;Subchapter&gt;</strong>`;
}
function onConfigChange() {
  const isCustom = document.getElementById('prefix-select').value === 'custom';
  document.getElementById('custom-resource-label').style.display = isCustom ? '' : 'none';
  document.getElementById('custom-resource-input').style.display = isCustom ? '' : 'none';
  updatePreview();
  if (cachedNoteRows) reparse();
}
function setStatus(msg, err) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = err ? 'status-err' : '';
}
function handleDragOver(e) { e.preventDefault(); document.getElementById('drop-zone').classList.add('drag-over'); }
function handleDragLeave() { document.getElementById('drop-zone').classList.remove('drag-over'); }
function handleDrop(e) { e.preventDefault(); document.getElementById('drop-zone').classList.remove('drag-over'); const f = e.dataTransfer.files[0]; if (f) handleFile(f); }

async function getDbBytes(zip) {
  const b = zip.file('collection.anki21b');
  if (b) {
    setStatus('Decompressing collection (zstd)…');
    const c = await b.async('uint8array');
    if (window.fzstd) return window.fzstd.decompress(c);
    throw new Error('fzstd not available — cannot decompress .anki21b');
  }
  const a21 = zip.file('collection.anki21'); if (a21) return new Uint8Array(await a21.async('arraybuffer'));
  const a2 = zip.file('collection.anki2'); if (a2) return new Uint8Array(await a2.async('arraybuffer'));
  throw new Error('No collection database found in package');
}

async function handleFile(file) {
  if (!file) return;
  if (!file.name.endsWith('.apkg') && !file.name.endsWith('.zip')) { setStatus('Please upload an .apkg file.', true); return; }
  setStatus('Reading file…');
  try {
    const buf = await file.arrayBuffer();
    const zip = await JSZip.loadAsync(buf);
    const dbBytes = await getDbBytes(zip);
    setStatus('Loading database…');
    const SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}` });
    const db = new SQL.Database(dbBytes);
    setStatus('Extracting tags…');
    const res = db.exec("SELECT tags FROM notes WHERE tags != ''");
    db.close();
    cachedNoteRows = res.length ? res[0].values : [];
    reparse(file.name);
  } catch(e) { setStatus('Error: ' + e.message, true); console.error(e); }
}

function reparse(filename) {
  if (!cachedNoteRows) return;
  const prefix = getFullPrefix();
  if (!prefix) { setStatus('Please configure the resource and subject above.', true); return; }
  allRows = extractRows(cachedNoteRows, prefix);
  if (!allRows.length) {
    setStatus(`No cards found matching: ${prefix}`, true);
    document.getElementById('summary').style.display = 'none';
    document.getElementById('results').style.display = 'none';
    return;
  }
  setStatus(`Loaded ${filename || 'package'} — ${allRows.length} subchapters found.`);
  showSummary();
  document.getElementById('results').style.display = 'block';
  document.getElementById('reset-btn').style.display = '';
  renderTable();
  renderTree();
}

function resetAll() {
  allRows = [];
  cachedNoteRows = null;
  sortCol = 0;
  sortDir = 1;
  document.getElementById('status').textContent = '';
  document.getElementById('summary').style.display = 'none';
  document.getElementById('summary').innerHTML = '';
  document.getElementById('results').style.display = 'none';
  document.getElementById('table-wrap').innerHTML = '';
  document.getElementById('tree-wrap').innerHTML = '';
  document.getElementById('search').value = '';
  document.getElementById('reset-btn').style.display = 'none';
  const fileInput = document.querySelector('#drop-zone input');
  if (fileInput) fileInput.value = '';
}

function extractRows(noteRows, prefix) {
  const subMap = {};
  const tagCounts = {};
  const prefixLower = prefix.toLowerCase();
  for (const row of noteRows) {
    const tags = (row[0] || '').trim().split(/\s+/);
    for (const rawTag of tags) {
      if (!rawTag) continue;
      const tag = rawTag.startsWith('#') ? rawTag : '#' + rawTag;
      if (!tag.toLowerCase().startsWith(prefixLower)) continue;
      const parts = tag.slice(prefix.length).split('::');
      if (parts.length < 2 || !parts[0] || !parts[1]) continue;
      const chapter = parts[0];
      const subchapter = parts[1];
      const key = chapter + '|||' + subchapter;
      if (!subMap[key]) {
        subMap[key] = { chapter, subchapter, count: 0, tags: [] };
        tagCounts[key] = {};
      }
      subMap[key].count += 1;
      if (!tagCounts[key][tag]) {
        tagCounts[key][tag] = true;
        subMap[key].tags.push(tag);
      }
    }
  }
  // Keep .tag as first tag for backward compat, .tags has all
  const result = Object.values(subMap);
  for (const r of result) { r.tag = r.tags[0] || ''; }
  return result.sort((a, b) => a.chapter.localeCompare(b.chapter) || a.subchapter.localeCompare(b.subchapter));
}

function showSummary() {
  const chapters = new Set(allRows.map(r => r.chapter)).size;
  const totalCards = allRows.reduce((s, r) => s + r.count, 0);
  document.getElementById('summary').style.display = 'flex';
  document.getElementById('summary').innerHTML = `
    <div class="stat"><div class="val">${chapters}</div><div class="lbl">Chapters</div></div>
    <div class="stat"><div class="val">${allRows.length}</div><div class="lbl">Subchapters</div></div>
    <div class="stat"><div class="val">${totalCards.toLocaleString()}</div><div class="lbl">Total cards</div></div>`;
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab[onclick="switchTab('${name}')"]`).classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

function getFiltered() {
  const q = (document.getElementById('search').value || '').toLowerCase();
  return q ? allRows.filter(r => r.chapter.toLowerCase().includes(q) || r.subchapter.toLowerCase().includes(q) || r.tags.some(t => t.toLowerCase().includes(q))) : allRows;
}
function getSorted(rows) {
  const cols = ['chapter','subchapter','mapped','count','tag'];
  return [...rows].sort((a,b) => {
    const c = cols[sortCol];
    if (c === 'count') return sortDir*(a.count-b.count);
    if (c === 'mapped') return sortDir*mappedLabel(a.chapter,a.subchapter).localeCompare(mappedLabel(b.chapter,b.subchapter));
    return sortDir*a[c].localeCompare(b[c]);
  });
}
function renderTable() {
  const rows = getSorted(getFiltered());
  const wrap = document.getElementById('table-wrap');
  if (!rows.length) { wrap.innerHTML = '<div id="empty">No results match your search.</div>'; return; }
  const arrs = [0,1,2,3,4].map(i => i===sortCol?(sortDir===1?' ↑':' ↓'):'');
  wrap.innerHTML = `<table>
    <colgroup><col class="col-chapter"><col class="col-subchapter"><col class="col-mapped"><col class="col-count"><col class="col-tag"></colgroup>
    <thead><tr>${['Chapter','Subchapter','Mapped Subchapter','# Cards','Tag'].map((h,i)=>`<th onclick="sortBy(${i})">${h}${arrs[i]}</th>`).join('')}</tr></thead>
    <tbody>${rows.map(r => {
      const num = formatSubNum(getChapterNum(r.chapter), getSubchapterNum(r.subchapter));
      return `<tr>
        <td class="chapter-cell">${esc(label(r.chapter))}</td>
        <td class="subchapter-cell">${esc(label(r.subchapter))}</td>
        <td class="mapped-cell">${num ? `<span class="mapped-num">${esc(num)}</span>` : ''}${esc(num ? stripLeadingNum(label(r.subchapter)) : label(r.subchapter))}</td>
        <td class="count-cell">${r.count}</td>
        <td class="tag-cell">${r.tags.map(t => esc(t)).join('<br>')}</td>
      </tr>`;
    }).join('')}</tbody></table>`;
}
function sortBy(col) { if(sortCol===col) sortDir*=-1; else {sortCol=col;sortDir=1;} renderTable(); }

function buildChapterMap() {
  const chapterMap = {};
  for (const row of allRows) {
    if (!chapterMap[row.chapter]) chapterMap[row.chapter] = [];
    chapterMap[row.chapter].push(row);
  }
  return chapterMap;
}

function renderTree() {
  const resourceName = getResourceName();
  const subjectName = label(getSubject());
  const chapterMap = buildChapterMap();
  const chapters = Object.keys(chapterMap).sort((a,b) => a.localeCompare(b));
  let html = `<div class="tree-node">`;
  html += `<div class="tree-row" onclick="toggleNode('root')"><span class="tog" id="tog-root">▾</span><span class="t-resource">${esc(resourceName)}</span><span class="t-arrow">→</span><span class="t-subject">${esc(subjectName)}</span></div>`;
  html += `<div class="tree-children" id="ch-root">`;
  for (const chapter of chapters) {
    const chapterNum = getChapterNum(chapter);
    const cid = 'c_' + chapter.replace(/[^a-zA-Z0-9_-]/g, '_');
    html += `<div class="tree-node">`;
    html += `<div class="tree-row" onclick="toggleNode('${esc(cid)}')"><span class="tog" id="tog-${esc(cid)}">▾</span><span class="t-chapter">${esc(label(chapter))}</span></div>`;
    html += `<div class="tree-children" id="ch-${esc(cid)}">`;
    for (const row of chapterMap[chapter]) {
      const subNum = getSubchapterNum(row.subchapter);
      const numLabel = formatSubNum(chapterNum, subNum);
      html += `<div class="leaf-block"><div class="leaf-row"><span class="leaf-indent"></span><span class="t-subnum">${esc(numLabel)}</span><span class="t-subchapter">${esc(label(row.subchapter))}</span><span class="t-arrow">→</span><span class="t-tag">${esc(row.tags[0])}</span></div>`;
      for (let ti = 1; ti < row.tags.length; ti++) {
        html += `<div class="leaf-row leaf-extra-tag"><span class="leaf-indent"></span><span class="t-arrow">→</span><span class="t-tag">${esc(row.tags[ti])}</span></div>`;
      }
      html += `</div>`;
    }
    html += `</div></div>`;
  }
  html += `</div></div>`;
  document.getElementById('tree-wrap').innerHTML = html;
}

function toggleNode(id) {
  const ch = document.getElementById('ch-' + id);
  const tog = document.getElementById('tog-' + id);
  if (!ch) return;
  ch.classList.toggle('collapsed');
  tog.textContent = ch.classList.contains('collapsed') ? '▸' : '▾';
}
function setAllTree(expand) {
  document.querySelectorAll('.tree-children').forEach(el => el.classList.toggle('collapsed', !expand));
  document.querySelectorAll('.tog').forEach(el => el.textContent = expand ? '▾' : '▸');
}

function buildHierarchy() {
  const resourceName = getResourceName();
  const subjectName = label(getSubject());
  const chapterMap = buildChapterMap();
  const chapters = Object.keys(chapterMap).sort((a,b) => a.localeCompare(b));
  return { resource: resourceName, subject: subjectName, chapters: chapters.map(ch => {
    const chapterNum = getChapterNum(ch);
    return {
      chapter: label(ch),
      subchapters: chapterMap[ch].map(r => {
        const subNum = getSubchapterNum(r.subchapter);
        return { number: formatSubNum(chapterNum, subNum), subchapter: label(r.subchapter), tags: r.tags };
      })
    };
  })};
}

function exportHierarchyText() {
  const h = buildHierarchy();
  const lines = [];
  lines.push(`${h.resource} → ${h.subject}`);
  for (const ch of h.chapters) {
    lines.push(`\n${ch.chapter}`);
    for (const sub of ch.subchapters) {
      const num = sub.number ? `${sub.number} ` : '';
      lines.push(`  * ${num}${sub.subchapter}`);
      for (const t of sub.tags) {
        lines.push(`      → ${t}`);
      }
    }
  }
  downloadText(lines.join('\n'), 'hierarchy.txt');
}
function exportHierarchyJSON() {
  downloadText(JSON.stringify(buildHierarchy(), null, 2), 'hierarchy.json');
}

function toDelimited(rows, sep) {
  const maxTags = Math.max(1, ...rows.map(r => r.tags.length));
  const headers = ['Chapter','Subchapter','Mapped Subchapter','Number of Anki Cards'];
  for (let i = 0; i < maxTags; i++) headers.push(i === 0 ? 'Tag' : `Tag ${i + 1}`);
  const escape = v => sep===',' ? `"${String(v).replace(/"/g,'""')}"` : String(v);
  return [headers.join(sep), ...rows.map(r => {
    const ml = mappedLabel(r.chapter, r.subchapter);
    const base = [label(r.chapter), label(r.subchapter), ml, r.count];
    for (let i = 0; i < maxTags; i++) base.push(r.tags[i] || '');
    return base.map(escape).join(sep);
  })].join('\n');
}
function downloadText(text, filename) { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([text],{type:'text/plain'})); a.download = filename; a.click(); }
function exportCSV() { downloadText(toDelimited(getSorted(getFiltered()),','),'anki_cards.csv'); }
function exportTSV() { downloadText(toDelimited(getSorted(getFiltered()),'\t'),'anki_cards.tsv'); }

updatePreview();
</script>
