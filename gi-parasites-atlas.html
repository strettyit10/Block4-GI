<script>
const DISEASES = [
// ═══════════════ PROTOZOA ═══════════════
{id:"entamoeba",cat:"Protozoa",ck:"prot",emoji:"🧫",name:"Entamoeba histolytica",
oneLiner:"Bloody <strong>amebic dysentery</strong> + <strong>liver abscess</strong> ('anchovy paste'). Flask-shaped colonic ulcers. Trophozoites with ingested RBCs.",
path:`<ul>
<li>Protozoan
  <ul>
    <li>Two forms:
      <ul>
        <li><strong>Trophozoite</strong> (invasive): 1 nucleus; uses cysteine proteinases to invade</li>
        <li><strong>Cyst</strong> (infectious): up to <strong>4 nuclei</strong></li>
      </ul>
    </li>
  </ul>
</li>
<li>Transmission:
  <ul>
    <li>Fecal-oral via contaminated water/food</li>
    <li>Sexual transmission (MSM)</li>
    <li>Common in developing countries</li>
  </ul>
</li>
<li>Pathogenesis:
  <ul>
    <li>Cysts ingested → excyst in small bowel → trophozoites colonize colon</li>
    <li>Invade epithelium → <strong>flask-shaped ulcers</strong> (narrow neck, broad base)</li>
    <li>Hematogenous spread via portal vein → <strong>liver abscess</strong> (classically R lobe)</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li><strong>Amebic dysentery</strong>:
  <ul>
    <li>Bloody diarrhea with mucus</li>
    <li>Cramps, tenesmus</li>
    <li>Weeks to months duration</li>
  </ul>
</li>
<li><strong>Amebic liver abscess</strong>:
  <ul>
    <li>Fever + RUQ pain + tender hepatomegaly</li>
    <li>Leukocytosis + ↑ alkaline phosphatase</li>
    <li><strong>'Anchovy paste'</strong> aspirate (red-brown)</li>
    <li>Classically right lobe</li>
    <li>Can rupture into lung/pleura/pericardium</li>
  </ul>
</li>
<li>Epidemiology:
  <ul>
    <li>Developing countries</li>
    <li>MSM transmission</li>
  </ul>
</li>
</ul>`,
dx:`<ul>
<li><strong>Stool O&P</strong>:
  <ul>
    <li>Cysts with up to 4 nuclei</li>
    <li><strong>Trophozoites with ingested RBCs</strong> (pathognomonic)</li>
  </ul>
</li>
<li><strong>Serology</strong>:
  <ul>
    <li>Positive in invasive disease</li>
    <li>Most helpful for liver abscess (stool often negative)</li>
  </ul>
</li>
<li>Stool PCR / antigen assays</li>
</ul>`,
tx:`<ul>
<li><strong>Metronidazole (or tinidazole)</strong>
  <ul>
    <li>For invasive disease + liver abscess</li>
  </ul>
</li>
<li>Then <strong>paromomycin</strong>
  <ul>
    <li>Luminal agent (not absorbed)</li>
    <li>Eliminates cysts + prevents relapse</li>
  </ul>
</li>
</ul>`,
hy:["<strong>Flask-shaped colonic ulcers</strong>","<strong>Liver abscess, R lobe, 'anchovy paste'</strong>","<strong>Trophozoite with ingested RBCs</strong> (pathognomonic)","<strong>Cyst with up to 4 nuclei</strong>","<strong>Metronidazole + paromomycin</strong>","Contrast with E. dispar (nonpathogenic morphologically identical)"],
mn:"<strong>Entamoeba</strong> = <strong>E</strong>ats <strong>R</strong>BCs, makes <strong>F</strong>lask ulcers + <strong>A</strong>nchovy abscess. <strong>Metro</strong> kills invasive, <strong>Paromo</strong> sweeps the lumen.",
trap:"Anchovy paste = brown-red abscess fluid, looks like sterile pus but contains necrotic hepatocytes — usually sterile on culture (organisms stay at abscess wall)."},

{id:"giardia",cat:"Protozoa",ck:"prot",emoji:"🧫",name:"Giardia lamblia (intestinalis)",
oneLiner:"<strong>Backpacker diarrhea</strong> from streams + daycare outbreaks. Greasy, foul-smelling, fat-malabsorptive stools. NO blood. <strong>'Owl-face' trophozoite</strong>.",
path:`<ul>
<li>Flagellated protozoan</li>
<li>Two forms:
  <ul>
    <li><strong>Trophozoite</strong>:
      <ul>
        <li>Pear-shaped with 2 nuclei = <strong>'owl face'</strong></li>
        <li>4 pairs of flagella</li>
        <li>Ventral sucking disk</li>
      </ul>
    </li>
    <li><strong>Cyst</strong>:
      <ul>
        <li>Chlorine-resistant</li>
      </ul>
    </li>
  </ul>
</li>
<li>Transmission:
  <ul>
    <li>Fecal-oral via contaminated water (streams, wells)</li>
    <li>Person-to-person (daycare, MSM)</li>
  </ul>
</li>
<li>Pathogenesis:
  <ul>
    <li>Trophozoites attach to duodenal villi via sucking disk</li>
    <li>→ Inflammation + villous blunting</li>
    <li>→ Fat + carbohydrate malabsorption</li>
    <li>No invasion</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Stool changes:
  <ul>
    <li>Watery → <strong>greasy, foul-smelling, floating (steatorrhea)</strong></li>
    <li><strong>NO blood, no mucus, no fever</strong></li>
  </ul>
</li>
<li>GI symptoms:
  <ul>
    <li>Bloating, flatulence, cramps, belching</li>
  </ul>
</li>
<li>Chronic infection:
  <ul>
    <li>Fat-soluble vitamin + calorie malabsorption</li>
    <li>Weight loss</li>
  </ul>
</li>
<li>Risk factors:
  <ul>
    <li><strong>IgA deficiency</strong> + hypogammaglobulinemia → increased susceptibility</li>
  </ul>
</li>
</ul>`,
dx:`<ul>
<li><strong>Stool antigen ELISA</strong> — first-line, most sensitive</li>
<li>Stool PCR</li>
<li>Stool O&P — can miss due to intermittent shedding</li>
<li>Duodenal aspirate / string test (gold standard, rarely used)</li>
</ul>`,
tx:`<ul>
<li><strong>Metronidazole</strong> or <strong>tinidazole</strong> (single dose)</li>
<li>Nitazoxanide alternative (pediatric)</li>
</ul>`,
hy:["<strong>Backpackers, hikers, campers</strong> drinking stream water","<strong>Daycare outbreaks</strong>","<strong>Owl-face trophozoite</strong> (2 nuclei, 4 flagella)","<strong>Greasy floating stools</strong>, fat malabsorption","<strong>No blood, no fever</strong>","<strong>IgA deficiency</strong> = risk factor","Cyst is chlorine-resistant (why filtered water matters)"],
mn:"<strong>G</strong>iardia = <strong>G</strong>ives <strong>G</strong>reasy, <strong>G</strong>assy stools from <strong>G</strong>lacier streams. The <strong>owl is watching you</strong>."},

{id:"crypto",cat:"Protozoa",ck:"prot",emoji:"🧫",name:"Cryptosporidium parvum",
oneLiner:"<strong>Chronic severe diarrhea in AIDS (CD4 &lt;100)</strong>. <strong>Acid-fast oocysts</strong>. Waterborne, chlorine-resistant.",
path:`<ul>
<li>Apicomplexan protozoan</li>
<li>Oocysts:
  <ul>
    <li>Small (4–5 μm)</li>

{id:"leishmania",cat:"Protozoa",ck:"prot",emoji:"🧫",name:"Leishmania spp.",

{id:"plasmodium",cat:"Protozoa",ck:"prot",emoji:"🧫",name:"Plasmodium spp. (Malaria)",

</ul>`,

<li>PCR</li>

{id:"strongyloides",cat:"Nematodes (Roundworms)",ck:"nem",emoji:"🪱",name:"Strongyloides stercoralis",

{id:"schisto-haematobium",cat:"Trematodes (Flukes)",ck:"tre",emoji:"🌀",name:"Schistosoma haematobium",
oneLiner:"<strong>Urinary schistosomiasis</strong> (not GI — but often grouped). <strong>Terminal spine on egg</strong>. Africa/Middle East. <strong>SCC of bladder</strong>.",
path:`<ul>
<li>Trematode (fluke)</li>
<li>Intermediate host:
  <ul>
    <li><strong>Bulinus snail</strong> in freshwater</li>
  </ul>
</li>
<li>Distribution:
  <ul>
    <li>Africa</li>
    <li>Middle East</li>
  </ul>
</li>
<li>Life cycle:
  <ul>
    <li>Cercariae penetrate skin</li>
    <li>Migrate through body</li>
    <li>Adults pair up in <strong>vesical venous plexus of bladder</strong></li>
    <li>Eggs released into bladder</li>
    <li>Pass in <strong>urine</strong> (not stool)</li>
  </ul>
</li>
<li>Pathogenesis:
  <ul>
    <li>Chronic inflammation of bladder wall</li>
    <li>→ Squamous metaplasia</li>
    <li>→ Increased cancer risk</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Acute symptoms:
  <ul>
    <li><strong>Painless hematuria</strong> (hallmark)</li>
    <li>Dysuria, frequency</li>
  </ul>
</li>
<li>Chronic:
  <ul>
    <li>Bladder fibrosis</li>
    <li>Obstructive uropathy</li>
    <li>Hydronephrosis</li>
  </ul>
</li>
<li>Malignancy:
  <ul>
    <li><strong>Squamous cell carcinoma of the bladder</strong>
      <ul>
        <li>From chronic inflammation → squamous metaplasia → SCC</li>
        <li>Unlike urothelial carcinoma (more common bladder cancer globally)</li>
      </ul>
    </li>
  </ul>
</li>
<li>Rarely:
  <ul>
    <li>Pulmonary involvement if eggs embolize</li>
  </ul>
</li>
</ul>`,
dx:`<ul>
<li><strong>URINE O&P</strong> (not stool!):
  <ul>
    <li>Eggs with <strong>TERMINAL spine</strong></li>
  </ul>
</li>
<li>Bladder biopsy</li>
<li>Serology</li>
</ul>`,
tx:`<ul>
<li><strong>Praziquantel</strong></li>
</ul>`,
hy:["<strong>Terminal spine egg</strong>","<strong>Urine O&P (not stool)</strong>","Bladder (vesical plexus)","<strong>SCC of bladder</strong> (unique — most bladder cancer elsewhere is urothelial)","Africa + Middle East","Bulinus snail","Painless hematuria"],
mn:"<strong>H</strong>aematobium = <strong>H</strong>ematuria + <strong>H</strong>ead spine (terminal). <strong>H</strong>as <strong>H</strong>igh SCC risk.",
trap:"Bladder cancer in Western world = transitional/urothelial cell carcinoma. Schistosoma-associated bladder cancer = SQUAMOUS cell carcinoma — classic Step 1 twist."}
];

const state={currentId:null,learned:new Set(),search:"",collapsed:new Set()};
function wrapContent(s){if(!s)return"";const t=s.trim();if(t.startsWith("<ul>")||t.startsWith("<ol>"))return t;return"<p>"+t+"</p>";}
function groupByCategory(){
  const map={};
  DISEASES.forEach(d=>{
    if(!map[d.cat])map[d.cat]={key:d.ck,emoji:d.emoji,items:[]};
    map[d.cat].items.push(d);
  });
  return map;
}
function getVisibleDiseases(){
  const q=state.search.toLowerCase().trim();
  if(!q)return DISEASES;
  return DISEASES.filter(d=>{
    const hay=(d.name+" "+d.cat+" "+d.oneLiner+" "+(d.path||"")+" "+(d.clin||"")+" "+(d.dx||"")+" "+(d.tx||"")+" "+(d.hy||[]).join(" ")+" "+(d.mn||"")+" "+(d.trap||"")).toLowerCase();
    return hay.includes(q);
  });
}
function renderSidebar(){
  const visible=getVisibleDiseases();
  const visibleIds=new Set(visible.map(d=>d.id));
  const groups=groupByCategory();
  const list=document.getElementById("sbList");
  let html=`<div class="sb-home ${state.currentId===null?"active":""}" onclick="goHome()">🏠 Home</div>`;
  Object.entries(groups).forEach(([cat,info])=>{
    const visibleItems=info.items.filter(d=>visibleIds.has(d.id));
    if(!visibleItems.length)return;
    const collapsed=state.collapsed.has(cat)&&!state.search;
    html+=`<div class="cat-group ${collapsed?"collapsed":""}" data-cat="${cat}"><div class="cat-header" onclick="toggleCat('${cat.replace(/'/g,"\\'")}')"><span class="cat-chevron">▼</span><span>${info.emoji} ${cat}</span><span class="cat-count">${visibleItems.length}</span></div><div class="cat-list">`;
    visibleItems.forEach(d=>{
      const active=state.currentId===d.id;
      const learned=state.learned.has(d.id);
      html+=`<div class="dz-item ${active?"active":""} ${learned?"learned":""}" data-id="${d.id}" onclick="selectDisease('${d.id}')"><span class="dz-check">${learned?"✓":"○"}</span><span class="dz-name">${d.name}</span></div>`;
    });
    html+=`</div></div>`;
  });
  list.innerHTML=html||`<div class="empty" style="padding:30px 14px">No matches.</div>`;
}
function toggleCat(cat){
  if(state.collapsed.has(cat))state.collapsed.delete(cat);
  else state.collapsed.add(cat);
  renderSidebar();
}
function renderHomepage(){
  const content=document.getElementById("content");
  const groups=groupByCategory();
  let catCardsHtml="";
  Object.entries(groups).forEach(([cat,info])=>{
    catCardsHtml+=`<div class="home-cat"><div class="home-cat-title">${info.emoji} ${cat} <span class="home-cat-count">${info.items.length}</span></div><div class="home-dz-list">${info.items.map(d=>{const learned=state.learned.has(d.id);return `<div class="home-dz ${learned?"learned":""}" onclick="selectDisease('${d.id}')"><span class="home-check">${learned?"✓":"○"}</span><span>${d.name}</span></div>`;}).join("")}</div></div>`;
  });
  content.innerHTML=`<div class="content-inner"><div class="home-hero"><div class="home-brand">HoyaDocs · Block 4 GI</div><h1 class="home-title">Welcome to the GI Parasites Atlas</h1><p class="home-sub">An interactive USMLE Step 1 reference for 21 GI + blood parasites — life cycles, clinical features, diagnosis, treatment, buzzwords, and exam traps.</p><button class="home-start" onclick="selectDisease('entamoeba')">Start with Entamoeba histolytica →</button></div><h2 class="home-section-title">Browse All Parasites</h2><p style="font-size:13.5px;color:#6b7b6c;margin-bottom:18px;font-style:italic;">Click any parasite to open it. Use the sidebar to search or navigate by category. Use ← → arrow keys to move between parasites and Space to mark as learned.</p><div class="home-grid">${catCardsHtml}</div></div>`;
  document.getElementById("content").scrollTo(0,0);
}
function renderContent(){
  if(state.currentId===null){renderHomepage();return;}
  const content=document.getElementById("content");
  const d=DISEASES.find(x=>x.id===state.currentId);
  if(!d){content.innerHTML='<div class="empty">Not found.</div>';return;}
  const learned=state.learned.has(d.id);
  const visible=getVisibleDiseases();
  const idx=visible.findIndex(x=>x.id===d.id);
  const prev=idx>0?visible[idx-1]:null;
  const next=idx<visible.length-1?visible[idx+1]:null;
  content.innerHTML=`<div class="content-inner"><div class="dz-entry"><div class="cat-label"><span class="cat-dot"></span>${d.emoji} ${d.cat}</div><h2 class="dz-title">${d.name}</h2><div class="dz-oneliner">${d.oneLiner}</div>${d.path?`<div class="sec"><h3>🔬 Microbiology &amp; Life Cycle</h3>${wrapContent(d.path)}</div>`:""}${d.clin?`<div class="sec"><h3>🩺 Clinical Features</h3>${wrapContent(d.clin)}</div>`:""}${d.dx?`<div class="sec"><h3>🔍 Diagnosis</h3>${wrapContent(d.dx)}</div>`:""}${d.tx?`<div class="sec"><h3>💊 Treatment</h3>${wrapContent(d.tx)}</div>`:""}${d.hy?.length?`<div class="callout hy"><h4>⚡ USMLE High-Yield</h4><ul>${d.hy.map(x=>`<li>${x}</li>`).join("")}</ul></div>`:""}${d.mn?`<div class="callout mn"><h4>🧠 Mnemonic</h4>${d.mn}</div>`:""}${d.trap?`<div class="callout trap"><h4>⚠️ Exam Trap</h4>${d.trap}</div>`:""}</div><div class="footer-nav"><button class="nav-btn" onclick="navigate(-1)" ${prev?"":"disabled"}>◀ ${prev?shorten(prev.name,24):"Previous"}<span class="kbd">←</span></button><button class="nav-btn learn ${learned?"learned":""}" onclick="toggleLearned()">${learned?"✓ Learned":"Mark Learned"}<span class="kbd">Space</span></button><button class="nav-btn" onclick="navigate(1)" ${next?"":"disabled"}>${next?shorten(next.name,24):"Next"} ▶<span class="kbd">→</span></button></div></div>`;
  document.getElementById("content").scrollTo(0,0);
}
function shorten(s,n){return s.length>n?s.slice(0,n-1)+"…":s;}
function goHome(){state.currentId=null;renderSidebar();renderContent();closeSidebar();}
function selectDisease(id){
  state.currentId=id;
  const d=DISEASES.find(x=>x.id===id);
  if(d)state.collapsed.delete(d.cat);
  renderSidebar();renderContent();closeSidebar();
  setTimeout(()=>{const el=document.querySelector(`.dz-item[data-id="${id}"]`);if(el)el.scrollIntoView({block:"nearest",behavior:"smooth"});},50);
}
function navigate(dir){
  const visible=getVisibleDiseases();
  if(state.currentId===null){if(dir>0&&visible.length)selectDisease(visible[0].id);return;}
  const idx=visible.findIndex(x=>x.id===state.currentId);
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=visible.length)return;
  selectDisease(visible[newIdx].id);
}
function toggleLearned(){
  if(!state.currentId)return;
  if(state.learned.has(state.currentId))state.learned.delete(state.currentId);
  else state.learned.add(state.currentId);
  renderSidebar();renderContent();updateProgress();
}
function updateProgress(){
  document.getElementById("learnedText").textContent=`${state.learned.size} / ${DISEASES.length}`;
  document.getElementById("progressFill").style.width=(DISEASES.length?state.learned.size/DISEASES.length*100:0)+"%";
}
function toggleSidebar(){
  const open=document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("sbBackdrop").classList.toggle("show",open);
}
function closeSidebar(){if(window.innerWidth<=720){document.getElementById("sidebar").classList.remove("open");document.getElementById("sbBackdrop").classList.remove("show");}}
function exportExcel(){
  let html=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="UTF-8"><style>th{background:#14532d;color:white;padding:8px;font-weight:bold;text-align:left;border:1px solid #0f3a1f}td{padding:6px 8px;border:1px solid #e2e8f0;vertical-align:top}tr:nth-child(even) td{background:#f8fafc}.cat{background:#dcfce7;font-weight:bold}</style></head><body><table><tr><th>#</th><th>Category</th><th>Parasite</th><th>One-Liner</th><th>Microbiology/Life Cycle</th><th>Clinical Features</th><th>Diagnosis</th><th>Treatment</th><th>USMLE High-Yield</th><th>Mnemonic</th><th>Exam Trap</th><th>Learned</th></tr>`;
  DISEASES.forEach((d,i)=>{
    const strip=(s)=>(s||"").replace(/<[^>]+>/g," ").replace(/\s+/g," ").trim();
    html+=`<tr><td>${i+1}</td><td class="cat">${d.cat}</td><td><strong>${d.name}</strong></td><td>${strip(d.oneLiner)}</td><td>${strip(d.path)}</td><td>${strip(d.clin)}</td><td>${strip(d.dx)}</td><td>${strip(d.tx)}</td><td>${(d.hy||[]).map(strip).join(" • ")}</td><td>${strip(d.mn)}</td><td>${strip(d.trap)}</td><td>${state.learned.has(d.id)?"✓":""}</td></tr>`;
  });
  html+=`</table></body></html>`;
  const blob=new Blob(['\ufeff',html],{type:"application/vnd.ms-excel"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download="GI_Parasites_Study_Guide.xls";a.click();
  URL.revokeObjectURL(url);
}
function printAll(){
  const content=document.getElementById("content");
  const original=content.innerHTML;
  content.innerHTML=`<div class="content-inner">${DISEASES.map(d=>`<div class="dz-entry" style="page-break-after:always;margin-bottom:40px;"><div class="cat-label"><span class="cat-dot"></span>${d.emoji} ${d.cat}</div><h2 class="dz-title">${d.name}</h2><div class="dz-oneliner">${d.oneLiner}</div>${d.path?`<div class="sec"><h3>🔬 Microbiology &amp; Life Cycle</h3>${wrapContent(d.path)}</div>`:""}${d.clin?`<div class="sec"><h3>🩺 Clinical Features</h3>${wrapContent(d.clin)}</div>`:""}${d.dx?`<div class="sec"><h3>🔍 Diagnosis</h3>${wrapContent(d.dx)}</div>`:""}${d.tx?`<div class="sec"><h3>💊 Treatment</h3>${wrapContent(d.tx)}</div>`:""}${d.hy?.length?`<div class="callout hy"><h4>⚡ USMLE High-Yield</h4><ul>${d.hy.map(x=>`<li>${x}</li>`).join("")}</ul></div>`:""}${d.mn?`<div class="callout mn"><h4>🧠 Mnemonic</h4>${d.mn}</div>`:""}${d.trap?`<div class="callout trap"><h4>⚠️ Exam Trap</h4>${d.trap}</div>`:""}</div>`).join("")}</div>`;
  setTimeout(()=>{window.print();content.innerHTML=original;renderContent();},300);
}
document.getElementById("search").addEventListener("input",(e)=>{state.search=e.target.value;renderSidebar();});
document.getElementById("prevBtn").onclick=()=>navigate(-1);
document.getElementById("nextBtn").onclick=()=>navigate(1);
document.getElementById("printBtn").onclick=printAll;
document.getElementById("excelBtn").onclick=exportExcel;
document.addEventListener("keydown",(e)=>{
  if(e.target.tagName==="INPUT")return;
  if(state.currentId===null&&e.key!=="ArrowRight"&&e.key!=="ArrowDown")return;
  if(e.key==="ArrowLeft"){e.preventDefault();navigate(-1);}
  else if(e.key==="ArrowRight"){e.preventDefault();navigate(1);}
  else if(e.key===" "){e.preventDefault();toggleLearned();}
  else if(e.key==="ArrowDown"||e.key==="ArrowUp"){
    e.preventDefault();
    const visible=getVisibleDiseases();
    const idx=visible.findIndex(x=>x.id===state.currentId);
    const dir=e.key==="ArrowDown"?1:-1;
    const newIdx=idx===-1?0:idx+dir;
    if(newIdx>=0&&newIdx<visible.length)selectDisease(visible[newIdx].id);
  }
  else if(e.key==="Escape"){goHome();}
});
Object.keys(groupByCategory()).forEach(c=>state.collapsed.add(c));
renderSidebar();
renderHomepage();
updateProgress();
</script>
</body>
</html>
