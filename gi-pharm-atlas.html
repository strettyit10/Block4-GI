<script>
const DISEASES = [
// ═══════════════ H. PYLORI ANTIBIOTICS ═══════════════
{id:"metronidazole",cat:"H. pylori Antibiotics",ck:"hp",emoji:"🦠",name:"Metronidazole (Flagyl)",
oneLiner:"Nitroimidazole. Anaerobe + protozoan killer. Produces toxic free radicals inside anaerobic organisms. <strong>Disulfiram-like reaction with alcohol</strong>.",
path:"<strong>Prodrug</strong> — activated by anaerobic microbes' ferredoxin/nitroreductase (oxygen sensitive). Forms reactive nitro radicals → damage DNA + proteins of anaerobes. No activity against aerobes.",
clin:"<ul><li><strong>H. pylori quad therapy</strong> (with PPI + bismuth + tetracycline)</li><li><strong>C. difficile</strong> (mild cases — now 2nd-line after vancomycin/fidaxomicin)</li><li><strong>Protozoa</strong>: Giardia, Entamoeba, Trichomonas</li><li><strong>Anaerobes</strong>: Bacteroides, Clostridium (intra-abdominal, pelvic)</li><li>Bacterial vaginosis (Gardnerella)</li></ul>",
dx:"<ul><li><strong>Disulfiram-like reaction with alcohol</strong> (flushing, nausea, tachycardia) — avoid EtOH during + 3 days after</li><li>Metallic taste</li><li>Peripheral neuropathy (with chronic use)</li><li>Headache</li></ul>",
hy:["<strong>Disulfiram reaction</strong> with alcohol","<strong>GET GAP on the METRO</strong>: Giardia, Entamoeba, Trichomonas, Gardnerella, Anaerobes, H. Pylori","Activated in anaerobic conditions","Peripheral neuropathy (chronic)"],
mn:"<strong>GET GAP on the METRO</strong>: <strong>G</strong>iardia, <strong>E</strong>ntamoeba, <strong>T</strong>richomonas, <strong>G</strong>ardnerella, <strong>A</strong>naerobes, <strong>H. P</strong>ylori"},

{id:"tetracycline",cat:"H. pylori Antibiotics",ck:"hp",emoji:"🦠",name:"Tetracycline",
oneLiner:"Bacteriostatic. Inhibits 30S ribosomal subunit. Part of <strong>bismuth quadruple therapy</strong>. Chelated by divalent cations.",
path:"Binds <strong>30S ribosomal subunit</strong> → blocks aminoacyl-tRNA attachment to the ribosomal A site → inhibits bacterial protein synthesis. Bacteriostatic.",
clin:"<ul><li>H. pylori bismuth quadruple therapy (PPI + bismuth + tetracycline + metronidazole)</li><li>Rickettsiae (Rocky Mountain spotted fever, typhus)</li><li>Chlamydia, Mycoplasma pneumoniae</li><li>Lyme disease (doxycycline is preferred tetracycline analog)</li><li>Acne (anti-inflammatory effect)</li></ul>",
dx:"<ul><li><strong>Photosensitivity</strong></li><li><strong>Tooth discoloration + impaired bone growth in kids &lt;8 yr</strong> — contraindicated</li><li><strong>Contraindicated in pregnancy</strong> (teratogen — teeth/bones)</li><li>Fanconi syndrome (from expired drug)</li><li>GI upset, esophagitis (take with water, stay upright)</li></ul>",
tx:"<strong>Chelated by divalent cations (Ca²⁺, Mg²⁺, Fe²⁺, Al³⁺)</strong> — don't take with milk, antacids, or iron supplements; binds + prevents absorption.",
hy:["<strong>Avoid in kids &lt;8 + pregnancy</strong>","<strong>Chelated by Ca/Mg/Fe/Al</strong> (take separately from dairy/antacids)","Photosensitivity","30S ribosome (bacteriostatic)"],
trap:"Giving tetracycline with milk or antacids → near-zero absorption. Space doses several hours apart."},

{id:"bismuth-abx",cat:"H. pylori Antibiotics",ck:"hp",emoji:"🦠",name:"Bismuth Subsalicylate (Pepto-Bismol)",
oneLiner:"Multi-mechanism: antimicrobial vs H. pylori, mucosal coating, antidiarrheal. Component of quad therapy. <strong>Black stool + black tongue</strong> (not melena).",
path:"Multiple actions: (1) <strong>Direct antimicrobial</strong> against H. pylori; (2) <strong>Coats ulcers</strong> (protective barrier); (3) Stimulates mucus + bicarbonate; (4) Antisecretory via salicylate; (5) Prevents bacterial binding to intestinal cells.",
clin:"<ul><li>H. pylori quad therapy</li><li>Traveler's diarrhea (prophylaxis + treatment)</li><li>Dyspepsia, heartburn, nausea</li></ul>",
dx:"<ul><li><strong>Black stool</strong> + <strong>black tongue</strong> (from bismuth — benign, NOT melena/GI bleed)</li><li><strong>Reye syndrome</strong> risk in children with viral illness (salicylate component) — avoid in kids with chickenpox/flu</li><li>Salicylate toxicity with high doses (tinnitus, hyperventilation)</li></ul>",
hy:["<strong>Black stool + black tongue</strong> (NOT melena)","Reye syndrome risk in kids with viral illness","H. pylori coverage + mucosal protection","Traveler's diarrhea"],
trap:"Black stool from bismuth can mimic melena on history — ask about Pepto-Bismol use."},

{id:"amoxicillin",cat:"H. pylori Antibiotics",ck:"hp",emoji:"🦠",name:"Amoxicillin",
oneLiner:"Aminopenicillin β-lactam. <strong>First-line H. pylori triple therapy</strong> component. Bactericidal.",
path:"Binds <strong>penicillin-binding proteins (PBPs)</strong> → inhibits transpeptidation → cell wall defect → autolysis. Bactericidal. Wider spectrum than penicillin G due to ability to cross gram-negative outer membrane.",
clin:"<ul><li><strong>H. pylori triple therapy</strong> (PPI + clarithromycin + amoxicillin)</li><li>Otitis media, strep throat, sinusitis</li><li>Lyme disease (early)</li><li>Endocarditis prophylaxis (dental procedures)</li><li>UTIs (less now due to resistance)</li></ul>",
dx:"<ul><li>Hypersensitivity reactions (immediate IgE anaphylaxis; delayed serum sickness, SJS)</li><li><strong>Maculopapular rash with EBV mono</strong> (not a true allergy — delayed T-cell response to amoxicillin metabolites)</li><li>Pseudomembranous colitis</li><li>Diarrhea (disrupts gut flora)</li></ul>",
hy:["<strong>Amoxicillin + EBV = rash</strong> (not true allergy)","β-lactam cell wall inhibitor","H. pylori first-line","Endocarditis prophylaxis"]},

{id:"clarithromycin",cat:"H. pylori Antibiotics",ck:"hp",emoji:"🦠",name:"Clarithromycin",
oneLiner:"Macrolide. Binds 50S ribosome. <strong>H. pylori triple therapy</strong>. Strong CYP3A4 inhibitor + QT prolongation.",
path:"Binds <strong>50S ribosomal subunit (23S rRNA)</strong> → blocks translocation → inhibits protein synthesis. Bacteriostatic.",
clin:"<ul><li><strong>H. pylori triple therapy</strong></li><li>Atypical pneumonia (Mycoplasma, Legionella, Chlamydia)</li><li>Upper respiratory infections</li><li>MAC prophylaxis (HIV)</li></ul>",
dx:"<ul><li>GI upset (common), metallic taste</li><li><strong>QT prolongation → torsades</strong> (especially with other QT drugs)</li><li><strong>CYP3A4 inhibition</strong> → ↑ levels of warfarin, statins (simvastatin/lovastatin contraindicated), carbamazepine, digoxin</li><li>Hepatotoxicity (cholestatic hepatitis)</li><li>Rising resistance → check local H. pylori resistance rates</li></ul>",
hy:["<strong>Strong CYP inhibitor</strong>","QT prolongation","H. pylori (resistance rising)","Covers atypical pneumonia"],
mn:"'Clari<strong>thro</strong>mycin' raises <strong>THR</strong>ee things: warfarin, statins, digoxin — watch for toxicity."},

{id:"levofloxacin",cat:"H. pylori Antibiotics",ck:"hp",emoji:"🦠",name:"Levofloxacin",
oneLiner:"Fluoroquinolone. Inhibits DNA gyrase + topoisomerase IV. <strong>Salvage H. pylori therapy</strong> when first-line fails.",
path:"Inhibits bacterial <strong>topoisomerase II (DNA gyrase)</strong> + <strong>topoisomerase IV</strong> → prevents DNA supercoiling + replication. Bactericidal.",
clin:"<ul><li>H. pylori salvage therapy (2nd-line after failed triple/quad)</li><li>UTI, pyelonephritis, prostatitis</li><li>Atypical pneumonia, community-acquired pneumonia</li><li>Tuberculosis (MDR)</li></ul>",

const state={currentId:null,learned:new Set(),search:"",collapsed:new Set()};
function groupByCategory(){
  const map={};
  DISEASES.forEach(d=>{
    if(!map[d.cat])map[d.cat]={key:d.ck,emoji:d.emoji,items:[]};
    map[d.cat].items.push(d);
  });
  return map;
}
function getVisibleDiseases(){
  const q=state.search.toLowerCase().trim();
  if(!q)return DISEASES;
  return DISEASES.filter(d=>{
    const hay=(d.name+" "+d.cat+" "+d.oneLiner+" "+(d.path||"")+" "+(d.clin||"")+" "+(d.dx||"")+" "+(d.tx||"")+" "+(d.hy||[]).join(" ")+" "+(d.mn||"")+" "+(d.trap||"")).toLowerCase();
    return hay.includes(q);
  });
}
function renderSidebar(){
  const visible=getVisibleDiseases();
  const visibleIds=new Set(visible.map(d=>d.id));
  const groups=groupByCategory();
  const list=document.getElementById("sbList");
  let html=`<div class="sb-home ${state.currentId===null?"active":""}" onclick="goHome()">🏠 Home</div>`;
  Object.entries(groups).forEach(([cat,info])=>{
    const visibleItems=info.items.filter(d=>visibleIds.has(d.id));
    if(!visibleItems.length)return;
    const collapsed=state.collapsed.has(cat)&&!state.search;
    html+=`<div class="cat-group ${collapsed?"collapsed":""}" data-cat="${cat}"><div class="cat-header" onclick="toggleCat('${cat.replace(/'/g,"\\'")}')"><span class="cat-chevron">▼</span><span>${info.emoji} ${cat}</span><span class="cat-count">${visibleItems.length}</span></div><div class="cat-list">`;
    visibleItems.forEach(d=>{
      const active=state.currentId===d.id;
      const learned=state.learned.has(d.id);
      html+=`<div class="dz-item ${active?"active":""} ${learned?"learned":""}" data-id="${d.id}" onclick="selectDisease('${d.id}')"><span class="dz-check">${learned?"✓":"○"}</span><span class="dz-name">${d.name}</span></div>`;
    });
    html+=`</div></div>`;
  });
  list.innerHTML=html||`<div class="empty" style="padding:30px 14px">No matches.</div>`;
}
function toggleCat(cat){
  if(state.collapsed.has(cat))state.collapsed.delete(cat);
  else state.collapsed.add(cat);
  renderSidebar();
}

  let catCardsHtml="";
  Object.entries(groups).forEach(([cat,info])=>{
    catCardsHtml+=`<div class="home-cat"><div class="home-cat-title">${info.emoji} ${cat} <span class="home-cat-count">${info.items.length}</span></div><div class="home-dz-list">${info.items.map(d=>{const learned=state.learned.has(d.id);return `<div class="home-dz ${learned?"learned":""}" onclick="selectDisease('${d.id}')"><span class="home-check">${learned?"✓":"○"}</span><span>${d.name}</span></div>`;}).join("")}</div></div>`;
  });
  content.innerHTML=`<div class="content-inner"><div class="home-hero"><div class="home-brand">HoyaDocs · Block 4 GI</div><h1 class="home-title">Welcome to the GI Pharm Atlas</h1><p class="home-sub">An interactive USMLE Step 1 reference for all 56 GI medications — mechanism of action, clinical uses, adverse effects, and exam traps.</p><button class="home-start" onclick="selectDisease('omeprazole')">Start with Omeprazole →</button></div><h2 class="home-section-title">Browse All Medications</h2><p style="font-size:13.5px;color:#6b7b6c;margin-bottom:18px;font-style:italic;">Click any drug to open it. Use the sidebar to search or navigate by category. Use ← → arrow keys to move between drugs and Space to mark as learned.</p><div class="home-grid">${catCardsHtml}</div></div>`;
  document.getElementById("content").scrollTo(0,0);
}
function renderContent(){
  if(state.currentId===null){renderHomepage();return;}
  const content=document.getElementById("content");
  const d=DISEASES.find(x=>x.id===state.currentId);
  if(!d){content.innerHTML='<div class="empty">Not found.</div>';return;}
  const learned=state.learned.has(d.id);
  const visible=getVisibleDiseases();
  const idx=visible.findIndex(x=>x.id===d.id);
  const prev=idx>0?visible[idx-1]:null;
  const next=idx<visible.length-1?visible[idx+1]:null;
  content.innerHTML=`<div class="content-inner"><div class="dz-entry"><div class="cat-label"><span class="cat-dot"></span>${d.emoji} ${d.cat}</div><h2 class="dz-title">${d.name}</h2><div class="dz-oneliner">${d.oneLiner}</div>${d.path?`<div class="sec"><h3>🔬 Mechanism of Action</h3><p>${d.path}</p></div>`:""}${d.clin?`<div class="sec"><h3>🩺 Clinical Uses</h3>${d.clin.trim().startsWith("<ul>")?d.clin:"<p>"+d.clin+"</p>"}</div>`:""}${d.dx?`<div class="sec"><h3>⚠️ Adverse Effects</h3>${d.dx.trim().startsWith("<ul>")?d.dx:"<p>"+d.dx+"</p>"}</div>`:""}${d.tx?`<div class="sec"><h3>💊 Pharmacokinetics &amp; Notes</h3><p>${d.tx}</p></div>`:""}${d.hy?.length?`<div class="callout hy"><h4>⚡ High-Yield</h4><ul>${d.hy.map(x=>`<li>${x}</li>`).join("")}</ul></div>`:""}${d.mn?`<div class="callout mn"><h4>🧠 Mnemonic</h4>${d.mn}</div>`:""}${d.trap?`<div class="callout trap"><h4>⚠️ Exam Trap</h4>${d.trap}</div>`:""}</div><div class="footer-nav"><button class="nav-btn" onclick="navigate(-1)" ${prev?"":"disabled"}>◀ ${prev?shorten(prev.name,24):"Previous"}<span class="kbd">←</span></button><button class="nav-btn learn ${learned?"learned":""}" onclick="toggleLearned()">${learned?"✓ Learned":"Mark Learned"}<span class="kbd">Space</span></button><button class="nav-btn" onclick="navigate(1)" ${next?"":"disabled"}>${next?shorten(next.name,24):"Next"} ▶<span class="kbd">→</span></button></div></div>`;
  document.getElementById("content").scrollTo(0,0);
}
function shorten(s,n){return s.length>n?s.slice(0,n-1)+"…":s;}
function goHome(){state.currentId=null;renderSidebar();renderContent();closeSidebar();}
function selectDisease(id){
  state.currentId=id;
  const d=DISEASES.find(x=>x.id===id);
  if(d)state.collapsed.delete(d.cat);
  renderSidebar();renderContent();closeSidebar();
  setTimeout(()=>{const el=document.querySelector(`.dz-item[data-id="${id}"]`);if(el)el.scrollIntoView({block:"nearest",behavior:"smooth"});},50);
}
function navigate(dir){
  const visible=getVisibleDiseases();
  if(state.currentId===null){if(dir>0&&visible.length)selectDisease(visible[0].id);return;}
  const idx=visible.findIndex(x=>x.id===state.currentId);
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=visible.length)return;
  selectDisease(visible[newIdx].id);
}
function toggleLearned(){
  if(!state.currentId)return;
  if(state.learned.has(state.currentId))state.learned.delete(state.currentId);
  else state.learned.add(state.currentId);
  renderSidebar();renderContent();updateProgress();
}
function updateProgress(){
  document.getElementById("learnedText").textContent=`${state.learned.size} / ${DISEASES.length}`;
  document.getElementById("progressFill").style.width=(DISEASES.length?state.learned.size/DISEASES.length*100:0)+"%";
}
function toggleSidebar(){
  const open=document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("sbBackdrop").classList.toggle("show",open);
}
function closeSidebar(){if(window.innerWidth<=720){document.getElementById("sidebar").classList.remove("open");document.getElementById("sbBackdrop").classList.remove("show");}}
function exportExcel(){
  let html=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="UTF-8"><style>th{background:#14532d;color:white;padding:8px;font-weight:bold;text-align:left;border:1px solid #0f3a1f}td{padding:6px 8px;border:1px solid #e2e8f0;vertical-align:top}tr:nth-child(even) td{background:#f8fafc}.cat{background:#dcfce7;font-weight:bold}</style></head><body><table><tr><th>#</th><th>Category</th><th>Medication</th><th>One-Liner</th><th>Mechanism of Action</th><th>Clinical Uses</th><th>Adverse Effects</th><th>PK / Notes</th><th>High-Yield</th><th>Mnemonic</th><th>Exam Trap</th><th>Learned</th></tr>`;
  DISEASES.forEach((d,i)=>{
    const strip=(s)=>(s||"").replace(/<[^>]+>/g," ").replace(/\s+/g," ").trim();
    html+=`<tr><td>${i+1}</td><td class="cat">${d.cat}</td><td><strong>${d.name}</strong></td><td>${strip(d.oneLiner)}</td><td>${strip(d.path)}</td><td>${strip(d.clin)}</td><td>${strip(d.dx)}</td><td>${strip(d.tx)}</td><td>${(d.hy||[]).map(strip).join(" • ")}</td><td>${strip(d.mn)}</td><td>${strip(d.trap)}</td><td>${state.learned.has(d.id)?"✓":""}</td></tr>`;
  });
  html+=`</table></body></html>`;
  const blob=new Blob(['\ufeff',html],{type:"application/vnd.ms-excel"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download="GI_Pharm_Study_Guide.xls";a.click();
  URL.revokeObjectURL(url);
}
function printAll(){
  const content=document.getElementById("content");
  const original=content.innerHTML;
  content.innerHTML=`<div class="content-inner">${DISEASES.map(d=>`<div class="dz-entry" style="page-break-after:always;margin-bottom:40px;"><div class="cat-label"><span class="cat-dot"></span>${d.emoji} ${d.cat}</div><h2 class="dz-title">${d.name}</h2><div class="dz-oneliner">${d.oneLiner}</div>${d.path?`<div class="sec"><h3>🔬 Mechanism of Action</h3><p>${d.path}</p></div>`:""}${d.clin?`<div class="sec"><h3>🩺 Clinical Uses</h3>${d.clin.trim().startsWith("<ul>")?d.clin:"<p>"+d.clin+"</p>"}</div>`:""}${d.dx?`<div class="sec"><h3>⚠️ Adverse Effects</h3>${d.dx.trim().startsWith("<ul>")?d.dx:"<p>"+d.dx+"</p>"}</div>`:""}${d.tx?`<div class="sec"><h3>💊 Pharmacokinetics &amp; Notes</h3><p>${d.tx}</p></div>`:""}${d.hy?.length?`<div class="callout hy"><h4>⚡ High-Yield</h4><ul>${d.hy.map(x=>`<li>${x}</li>`).join("")}</ul></div>`:""}${d.mn?`<div class="callout mn"><h4>🧠 Mnemonic</h4>${d.mn}</div>`:""}${d.trap?`<div class="callout trap"><h4>⚠️ Exam Trap</h4>${d.trap}</div>`:""}</div>`).join("")}</div>`;
  setTimeout(()=>{window.print();content.innerHTML=original;renderContent();},300);
}
document.getElementById("search").addEventListener("input",(e)=>{state.search=e.target.value;renderSidebar();});
document.getElementById("prevBtn").onclick=()=>navigate(-1);
document.getElementById("nextBtn").onclick=()=>navigate(1);
document.getElementById("printBtn").onclick=printAll;
document.getElementById("excelBtn").onclick=exportExcel;
document.addEventListener("keydown",(e)=>{
  if(e.target.tagName==="INPUT")return;
  if(state.currentId===null&&e.key!=="ArrowRight"&&e.key!=="ArrowDown")return;
  if(e.key==="ArrowLeft"){e.preventDefault();navigate(-1);}
  else if(e.key==="ArrowRight"){e.preventDefault();navigate(1);}
  else if(e.key===" "){e.preventDefault();toggleLearned();}
  else if(e.key==="ArrowDown"||e.key==="ArrowUp"){
    e.preventDefault();
    const visible=getVisibleDiseases();
    const idx=visible.findIndex(x=>x.id===state.currentId);
    const dir=e.key==="ArrowDown"?1:-1;
    const newIdx=idx===-1?0:idx+dir;
    if(newIdx>=0&&newIdx<visible.length)selectDisease(visible[newIdx].id);
  }
  else if(e.key==="Escape"){goHome();}
});
Object.keys(groupByCategory()).forEach(c=>state.collapsed.add(c));
renderSidebar();
renderHomepage();
updateProgress();
</script>
</body>
</html>
