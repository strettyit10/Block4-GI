<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ══════════════════════════════════════
   DESIGN TOKENS — matching HoyaDocs hub
══════════════════════════════════════ */
:root {
  --sb:         #0d2416;
  --sb-hover:   rgba(255,255,255,0.07);
  --sb-line:    rgba(255,255,255,0.09);
  --bg:         #f4f8f5;
  --surface:    #ffffff;
  --ink:        #0f172a;
  --ink-2:      #334155;
  --ink-3:      #64748b;
  --rule:       #e2e8f0;
  --card-sh:    0 1px 3px rgba(0,0,0,0.05);
  --bc-blue-bg: #eef4ff; --bc-blue-br: #c7d9f5; --bc-blue-tx: #1f4b99;
  --bc-grn-bg:  #edfdf4; --bc-grn-br:  #a7f3c9; --bc-grn-tx:  #166534;
  --bc-ros-bg:  #fff1f2; --bc-ros-br:  #fda4af; --bc-ros-tx:  #9f1239;
  --bc-pur-bg:  #f5f0ff; --bc-pur-br:  #d8b4fe; --bc-pur-tx:  #6d28d9;
  --bc-amb-bg:  #fffbeb; --bc-amb-br:  #fde68a; --bc-amb-tx:  #92400e;
  --hero-em:    #166534;
  --accent:     #166534;
  --accent-soft:#dcfce7;
  --done-bg:    #f0fdf4;
  --done-text:  #86efac;
  --streak-bg:  #fef3c7;
  --streak-tx:  #92400e;
}

[data-theme="dark"] {
  --bg:         #0a1f10;
  --surface:    #122b1a;
  --ink:        #f1f5f9;
  --ink-2:      #cbd5e1;
  --ink-3:      #94a3b8;
  --rule:       #1e4a2a;
  --card-sh:    0 1px 3px rgba(0,0,0,0.4);
  --bc-blue-bg: #1a2744; --bc-blue-br: #2d4a8a; --bc-blue-tx: #6ba3e8;
  --bc-grn-bg:  #0a2218; --bc-grn-br:  #1a5c35; --bc-grn-tx:  #5dbf87;
  --bc-ros-bg:  #250a12; --bc-ros-br:  #6b1a2e; --bc-ros-tx:  #e06b8a;
  --bc-pur-bg:  #1a1033; --bc-pur-br:  #4c1d95; --bc-pur-tx:  #a78bfa;
  --bc-amb-bg:  #2a1f0a; --bc-amb-br:  #7c5a1a; --bc-amb-tx:  #fbbf24;
  --hero-em:    #4ade80;
  --accent:     #4ade80;
  --accent-soft:#0a2218;
  --done-bg:    #0a2218;
  --done-text:  #34d399;
  --streak-bg:  #2a1f0a;
  --streak-tx:  #fbbf24;
}

html, body { height: 100%; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.6;
  transition: background 0.2s, color 0.2s;
}

a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }

/* ══════════════════════════════════════
   LAYOUT
══════════════════════════════════════ */
.shell { display: flex; min-height: 100vh; }

/* SIDEBAR — matches hub */
.sidebar {
  width: 232px; flex-shrink: 0;
  background: var(--sb);
  position: sticky; top: 0; height: 100vh;
  display: flex; flex-direction: column;
  padding: 28px 18px 24px;
  overflow-y: auto;
  transition: background 0.2s;
}

.sb-brand { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.sb-name {
  font-size: 1.35rem; font-weight: 900; color: #fff;
  letter-spacing: -0.01em; flex: 1;
  text-shadow: 0 1px 8px rgba(0,0,0,0.25);
}
.dark-toggle {
  width: 28px; height: 28px; border-radius: 7px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.82rem; color: rgba(255,255,255,0.7);
  flex-shrink: 0;
}
.dark-toggle:hover { background: rgba(255,255,255,0.16); }
.sb-block {
  font-size: 0.72rem; font-weight: 500;
  color: rgba(255,255,255,0.42);
  margin-bottom: 26px; padding-left: 2px;
}
.sb-section-label {
  font-size: 0.62rem; font-weight: 700;
  letter-spacing: 0.10em; text-transform: uppercase;
  color: #ffffff; margin-bottom: 6px; padding: 0 8px;
}
.sb-nav { display: flex; flex-direction: column; gap: 2px; margin-bottom: 20px; }
.sb-link {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 10px; border-radius: 8px;
  font-size: 0.82rem; font-weight: 500;
  color: rgba(255,255,255,0.60);
  transition: background 0.13s, color 0.13s;
}
.sb-link:hover { background: var(--sb-hover); color: rgba(255,255,255,0.92); }
.sb-link.active { background: rgba(255,255,255,0.12); color: #fff; }
.sb-link-icon {
  width: 22px; height: 22px; border-radius: 6px;
  background: rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.82rem; flex-shrink: 0;
}
.sb-icon-green { background: rgba(74,180,120,0.32); }
.sb-icon-amber { background: rgba(245,158,11,0.32); }
.sb-icon-blue  { background: rgba(99,140,220,0.32); }
.sb-icon-rose  { background: rgba(220,90,110,0.32); }
.sb-rule { height: 1px; background: var(--sb-line); margin: 4px 0 18px; }
.sb-spacer { flex: 1; }

/* MAIN */
.main { flex: 1; min-width: 0; background: var(--bg); transition: background 0.2s; }
.main-inner { max-width: 860px; padding: 40px 48px 80px; }

/* HERO */
.hero { margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--rule); }
.hero-eyebrow {
  font-size: 0.68rem; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--ink-3); margin-bottom: 12px;
}
.hero-title {
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  font-weight: 900; letter-spacing: -0.045em;
  color: var(--ink); line-height: 1.05; margin-bottom: 10px;
}
.hero-title em { font-style: normal; color: var(--hero-em); }
.hero-sub { font-size: 0.9rem; color: var(--ink-2); line-height: 1.6; }

/* DATE NAV */
.date-nav {
  display: flex; align-items: center; gap: 10px;
  margin-top: 16px; margin-bottom: 4px;
}
.date-nav button {
  padding: 6px 14px; border-radius: 8px;
  border: 1px solid var(--rule); background: var(--surface);
  color: var(--ink-2); font-size: 0.82rem; font-weight: 600;
  box-shadow: var(--card-sh);
  transition: all 0.14s;
}
.date-nav button:hover { border-color: var(--accent); color: var(--accent); }
.date-nav .today-btn {
  background: var(--accent); color: #fff;
  border-color: var(--accent);
}
.date-nav .today-btn:hover { opacity: 0.9; }
.date-nav .current-date {
  font-size: 1rem; font-weight: 700; color: var(--ink);
  flex: 1; text-align: center;
}

/* ══════════════════════════════════════
   PROGRESS CARD
══════════════════════════════════════ */
.progress-card {
  background: var(--surface); border: 1px solid var(--rule);
  border-radius: 16px; padding: 20px 24px;
  box-shadow: var(--card-sh);
  margin-bottom: 16px;
  transition: background 0.2s, border-color 0.2s;
}
.progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.progress-header h3 { font-size: 0.88rem; font-weight: 700; color: var(--ink); }
.progress-pct { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.03em; color: var(--accent); }
.progress-bar { height: 8px; background: var(--rule); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #34d399); border-radius: 4px; transition: width 0.4s ease; }
.progress-stats {
  display: flex; gap: 16px; margin-top: 10px;
  font-size: 0.78rem; color: var(--ink-3); font-weight: 500;
}
.progress-stats span { display: flex; align-items: center; gap: 5px; }
.stat-dot { width: 7px; height: 7px; border-radius: 50%; }
.stat-dot.done { background: var(--accent); }
.stat-dot.pending { background: var(--rule); }
.stat-dot.skipped { background: var(--ink-3); }

/* TIMER */
.timer-card {
  background: var(--surface); border: 1px solid var(--rule);
  border-radius: 16px; padding: 14px 24px;
  box-shadow: var(--card-sh); margin-bottom: 20px;
  display: flex; align-items: center; gap: 16px;
  transition: background 0.2s;
}
.timer-display {
  font-size: 1.6rem; font-weight: 800;
  font-family: 'Inter', monospace; letter-spacing: -0.02em;
  color: var(--accent); min-width: 90px;
}
.timer-label { color: var(--ink-3); font-size: 0.82rem; flex: 1; font-weight: 500; }
.timer-btns { display: flex; gap: 6px; }
.timer-btns button {
  padding: 7px 16px; border-radius: 8px; font-size: 0.82rem; font-weight: 600;
  border: 1px solid var(--rule); background: var(--surface); color: var(--ink-2);
}
.timer-btns button.start { background: var(--accent); color: #fff; border-color: var(--accent); }
.timer-btns button.stop { background: #ef4444; color: #fff; border-color: #ef4444; }

/* ══════════════════════════════════════
   PHASE SECTIONS
══════════════════════════════════════ */
.section-divider { display: flex; align-items: center; gap: 14px; margin: 28px 0 16px; }
.section-divider-icon { font-size: 1.1rem; }
.section-divider-text { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.02em; color: var(--ink); white-space: nowrap; }
.section-divider-line { flex: 1; height: 1px; background: var(--accent); opacity: 0.3; }
.section-divider-badge {
  font-size: 0.7rem; font-weight: 700; padding: 3px 10px;
  border-radius: 999px; background: var(--accent-soft);
  color: var(--accent);
}

/* SESSION CARD */
.session-card {
  background: var(--surface); border: 1px solid var(--rule);
  border-radius: 16px; padding: 18px 22px;
  box-shadow: var(--card-sh); margin-bottom: 10px;
  transition: background 0.2s;
}
.session-label {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
}
.session-title { font-size: 0.88rem; font-weight: 700; color: var(--ink); }
.block-tag {
  font-size: 0.62rem; font-weight: 700;
  letter-spacing: 0.05em; text-transform: uppercase;
  padding: 2px 8px; border-radius: 6px;
}
.block-tag.gi { background: var(--bc-grn-bg); color: var(--bc-grn-tx); border: 1px solid var(--bc-grn-br); }
.block-tag.repro { background: var(--bc-ros-bg); color: var(--bc-ros-tx); border: 1px solid var(--bc-ros-br); }
.block-tag.endo { background: var(--bc-amb-bg); color: var(--bc-amb-tx); border: 1px solid var(--bc-amb-br); }
.block-tag.course { background: var(--bc-blue-bg); color: var(--bc-blue-tx); border: 1px solid var(--bc-blue-br); }

/* TASK ITEMS */
.task {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid var(--rule);
}
.task:last-child { border-bottom: none; }
.task input[type="checkbox"] {
  width: 17px; height: 17px; margin-top: 3px;
  accent-color: var(--accent); cursor: pointer; flex-shrink: 0;
  border-radius: 4px;
}
.task-text { flex: 1; font-size: 0.85rem; line-height: 1.5; color: var(--ink-2); font-weight: 500; }
.task.done .task-text { text-decoration: line-through; color: var(--ink-3); opacity: 0.6; }
.task-time {
  font-size: 0.72rem; font-weight: 600; color: var(--ink-3);
  white-space: nowrap; padding: 2px 8px;
  background: var(--bg); border-radius: 6px;
}
.task-subtasks {
  margin-top: 6px; padding-left: 10px;
  font-size: 0.82rem; color: var(--ink-3);
}
.task-subtasks div { padding: 2px 0; }
.skip-badge {
  font-size: 0.62rem; font-weight: 700;
  padding: 1px 6px; border-radius: 4px;
  background: var(--done-bg); color: var(--done-text);
  letter-spacing: 0.03em;
}
.task.auto-skip .task-text { text-decoration: line-through; color: var(--ink-3); opacity: 0.5; }

/* EMPTY STATE */
.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--ink-3);
}
.empty-state h2 { color: var(--ink); font-weight: 800; margin-bottom: 6px; }

/* ══════════════════════════════════════
   END OF DAY
══════════════════════════════════════ */
.eod-card {
  background: var(--surface); border: 1px solid var(--rule);
  border-radius: 16px; padding: 20px 24px;
  box-shadow: var(--card-sh); margin-top: 24px;
}
.eod-card h3 { font-size: 0.88rem; font-weight: 700; color: var(--ink); margin-bottom: 10px; }
.eod-card textarea {
  width: 100%; background: var(--bg); border: 1px solid var(--rule);
  color: var(--ink); border-radius: 10px; padding: 12px;
  font-family: inherit; font-size: 0.85rem; resize: vertical; min-height: 60px;
  transition: border-color 0.14s;
}
.eod-card textarea:focus { outline: none; border-color: var(--accent); }
.eod-card button {
  margin-top: 10px; padding: 9px 24px;
  background: var(--accent); border: none; color: #fff;
  border-radius: 8px; font-weight: 700; font-size: 0.85rem;
  transition: opacity 0.14s;
}
.eod-card button:hover { opacity: 0.9; }

/* ══════════════════════════════════════
   HISTORY HEATMAP
══════════════════════════════════════ */
.history-card {
  background: var(--surface); border: 1px solid var(--rule);
  border-radius: 16px; padding: 20px 24px;
  box-shadow: var(--card-sh); margin-top: 16px;
}
.history-card h3 { font-size: 0.88rem; font-weight: 700; color: var(--ink); margin-bottom: 14px; }
.streak-bar {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 14px; padding: 8px 14px;
  background: var(--streak-bg); border-radius: 10px;
  font-size: 0.82rem; font-weight: 600; color: var(--streak-tx);
}
.streak-fire { font-size: 1.2em; }
.streak-num { font-size: 1.2em; font-weight: 900; }

.history-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(36px, 1fr));
  gap: 4px;
}
.history-day {
  aspect-ratio: 1; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.62rem; font-weight: 700; cursor: pointer;
  position: relative; transition: transform 0.1s;
}
.history-day:hover { transform: scale(1.15); }
.history-day.future { background: var(--bg); color: var(--ink-3); border: 1px solid var(--rule); }
.history-day.no-data { background: var(--bg); color: var(--ink-3); border: 1px dashed var(--rule); }
.history-day.low { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
.history-day.mid { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
.history-day.high { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
.history-day.perfect { background: var(--accent); color: #fff; }
.history-day.today-marker { outline: 2px solid var(--accent); outline-offset: 1px; }

[data-theme="dark"] .history-day.low { background: #2a0f0f; color: #fca5a5; border-color: #4a1515; }
[data-theme="dark"] .history-day.mid { background: #2a1f0a; color: #fbbf24; border-color: #4a3510; }
[data-theme="dark"] .history-day.high { background: #0a2218; color: #4ade80; border-color: #1a4a2a; }
[data-theme="dark"] .history-day.perfect { background: var(--accent); color: #000; }

.history-tooltip {
  display: none; position: absolute; bottom: 115%; left: 50%; transform: translateX(-50%);
  background: var(--ink); color: var(--bg); padding: 4px 10px; border-radius: 6px;
  font-size: 0.72rem; white-space: nowrap; z-index: 10; font-weight: 600;
}
.history-day:hover .history-tooltip { display: block; }

/* RESPONSIVE */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .main-inner { padding: 20px 16px 60px; }
  .timer-card { flex-wrap: wrap; }
}
</style>
</head>

  try { localStorage.setItem('theme', next); } catch(e) {}
}

let fbApp, fbAuth, fbDb, fbUser = null;
let syncStatus = 'offline'; // offline, syncing, synced, error
let syncDebounce = null;

async function initFirebase() {
  try {
    const { initializeApp } = await import('https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js');
    const { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut: fbSignOut } =
      await import('https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js');
    const { getFirestore, doc, getDoc, setDoc } =
      await import('https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js');

    fbApp = initializeApp(firebaseConfig);
    fbAuth = getAuth(fbApp);
    fbDb = getFirestore(fbApp);

    // Expose for use in other functions
    window._fb = { signInWithPopup, GoogleAuthProvider, fbSignOut, doc, getDoc, setDoc };

    onAuthStateChanged(fbAuth, async (user) => {
      fbUser = user;
      if (user) {
        await pullFromCloud();
      }
      render();
    });
  } catch (e) {
    console.error('Firebase init error:', e);
    syncStatus = 'error';
  }
}

async function signIn() {
  if (!fbAuth || !window._fb) return;
  try {
    const provider = new window._fb.GoogleAuthProvider();
    await window._fb.signInWithPopup(fbAuth, provider);
  } catch (e) {
    console.error('Sign-in error:', e);
    alert('Sign-in failed: ' + e.message);
  }
}

async function signOutUser() {
  if (!fbAuth || !window._fb) return;
  try {
    await window._fb.fbSignOut(fbAuth);
    fbUser = null;
    syncStatus = 'offline';
    render();
  } catch (e) { console.error('Sign-out error:', e); }
}

async function pushToCloud() {
  if (!fbUser || !fbDb || !window._fb) return;
  syncStatus = 'syncing';
  render();
  try {
    const ref = window._fb.doc(fbDb, 'users', fbUser.uid);
    await window._fb.setDoc(ref, {
      state: JSON.stringify(state),
      updatedAt: new Date().toISOString(),
      email: fbUser.email
    });
    syncStatus = 'synced';
  } catch (e) {
    console.error('Push error:', e);
    syncStatus = 'error';
  }
  render();
}

async function pullFromCloud() {
  if (!fbUser || !fbDb || !window._fb) return;
  syncStatus = 'syncing';
  try {
    const ref = window._fb.doc(fbDb, 'users', fbUser.uid);
    const snap = await window._fb.getDoc(ref);
    if (snap.exists()) {
      const cloudState = JSON.parse(snap.data().state);
      // Merge: cloud wins for days that have more tasks checked
      for (const [date, cloudDay] of Object.entries(cloudState.days || {})) {
        const local = state.days[date];
        if (!local) {
          state.days[date] = cloudDay;
        } else {
          const localChecked = Object.keys(local.tasks || {}).length;
          const cloudChecked = Object.keys(cloudDay.tasks || {}).length;
          if (cloudChecked > localChecked) {
            state.days[date] = cloudDay;
          } else if (cloudChecked === localChecked) {
            // Merge tasks from both
            state.days[date].tasks = { ...cloudDay.tasks, ...local.tasks };
            state.days[date].notes = local.notes || cloudDay.notes;
            state.days[date].totalTime = Math.max(local.totalTime || 0, cloudDay.totalTime || 0);
          }
        }
      }
      saveLocal();
    }
    syncStatus = 'synced';
  } catch (e) {
    console.error('Pull error:', e);
    syncStatus = 'error';
  }
}

function debouncedSync() {
  if (!fbUser) return;
  clearTimeout(syncDebounce);
  syncDebounce = setTimeout(() => pushToCloud(), 2000);
}

// STATE (local + cloud)
// ============================================================
const STATE_KEY = 'hoyadocs_checklist_v2';
let state = { days: {} };

function loadState() {
  try { const s = localStorage.getItem(STATE_KEY); if (s) state = JSON.parse(s); } catch(e) {}
}
function saveLocal() {
  try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); } catch(e) {}
}
function saveState() {
  saveLocal();
  debouncedSync();
}
function getDayState(ds) {
  if (!state.days[ds]) state.days[ds] = { tasks: {}, notes: '', savedAt: null, totalTime: 0 };
  return state.days[ds];
}

// ============================================================
// DATE
// ============================================================
let currentDate = new Date(); currentDate.setHours(0,0,0,0);

function fmtDate(d) { return d.toISOString().split('T')[0]; }
function fmtDisplay(d) {
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}`;
}
function getSessionsForDate(ds) { return SCHEDULE.filter(s => s.date === ds); }

// ============================================================
// PARSE TASKS
// ============================================================
function parseTasks(text, phase) {
  if (!text || text === '—') return [];
  const lines = text.split('\n');
  const tasks = [];
  let cur = null;
  for (const line of lines) {
    const t = line.trim();
    if (!t) continue;
    if (t.startsWith('→') || (t.startsWith('(') && !t.includes('DONE'))) continue;
    const isNum = /^\d+\.\s/.test(t);
    const isStar = t.startsWith('★');
    const isBullet = t.startsWith('•');
    const isDone = t.includes('DONE') && t.includes('skip');
    const timeM = t.match(/(\d+)\s*min/);
    if (isNum || isStar) {
      cur = {
        id: `${phase}_${tasks.length}`,
        text: t.replace(/^\d+\.\s*/, '').replace(/^★\s*/, '★ '),
        time: timeM ? parseInt(timeM[1]) : null,
        isDone: isDone, isPreDone: isDone, subtasks: []
      };
      tasks.push(cur);
    } else if (isBullet && cur) {
      cur.subtasks.push({ text: t.replace(/^•\s*/, ''), isDone: isDone || (t.includes('DONE') && t.includes('skip')), isPreDone: isDone || (t.includes('DONE') && t.includes('skip')) });
    } else if (isBullet) {
      tasks.push({ id: `${phase}_${tasks.length}`, text: t.replace(/^•\s*/, ''), time: null, isDone, isPreDone: isDone, subtasks: [] });
    } else if (cur && t.includes('done before')) {
      cur.text += ` ${t}`;
    }
  }
  return tasks;
}

// ============================================================
// TIMER
// ============================================================
let timerInterval = null, timerSeconds = 0, timerRunning = false;

function startTimer() {
  timerRunning = true;
  timerInterval = setInterval(() => { timerSeconds++; updateTimerEl(); }, 1000);
  render();
}
function stopTimer() {
  clearInterval(timerInterval); timerRunning = false;
  const ds = getDayState(fmtDate(currentDate));
  ds.totalTime = (ds.totalTime||0) + timerSeconds;
  saveState(); timerSeconds = 0; render();
}
function resetTimer() { clearInterval(timerInterval); timerRunning = false; timerSeconds = 0; render(); }
function updateTimerEl() {
  const el = document.getElementById('timer-el');
  if (el) {
    const h = Math.floor(timerSeconds/3600), m = Math.floor((timerSeconds%3600)/60), s = timerSeconds%60;
    el.textContent = `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }
}

// ============================================================
// PROGRESS
// ============================================================
function calcProgress(ds, sessions) {
  const day = getDayState(ds);
  let total=0, done=0, skipped=0;
  for (const sess of sessions) {
    for (const ph of ['before','dayof','after']) {
      const tasks = parseTasks(sess[ph], `${sess.title}_${ph}`);
      for (const t of tasks) {
        if (t.isPreDone) { skipped++; continue; }
        total++;
        if (day.tasks[`${sess.title}|${ph}|${t.id}`]) done++;
      }
    }
  }
  return { total, done, skipped, pct: total > 0 ? Math.round((done/total)*100) : 0 };
}

function calcStreak() {
  let streak = 0;
  const today = new Date(); today.setHours(0,0,0,0);
  let d = new Date(today); d.setDate(d.getDate()-1);
  while (streak < 60) {
    const ds = fmtDate(d);
    const sess = getSessionsForDate(ds);
    if (sess.length === 0) { d.setDate(d.getDate()-1); continue; }
    if (calcProgress(ds, sess).pct >= 70) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  const ts = getSessionsForDate(fmtDate(today));
  if (ts.length > 0 && calcProgress(fmtDate(today), ts).pct >= 70) streak++;
  return streak;
}

// ============================================================
// RENDER
// ============================================================
function render() {
  const ds = fmtDate(currentDate);
  const sessions = getSessionsForDate(ds);
  const isToday = ds === fmtDate(new Date());
  const day = getDayState(ds);
  const prog = calcProgress(ds, sessions);
  const streak = calcStreak();
  let h = '';

  // Hero
  h += `<div class="hero">
    <div class="hero-eyebrow">DAILY CHECKLIST</div>
    <h1 class="hero-title">${isToday ? "Today's" : ''} <em>Game Plan</em></h1>
    <div class="hero-sub">Your complete study checklist — check off tasks as you go.</div>
    <div class="date-nav">
      <button onclick="navDate(-1)">← Prev</button>
      <button class="today-btn" onclick="goToday()">Today</button>
      <button onclick="navDate(1)">Next →</button>
      <div class="current-date">${fmtDisplay(currentDate)}${isToday ? '' : ''}</div>
    </div>
  </div>`;

  if (sessions.length === 0) {
    h += `<div class="empty-state"><h2>No sessions scheduled</h2><p>Nothing on the calendar for this date. Use the arrows to navigate.</p></div>`;
  } else {
    // Progress
    h += `<div class="progress-card">
      <div class="progress-header">
        <h3>Day Progress</h3>
        <div class="progress-pct">${prog.pct}%</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${prog.pct}%"></div></div>
      <div class="progress-stats">
        <span><span class="stat-dot done"></span> ${prog.done} done</span>
        <span><span class="stat-dot pending"></span> ${prog.total - prog.done} remaining</span>
        ${prog.skipped > 0 ? `<span><span class="stat-dot skipped"></span> ${prog.skipped} auto-skipped</span>` : ''}
        ${day.totalTime > 0 ? `<span>⏱ ${Math.floor(day.totalTime/3600)}h ${Math.floor((day.totalTime%3600)/60)}m studied</span>` : ''}
      </div>
    </div>`;

    // Timer
    h += `<div class="timer-card">
      <div class="timer-display" id="timer-el">${timerRunning ? '' : '0:00:00'}</div>
      <div class="timer-label">${timerRunning ? 'Studying...' : 'Pomodoro — start when you begin a task'}</div>
      <div class="timer-btns">
        ${timerRunning ? `<button class="stop" onclick="stopTimer()">■ Stop</button>` : `<button class="start" onclick="startTimer()">▶ Start</button>`}
        <button onclick="resetTimer()">Reset</button>
      </div>
    </div>`;

    // Phases
    const phases = [
      { key:'before', icon:'🌙', title:'Day Before Lecture', desc:'Evening prep' },
      { key:'dayof', icon:'📖', title:'Day Of Lecture', desc:'Primary study' },
      { key:'after', icon:'🔄', title:'Day After Lecture', desc:'Reinforcement' },
    ];

    for (const phase of phases) {
      let phaseTasks = [], phaseHtml = '';
      for (const sess of sessions) {
        const tasks = parseTasks(sess[phase.key], `${sess.title}_${phase.key}`);
        if (!tasks.length) continue;
        const blockClass = sess.block === 'GI' ? 'gi' : sess.block === 'REPRO' ? 'repro' : 'endo';
        phaseHtml += `<div class="session-card"><div class="session-label">
          <span class="session-title">${esc(sess.title)}</span>
          <span class="block-tag ${blockClass}">${sess.block}</span>
          <span class="block-tag course">${sess.course}</span>
        </div>`;
        for (const t of tasks) {
          const key = `${sess.title}|${phase.key}|${t.id}`;
          const checked = t.isPreDone || day.tasks[key];
          phaseTasks.push({ key, checked, skip: t.isPreDone });
          phaseHtml += `<div class="task ${checked ? 'done' : ''} ${t.isPreDone ? 'auto-skip' : ''}">
            <input type="checkbox" ${checked ? 'checked' : ''} ${t.isPreDone ? 'disabled' : ''}
              onchange="toggle('${key.replace(/'/g,"\\'")}', this.checked)">
            <div class="task-text">
              ${t.isPreDone ? '<span class="skip-badge">SKIP</span> ' : ''}${esc(t.text)}
              ${t.subtasks.length ? '<div class="task-subtasks">' + t.subtasks.map(st =>
                `<div style="${st.isPreDone ? 'text-decoration:line-through;opacity:0.5' : ''}">${st.isPreDone ? '<span class="skip-badge">SKIP</span> ' : '• '}${esc(st.text)}</div>`
              ).join('') + '</div>' : ''}
            </div>
            ${t.time ? `<span class="task-time">${t.time}m</span>` : ''}
          </div>`;
        }
        phaseHtml += `</div>`;
      }
      const pd = phaseTasks.filter(t=>t.checked).length, pt = phaseTasks.length;
      if (pt > 0) {
        h += `<div class="section-divider">
          <span class="section-divider-icon">${phase.icon}</span>
          <span class="section-divider-text">${phase.title}</span>
          <span class="section-divider-line"></span>
          <span class="section-divider-badge">${pd}/${pt}</span>
        </div>${phaseHtml}`;
      }
    }

    // Anki
    let ankiHtml = '';
    for (const sess of sessions) {
      if (!sess.anki || sess.anki === '—') continue;
      const tasks = parseTasks(sess.anki, `${sess.title}_anki`);
      if (!tasks.length) continue;
      const bc = sess.block === 'GI' ? 'gi' : sess.block === 'REPRO' ? 'repro' : 'endo';
      ankiHtml += `<div class="session-card"><div class="session-label">
        <span class="session-title">${esc(sess.title)}</span>
        <span class="block-tag ${bc}">${sess.block}</span>
      </div>`;
      for (const t of tasks) {
        const key = `${sess.title}|anki|${t.id}`;
        const checked = day.tasks[key];
        ankiHtml += `<div class="task ${checked?'done':''}">
          <input type="checkbox" ${checked?'checked':''} onchange="toggle('${key.replace(/'/g,"\\'")}',this.checked)">
          <div class="task-text">${esc(t.text)}
            ${t.subtasks.length ? '<div class="task-subtasks">' + t.subtasks.map(st => `<div>• ${esc(st.text)}</div>`).join('') + '</div>' : ''}
          </div>
        </div>`;
      }
      ankiHtml += `</div>`;
    }
    if (ankiHtml) {
      h += `<div class="section-divider">
        <span class="section-divider-icon">🃏</span>
        <span class="section-divider-text">Anki</span>
        <span class="section-divider-line"></span>
      </div>${ankiHtml}`;
    }

    // EOD
    h += `<div class="eod-card">
      <h3>End of Day Reflection</h3>
      <textarea id="eod" placeholder="How did today go? What was hard? What will you change tomorrow?"
        oninput="saveNotes(this.value)">${esc(day.notes||'')}</textarea>
      <button onclick="saveDay(this)">Save Day & Log Progress</button>
    </div>`;

    // Cloud Sync panel
    h += '<div class="eod-card" style="margin-top:12px">';
    if (fbUser) {
      const statusIcon = syncStatus === 'synced' ? '☁️ Synced' : syncStatus === 'syncing' ? '⏳ Syncing...' : syncStatus === 'error' ? '⚠️ Sync error' : '☁️';
      h += '<div style="display:flex;align-items:center;justify-content:space-between">';
      h += '<h3>Cloud Sync</h3>';
      h += '<span style="font-size:0.78rem;color:var(--ink-3);font-weight:600">' + statusIcon + '</span>';
      h += '</div>';
      h += '<div style="display:flex;align-items:center;gap:10px;margin-top:10px;padding:10px 14px;background:var(--bg);border-radius:10px">';
      h += '<img src="' + (fbUser.photoURL || '') + '" style="width:28px;height:28px;border-radius:50%;border:1px solid var(--rule)" onerror="this.style.display=\'none\'">';
      h += '<div style="flex:1;font-size:0.82rem"><div style="font-weight:700;color:var(--ink)">' + esc(fbUser.displayName || 'User') + '</div>';
      h += '<div style="color:var(--ink-3);font-size:0.75rem">' + esc(fbUser.email || '') + '</div></div>';
      h += '<button onclick="pushToCloud()" style="padding:6px 14px;font-size:0.78rem;background:var(--accent);color:#fff;border:none;border-radius:6px;font-weight:600;cursor:pointer">Sync Now</button>';
      h += '<button onclick="signOutUser()" style="padding:6px 14px;font-size:0.78rem;background:var(--surface);color:var(--ink-3);border:1px solid var(--rule);border-radius:6px;font-weight:600;cursor:pointer">Sign Out</button>';
      h += '</div>';
      h += '<div style="font-size:0.72rem;color:var(--ink-3);margin-top:8px">Progress auto-syncs when you check tasks. Works on any device — just sign in.</div>';
    } else {
      h += '<h3>Sync Across Devices</h3>';
      h += '<div style="margin-top:10px;text-align:center;padding:16px">';
      h += '<button onclick="signIn()" style="padding:10px 28px;font-size:0.9rem;background:var(--accent);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:8px">';
      h += '<svg width="18" height="18" viewBox="0 0 24 24"><path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#fff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#fff" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#fff" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>';
      h += 'Sign in with Google</button>';
      h += '<div style="font-size:0.78rem;color:var(--ink-3);margin-top:10px">Sign in to sync your progress across all your devices</div>';
      h += '</div>';
    }
    h += '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--rule)">';
    h += '<button id="export-btn" onclick="exportProgress()" style="flex:1;min-width:120px;padding:7px 14px;font-size:0.78rem;background:var(--surface);border:1px solid var(--rule);color:var(--ink-2);border-radius:6px;font-weight:600;cursor:pointer">Export .json</button>';
    h += '<label style="flex:1;min-width:120px;padding:7px 14px;font-size:0.78rem;background:var(--surface);border:1px solid var(--rule);color:var(--ink-2);border-radius:6px;font-weight:600;text-align:center;cursor:pointer">';
    h += 'Import .json<input type="file" accept=".json" onchange="importProgress(this)" style="display:none">';
    h += '</label></div>';
    h += '</div>';
  }

  // History
  h += renderHistory(streak);
  document.getElementById('app').innerHTML = h;
  if (timerRunning) updateTimerEl();
}

function renderHistory(streak) {
  const start = new Date('2026-04-06'), end = new Date('2026-06-11');
  const today = new Date(); today.setHours(0,0,0,0);
  let h = `<div class="history-card"><h3>Study History</h3>
    <div class="streak-bar"><span class="streak-fire">🔥</span>
    <span class="streak-num">${streak}</span> day streak (70%+ completion)</div>
    <div class="history-grid">`;
  let d = new Date(start);
  while (d <= end) {
    const ds = fmtDate(d);
    const sess = getSessionsForDate(ds);
    const isTdy = ds === fmtDate(today);
    const isCur = ds === fmtDate(currentDate);
    const isFut = d > today;
    let cls = 'future', tip = `${d.getMonth()+1}/${d.getDate()}`;
    if (sess.length > 0 && !isFut) {
      const p = calcProgress(ds, sess);
      if (p.total === 0) { cls = 'no-data'; tip += ' · no tasks'; }
      else if (p.pct === 100) { cls = 'perfect'; tip += ` · ${p.pct}%`; }
      else if (p.pct >= 70) { cls = 'high'; tip += ` · ${p.pct}%`; }
      else if (p.pct >= 40) { cls = 'mid'; tip += ` · ${p.pct}%`; }
      else if (p.pct > 0) { cls = 'low'; tip += ` · ${p.pct}%`; }
      else { cls = 'no-data'; tip += ' · not started'; }
    } else if (!sess.length) { cls = 'no-data'; }
    h += `<div class="history-day ${cls} ${isTdy?'today-marker':''}" onclick="goToDate('${ds}')"
      style="${isCur ? 'outline:2px solid var(--accent);outline-offset:1px;' : ''}">${d.getDate()}
      <div class="history-tooltip">${tip}</div></div>`;
    d.setDate(d.getDate()+1);
  }
  return h + `</div></div>`;
}

// ============================================================
// HANDLERS
// ============================================================
function toggle(key, checked) {
  const d = getDayState(fmtDate(currentDate));
  if (checked) d.tasks[key] = true; else delete d.tasks[key];
  saveState(); render();
}
function navDate(n) { currentDate.setDate(currentDate.getDate()+n); render(); }
function goToday() { currentDate = new Date(); currentDate.setHours(0,0,0,0); render(); }
function goToDate(ds) { currentDate = new Date(ds+'T00:00:00'); render(); }
function saveNotes(v) { getDayState(fmtDate(currentDate)).notes = v; saveState(); }
function saveDay(btn) {
  getDayState(fmtDate(currentDate)).savedAt = new Date().toISOString();
  saveState();
  btn.textContent = '✓ Saved!'; btn.style.background = '#166534';
  setTimeout(() => { btn.textContent = 'Save Day & Log Progress'; btn.style.background = ''; }, 2000);
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }


// ============================================================
// SYNC ACROSS DEVICES
// ============================================================
function exportProgress() {
  const blob = new Blob([JSON.stringify(state, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'hoyadocs_progress_' + fmtDate(new Date()) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  const btn = document.getElementById('export-btn');
  if (btn) { btn.textContent = 'Downloaded!'; setTimeout(() => { btn.textContent = 'Export Progress'; }, 2000); }
}

function importProgress(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if (imported.days) {
        for (const date of Object.keys(imported.days)) {
          const dayData = imported.days[date];
          const existing = state.days[date];
          if (!existing) {
            state.days[date] = dayData;
          } else {
            const merged = Object.assign({}, existing.tasks, dayData.tasks);
            state.days[date] = {
              tasks: merged,
              notes: dayData.notes || existing.notes,
              savedAt: dayData.savedAt || existing.savedAt,
              totalTime: Math.max(dayData.totalTime || 0, existing.totalTime || 0)
            };
          }
        }
        saveState(); render();
        alert('Progress imported and merged successfully!');
      }
    } catch(err) { alert('Error: ' + err.message); }
  };
  reader.readAsText(file);
}

// INIT
loadState();
render();
initFirebase();
</script>
