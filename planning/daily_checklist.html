<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HoyaDocs | Daily Checklist</title>

<script>(function(){const t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ══════════════════════════════════════
   DESIGN TOKENS — matching HoyaDocs hub
══════════════════════════════════════ */
:root {
  --sb:         #0d2416;
  --sb-hover:   rgba(255,255,255,0.07);
  --sb-line:    rgba(255,255,255,0.09);
  --bg:         #f4f8f5;
  --surface:    #ffffff;
  --ink:        #0f172a;
  --ink-2:      #334155;
  --ink-3:      #64748b;
  --rule:       #e2e8f0;
  --card-sh:    0 1px 3px rgba(0,0,0,0.05);
  --bc-blue-bg: #eef4ff; --bc-blue-br: #c7d9f5; --bc-blue-tx: #1f4b99;
  --bc-grn-bg:  #edfdf4; --bc-grn-br:  #a7f3c9; --bc-grn-tx:  #166534;
  --bc-ros-bg:  #fff1f2; --bc-ros-br:  #fda4af; --bc-ros-tx:  #9f1239;
  --bc-pur-bg:  #f5f0ff; --bc-pur-br:  #d8b4fe; --bc-pur-tx:  #6d28d9;
  --bc-amb-bg:  #fffbeb; --bc-amb-br:  #fde68a; --bc-amb-tx:  #92400e;
  --hero-em:    #166534;
  --accent:     #166534;
  --accent-soft:#dcfce7;
  --done-bg:    #f0fdf4;
  --done-text:  #86efac;
  --streak-bg:  #fef3c7;
  --streak-tx:  #92400e;
}

[data-theme="dark"] {
  --bg:         #0a1f10;
  --surface:    #122b1a;
  --ink:        #f1f5f9;
  --ink-2:      #cbd5e1;
  --ink-3:      #94a3b8;
  --rule:       #1e4a2a;
  --card-sh:    0 1px 3px rgba(0,0,0,0.4);
  --bc-blue-bg: #1a2744; --bc-blue-br: #2d4a8a; --bc-blue-tx: #6ba3e8;
  --bc-grn-bg:  #0a2218; --bc-grn-br:  #1a5c35; --bc-grn-tx:  #5dbf87;
  --bc-ros-bg:  #250a12; --bc-ros-br:  #6b1a2e; --bc-ros-tx:  #e06b8a;
  --bc-pur-bg:  #1a1033; --bc-pur-br:  #4c1d95; --bc-pur-tx:  #a78bfa;
  --bc-amb-bg:  #2a1f0a; --bc-amb-br:  #7c5a1a; --bc-amb-tx:  #fbbf24;
  --hero-em:    #4ade80;
  --accent:     #4ade80;
  --accent-soft:#0a2218;
  --done-bg:    #0a2218;
  --done-text:  #34d399;
  --streak-bg:  #2a1f0a;
  --streak-tx:  #fbbf24;
}

html, body { height: 100%; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.6;
  transition: background 0.2s, color 0.2s;
}

a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }

/* ══════════════════════════════════════
   LAYOUT
══════════════════════════════════════ */
.shell { display: flex; min-height: 100vh; }

/* SIDEBAR — matches hub */
.sidebar {
  width: 232px; flex-shrink: 0;
  background: var(--sb);
  position: sticky; top: 0; height: 100vh;
  display: flex; flex-direction: column;
  padding: 28px 18px 24px;
  overflow-y: auto;
  transition: background 0.2s;
}

.sb-brand { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.sb-name {
  font-size: 1.35rem; font-weight: 900; color: #fff;
  letter-spacing: -0.01em; flex: 1;
  text-shadow: 0 1px 8px rgba(0,0,0,0.25);
}
.dark-toggle {
  width: 28px; height: 28px; border-radius: 7px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.82rem; color: rgba(255,255,255,0.7);
  flex-shrink: 0;
}
.dark-toggle:hover { background: rgba(255,255,255,0.16); }
.sb-block {
  font-size: 0.72rem; font-weight: 500;
  color: rgba(255,255,255,0.42);
  margin-bottom: 26px; padding-left: 2px;
}
.sb-section-label {
  font-size: 0.62rem; font-weight: 700;
  letter-spacing: 0.10em; text-transform: uppercase;
  color: #ffffff; margin-bottom: 6px; padding: 0 8px;
}
.sb-nav { display: flex; flex-direction: column; gap: 2px; margin-bottom: 20px; }
.sb-link {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 10px; border-radius: 8px;
  font-size: 0.82rem; font-weight: 500;
  color: rgba(255,255,255,0.60);
  transition: background 0.13s, color 0.13s;
}
.sb-link:hover { background: var(--sb-hover); color: rgba(255,255,255,0.92); }
.sb-link.active { background: rgba(255,255,255,0.12); color: #fff; }
.sb-link-icon {
  width: 22px; height: 22px; border-radius: 6px;
  background: rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.82rem; flex-shrink: 0;
}
.sb-icon-green { background: rgba(74,180,120,0.32); }
.sb-icon-amber { background: rgba(245,158,11,0.32); }
.sb-icon-blue  { background: rgba(99,140,220,0.32); }
.sb-icon-rose  { background: rgba(220,90,110,0.32); }
.sb-rule { height: 1px; background: var(--sb-line); margin: 4px 0 18px; }
.sb-spacer { flex: 1; }

/* MAIN */
.main { flex: 1; min-width: 0; background: var(--bg); transition: background 0.2s; display: flex; flex-direction: column; }
.main-inner { max-width: 860px; padding: 40px 48px 80px; }

/* TAB BAR */
.tab-bar {
  display: flex;
  gap: 4px;
  padding: 12px 48px 0;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 10;
}
.tab-btn {
  background: none;
  border: none;
  padding: 12px 20px;
  font-family: inherit;
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text-dim);
  cursor: pointer;
  border-radius: 10px 10px 0 0;
  border-bottom: 3px solid transparent;
  margin-bottom: -1px;
  transition: all 0.15s;
}
.tab-btn:hover { color: var(--text); background: var(--surface); }
.tab-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  background: var(--surface);
}
.tab-panel { display: none; flex: 1; min-height: 0; }
.tab-panel.active { display: flex; flex-direction: column; }
.planner-frame { width: 100%; height: calc(100vh - 52px); border: none; background: var(--bg); }
@media (max-width: 768px) {
  .tab-bar { padding: 8px 12px 0; }
  .tab-btn { padding: 10px 12px; font-size: 0.82rem; }
}

/* HERO */
.hero { margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--rule); }
.hero-eyebrow {
  font-size: 0.68rem; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--ink-3); margin-bottom: 12px;
}
.hero-title {
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  font-weight: 900; letter-spacing: -0.045em;
  color: var(--ink); line-height: 1.05; margin-bottom: 10px;
}
.hero-title em { font-style: normal; color: var(--hero-em); }
.hero-sub { font-size: 0.9rem; color: var(--ink-2); line-height: 1.6; }

/* DATE NAV */
.date-nav {
  display: flex; align-items: center; gap: 10px;
  margin-top: 16px; margin-bottom: 4px;
}
.date-nav button {
  padding: 6px 14px; border-radius: 8px;
  border: 1px solid var(--rule); background: var(--surface);
  color: var(--ink-2); font-size: 0.82rem; font-weight: 600;
  box-shadow: var(--card-sh);
  transition: all 0.14s;
}
.date-nav button:hover { border-color: var(--accent); color: var(--accent); }
.date-nav .today-btn {
  background: var(--accent); color: #fff;
  border-color: var(--accent);
}
.date-nav .today-btn:hover { opacity: 0.9; }
.date-nav .current-date {
  font-size: 1rem; font-weight: 700; color: var(--ink);
  flex: 1; text-align: center;
}

/* ══════════════════════════════════════
   PROGRESS CARD
══════════════════════════════════════ */
.progress-card {
  background: var(--surface); border: 1px solid var(--rule);
  border-radius: 16px; padding: 20px 24px;
  box-shadow: var(--card-sh);
  margin-bottom: 16px;
  transition: background 0.2s, border-color 0.2s;
}
.progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.progress-header h3 { font-size: 0.88rem; font-weight: 700; color: var(--ink); }
.progress-pct { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.03em; color: var(--accent); }
.progress-bar { height: 8px; background: var(--rule); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #34d399); border-radius: 4px; transition: width 0.4s ease; }
.progress-stats {
  display: flex; gap: 16px; margin-top: 10px;
  font-size: 0.78rem; color: var(--ink-3); font-weight: 500;
}
.progress-stats span { display: flex; align-items: center; gap: 5px; }
.stat-dot { width: 7px; height: 7px; border-radius: 50%; }
.stat-dot.done { background: var(--accent); }
.stat-dot.pending { background: var(--rule); }
.stat-dot.skipped { background: var(--ink-3); }

/* TIMER */
.timer-card {
  background: var(--surface); border: 1px solid var(--rule);
  border-radius: 16px; padding: 14px 24px;
  box-shadow: var(--card-sh); margin-bottom: 20px;
  display: flex; align-items: center; gap: 16px;
  transition: background 0.2s;
}
.timer-display {
  font-size: 1.6rem; font-weight: 800;
  font-family: 'Inter', monospace; letter-spacing: -0.02em;
  color: var(--accent); min-width: 90px;
}
.timer-label { color: var(--ink-3); font-size: 0.82rem; flex: 1; font-weight: 500; }
.timer-btns { display: flex; gap: 6px; }
.timer-btns button {
  padding: 7px 16px; border-radius: 8px; font-size: 0.82rem; font-weight: 600;
  border: 1px solid var(--rule); background: var(--surface); color: var(--ink-2);
}
.timer-btns button.start { background: var(--accent); color: #fff; border-color: var(--accent); }
.timer-btns button.stop { background: #ef4444; color: #fff; border-color: #ef4444; }

/* ══════════════════════════════════════
   PHASE SECTIONS
══════════════════════════════════════ */
.section-divider { display: flex; align-items: center; gap: 14px; margin: 28px 0 16px; }
.section-divider-icon { font-size: 1.1rem; }
.section-divider-text { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.02em; color: var(--ink); white-space: nowrap; }
.section-divider-line { flex: 1; height: 1px; background: var(--accent); opacity: 0.3; }
.section-divider-badge {
  font-size: 0.7rem; font-weight: 700; padding: 3px 10px;
  border-radius: 999px; background: var(--accent-soft);
  color: var(--accent);
}

/* SESSION CARD */
.session-card {
  background: var(--surface); border: 1px solid var(--rule);
  border-radius: 16px; padding: 18px 22px;
  box-shadow: var(--card-sh); margin-bottom: 10px;
  transition: background 0.2s;
}
.session-label {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
}
.session-title { font-size: 0.88rem; font-weight: 700; color: var(--ink); }
.block-tag {
  font-size: 0.62rem; font-weight: 700;
  letter-spacing: 0.05em; text-transform: uppercase;
  padding: 2px 8px; border-radius: 6px;
}
.block-tag.gi { background: var(--bc-grn-bg); color: var(--bc-grn-tx); border: 1px solid var(--bc-grn-br); }
.block-tag.repro { background: var(--bc-ros-bg); color: var(--bc-ros-tx); border: 1px solid var(--bc-ros-br); }
.block-tag.endo { background: var(--bc-amb-bg); color: var(--bc-amb-tx); border: 1px solid var(--bc-amb-br); }
.block-tag.course { background: var(--bc-blue-bg); color: var(--bc-blue-tx); border: 1px solid var(--bc-blue-br); }

/* TASK ITEMS */
.task {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid var(--rule);
}
.task:last-child { border-bottom: none; }
.task input[type="checkbox"] {
  width: 17px; height: 17px; margin-top: 3px;
  accent-color: var(--accent); cursor: pointer; flex-shrink: 0;
  border-radius: 4px;
}
.task-text { flex: 1; font-size: 0.85rem; line-height: 1.5; color: var(--ink-2); font-weight: 500; }
.task.done .task-text { text-decoration: line-through; color: var(--ink-3); opacity: 0.6; }
.task-time {
  font-size: 0.72rem; font-weight: 600; color: var(--ink-3);
  white-space: nowrap; padding: 2px 8px;
  background: var(--bg); border-radius: 6px;
}
.task-time.saved {
  background: var(--done-bg); color: var(--done-text);
}
.bucket-time {
  font-size: 0.72rem; font-weight: 700; color: var(--ink-3);
  margin-left: 8px; white-space: nowrap;
}
.day-time-remaining {
  font-size: 0.92rem; font-weight: 700; color: var(--accent);
  margin-top: 6px;
}
.task-subtasks {
  margin-top: 6px; padding-left: 10px;
  font-size: 0.82rem; color: var(--ink-3);
}
.task-subtasks div { padding: 2px 0; }
.skip-badge {
  font-size: 0.62rem; font-weight: 700;
  padding: 1px 6px; border-radius: 4px;
  background: var(--done-bg); color: var(--done-text);
  letter-spacing: 0.03em;
}
.task.auto-skip .task-text { text-decoration: line-through; color: var(--ink-3); opacity: 0.5; }
.task.sub { padding-left: 12px; }
.task.pre-done { opacity: 0.55; }
.task-skip {
  font-size: 0.62rem; font-weight: 700;
  padding: 1px 6px; border-radius: 4px;
  background: var(--done-bg); color: var(--done-text);
  letter-spacing: 0.03em; margin-left: 6px;
}

/* EMPTY STATE */
.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--ink-3);
}
.empty-state h2 { color: var(--ink); font-weight: 800; margin-bottom: 6px; }

/* ══════════════════════════════════════
   END OF DAY
══════════════════════════════════════ */
.eod-card {
  background: var(--surface); border: 1px solid var(--rule);
  border-radius: 16px; padding: 20px 24px;
  box-shadow: var(--card-sh); margin-top: 24px;
}
.eod-card h3 { font-size: 0.88rem; font-weight: 700; color: var(--ink); margin-bottom: 10px; }
.eod-card textarea {
  width: 100%; background: var(--bg); border: 1px solid var(--rule);
  color: var(--ink); border-radius: 10px; padding: 12px;
  font-family: inherit; font-size: 0.85rem; resize: vertical; min-height: 60px;
  transition: border-color 0.14s;
}
.eod-card textarea:focus { outline: none; border-color: var(--accent); }
.eod-card button {
  margin-top: 10px; padding: 9px 24px;
  background: var(--accent); border: none; color: #fff;
  border-radius: 8px; font-weight: 700; font-size: 0.85rem;
  transition: opacity 0.14s;
}
.eod-card button:hover { opacity: 0.9; }

/* ══════════════════════════════════════
   HISTORY HEATMAP
══════════════════════════════════════ */
.history-card {
  background: var(--surface); border: 1px solid var(--rule);
  border-radius: 16px; padding: 20px 24px;
  box-shadow: var(--card-sh); margin-top: 16px;
}
.history-card h3 { font-size: 0.88rem; font-weight: 700; color: var(--ink); margin-bottom: 14px; }
.streak-bar {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 14px; padding: 8px 14px;
  background: var(--streak-bg); border-radius: 10px;
  font-size: 0.82rem; font-weight: 600; color: var(--streak-tx);
}
.streak-fire { font-size: 1.2em; }
.streak-num { font-size: 1.2em; font-weight: 900; }

.history-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(36px, 1fr));
  gap: 4px;
}
.history-day {
  aspect-ratio: 1; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.62rem; font-weight: 700; cursor: pointer;
  position: relative; transition: transform 0.1s;
}
.history-day:hover { transform: scale(1.15); }
.history-day.future { background: var(--bg); color: var(--ink-3); border: 1px solid var(--rule); }
.history-day.no-data { background: var(--bg); color: var(--ink-3); border: 1px dashed var(--rule); }
.history-day.low { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
.history-day.mid { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
.history-day.high { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
.history-day.perfect { background: var(--accent); color: #fff; }
.history-day.today-marker { outline: 2px solid var(--accent); outline-offset: 1px; }

[data-theme="dark"] .history-day.low { background: #2a0f0f; color: #fca5a5; border-color: #4a1515; }
[data-theme="dark"] .history-day.mid { background: #2a1f0a; color: #fbbf24; border-color: #4a3510; }
[data-theme="dark"] .history-day.high { background: #0a2218; color: #4ade80; border-color: #1a4a2a; }
[data-theme="dark"] .history-day.perfect { background: var(--accent); color: #000; }

.history-tooltip {
  display: none; position: absolute; bottom: 115%; left: 50%; transform: translateX(-50%);
  background: var(--ink); color: var(--bg); padding: 4px 10px; border-radius: 6px;
  font-size: 0.72rem; white-space: nowrap; z-index: 10; font-weight: 600;
}
.history-day:hover .history-tooltip { display: block; }

/* RESPONSIVE */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .main-inner { padding: 20px 16px 60px; }
  .timer-card { flex-wrap: wrap; }
}
</style>
</head>
<body>
<div class="shell">

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sb-brand">
      <div class="sb-name">HoyaDocs</div>
      <button class="dark-toggle" onclick="toggleTheme()" title="Toggle dark mode">🌓</button>
    </div>
    <div class="sb-block">GI Block · Daily Checklist</div>

    <div class="sb-section-label">Navigate</div>
    <div class="sb-nav">
      <a class="sb-link" href="../index.html"><span class="sb-link-icon sb-icon-green">🏠</span> Study Hub Home</a>
      <a class="sb-link active" href="daily_checklist.html"><span class="sb-link-icon sb-icon-amber">✅</span> Daily Checklist + Planner</a>
      <a class="sb-link" href="../active_recall_hub.html"><span class="sb-link-icon sb-icon-rose">🧠</span> Active Recall</a>
      <a class="sb-link" href="../QuestionBank.html"><span class="sb-link-icon sb-icon-blue">❓</span> Question Bank</a>
    </div>

    <div class="sb-rule"></div>
    <div class="sb-section-label">Quick Links</div>
    <div class="sb-nav">
      <a class="sb-link" href="../resource-mapping/gi_mapping.html"><span class="sb-link-icon">📊</span> Resource Map</a>
      <a class="sb-link" href="../resource-mapping/gi_resource_hub.html"><span class="sb-link-icon">📚</span> Resource Hub</a>
    </div>

    <div class="sb-spacer"></div>
    <div style="font-size:0.65rem;color:rgba(255,255,255,0.3);padding:0 8px;">v1.0 · Built for ADHD brains</div>
  </nav>

  <!-- MAIN -->
  <div class="main">
    <div class="tab-bar">
      <button class="tab-btn" data-tab="thisweek" onclick="switchTab('thisweek')">📅 This Week</button>
      <button class="tab-btn active" data-tab="checklist" onclick="switchTab('checklist')">✅ Daily Checklist</button>
      <button class="tab-btn" data-tab="planner" onclick="switchTab('planner')">📝 Lecture Planner</button>
      <button class="tab-btn" data-tab="dashboard" onclick="switchTab('dashboard')">📊 Dashboard</button>
    </div>
    <div id="tab-checklist" class="tab-panel active">
      <div class="main-inner" id="app"></div>
    </div>
    <div id="tab-frame" class="tab-panel">
      <iframe id="plannerFrame" class="planner-frame" data-src="../study-planner.html?embed=1" title="Study Planner"></iframe>
    </div>
  </div>
</div>

<script>
// ============================================================
// THEME TOGGLE
// ============================================================
// Tabs that live inside the Study Planner iframe
const FRAME_TABS = { thisweek: 'thisweek', planner: 'planner', dashboard: 'dashboard' };

function switchTab(name) {
  // Update button active state
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === name);
  });
  // Pick which panel to show: 'checklist' panel, or the shared iframe panel
  const showFrame = !!FRAME_TABS[name];
  document.getElementById('tab-checklist').classList.toggle('active', name === 'checklist');
  document.getElementById('tab-frame').classList.toggle('active', showFrame);
  if (showFrame) {
    const f = document.getElementById('plannerFrame');
    if (f) {
      // Lazy-load iframe with the initial tab baked into the URL so the planner
      // opens on the right view even before its JS is ready.
      if (!f.src && f.dataset.src) {
        f.src = f.dataset.src + '&tab=' + FRAME_TABS[name];
      } else if (f.contentWindow) {
        try {
          f.contentWindow.postMessage({ type: 'hoyadocs-switch-tab', tab: FRAME_TABS[name] }, '*');
        } catch(e) {}
      }
    }
  }
  try { localStorage.setItem('hoyadocs_checklist_tab', name); } catch(e) {}
}
function restoreTab() {
  try {
    const t = localStorage.getItem('hoyadocs_checklist_tab');
    if (t && t !== 'checklist') switchTab(t);
  } catch(e) {}
}

function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  try { localStorage.setItem('theme', next); } catch(e) {}
}

let fbApp, fbAuth, fbDb, fbUser = null;
let syncStatus = 'offline'; // offline, syncing, synced, error
let syncDebounce = null;

async function initFirebase() {
  try {
    const { initializeApp } = await import('https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js');
    const { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut: fbSignOut } =
      await import('https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js');
    const { getFirestore, doc, getDoc, setDoc } =
      await import('https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js');

    fbApp = initializeApp(firebaseConfig);
    fbAuth = getAuth(fbApp);
    fbDb = getFirestore(fbApp);

    // Expose for use in other functions
    window._fb = { signInWithPopup, GoogleAuthProvider, fbSignOut, doc, getDoc, setDoc };

    onAuthStateChanged(fbAuth, async (user) => {
      fbUser = user;
      if (user) {
        await pullFromCloud();
      }
      render();
    });
  } catch (e) {
    console.error('Firebase init error:', e);
    syncStatus = 'error';
  }
}

async function signIn() {
  if (!fbAuth || !window._fb) return;
  try {
    const provider = new window._fb.GoogleAuthProvider();
    await window._fb.signInWithPopup(fbAuth, provider);
  } catch (e) {
    console.error('Sign-in error:', e);
    alert('Sign-in failed: ' + e.message);
  }
}

async function signOutUser() {
  if (!fbAuth || !window._fb) return;
  try {
    await window._fb.fbSignOut(fbAuth);
    fbUser = null;
    syncStatus = 'offline';
    render();
  } catch (e) { console.error('Sign-out error:', e); }
}

async function pushToCloud() {
  if (!fbUser || !fbDb || !window._fb) return;
  syncStatus = 'syncing';
  render();
  try {
    const ref = window._fb.doc(fbDb, 'users', fbUser.uid);
    // Grab the Study Planner's state from localStorage (it's written by the iframe)
    let plannerState = null;
    try { plannerState = localStorage.getItem('gi-planner-v2'); } catch(e) {}
    await window._fb.setDoc(ref, {
      state: JSON.stringify(state),
      plannerState: plannerState || '',
      updatedAt: new Date().toISOString(),
      email: fbUser.email
    });
    syncStatus = 'synced';
  } catch (e) {
    console.error('Push error:', e);
    syncStatus = 'error';
  }
  render();
}

// Count "included" third-party resources in a planner state — used to decide
// which side of a merge has more meaningful data.
function countPlannerIncluded(plannerObj) {
  if (!plannerObj || typeof plannerObj !== 'object') return 0;
  let n = 0;
  const TP = ['BC','BB','PT','FA','PH','SK'];
  for (const lec of Object.values(plannerObj)) {
    if (!lec || typeof lec !== 'object') continue;
    for (const r of TP) {
      if (lec[r] && lec[r].included) n++;
    }
  }
  return n;
}

async function pullFromCloud() {
  if (!fbUser || !fbDb || !window._fb) return;
  syncStatus = 'syncing';
  try {
    const ref = window._fb.doc(fbDb, 'users', fbUser.uid);
    const snap = await window._fb.getDoc(ref);
    if (snap.exists()) {
      const cloudState = JSON.parse(snap.data().state);
      // Merge: cloud wins for days that have more tasks checked
      for (const [date, cloudDay] of Object.entries(cloudState.days || {})) {
        const local = state.days[date];
        if (!local) {
          state.days[date] = cloudDay;
        } else {
          const localChecked = Object.keys(local.tasks || {}).length;
          const cloudChecked = Object.keys(cloudDay.tasks || {}).length;
          if (cloudChecked > localChecked) {
            state.days[date] = cloudDay;
          } else if (cloudChecked === localChecked) {
            // Merge tasks from both
            state.days[date].tasks = { ...cloudDay.tasks, ...local.tasks };
            state.days[date].notes = local.notes || cloudDay.notes;
            state.days[date].totalTime = Math.max(local.totalTime || 0, cloudDay.totalTime || 0);
          }
        }
      }
      // Merge backlog: prefer the larger/newer set
      const cloudBacklog = cloudState.backlog || [];
      const localBacklog = state.backlog || [];
      const mergedKeys = {};
      const merged = [];
      for (const item of [...cloudBacklog, ...localBacklog]) {
        if (mergedKeys[item.key]) continue;
        mergedKeys[item.key] = true;
        merged.push(item);
      }
      state.backlog = merged;
      state.backlogKeys = {};
      for (const item of merged) state.backlogKeys[item.key] = true;
      saveLocal();

      // --- Restore Study Planner state ---
      const cloudPlannerStr = snap.data().plannerState || '';
      if (cloudPlannerStr) {
        try {
          let localPlannerStr = '';
          try { localPlannerStr = localStorage.getItem('gi-planner-v2') || ''; } catch(e) {}
          const cloudPlanner = JSON.parse(cloudPlannerStr);
          let useCloud = true;
          if (localPlannerStr) {
            const localPlanner = JSON.parse(localPlannerStr);
            // If local has more included resources, keep local (user worked offline)
            if (countPlannerIncluded(localPlanner) > countPlannerIncluded(cloudPlanner)) {
              useCloud = false;
            }
          }
          if (useCloud) {
            localStorage.setItem('gi-planner-v2', cloudPlannerStr);
            // If the planner iframe is already loaded, tell it to reload its state.
            const frame = document.getElementById('plannerFrame');
            if (frame && frame.contentWindow) {
              try { frame.contentWindow.postMessage({ type: 'hoyadocs-planner-reload' }, '*'); } catch(e) {}
            }
          }
        } catch (e) { console.error('Planner state parse error:', e); }
      }
    }
    syncStatus = 'synced';
  } catch (e) {
    console.error('Pull error:', e);
    syncStatus = 'error';
  }
}

function getDayState(ds) {

// ============================================================
// BACKLOG
// ============================================================
function addToBacklog(item) {
  // item: { key, text, time, date, sessTitle, phase, block }
  if (state.backlogKeys[item.key]) return;
  state.backlog.push({ ...item, completed: false, addedAt: new Date().toISOString() });
  state.backlogKeys[item.key] = true;
  saveState();
  render();
}
function removeFromBacklog(key) {
  state.backlog = state.backlog.filter(b => b.key !== key);
  delete state.backlogKeys[key];
  saveState();
  render();
}
function toggleBacklogComplete(key, checked) {
  const item = state.backlog.find(b => b.key === key);
  if (item) { item.completed = checked; saveState(); render(); }
}
function getBacklogStats() {
  const incomplete = state.backlog.filter(b => !b.completed);
  const totalMin = incomplete.reduce((s, b) => s + (b.time || 0), 0);
  return { count: incomplete.length, time: totalMin, total: state.backlog.length };
}

function fmtDate(d) { return d.toISOString().split('T')[0]; }

  return `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}`;
}
function getSessionsForDate(ds) { return SCHEDULE.filter(s => s.date === ds); }

// ============================================================
// PARSE TASKS
// ============================================================
function parseTasks(text, phase) {
  if (!text || text === '—') return [];
  const lines = text.split('\n');
  const tasks = [];
  let cur = null;
  for (const line of lines) {
    const t = line.trim();
    if (!t) continue;
    if (t.startsWith('→') || (t.startsWith('(') && !t.includes('DONE'))) continue;
    const isNum = /^\d+\.\s/.test(t);
    const isStar = t.startsWith('★');
    const isBullet = t.startsWith('•');
    const timeM = t.match(/(\d+)\s*min/);
    // Clean display text: strip "✓ DONE: ... — skip, from ..." markers
    const cleanText = (s) => s.replace(/✓\s*DONE:\s*/g, '').replace(/\s*—\s*skip,?\s*from\s*.*/i, '').replace(/\(done before.*?\)/gi, '').trim();
    if (isNum || isStar) {
      cur = {
        id: `${phase}_${tasks.length}`,
        text: cleanText(t.replace(/^\d+\.\s*/, '').replace(/^★\s*/, '★ ')),
        time: timeM ? parseInt(timeM[1]) : null,
        isPreDone: false, subtasks: []
      };
      tasks.push(cur);
    } else if (isBullet && cur) {
      cur.subtasks.push({ text: cleanText(t.replace(/^•\s*/, '')), isPreDone: false });
    } else if (isBullet) {
      tasks.push({ id: `${phase}_${tasks.length}`, text: cleanText(t.replace(/^•\s*/, '')), time: null, isPreDone: false, subtasks: [] });
    }
  }
  return tasks;
}

function renderTaskList(tasks, phase, sessTitle, day, bucketArr) {

    html += '<div class="task-text">' + esc(t.text);
    if (t.time && checked) {
      html += ' <span class="task-time saved">✓ ' + t.time + ' min done</span>';
    } else if (t.time) {
      html += ' <span class="task-time">' + t.time + ' min</span>';
    }
    html += '</div></div>';
    // Subtasks
    for (const st of t.subtasks) {
      const stKey = key + '_sub_' + st.text.slice(0, 20).replace(/[^a-zA-Z0-9]/g, '');
      const stChecked = !!day.tasks[stKey];

      html += '<div class="task-text" style="padding-left:20px">' + esc(st.text) + '</div>';
      html += '</div>';
    }
  }
  return html;
}

function bucketTimeRemaining(bucketArr) {
  let total = 0, done = 0;
  for (const t of bucketArr) {
    total += t.time || 0;
    if (t.checked) done += t.time || 0;
  }
  return { total, done, remaining: total - done };
}

function fmtTime(mins) {
  if (mins <= 0) return '0 min';
  if (mins < 60) return mins + ' min';
  const h = Math.floor(mins / 60), m = mins % 60;
  return m > 0 ? h + 'h ' + m + 'm' : h + 'h';
}

// ============================================================
// PROGRESS — based on the new 3-bucket model
// ============================================================
function calcTodayProgress(ds) {
  const day = getDayState(ds);
  const todaySess = getSessionsForDate(ds);
  const prevDate = offsetDate(ds, -1);
  const nextDate = offsetDate(ds, 1);
  const yesterdaySess = getSessionsForDate(prevDate);
  const tomorrowSess = getSessionsForDate(nextDate);

  let total = 0, done = 0;

  // Bucket 1: yesterday's "after" tasks
  for (const sess of yesterdaySess) {
    for (const t of parseTasks(sess.after, `${sess.title}_after`)) {
      total++;
      if (day.tasks[`${sess.title}|after|${t.id}`]) done++;
    }
  }
  // Bucket 2: today's "dayof" tasks + anki
  for (const sess of todaySess) {
    for (const t of parseTasks(sess.dayof, `${sess.title}_dayof`)) {
      total++;
      if (day.tasks[`${sess.title}|dayof|${t.id}`]) done++;
    }
    for (const t of parseTasks(sess.anki, `${sess.title}_anki`)) {
      total++;
      if (day.tasks[`${sess.title}|anki|${t.id}`]) done++;
    }
  }
  // Bucket 3: tomorrow's "before" tasks
  for (const sess of tomorrowSess) {
    for (const t of parseTasks(sess.before, `${sess.title}_before`)) {
      total++;
      if (day.tasks[`${sess.title}|before|${t.id}`]) done++;
    }
  }
  return { total, done, pct: total > 0 ? Math.round((done/total)*100) : 0 };
}

// Gather unchecked tasks from days BEFORE yesterday (true overdue carry-over)
// Yesterday's tasks are already shown in Bucket 1 via the normal path
function getCarryOverTasks(currentDs) {
  const items = [];
  const today = new Date(currentDs + 'T00:00:00');
  const cutoff = new Date(today); cutoff.setDate(cutoff.getDate() - 14); // 14-day lookback
  // Iterate from 2 days before currentDs backwards
  let d = new Date(today); d.setDate(d.getDate() - 2);
  while (d >= cutoff) {
    const ds = fmtDate(d);
    const dayState = state.days[ds];
    const sessions = getSessionsForDate(ds);
    const prevOfDay = getSessionsForDate(fmtDate(new Date(d.getTime() - 86400000)));
    const nextOfDay = getSessionsForDate(fmtDate(new Date(d.getTime() + 86400000)));
    // On date ds, 3 buckets existed: yesterday-of-ds(after), today-of-ds(dayof+anki), tomorrow-of-ds(before)
    const scan = (sessList, field, phase) => {
      for (const sess of sessList) {
        for (const t of parseTasks(sess[field], sess.title + '_' + phase)) {
          const key = `${sess.title}|${phase}|${t.id}`;
          if (state.backlogKeys[key]) continue;
          // Was it checked on ANY day? (user may have completed later)
          let completed = false;
          for (const checkDs of Object.keys(state.days)) {
            if (state.days[checkDs].tasks && state.days[checkDs].tasks[key]) { completed = true; break; }
          }
          if (completed) continue;
          items.push({ key, text: t.text, time: t.time || 0, date: ds, sessTitle: sess.title, phase, block: sess.block });
        }
      }
    };
    scan(prevOfDay, 'after', 'after');
    scan(sessions, 'dayof', 'dayof');
    scan(sessions, 'anki', 'anki');
    scan(nextOfDay, 'before', 'before');
    d.setDate(d.getDate() - 1);
  }
  // Dedupe by key (a task may appear across multiple days)
  const seen = {};
  return items.filter(i => { if (seen[i.key]) return false; seen[i.key] = true; return true; });
}

function offsetDate(ds, days) {
  const d = new Date(ds + 'T00:00:00');
  d.setDate(d.getDate() + days);
  return fmtDate(d);
}

// Find sessions with hubs due today
function getHubsDueToday(ds) {
  const hubs = [];
  // Look back up to 10 days for hub schedules that land on today
  for (let i = 1; i <= 10; i++) {
    const prevDs = offsetDate(ds, -i);
    const prevSess = getSessionsForDate(prevDs);
    for (const sess of prevSess) {
      if (!sess.hub || sess.hub === '—') continue;
      const hubText = sess.hub;
      // Parse hub dates: "Hub 1: Mon Apr 06" "Hub 2: Fri Apr 10" "Hub 3: Tue Apr 14"
      const hubMatches = hubText.matchAll(/Hub (\d):\s*\w+ (\w+) (\d+)/g);
      for (const m of hubMatches) {
        const hubNum = m[1];
        const months = {Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
        const mo = months[m[2]] || '04';
        const dy = m[3].padStart(2, '0');
        const hubDate = `2026-${mo}-${dy}`;
        if (hubDate === ds) {
          hubs.push({ title: sess.title, hubNum, block: sess.block });
        }
      }
    }
  }
  return hubs;
}

function calcStreak() {
  let streak = 0;
  const today = new Date(); today.setHours(0,0,0,0);
  let d = new Date(today); d.setDate(d.getDate()-1);
  while (streak < 60) {
    const ds = fmtDate(d);
    const sess = getSessionsForDate(ds);
    if (sess.length === 0) { d.setDate(d.getDate()-1); continue; }
    if (calcTodayProgress(ds).pct >= 70) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  const ts = getSessionsForDate(fmtDate(today));
  if (ts.length > 0 && calcTodayProgress(fmtDate(today)).pct >= 70) streak++;
  return streak;
}

      h += '<div style="font-size:1.4rem">📚</div>';
      h += '<div style="flex:1">';
      h += '<div style="font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--ink-3)">Backlog</div>';
      h += '<div style="font-size:0.92rem;font-weight:700;color:' + sevColor + '">' + blStats.count + ' task' + (blStats.count === 1 ? '' : 's') + ' · <span style="font-size:1.05rem">' + fmtTime(blStats.time) + '</span> behind</div>';
      h += '</div>';
      h += '<button onclick="document.getElementById(\'backlog-section\').scrollIntoView({behavior:\'smooth\'})" style="padding:6px 14px;font-size:0.75rem;background:var(--surface);color:var(--ink-2);border:1px solid var(--rule);border-radius:6px;font-weight:700;cursor:pointer">View</button>';
      h += '</div>';
    }

    // ── PROGRESS ──
    h += `<div class="progress-card">
      <div class="progress-header"><h3>Day Progress</h3><div class="progress-pct">${prog.pct}%</div></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${prog.pct}%"></div></div>
      <div class="progress-stats">
        <span><span class="stat-dot done"></span> ${prog.done} done</span>
        <span><span class="stat-dot pending"></span> ${prog.total - prog.done} remaining</span>
        ${day.totalTime > 0 ? '<span>⏱ ' + Math.floor(day.totalTime/3600) + 'h ' + Math.floor((day.totalTime%3600)/60) + 'm studied</span>' : ''}
      </div>
    </div>`;

    // ── TIMER ──
    h += `<div class="timer-card">
      <div class="timer-display" id="timer-el">${timerRunning ? '' : '0:00:00'}</div>
      <div class="timer-label">${timerRunning ? 'Studying...' : 'Pomodoro — start when you begin a task'}</div>
      <div class="timer-btns">
        ${timerRunning ? '<button class="stop" onclick="stopTimer()">■ Stop</button>' : '<button class="start" onclick="startTimer()">▶ Start</button>'}
        <button onclick="resetTimer()">Reset</button>
      </div>
    </div>`;

    // ══════════════════════════════════════════════════════
    // BUCKET 1: Review Yesterday's Content
    // (yesterday's "Day After Lecture" tasks + hubs due)
    // ══════════════════════════════════════════════════════
    let bucket1Tasks = [], bucket1Html = '';

    // Hubs due today
    if (hubsDue.length > 0) {
      bucket1Html += '<div class="session-card">';
      bucket1Html += '<div class="session-label"><span class="session-title">Hubs Due Today</span></div>';
      for (const hub of hubsDue) {
        const key = `hub|${hub.title}|${hub.hubNum}`;
        const checked = day.tasks[key];
        const ht = hubTime(hub.hubNum);
        bucket1Tasks.push({ key, checked, time: ht });
        const bc = hub.block === 'GI' ? 'gi' : hub.block === 'REPRO' ? 'repro' : 'endo';
        bucket1Html += '<div class="task ' + (checked ? 'done' : '') + '">';
        bucket1Html += '<input type="checkbox" ' + (checked ? 'checked' : '') + ' onchange="toggle(\'' + key.replace(/'/g,"\\'") + '\', this.checked)">';
        bucket1Html += '<div class="task-text">Complete <strong>Hub ' + hub.hubNum + '</strong> for ' + esc(hub.title) + ' <span class="block-tag ' + bc + '">' + hub.block + '</span>';
        if (checked) bucket1Html += ' <span class="task-time saved">✓ ' + ht + ' min done</span>';
        else bucket1Html += ' <span class="task-time">' + ht + ' min</span>';
        bucket1Html += '</div></div>';
      }
      bucket1Html += '</div>';
    }

    // Yesterday's "after" tasks
    for (const sess of yesterdaySess) {
      const tasks = parseTasks(sess.after, sess.title + '_after');
      if (!tasks.length) continue;
      const bc = sess.block === 'GI' ? 'gi' : sess.block === 'REPRO' ? 'repro' : 'endo';
      bucket1Html += '<div class="session-card"><div class="session-label">';
      bucket1Html += '<span class="session-title">' + esc(sess.title) + '</span>';
      bucket1Html += '<span class="block-tag ' + bc + '">' + sess.block + '</span>';
      bucket1Html += '<span class="block-tag course">' + esc(sess.course) + '</span>';
      bucket1Html += '</div>';
      bucket1Html += renderTaskList(tasks, 'after', sess.title, day, bucket1Tasks);
      bucket1Html += '</div>';
    }

    // Carry-over tasks from days before yesterday
    const carryOver = getCarryOverTasks(ds);
    // Stash carry-over items in a global lookup so the Backlog button can retrieve by index
    window._carryLookup = {};
    if (carryOver.length > 0) {
      // Group by original date
      const byDate = {};
      for (const item of carryOver) {
        if (!byDate[item.date]) byDate[item.date] = [];
        byDate[item.date].push(item);
      }
      const dates = Object.keys(byDate).sort().reverse();
      let coIdx = 0;
      for (const od of dates) {
        const items = byDate[od];
        bucket1Html += '<div class="session-card" style="border-left:3px solid #b45309">';
        bucket1Html += '<div class="session-label">';
        bucket1Html += '<span class="session-title" style="color:#b45309">⚠ Overdue from ' + od + '</span>';
        bucket1Html += '<span class="block-tag" style="background:#fef3c7;color:#92400e">' + items.length + ' task' + (items.length === 1 ? '' : 's') + '</span>';
        bucket1Html += '</div>';
        for (const item of items) {
          const key = item.key;
          const checked = !!(state.days[ds] && state.days[ds].tasks && state.days[ds].tasks[key]);
          bucket1Tasks.push({ key, checked, time: item.time });
          const lookupId = 'co_' + coIdx++;
          window._carryLookup[lookupId] = item;
          bucket1Html += '<div class="task ' + (checked ? 'done' : '') + '" style="align-items:center">';
          bucket1Html += '<input type="checkbox" ' + (checked ? 'checked' : '') + ' onchange="toggle(\'' + key.replace(/'/g,"\\'") + '\', this.checked)">';
          bucket1Html += '<div class="task-text" style="flex:1">' + esc(item.text);
          if (item.time && checked) bucket1Html += ' <span class="task-time saved">✓ ' + item.time + ' min done</span>';
          else if (item.time) bucket1Html += ' <span class="task-time">' + item.time + ' min</span>';
          bucket1Html += '<span style="font-size:0.65rem;color:var(--ink-3);margin-left:6px">· ' + esc(item.sessTitle) + '</span>';
          bucket1Html += '</div>';
          bucket1Html += '<button onclick="addToBacklog(window._carryLookup[\'' + lookupId + '\'])" style="padding:3px 8px;font-size:0.65rem;background:var(--surface);color:var(--ink-3);border:1px solid var(--rule);border-radius:5px;font-weight:600;cursor:pointer;white-space:nowrap">→ Backlog</button>';
          bucket1Html += '</div>';
        }
        bucket1Html += '</div>';
      }
    }

    if (bucket1Tasks.length > 0) {
      const bd = bucket1Tasks.filter(t => t.checked).length;
      const b1t = bucketTimeRemaining(bucket1Tasks);
      h += '<div class="section-divider">';
      h += '<span class="section-divider-icon">🔄</span>';
      h += '<span class="section-divider-text">Review Yesterday\'s Content</span>';
      h += '<span class="section-divider-line"></span>';
      h += '<span class="section-divider-badge">' + bd + '/' + bucket1Tasks.length + '</span>';
      if (b1t.total > 0) h += '<span class="bucket-time">' + (b1t.remaining > 0 ? '~' + fmtTime(b1t.remaining) + ' left' : '✓ done') + '</span>';
      h += '</div>' + bucket1Html;
    }

    // ══════════════════════════════════════════════════════
    // BUCKET 2: Today's Content
    // (today's "Day Of Lecture" tasks + Anki)
    // ══════════════════════════════════════════════════════
    let bucket2Tasks = [], bucket2Html = '';
    let ankiHtml = '';

    for (const sess of todaySess) {
      // Day Of tasks
      const tasks = parseTasks(sess.dayof, sess.title + '_dayof');
      if (tasks.length) {
        const bc = sess.block === 'GI' ? 'gi' : sess.block === 'REPRO' ? 'repro' : 'endo';
        bucket2Html += '<div class="session-card"><div class="session-label">';
        bucket2Html += '<span class="session-title">' + esc(sess.title) + '</span>';
        bucket2Html += '<span class="block-tag ' + bc + '">' + sess.block + '</span>';
        bucket2Html += '<span class="block-tag course">' + esc(sess.course) + '</span>';
        bucket2Html += '</div>';
        bucket2Html += renderTaskList(tasks, 'dayof', sess.title, day, bucket2Tasks);
        bucket2Html += '</div>';
      }

      // Anki tasks (part of today's content)
      const aTasks = parseTasks(sess.anki, sess.title + '_anki');
      if (aTasks.length) {
        const bc = sess.block === 'GI' ? 'gi' : sess.block === 'REPRO' ? 'repro' : 'endo';
        ankiHtml += '<div class="session-card"><div class="session-label">';
        ankiHtml += '<span class="session-title">' + esc(sess.title) + '</span>';
        ankiHtml += '<span class="block-tag ' + bc + '">' + sess.block + '</span>';
        ankiHtml += '</div>';
        ankiHtml += renderTaskList(aTasks, 'anki', sess.title, day, bucket2Tasks);
        ankiHtml += '</div>';
      }
    }

    if (bucket2Tasks.length > 0) {
      const bd = bucket2Tasks.filter(t => t.checked).length;
      const b2t = bucketTimeRemaining(bucket2Tasks);
      h += '<div class="section-divider">';
      h += '<span class="section-divider-icon">📖</span>';
      h += '<span class="section-divider-text">Today\'s Content</span>';
      h += '<span class="section-divider-line"></span>';
      h += '<span class="section-divider-badge">' + bd + '/' + bucket2Tasks.length + '</span>';
      if (b2t.total > 0) h += '<span class="bucket-time">' + (b2t.remaining > 0 ? '~' + fmtTime(b2t.remaining) + ' left' : '✓ done') + '</span>';
      h += '</div>' + bucket2Html;
      if (ankiHtml) {
        h += '<div class="section-divider">';
        h += '<span class="section-divider-icon">🃏</span>';
        h += '<span class="section-divider-text">Anki</span>';
        h += '<span class="section-divider-line"></span>';
        h += '</div>' + ankiHtml;
      }
    } else if (todaySess.length === 0) {
      h += '<div class="section-divider">';
      h += '<span class="section-divider-icon">📖</span>';
      h += '<span class="section-divider-text">Today\'s Content</span>';
      h += '<span class="section-divider-line"></span>';
      h += '</div>';
      h += '<div class="session-card" style="text-align:center;color:var(--ink-3);padding:24px"><p>No lectures scheduled today</p></div>';
    }

    // ══════════════════════════════════════════════════════
    // BUCKET 3: Prepare for Tomorrow
    // (tomorrow's "Day Before Lecture" tasks)
    // ══════════════════════════════════════════════════════
    let bucket3Tasks = [], bucket3Html = '';

    for (const sess of tomorrowSess) {
      const tasks = parseTasks(sess.before, sess.title + '_before');
      if (!tasks.length) continue;
      const bc = sess.block === 'GI' ? 'gi' : sess.block === 'REPRO' ? 'repro' : 'endo';
      bucket3Html += '<div class="session-card"><div class="session-label">';
      bucket3Html += '<span class="session-title">' + esc(sess.title) + '</span>';
      bucket3Html += '<span class="block-tag ' + bc + '">' + sess.block + '</span>';
      bucket3Html += '<span class="block-tag course">' + esc(sess.course) + '</span>';
      bucket3Html += '</div>';
      bucket3Html += renderTaskList(tasks, 'before', sess.title, day, bucket3Tasks);
      bucket3Html += '</div>';
    }

    if (bucket3Tasks.length > 0) {
      const bd = bucket3Tasks.filter(t => t.checked).length;
      const b3t = bucketTimeRemaining(bucket3Tasks);
      h += '<div class="section-divider">';
      h += '<span class="section-divider-icon">🌙</span>';
      h += '<span class="section-divider-text">Prepare for Tomorrow</span>';
      h += '<span class="section-divider-line"></span>';
      h += '<span class="section-divider-badge">' + bd + '/' + bucket3Tasks.length + '</span>';
      if (b3t.total > 0) h += '<span class="bucket-time">' + (b3t.remaining > 0 ? '~' + fmtTime(b3t.remaining) + ' left' : '✓ done') + '</span>';
      h += '</div>' + bucket3Html;
    }

    // ── BACKLOG LIST ──
    if (state.backlog.length > 0) {
      h += '<div id="backlog-section" class="section-divider">';
      h += '<span class="section-divider-icon">📚</span>';
      h += '<span class="section-divider-text">Backlog</span>';
      h += '<span class="section-divider-line"></span>';
      h += '<span class="section-divider-badge">' + blStats.count + '/' + state.backlog.length + '</span>';
      if (blStats.time > 0) h += '<span class="bucket-time">' + fmtTime(blStats.time) + ' behind</span>';
      h += '</div>';
      h += '<div class="session-card">';
      h += '<div class="session-label"><span class="session-title" style="color:var(--ink-3);font-size:0.75rem;font-weight:600">Tasks you\'ve deferred — work through when you have time</span></div>';
      // Sort: incomplete first, by date desc
      const sorted = [...state.backlog].sort((a, b) => {
        if (a.completed !== b.completed) return a.completed ? 1 : -1;
        return (b.date || '').localeCompare(a.date || '');
      });
      for (const item of sorted) {
        const bc = item.block === 'GI' ? 'gi' : item.block === 'REPRO' ? 'repro' : 'endo';
        h += '<div class="task ' + (item.completed ? 'done' : '') + '" style="align-items:center">';
        h += '<input type="checkbox" ' + (item.completed ? 'checked' : '') + ' onchange="toggleBacklogComplete(\'' + item.key.replace(/'/g,"\\'") + '\', this.checked)">';
        h += '<div class="task-text" style="flex:1">' + esc(item.text);
        if (item.time && item.completed) h += ' <span class="task-time saved">✓ ' + item.time + ' min done</span>';
        else if (item.time) h += ' <span class="task-time">' + item.time + ' min</span>';
        h += ' <span class="block-tag ' + bc + '">' + item.block + '</span>';
        h += '<div style="font-size:0.65rem;color:var(--ink-3);margin-top:2px">From ' + (item.date || '—') + ' · ' + esc(item.sessTitle) + '</div>';
        h += '</div>';
        h += '<button onclick="removeFromBacklog(\'' + item.key.replace(/'/g,"\\'") + '\')" title="Remove from backlog" style="padding:3px 8px;font-size:0.65rem;background:var(--surface);color:var(--ink-3);border:1px solid var(--rule);border-radius:5px;font-weight:600;cursor:pointer;white-space:nowrap">Remove</button>';
        h += '</div>';
      }
      h += '</div>';
    }

    // ── EOD ──
    h += '<div class="eod-card">';
    h += '<h3>End of Day Reflection</h3>';
    h += '<textarea id="eod" placeholder="How did today go? What was hard? What will you change tomorrow?" oninput="saveNotes(this.value)">' + esc(day.notes || '') + '</textarea>';
    h += '<button onclick="saveDay(this)">Save Day &amp; Log Progress</button>';
    h += '</div>';
  }

  // ── HISTORY ──
  h += renderHistory(streak);
  document.getElementById('app').innerHTML = h;
  if (timerRunning) updateTimerEl();
}

function renderHistory(streak) {
  const start = new Date('2026-04-06'), end = new Date('2026-06-11');
  const today = new Date(); today.setHours(0,0,0,0);
  let h = `<div class="history-card"><h3>Study History</h3>
    <div class="streak-bar"><span class="streak-fire">🔥</span>
    <span class="streak-num">${streak}</span> day streak (70%+ completion)</div>
    <div class="history-grid">`;
  let d = new Date(start);
  while (d <= end) {
    const ds = fmtDate(d);
    const sess = getSessionsForDate(ds);
    const isTdy = ds === fmtDate(today);
    const isCur = ds === fmtDate(currentDate);
    const isFut = d > today;
    let cls = 'future', tip = `${d.getMonth()+1}/${d.getDate()}`;
    if (sess.length > 0 && !isFut) {
      const p = calcTodayProgress(ds);
      if (p.total === 0) { cls = 'no-data'; tip += ' · no tasks'; }
      else if (p.pct === 100) { cls = 'perfect'; tip += ` · ${p.pct}%`; }
      else if (p.pct >= 70) { cls = 'high'; tip += ` · ${p.pct}%`; }
      else if (p.pct >= 40) { cls = 'mid'; tip += ` · ${p.pct}%`; }
      else if (p.pct > 0) { cls = 'low'; tip += ` · ${p.pct}%`; }
      else { cls = 'no-data'; tip += ' · not started'; }
    } else if (!sess.length) { cls = 'no-data'; }
    h += `<div class="history-day ${cls} ${isTdy?'today-marker':''}" onclick="goToDate('${ds}')"
      style="${isCur ? 'outline:2px solid var(--accent);outline-offset:1px;' : ''}">${d.getDate()}
      <div class="history-tooltip">${tip}</div></div>`;
    d.setDate(d.getDate()+1);
  }
  return h + `</div></div>`;
}

// ============================================================
// HANDLERS
// ============================================================
function toggle(key, checked) {
  const d = getDayState(fmtDate(currentDate));
  if (checked) d.tasks[key] = true; else delete d.tasks[key];
  saveState(); render();
}
function navDate(n) { currentDate.setDate(currentDate.getDate()+n); render(); }
function goToday() { currentDate = new Date(); currentDate.setHours(0,0,0,0); render(); }
function goToDate(ds) { currentDate = new Date(ds+'T00:00:00'); render(); }
function saveNotes(v) { getDayState(fmtDate(currentDate)).notes = v; saveState(); }
function saveDay(btn) {
  getDayState(fmtDate(currentDate)).savedAt = new Date().toISOString();
  saveState();
  btn.textContent = '✓ Saved!'; btn.style.background = '#166534';
  setTimeout(() => { btn.textContent = 'Save Day & Log Progress'; btn.style.background = ''; }, 2000);
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }


// ============================================================
// SYNC ACROSS DEVICES
// ============================================================
function exportProgress() {
  const blob = new Blob([JSON.stringify(state, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'hoyadocs_progress_' + fmtDate(new Date()) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  const btn = document.getElementById('export-btn');
  if (btn) { btn.textContent = 'Downloaded!'; setTimeout(() => { btn.textContent = 'Export Progress'; }, 2000); }
}

function importProgress(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if (imported.days) {
        for (const date of Object.keys(imported.days)) {
          const dayData = imported.days[date];
          const existing = state.days[date];
          if (!existing) {
            state.days[date] = dayData;
          } else {
            const merged = Object.assign({}, existing.tasks, dayData.tasks);
            state.days[date] = {
              tasks: merged,
              notes: dayData.notes || existing.notes,
              savedAt: dayData.savedAt || existing.savedAt,
              totalTime: Math.max(dayData.totalTime || 0, existing.totalTime || 0)
            };
          }
        }
        saveState(); render();
        alert('Progress imported and merged successfully!');
      }
    } catch(err) { alert('Error: ' + err.message); }
  };
  reader.readAsText(file);
}

// INIT
loadState();
render();
restoreTab();
initFirebase();
</script>
