.home-cat-title{font-family:Georgia,serif;font-size:13.5px;font-weight:700;color:#14532d;letter-spacing:0.5px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #d4c9ad;display:flex;align-items:center;gap:6px}
.home-cat-count{margin-left:auto;background:rgba(20,83,45,0.12);font-size:10.5px;padding:1px 7px;border-radius:8px;font-weight:700}

.home-dz.learned{color:#16a34a}

.empty{text-align:center;padding:80px 20px;color:#8a9b8b;font-style:italic}
.menu-toggle{display:none;padding:8px 11px;background:#14532d;color:white;border:none;border-radius:4px;font-size:16px;cursor:pointer;line-height:1;order:-1}

  .home-section-title{margin-top:24px}

.sb-backdrop.show{display:block}

  body{overflow:visible;background:white;font-size:10.5pt}
  .app{display:block;height:auto}
  .sidebar,.main-top,.footer-nav,.sb-backdrop{display:none!important}

}
.sb-list::-webkit-scrollbar,.content::-webkit-scrollbar{width:8px}
.sb-list::-webkit-scrollbar-thumb{background:#d4c9ad;border-radius:4px}

.sb-list::-webkit-scrollbar-thumb:hover,.content::-webkit-scrollbar-thumb:hover{background:#14532d}

<div class="app">
<aside class="sidebar" id="sidebar">

<script>
const DISEASES = [
// ═══════════════ VIRUSES ═══════════════
{id:"rotavirus",cat:"Viruses",ck:"viru",emoji:"🦠",name:"Rotavirus",
oneLiner:"Most common cause of severe watery diarrhea in children &lt;2 yr worldwide. Non-enveloped segmented dsRNA virus. Oral vaccine available.",
path:"<strong>Reoviridae</strong> family — non-enveloped, <strong>segmented dsRNA</strong> virus. Destroys <strong>villus tips</strong> of small bowel → ↓ absorption + osmotic diarrhea. <strong>NSP4</strong> is a viral enterotoxin → secretory component. Transmission: fecal-oral.",
clin:"<ul><li>Daycare/winter outbreaks in kids 6 mo–2 yr</li><li>Profuse <strong>watery diarrhea</strong>, vomiting, low-grade fever</li><li>NO blood or mucus</li><li>Main danger: <strong>dehydration</strong> (leading cause of diarrheal death worldwide in under-5)</li></ul>",
dx:"Stool antigen (ELISA) or PCR.",
tx:"<strong>Oral rehydration therapy (ORT)</strong>. Live attenuated oral vaccine (RotaTeq, Rotarix) given to infants.",
hy:["<strong>#1 severe childhood diarrhea worldwide</strong>","<strong>Segmented dsRNA</strong>, non-enveloped","<strong>NSP4 enterotoxin</strong>","Damages villus tips → malabsorption","Winter/daycare","Prevent with oral vaccine"],
mn:"<strong>R</strong>otavirus = <strong>R</strong>eovirus, <strong>R</strong>ehydration, <strong>R</strong>ice-water? No — that's cholera. Rotavirus = villus destruction + osmotic diarrhea.",
trap:"Historical RotaShield (1998) vaccine was withdrawn due to <strong>intussusception</strong> risk. Current vaccines (RotaTeq, Rotarix) have much smaller risk — still a boards-classic association."},

{id:"norovirus",cat:"Viruses",ck:"viru",emoji:"🦠",name:"Norovirus",
oneLiner:"Most common viral gastroenteritis in adults (all ages). Cruise ships, nursing homes, schools. Alcohol-sanitizer resistant — soap + water.",
path:"<strong>Caliciviridae</strong> family — non-enveloped, <strong>positive-sense ssRNA</strong>. Very low infectious dose (~18 particles). Highly stable in environment. <strong>Alcohol-resistant</strong>.",
clin:"<ul><li>Acute <strong>vomiting + watery diarrhea</strong> (vomiting often dominant)</li><li>Brief illness (24–60 hr)</li><li>Epidemic outbreaks: cruise ships, schools, nursing homes, restaurants</li><li>Low-grade fever, abdominal cramps</li></ul>",
dx:"Clinical diagnosis; RT-PCR for outbreak investigation.",
tx:"Supportive (ORT). No antiviral.",
hy:["<strong>Cruise ship / dorm outbreak</strong> = Norovirus","<strong>Alcohol-sanitizer resistant</strong> → wash hands with soap + water","Positive-sense ssRNA, non-enveloped","Extremely low infectious dose","Vomiting > diarrhea (but has both)"],
mn:"<strong>'N</strong>oro = <strong>N</strong>o cruise (outbreak on boat). <strong>N</strong>eeds soap, <strong>N</strong>ot alcohol."},

{id:"adenovirus",cat:"Viruses",ck:"viru",emoji:"🦠",name:"Adenovirus (enteric)",
oneLiner:"Enteric serotypes <strong>40 &amp; 41</strong> cause prolonged pediatric diarrhea. 2nd most common viral cause of kid diarrhea. dsDNA, non-enveloped.",
path:"<strong>Adenoviridae</strong> — dsDNA, non-enveloped, icosahedral. Serotypes 40/41 specific to gut (other serotypes cause respiratory, conjunctivitis, hemorrhagic cystitis).",
clin:"Prolonged (1–2 wk) watery diarrhea in kids &lt;2 yr. Less severe than rotavirus; no seasonality.",
dx:"Stool antigen or PCR.",
tx:"Supportive.",
hy:["Serotypes <strong>40, 41</strong> = enteric","2nd most common pediatric viral diarrhea","Longer duration than rotavirus","dsDNA, non-enveloped"]},

{id:"enterovirus",cat:"Viruses",ck:"viru",emoji:"🦠",name:"Enterovirus",
oneLiner:"Picornaviridae family — Coxsackie A/B, Echovirus, Poliovirus, Enterovirus 71. Mostly extra-GI disease despite fecal-oral route.",
path:"Non-enveloped, <strong>positive-sense ssRNA</strong>. Fecal-oral transmission but rarely causes prominent diarrhea — <strong>invades via gut then disseminates</strong>.",
clin:"<ul><li>Coxsackie A → hand-foot-mouth disease, herpangina</li><li>Coxsackie B → myocarditis, pleurodynia</li><li>Echovirus → aseptic meningitis</li><li>Enterovirus 71 → HFMD with CNS involvement</li><li>GI symptoms minor or absent</li></ul>",
hy:["Fecal-oral but causes extra-GI disease","Acid-stable (unlike rhinovirus)","Summer/fall epidemics","Picornavirus family"]},

{id:"astrovirus",cat:"Viruses",ck:"viru",emoji:"🦠",name:"Astrovirus",
oneLiner:"Mild watery diarrhea in children and immunocompromised. <strong>Star-shaped</strong> on electron microscopy (hence name).",
path:"Astroviridae — non-enveloped, ssRNA, star-shaped on EM.",
clin:"Mild, self-limited watery diarrhea in kids (winter) and immunocompromised.",
hy:["<strong>Star-shaped on EM</strong>","Mild pediatric diarrhea","Immunocompromised hosts"]},

{id:"calicivirus",cat:"Viruses",ck:"viru",emoji:"🦠",name:"Calicivirus",
oneLiner:"Family name — includes Norovirus + Sapovirus. 'Cup-shaped' depressions on EM.",
path:"Caliciviridae family: norovirus (main pathogen), sapovirus (mild pediatric). Non-enveloped, ssRNA, <strong>cup-like depressions</strong> on capsid (Latin: calyx = cup).",
hy:["Family = norovirus + sapovirus","Cup-shaped depressions on EM (→ 'calyx')","Sapovirus = mild pediatric diarrhea"]},

{id:"coronavirus",cat:"Viruses",ck:"viru",emoji:"🦠",name:"Coronavirus (enteric)",
oneLiner:"Primarily respiratory but some strains (SARS-CoV-2, MERS) have GI manifestations — diarrhea in ~20% of COVID-19 patients.",
path:"Enveloped, ssRNA, <strong>crown-like spike proteins</strong> on EM. ACE2 receptor on enterocytes → viral replication → GI symptoms.",
clin:"Diarrhea, nausea, abdominal pain in subset of COVID-19 patients. Also respiratory illness.",
hy:["Crown-like spikes (corona = crown)","ACE2 receptor on gut enterocytes","GI symptoms in ~20% of COVID-19"]},

// ═══════════════ BACTERIA — CORE ═══════════════
{id:"campylobacter-jejuni",cat:"Bacteria (Core)",ck:"bact",emoji:"🧫",name:"Campylobacter jejuni",
oneLiner:"Most common bacterial cause of gastroenteritis in US. <strong>Comma/S-shaped</strong> gram-neg rod, <strong>oxidase+</strong>, grows at <strong>42°C</strong>. Poultry, raw milk, puppies.",
path:"Gram-negative, <strong>curved/comma-shaped</strong> or S-shaped rod. <strong>Microaerophilic</strong>, grows at <strong>42°C</strong>. <strong>Oxidase+</strong>, catalase+. <strong>Motile</strong> via polar flagellum. Invades colon → bloody inflammatory diarrhea.",
clin:"<ul><li>Bloody or watery diarrhea, fever, severe cramping abdominal pain</li><li>Can mimic <strong>appendicitis</strong> (RLQ pain, pseudoappendicitis)</li><li>1–7 day incubation</li><li><strong>Complications</strong>: Guillain-Barré syndrome (classic — molecular mimicry with gangliosides), reactive arthritis (HLA-B27), rare HUS</li></ul>",
dx:"Stool culture on <strong>selective media at 42°C</strong> (Campy agar). Gram stain: curved 'gull-wing' rods.",
tx:"Usually self-limited. <strong>Azithromycin</strong> or ciprofloxacin for severe/prolonged.",
hy:["<strong>#1 bacterial gastroenteritis in US</strong>","Poultry, raw milk, puppy/pet exposure","<strong>Comma/S-shaped, gull-wing</strong>, oxidase+","Grows at <strong>42°C</strong>","<strong>Guillain-Barré syndrome</strong> (GBS) — most identified trigger worldwide","Reactive arthritis (HLA-B27)","Pseudoappendicitis"],
mn:"<strong>Campy</strong> = <strong>C</strong>urved, <strong>C</strong>atalase+, <strong>C</strong>arried by <strong>C</strong>hickens, <strong>C</strong>auses GBS."},

const state={currentId:null,learned:new Set(),search:"",collapsed:new Set()};
function groupByCategory(){
  const map={};
  DISEASES.forEach(d=>{
    if(!map[d.cat])map[d.cat]={key:d.ck,emoji:d.emoji,items:[]};
    map[d.cat].items.push(d);
  });
  return map;
}
function getVisibleDiseases(){
  const q=state.search.toLowerCase().trim();
  if(!q)return DISEASES;
  return DISEASES.filter(d=>{
    const hay=(d.name+" "+d.cat+" "+d.oneLiner+" "+(d.path||"")+" "+(d.clin||"")+" "+(d.dx||"")+" "+(d.tx||"")+" "+(d.hy||[]).join(" ")+" "+(d.mn||"")+" "+(d.trap||"")).toLowerCase();
    return hay.includes(q);
  });
}
function renderSidebar(){
  const visible=getVisibleDiseases();
  const visibleIds=new Set(visible.map(d=>d.id));
  const groups=groupByCategory();
  const list=document.getElementById("sbList");
  let html=`<div class="sb-home ${state.currentId===null?"active":""}" onclick="goHome()">🏠 Home</div>`;
  Object.entries(groups).forEach(([cat,info])=>{
    const visibleItems=info.items.filter(d=>visibleIds.has(d.id));
    if(!visibleItems.length)return;
    const collapsed=state.collapsed.has(cat)&&!state.search;
    html+=`<div class="cat-group ${collapsed?"collapsed":""}" data-cat="${cat}"><div class="cat-header" onclick="toggleCat('${cat.replace(/'/g,"\\'")}')"><span class="cat-chevron">▼</span><span>${info.emoji} ${cat}</span><span class="cat-count">${visibleItems.length}</span></div><div class="cat-list">`;
    visibleItems.forEach(d=>{
      const active=state.currentId===d.id;
      const learned=state.learned.has(d.id);
      html+=`<div class="dz-item ${active?"active":""} ${learned?"learned":""}" data-id="${d.id}" onclick="selectDisease('${d.id}')"><span class="dz-check">${learned?"✓":"○"}</span><span class="dz-name">${d.name}</span></div>`;
    });
    html+=`</div></div>`;
  });
  list.innerHTML=html||`<div class="empty" style="padding:30px 14px">No matches.</div>`;
}
function toggleCat(cat){
  if(state.collapsed.has(cat))state.collapsed.delete(cat);
  else state.collapsed.add(cat);
  renderSidebar();
}
function renderHomepage(){
  const content=document.getElementById("content");
  const groups=groupByCategory();
  let catCardsHtml="";
  Object.entries(groups).forEach(([cat,info])=>{
    catCardsHtml+=`<div class="home-cat"><div class="home-cat-title">${info.emoji} ${cat} <span class="home-cat-count">${info.items.length}</span></div><div class="home-dz-list">${info.items.map(d=>{const learned=state.learned.has(d.id);return `<div class="home-dz ${learned?"learned":""}" onclick="selectDisease('${d.id}')"><span class="home-check">${learned?"✓":"○"}</span><span>${d.name}</span></div>`;}).join("")}</div></div>`;
  });
  content.innerHTML=`<div class="content-inner"><div class="home-hero"><div class="home-brand">HoyaDocs · Block 4 GI</div><h1 class="home-title">Welcome to the GI Infections Atlas</h1><p class="home-sub">An interactive USMLE Step 1 reference covering all 55 GI infectious organisms — microbiology, clinical pearls, buzzwords, mnemonics, and exam traps.</p><button class="home-start" onclick="selectDisease('rotavirus')">Start with Rotavirus →</button></div><h2 class="home-section-title">Browse All Organisms</h2><p style="font-size:13.5px;color:#6b7b6c;margin-bottom:18px;font-style:italic;">Click any organism to open it. Use the sidebar to search or navigate by category. Use ← → arrow keys to move between organisms and Space to mark as learned.</p><div class="home-grid">${catCardsHtml}</div></div>`;
  document.getElementById("content").scrollTo(0,0);
}
function renderContent(){
  if(state.currentId===null){renderHomepage();return;}
  const content=document.getElementById("content");
  const d=DISEASES.find(x=>x.id===state.currentId);
  if(!d){content.innerHTML='<div class="empty">Not found.</div>';return;}
  const learned=state.learned.has(d.id);
  const visible=getVisibleDiseases();
  const idx=visible.findIndex(x=>x.id===d.id);
  const prev=idx>0?visible[idx-1]:null;
  const next=idx<visible.length-1?visible[idx+1]:null;
  content.innerHTML=`<div class="content-inner"><div class="dz-entry"><div class="cat-label"><span class="cat-dot"></span>${d.emoji} ${d.cat}</div><h2 class="dz-title">${d.name}</h2><div class="dz-oneliner">${d.oneLiner}</div>${d.path?`<div class="sec"><h3>🔬 Microbiology &amp; Pathogenesis</h3><p>${d.path}</p></div>`:""}${d.clin?`<div class="sec"><h3>🩺 Clinical Features</h3>${d.clin.trim().startsWith("<ul>")?d.clin:"<p>"+d.clin+"</p>"}</div>`:""}${d.dx?`<div class="sec"><h3>🔍 Diagnosis</h3><p>${d.dx}</p></div>`:""}${d.tx?`<div class="sec"><h3>💊 Treatment</h3><p>${d.tx}</p></div>`:""}${d.hy?.length?`<div class="callout hy"><h4>⚡ USMLE High-Yield</h4><ul>${d.hy.map(x=>`<li>${x}</li>`).join("")}</ul></div>`:""}${d.mn?`<div class="callout mn"><h4>🧠 Mnemonic</h4>${d.mn}</div>`:""}${d.trap?`<div class="callout trap"><h4>⚠️ Exam Trap</h4>${d.trap}</div>`:""}</div><div class="footer-nav"><button class="nav-btn" onclick="navigate(-1)" ${prev?"":"disabled"}>◀ ${prev?shorten(prev.name,24):"Previous"}<span class="kbd">←</span></button><button class="nav-btn learn ${learned?"learned":""}" onclick="toggleLearned()">${learned?"✓ Learned":"Mark Learned"}<span class="kbd">Space</span></button><button class="nav-btn" onclick="navigate(1)" ${next?"":"disabled"}>${next?shorten(next.name,24):"Next"} ▶<span class="kbd">→</span></button></div></div>`;
  document.getElementById("content").scrollTo(0,0);
}
function shorten(s,n){return s.length>n?s.slice(0,n-1)+"…":s;}
function goHome(){state.currentId=null;renderSidebar();renderContent();closeSidebar();}
function selectDisease(id){
  state.currentId=id;
  const d=DISEASES.find(x=>x.id===id);
  if(d)state.collapsed.delete(d.cat);
  renderSidebar();
  renderContent();
  closeSidebar();
  setTimeout(()=>{const el=document.querySelector(`.dz-item[data-id="${id}"]`);if(el)el.scrollIntoView({block:"nearest",behavior:"smooth"});},50);
}
function navigate(dir){
  const visible=getVisibleDiseases();
  if(state.currentId===null){if(dir>0&&visible.length)selectDisease(visible[0].id);return;}
  const idx=visible.findIndex(x=>x.id===state.currentId);
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=visible.length)return;
  selectDisease(visible[newIdx].id);
}
function toggleLearned(){
  if(!state.currentId)return;
  if(state.learned.has(state.currentId))state.learned.delete(state.currentId);
  else state.learned.add(state.currentId);
  renderSidebar();renderContent();updateProgress();
}
function updateProgress(){
  document.getElementById("learnedText").textContent=`${state.learned.size} / ${DISEASES.length}`;
  document.getElementById("progressFill").style.width=(DISEASES.length?state.learned.size/DISEASES.length*100:0)+"%";
}
function toggleSidebar(){
  const open=document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("sbBackdrop").classList.toggle("show",open);
}
function closeSidebar(){if(window.innerWidth<=720){document.getElementById("sidebar").classList.remove("open");document.getElementById("sbBackdrop").classList.remove("show");}}
function exportExcel(){
  let html=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="UTF-8"><style>th{background:#14532d;color:white;padding:8px;font-weight:bold;text-align:left;border:1px solid #0f3a1f}td{padding:6px 8px;border:1px solid #e2e8f0;vertical-align:top}tr:nth-child(even) td{background:#f8fafc}.cat{background:#dcfce7;font-weight:bold}</style></head><body><table><tr><th>#</th><th>Category</th><th>Organism</th><th>One-Liner</th><th>Microbiology/Pathogenesis</th><th>Clinical</th><th>Diagnosis</th><th>Treatment</th><th>USMLE High-Yield</th><th>Mnemonic</th><th>Exam Trap</th><th>Learned</th></tr>`;
  DISEASES.forEach((d,i)=>{
    const strip=(s)=>(s||"").replace(/<[^>]+>/g," ").replace(/\s+/g," ").trim();
    html+=`<tr><td>${i+1}</td><td class="cat">${d.cat}</td><td><strong>${d.name}</strong></td><td>${strip(d.oneLiner)}</td><td>${strip(d.path)}</td><td>${strip(d.clin)}</td><td>${strip(d.dx)}</td><td>${strip(d.tx)}</td><td>${(d.hy||[]).map(strip).join(" • ")}</td><td>${strip(d.mn)}</td><td>${strip(d.trap)}</td><td>${state.learned.has(d.id)?"✓":""}</td></tr>`;
  });
  html+=`</table></body></html>`;
  const blob=new Blob(['\ufeff',html],{type:"application/vnd.ms-excel"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download="GI_Infections_Study_Guide.xls";a.click();
  URL.revokeObjectURL(url);
}
function printAll(){
  const content=document.getElementById("content");
  const original=content.innerHTML;
  content.innerHTML=`<div class="content-inner">${DISEASES.map(d=>`<div class="dz-entry" style="page-break-after:always;margin-bottom:40px;"><div class="cat-label"><span class="cat-dot"></span>${d.emoji} ${d.cat}</div><h2 class="dz-title">${d.name}</h2><div class="dz-oneliner">${d.oneLiner}</div>${d.path?`<div class="sec"><h3>🔬 Microbiology &amp; Pathogenesis</h3><p>${d.path}</p></div>`:""}${d.clin?`<div class="sec"><h3>🩺 Clinical Features</h3>${d.clin.trim().startsWith("<ul>")?d.clin:"<p>"+d.clin+"</p>"}</div>`:""}${d.dx?`<div class="sec"><h3>🔍 Diagnosis</h3><p>${d.dx}</p></div>`:""}${d.tx?`<div class="sec"><h3>💊 Treatment</h3><p>${d.tx}</p></div>`:""}${d.hy?.length?`<div class="callout hy"><h4>⚡ USMLE High-Yield</h4><ul>${d.hy.map(x=>`<li>${x}</li>`).join("")}</ul></div>`:""}${d.mn?`<div class="callout mn"><h4>🧠 Mnemonic</h4>${d.mn}</div>`:""}${d.trap?`<div class="callout trap"><h4>⚠️ Exam Trap</h4>${d.trap}</div>`:""}</div>`).join("")}</div>`;
  setTimeout(()=>{window.print();content.innerHTML=original;renderContent();},300);
}
document.getElementById("search").addEventListener("input",(e)=>{state.search=e.target.value;renderSidebar();});
document.getElementById("prevBtn").onclick=()=>navigate(-1);
document.getElementById("nextBtn").onclick=()=>navigate(1);
document.getElementById("printBtn").onclick=printAll;
document.getElementById("excelBtn").onclick=exportExcel;
document.addEventListener("keydown",(e)=>{
  if(e.target.tagName==="INPUT")return;
  if(state.currentId===null&&e.key!=="ArrowRight"&&e.key!=="ArrowDown")return;
  if(e.key==="ArrowLeft"){e.preventDefault();navigate(-1);}
  else if(e.key==="ArrowRight"){e.preventDefault();navigate(1);}
  else if(e.key===" "){e.preventDefault();toggleLearned();}
  else if(e.key==="ArrowDown"||e.key==="ArrowUp"){
    e.preventDefault();
    const visible=getVisibleDiseases();
    const idx=visible.findIndex(x=>x.id===state.currentId);
    const dir=e.key==="ArrowDown"?1:-1;
    const newIdx=idx===-1?0:idx+dir;
    if(newIdx>=0&&newIdx<visible.length)selectDisease(visible[newIdx].id);
  }
  else if(e.key==="Escape"){goHome();}
});
Object.keys(groupByCategory()).forEach(c=>state.collapsed.add(c));
renderSidebar();
renderHomepage();
updateProgress();
</script>
</body>
</html>
