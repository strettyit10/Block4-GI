<style>

.home-dz:hover{background:#14532d;color:white;border-left-color:#fbbf24}
.home-dz:hover .home-check{color:#fbbf24}
.home-dz.learned{color:#16a34a}
.home-dz .home-check{font-size:10px;width:10px;flex-shrink:0;color:#b5bbb2}
.home-dz.learned .home-check{color:#16a34a}
.empty{text-align:center;padding:80px 20px;color:#8a9b8b;font-style:italic}

  .home-sub{font-size:15px}
  .home-hero{padding:14px 0 20px;margin-bottom:22px}
  .home-grid{grid-template-columns:1fr;gap:12px}
  .home-section-title{margin-top:24px}
  .dz-oneliner{font-size:15px;padding:11px 14px;margin-bottom:22px}

.sb-backdrop.show{display:block}

  body{overflow:visible;background:white;font-size:10.5pt}

}
.sb-list::-webkit-scrollbar,.content::-webkit-scrollbar{width:8px}
.sb-list::-webkit-scrollbar-thumb{background:#d4c9ad;border-radius:4px}
.content::-webkit-scrollbar-thumb{background:#d4c9ad;border-radius:4px}
.sb-list::-webkit-scrollbar-thumb:hover,.content::-webkit-scrollbar-thumb:hover{background:#14532d}

<body>
<div class="app">
<aside class="sidebar" id="sidebar">
  <div class="sb-top">
    <a class="sb-brand" href="https://hoyadocs.com/Block4-GI/" target="_blank" rel="noopener">HoyaDocs <span style="font-size:0.85em;opacity:0.65;font-weight:600;margin-left:2px;">↗</span></a>
    <span class="sb-title" onclick="goHome()">GI Toxicology Atlas</span>
    <div class="sb-sub">USMLE Step 1 · 69 agents</div>
    <div class="sb-search"><input type="text" id="search" placeholder="Search…"></div>
  </div>
  <div class="sb-progress">
    <span id="learnedText">0 / 0</span>
    <div class="sb-progress-bar"><div class="sb-progress-fill" id="progressFill"></div></div>
  </div>
  <div class="sb-list" id="sbList"></div>
</aside>
<div class="sb-backdrop" id="sbBackdrop" onclick="closeSidebar()"></div>
<main class="main">
  <div class="main-top">
    <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Menu">☰</button>
    <h1 onclick="goHome()">GI Toxicology Study Guide</h1>
    <span class="meta">↑↓ navigate · space = learn</span>
    <button class="btn" id="prevBtn" title="Previous">◀</button>
    <button class="btn" id="nextBtn" title="Next">▶</button>
    <button class="btn print" id="printBtn">🖨 PDF</button>
    <button class="btn excel" id="excelBtn">📊 Excel</button>
  </div>
  <div class="content" id="content"></div>
</main>
</div>
<script>
const DISEASES = [
// ═══════════════ DECONTAMINATION ═══════════════
{id:"activated-charcoal",cat:"Decontamination",ck:"dec",emoji:"⚫",name:"Activated Charcoal",
oneLiner:"Adsorbent that binds most ingested toxins in the gut. <strong>Does NOT bind: alcohols, iron, lithium, heavy metals, caustics</strong>.",
path:`<ul>
<li>Activated (heated) carbon with massive surface area</li>
<li>Mechanism:
  <ul>
    <li>Binds (adsorbs) ingested toxins in GI tract</li>
    <li>Prevents systemic absorption</li>
  </ul>
</li>
<li>Dose: 1 g/kg PO</li>
</ul>`,
clin:`<ul>
<li>Indications:
  <ul>
    <li>Most ingested drug overdoses within 1 hour of ingestion</li>
    <li>Multi-dose for toxins with enterohepatic recirculation
      <ul>
        <li>Carbamazepine</li>
        <li>Phenobarbital</li>
        <li>Theophylline</li>
        <li>Dapsone</li>
        <li>Quinine</li>
      </ul>
    </li>
  </ul>
</li>
<li><strong>Does NOT bind</strong>:
  <ul>
    <li>Alcohols (methanol, ethylene glycol, ethanol)</li>
    <li>Iron</li>
    <li>Lithium</li>
    <li>Heavy metals (lead, mercury, arsenic)</li>
    <li>Hydrocarbons</li>
    <li>Caustics (acids/alkalis)</li>
  </ul>
</li>
<li>Contraindications:
  <ul>
    <li>Unprotected airway (aspiration risk)</li>
    <li>GI obstruction/perforation</li>
  </ul>
</li>
</ul>`,
hy:["<strong>Most effective within 1 hour of ingestion</strong>","<strong>Does NOT bind: alcohols, iron, lithium</strong>","Multi-dose for enterohepatic drugs","No benefit in caustic ingestions","Aspiration risk in obtunded patients"],
mn:"<strong>Charcoal miss list — 'CHAIL'</strong>: <strong>C</strong>austics, <strong>H</strong>eavy metals, <strong>A</strong>lcohols, <strong>I</strong>ron, <strong>L</strong>ithium"},

{id:"ipecac",cat:"Decontamination",ck:"dec",emoji:"⚫",name:"Ipecac Syrup",
oneLiner:"<strong>Emetic — OUT OF FAVOR</strong>. Causes vomiting via CTZ + gastric irritation. No longer recommended by AAP.",
path:`<ul>
<li>Derived from Cephaelis root</li>
<li>Mechanism (dual action):
  <ul>
    <li>Direct gastric mucosal irritation</li>
    <li>Central stimulation of chemoreceptor trigger zone (CTZ) via emetine</li>
  </ul>
</li>
<li>Onset: 15–30 min</li>
</ul>`,
clin:`<ul>
<li>Historical use: household poisoning</li>
<li><strong>NO longer recommended</strong> (AAP withdrew recommendation 2003):
  <ul>
    <li>No proven benefit</li>
    <li>Can delay administration of effective therapies (charcoal)</li>
    <li>Mallory-Weiss tears</li>
    <li>Aspiration risk</li>
  </ul>
</li>
<li>Chronic abuse (bulimia):
  <ul>
    <li>Emetine <strong>cardiomyopathy</strong></li>
    <li>Myopathy</li>
    <li>Electrolyte disturbances</li>
  </ul>
</li>
</ul>`,
hy:["<strong>No longer recommended</strong>","Cardiomyopathy from chronic abuse (bulimia)","Replaced by activated charcoal + supportive care"]},

// ═══════════════ ANTIDOTES ═══════════════
{id:"nac",cat:"Antidotes",ck:"ant",emoji:"💉",name:"N-Acetylcysteine (Acetadote, Mucomyst)",
oneLiner:"<strong>Antidote for acetaminophen poisoning</strong>. Replenishes glutathione. Most effective within <strong>8 hours</strong> of ingestion.",
path:`<ul>
<li>Glutathione precursor</li>
<li>Mechanism:
  <ul>
    <li>Replenishes hepatic glutathione stores</li>
    <li>Glutathione neutralizes toxic acetaminophen metabolite <strong>NAPQI</strong></li>
    <li>NAPQI produced by CYP2E1 metabolism of acetaminophen</li>
    <li>Also directly conjugates with NAPQI</li>
  </ul>
</li>
<li>Routes:
  <ul>
    <li>IV (preferred — Acetadote) for serious toxicity</li>
    <li>PO (Mucomyst) — smells like rotten eggs</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Indication:
  <ul>
    <li><strong>Acetaminophen overdose</strong></li>
    <li>Decision based on Rumack-Matthew nomogram</li>
    <li>Most effective within <strong>8 hours</strong> of ingestion</li>
    <li>Still give up to 24+ hours (some benefit for hepatotoxicity)</li>
  </ul>
</li>
<li>Other uses:
  <ul>
    <li>Mucolytic (cystic fibrosis — breaks disulfide bonds)</li>
    <li>Contrast-induced nephropathy prevention (debated)</li>
  </ul>
</li>
<li>Adverse effects:
  <ul>
    <li>Anaphylactoid reaction (IV)</li>
    <li>Nausea + vomiting (PO — rotten egg smell)</li>
  </ul>
</li>
</ul>`,
hy:["<strong>Acetaminophen overdose</strong>","Replenishes <strong>glutathione</strong> to neutralize <strong>NAPQI</strong>","Rumack-Matthew nomogram guides decision","Within 8 hours = best outcome","Smells like rotten eggs (PO)","Also mucolytic (CF)"]},

{id:"hydroxocobalamin",cat:"Antidotes",ck:"ant",emoji:"💉",name:"Hydroxocobalamin (Vitamin B12)",
oneLiner:"<strong>Antidote for cyanide poisoning</strong>. Binds cyanide to form cyanocobalamin → excreted in urine. Preferred over old cyanide kit.",
path:`<ul>
<li>Vitamin B12 derivative</li>
<li>Mechanism:
  <ul>
    <li>Directly binds cyanide (CN⁻)</li>
    <li>Forms <strong>cyanocobalamin</strong> (vitamin B12)</li>
    <li>Renally excreted</li>
  </ul>
</li>
<li>IV administration</li>
</ul>`,
clin:`<ul>
<li>Indications:
  <ul>
    <li><strong>Cyanide poisoning</strong> (first-line antidote)
      <ul>
        <li>Smoke inhalation (fires with plastics)</li>
        <li>Industrial exposure</li>
        <li>Nitroprusside toxicity</li>
        <li>Amygdalin/laetrile</li>
      </ul>
    </li>
  </ul>
</li>
<li>Advantages over old Cyanide Kit:
  <ul>
    <li>No methemoglobinemia risk</li>
    <li>Safe in smoke inhalation + CO co-poisoning</li>
    <li>Can give empirically</li>
  </ul>
</li>
<li>Adverse effects:
  <ul>
    <li><strong>Chromaturia (red urine)</strong></li>
    <li>Red-orange skin discoloration</li>
    <li>Interferes with lab colorimetric assays</li>
  </ul>
</li>
</ul>`,
hy:["<strong>First-line cyanide antidote</strong>","Binds CN⁻ → cyanocobalamin → urine","<strong>Red urine + skin</strong> side effects","Safe in smoke inhalation (no MetHb)","Can give empirically if suspected"]},

{id:"cyanide-kit",cat:"Antidotes",ck:"ant",emoji:"💉",name:"Cyanide Antidote Kit",
oneLiner:"Old 3-part kit: <strong>amyl nitrite + sodium nitrite + sodium thiosulfate</strong>. Creates methemoglobin to bind cyanide. Replaced by hydroxocobalamin.",
path:`<ul>
<li>Three-agent kit:
  <ul>
    <li><strong>Amyl nitrite (inhaled)</strong>:
      <ul>
        <li>Rapid onset</li>
        <li>Induces methemoglobinemia</li>
      </ul>
    </li>
    <li><strong>Sodium nitrite (IV)</strong>:
      <ul>
        <li>Further induces methemoglobinemia</li>
        <li>MetHb has HIGH affinity for cyanide</li>
        <li>Cyanide leaves cytochrome oxidase → binds MetHb</li>
      </ul>
    </li>
    <li><strong>Sodium thiosulfate (IV)</strong>:
      <ul>
        <li>Sulfur donor for rhodanese enzyme</li>
        <li>Converts cyanide to thiocyanate</li>
        <li>Renally excreted</li>
      </ul>
    </li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Indication:
  <ul>
    <li>Cyanide poisoning (now 2nd-line after hydroxocobalamin)</li>
  </ul>
</li>
<li>Contraindications / cautions:
  <ul>
    <li><strong>Avoid in smoke inhalation (CO co-poisoning)</strong>
      <ul>
        <li>Inducing MetHb in already hypoxic patient = dangerous</li>
      </ul>
    </li>
    <li>Hypotension (nitrite vasodilation)</li>
  </ul>
</li>
</ul>`,
hy:["3 agents: amyl nitrite + Na nitrite + Na thiosulfate","<strong>Induces MetHb</strong> to bind CN⁻","Thiosulfate → thiocyanate for excretion","<strong>Avoid in smoke inhalation</strong> (CO present)","Replaced by hydroxocobalamin"]},

{id:"na-thiosulfate",cat:"Antidotes",ck:"ant",emoji:"💉",name:"Sodium Thiosulfate",
oneLiner:"Part of cyanide kit; also used alone. Sulfur donor for rhodanese → converts CN⁻ to thiocyanate.",
path:`<ul>
<li>Sulfur-donating compound</li>
<li>Mechanism:
  <ul>
    <li>Substrate for <strong>rhodanese</strong> (mitochondrial enzyme)</li>
    <li>Rhodanese transfers sulfur to cyanide</li>
    <li>CN⁻ + S → SCN⁻ (thiocyanate)</li>
    <li>Thiocyanate is renally excreted (much less toxic)</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Indications:
  <ul>
    <li>Cyanide poisoning (part of kit; also with hydroxocobalamin)</li>
    <li>Nitroprusside toxicity</li>
  </ul>
</li>
<li>Adverse effects:
  <ul>
    <li>Minimal — generally safe</li>
    <li>Thiocyanate toxicity in renal failure</li>
  </ul>
</li>
</ul>`,
hy:["Converts CN⁻ → thiocyanate via rhodanese","Safe adjunct to hydroxocobalamin","Also treats nitroprusside toxicity"]},

{id:"oxygen",cat:"Antidotes",ck:"ant",emoji:"💉",name:"Oxygen (100% FiO₂ / Hyperbaric)",
oneLiner:"<strong>Antidote for carbon monoxide (CO) poisoning</strong>. Displaces CO from hemoglobin. Hyperbaric for severe cases.",
path:`<ul>
<li>Mechanism:
  <ul>
    <li>CO binds hemoglobin with ~240× affinity vs O₂</li>
    <li>Forms <strong>carboxyhemoglobin (COHb)</strong></li>
    <li>Displaces O₂ from Hb + cytochrome oxidase</li>
    <li>High O₂ competes off CO</li>
    <li><strong>Half-life of COHb</strong>:
      <ul>
        <li>Room air: ~5 hours</li>
        <li>100% O₂: ~1 hour</li>
        <li>Hyperbaric (2.5-3 atm): ~20 min</li>
      </ul>
    </li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Indications:
  <ul>
    <li>All CO poisoning → <strong>100% non-rebreather</strong></li>
    <li>Hyperbaric O₂ indicated for:
      <ul>
        <li>COHb &gt;25% (or &gt;15% in pregnancy)</li>
        <li>LOC, neurologic symptoms</li>
        <li>Seizures</li>
        <li>Ischemic ECG changes</li>
        <li>Persistent symptoms despite NRB</li>
        <li>Pregnancy (fetal Hb binds CO more avidly)</li>
      </ul>
    </li>
  </ul>
</li>
<li>Classic presentations:
  <ul>
    <li>Winter heating (furnace)</li>
    <li>Cherry-red skin (classic but unreliable)</li>
    <li>Headache, confusion, dizziness</li>
    <li><strong>Pulse oximetry reads NORMAL (falsely)</strong></li>
    <li>Must measure COHb directly</li>
  </ul>
</li>
</ul>`,
hy:["<strong>100% O₂</strong> for all CO poisoning","<strong>Hyperbaric O₂</strong> for severe/pregnancy","<strong>Pulse ox falsely normal</strong>","Check COHb directly","Cherry-red skin (late, unreliable)","Half-life: room air 5 hr → 100% O₂ 1 hr → HBO 20 min"]},

{id:"dig-fab",cat:"Antidotes",ck:"ant",emoji:"💉",name:"Digoxin Immune Fab (Dig-Fab)",
oneLiner:"<strong>Antidote for digoxin toxicity</strong>. Ovine (sheep) Fab fragments bind + neutralize digoxin. For severe toxicity.",
path:`<ul>
<li>Sheep-derived immunoglobulin Fab fragments</li>
<li>Mechanism:
  <ul>
    <li>Bind digoxin with high affinity</li>
    <li>Form Fab-digoxin complex</li>
    <li>Renally excreted</li>
    <li>Pulls digoxin off Na/K ATPase</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Indications for digoxin toxicity:
  <ul>
    <li>Life-threatening arrhythmia
      <ul>
        <li>Ventricular tachycardia/fibrillation</li>
        <li>Bradyarrhythmia refractory to atropine</li>
      </ul>
    </li>
    <li>Hyperkalemia &gt;5.0 with dig toxicity</li>
    <li>End-organ dysfunction</li>
    <li>Acute ingestion &gt;10 mg adult or &gt;4 mg child</li>
    <li>Steady-state digoxin level &gt;10 ng/mL</li>
  </ul>
</li>
<li>Classic digoxin toxicity:
  <ul>
    <li>Nausea, vomiting, diarrhea</li>
    <li>Confusion, weakness</li>
    <li><strong>Visual disturbances — yellow-green halos</strong></li>
    <li>Arrhythmias (any type) + bradycardia</li>
    <li><strong>Hyperkalemia</strong> (blocks Na/K ATPase)</li>
  </ul>
</li>
<li>Precipitants of toxicity:
  <ul>
    <li>Hypokalemia (↑ dig binding)</li>
    <li>Renal failure</li>
    <li>Drug interactions (amiodarone, verapamil, quinidine, macrolides)</li>
  </ul>
</li>
</ul>`,
hy:["<strong>Digoxin toxicity antidote</strong>","<strong>Hyperkalemia</strong> = bad prognostic sign","<strong>Yellow-green halos</strong> (Van Gogh)","Hypokalemia precipitates toxicity","Any arrhythmia possible","Ovine (sheep) Fab fragments"]},

{id:"fomepizole",cat:"Antidotes",ck:"ant",emoji:"💉",name:"Fomepizole (Antizol, 4-Methylpyrazole)",
oneLiner:"<strong>First-line antidote for methanol + ethylene glycol</strong>. Competitive alcohol dehydrogenase inhibitor.",
path:`<ul>
<li>Competitive inhibitor of <strong>alcohol dehydrogenase (ADH)</strong></li>
<li>Mechanism:
  <ul>
    <li>Blocks ADH from metabolizing methanol or ethylene glycol</li>
    <li>Prevents formation of toxic metabolites:
      <ul>
        <li>Methanol → <strong>formic acid</strong> (blindness)</li>
        <li>Ethylene glycol → <strong>glycolic + oxalic acid</strong> (AKI, hypocalcemia, Ca oxalate crystals)</li>
      </ul>
    </li>
    <li>Parent alcohols excreted unchanged</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Indications:
  <ul>
    <li><strong>Methanol poisoning</strong>
      <ul>
        <li>Sources: windshield washer fluid, moonshine</li>
        <li>Anion gap metabolic acidosis, blindness, putaminal necrosis</li>
      </ul>
    </li>
    <li><strong>Ethylene glycol poisoning</strong>
      <ul>
        <li>Sources: antifreeze (sweet taste)</li>
        <li>Anion gap metabolic acidosis, AKI, hypocalcemia</li>
        <li>Calcium oxalate crystals in urine (envelope-shaped)</li>
      </ul>
    </li>
  </ul>
</li>
<li>Adjunctive treatments:
  <ul>
    <li>Hemodialysis (severe)</li>
    <li>Folate (methanol — clears formate)</li>
    <li>Thiamine + pyridoxine (ethylene glycol — alternate metabolism)</li>
    <li>Bicarbonate for acidosis</li>
  </ul>
</li>
</ul>`,
hy:["<strong>Methanol + ethylene glycol antidote</strong>","Competitive ADH inhibitor","<strong>First-line over ethanol</strong> (no CNS depression)","Anion gap + osmolar gap metabolic acidosis","Wood's lamp (fluorescein) for antifreeze"]},

{id:"ethanol-antidote",cat:"Antidotes",ck:"ant",emoji:"💉",name:"Ethyl Alcohol (Ethanol) as Antidote",
oneLiner:"2nd-line antidote for methanol/ethylene glycol if fomepizole unavailable. Competes with toxic alcohols for ADH.",
path:`<ul>
<li>Ethanol competes with methanol/EG for <strong>alcohol dehydrogenase (ADH)</strong></li>
<li>Ethanol preferred substrate (20× higher affinity)</li>
<li>Delays toxic metabolite formation → allows time for clearance</li>
</ul>`,
clin:`<ul>
<li>Indications:
  <ul>
    <li>2nd-line methanol/EG antidote (when fomepizole unavailable)</li>
  </ul>
</li>
<li>Disadvantages (vs fomepizole):
  <ul>
    <li>CNS depression</li>
    <li>Requires monitoring of blood ethanol levels</li>
    <li>Complex dosing</li>
    <li>Hypoglycemia risk (kids)</li>
  </ul>
</li>
</ul>`,
hy:["2nd-line for methanol/EG (fomepizole preferred)","Competes with ADH","Causes CNS depression","Hypoglycemia in kids"]},

{id:"naloxone",cat:"Antidotes",ck:"ant",emoji:"💉",name:"Naloxone (Narcan)",
oneLiner:"<strong>Antidote for opioid overdose</strong>. Competitive μ-opioid receptor antagonist. IN/IV/IM for respiratory depression.",
path:`<ul>
<li>Competitive antagonist at <strong>μ, κ, δ opioid receptors</strong></li>
<li>Primary effect at μ receptor (respiratory depression)</li>
<li>Rapid onset (minutes)</li>
<li>Short duration (30–90 min) → may require re-dosing for long-acting opioids</li>
<li>Routes: IN (most common OTC), IV, IM, SC</li>
</ul>`,
clin:`<ul>
<li>Indications:
  <ul>
    <li>Opioid overdose with respiratory depression</li>
    <li>Classic <strong>opioid toxidrome</strong>:
      <ul>
        <li><strong>Pinpoint pupils (miosis)</strong></li>
        <li><strong>Respiratory depression</strong></li>
        <li>Decreased LOC</li>
        <li>Hypothermia, hyporeflexia</li>
      </ul>
    </li>
  </ul>
</li>
<li>Adverse effects:
  <ul>
    <li><strong>Precipitated withdrawal</strong> in chronic opioid users:
      <ul>
        <li>Agitation, pain, yawning, lacrimation, rhinorrhea</li>
        <li>Vomiting, diarrhea</li>
        <li>Piloerection ('cold turkey')</li>
        <li>Pupillary dilation</li>
      </ul>
    </li>
    <li>Short half-life → <strong>re-dose needed</strong> for methadone, fentanyl, sustained-release</li>
  </ul>
</li>
</ul>`,
hy:["<strong>Respiratory depression reversal</strong>","Pinpoint pupils (miosis)","<strong>Short half-life → re-dose</strong> or drip","Precipitates withdrawal in chronic users","IN naloxone = OTC for bystander use","Doesn't reverse loperamide cardiac toxicity"]},

{id:"atropine",cat:"Antidotes",ck:"ant",emoji:"💉",name:"Atropine Sulfate",
oneLiner:"<strong>Antidote for organophosphate / nerve agent poisoning</strong> (muscarinic symptoms). Competitive muscarinic antagonist.",
path:`<ul>
<li>Competitive muscarinic receptor antagonist</li>
<li>Mechanism:
  <ul>
    <li>OP inhibits acetylcholinesterase → excess ACh at synapses</li>
    <li>Atropine blocks muscarinic effects of excess ACh</li>
    <li>Does NOT reverse nicotinic effects (fasciculations, paralysis)</li>
  </ul>
</li>
<li>Dose: titrate to drying of secretions (not HR/pupil size)</li>
</ul>`,
clin:`<ul>
<li>Indications:
  <ul>
    <li><strong>Organophosphate / nerve agent / carbamate poisoning</strong></li>
    <li>Bradycardia (non-OP)</li>
    <li>Pre-op drying</li>
  </ul>
</li>
<li>Cholinergic (muscarinic) toxidrome reversed:
  <ul>
    <li><strong>DUMBELS</strong>: Defecation, Urination, Miosis, Bronchorrhea/Bronchospasm, Emesis, Lacrimation, Salivation</li>
    <li>Or <strong>SLUDGE</strong>: Salivation, Lacrimation, Urination, Defecation, GI cramps, Emesis</li>
  </ul>
</li>
<li>Endpoint for dosing:
  <ul>
    <li><strong>Drying of pulmonary secretions</strong>
      <ul>
        <li>NOT heart rate or pupil size</li>
      </ul>
    </li>
  </ul>
</li>
<li>Adverse effects:
  <ul>
    <li>Anticholinergic: hot/dry/red/blind/mad</li>
  </ul>
</li>
</ul>`,
hy:["<strong>OP poisoning antidote (muscarinic)</strong>","<strong>DUMBELS / SLUDGE</strong>","Titrate to drying of secretions","Doesn't reverse nicotinic effects","Give with <strong>pralidoxime</strong> (reverses nicotinic + regenerates AChE)"]},

{id:"pralidoxime",cat:"Antidotes",ck:"ant",emoji:"💉",name:"Pralidoxime (2-PAM, Protopam)",
oneLiner:"<strong>Reactivates acetylcholinesterase</strong> in organophosphate poisoning. Given with atropine. <strong>Before 'aging' occurs</strong>.",
path:`<ul>
<li>Oxime class antidote</li>
<li>Mechanism:
  <ul>
    <li>OP covalently binds acetylcholinesterase (AChE)</li>
    <li>Pralidoxime <strong>regenerates AChE</strong> by displacing OP from active site</li>
    <li>Reverses BOTH muscarinic AND nicotinic effects</li>
    <li>Must be given <strong>before aging occurs</strong> (irreversible OP-AChE bond)
      <ul>
        <li>Aging time varies: minutes (soman/Novichok) to hours (malathion)</li>
        <li>Once aged, enzyme cannot be reactivated</li>
      </ul>
    </li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Indications:
  <ul>
    <li>Organophosphate poisoning (give WITH atropine)</li>
    <li>Nerve agent exposure</li>
  </ul>
</li>
<li>Reverses <strong>BOTH</strong>:
  <ul>
    <li>Muscarinic effects (though atropine already does)</li>
    <li><strong>Nicotinic effects</strong> (fasciculations, paralysis, weakness — atropine doesn't touch these)</li>
  </ul>
</li>
<li>Not effective for carbamate poisoning (spontaneously reversible)</li>
</ul>`,
hy:["<strong>Regenerates AChE</strong> in OP toxicity","<strong>Give WITH atropine</strong> (atropine doesn't reverse nicotinic)","<strong>Must give before aging</strong>","Reverses nicotinic (fasciculations, paralysis)","Not for carbamates"]},

{id:"benzodiazepines-ant",cat:"Antidotes",ck:"ant",emoji:"💉",name:"Benzodiazepines (for OP seizures)",
oneLiner:"<strong>Antidote for organophosphate/nerve agent seizures</strong>. GABA-A potentiators. IV diazepam/midazolam/lorazepam.",
path:`<ul>
<li>GABA-A receptor positive allosteric modulator</li>
<li>Mechanism:
  <ul>
    <li>Increases frequency of chloride channel opening</li>
    <li>Enhances GABAergic inhibition</li>
    <li>Suppresses seizure activity</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Indications:
  <ul>
    <li>Seizures from organophosphate / nerve agent poisoning</li>
    <li>Also: alcohol withdrawal, status epilepticus, general anxiety</li>
  </ul>
</li>
<li>Agents:
  <ul>
    <li>Diazepam (longest-acting)</li>
    <li>Midazolam (IM/IN for prehospital)</li>
    <li>Lorazepam (no active metabolite, hepatic-friendly)</li>
  </ul>
</li>
</ul>`,
hy:["Treats OP/nerve agent <strong>seizures</strong>","GABA-A enhancer","Combined with atropine + pralidoxime in nerve agent attacks","Autoinjector for mass casualty (diazepam)"]},

{id:"leucovorin",cat:"Antidotes",ck:"ant",emoji:"💉",name:"Leucovorin (Folinic Acid)",
oneLiner:"<strong>Rescue for methotrexate toxicity</strong>. Reduced folate that bypasses dihydrofolate reductase blockade.",
path:`<ul>
<li>Reduced (active) folate = 5-formyl-THF</li>
<li>Mechanism:
  <ul>
    <li>Methotrexate inhibits dihydrofolate reductase (DHFR)</li>
    <li>→ No conversion of dihydrofolate to tetrahydrofolate (THF)</li>
    <li>→ ↓ purine + thymidine synthesis → ↓ DNA replication</li>
    <li>Leucovorin BYPASSES DHFR — provides active folate directly</li>
    <li>Rescues normal cells (cancer cells use methotrexate efficiently)</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Indications:
  <ul>
    <li><strong>Methotrexate rescue</strong> (high-dose MTX chemotherapy)</li>
    <li>Pyrimethamine (toxoplasmosis) toxicity prevention</li>
    <li>5-FU enhancement (colorectal cancer)</li>
  </ul>
</li>
<li>Key distinction:
  <ul>
    <li><strong>Folic acid does NOT rescue MTX toxicity</strong> — needs DHFR to activate</li>
    <li>Must use leucovorin (active form)</li>
  </ul>
</li>
</ul>`,
hy:["<strong>Methotrexate rescue</strong>","Active (reduced) folate","Bypasses DHFR","<strong>Folic acid does NOT work</strong> for MTX rescue","Also for pyrimethamine toxicity"],
trap:"Folic acid ≠ folinic acid for MTX rescue. Must use leucovorin (folinic acid)."},

{id:"glucarpidase",cat:"Antidotes",ck:"ant",emoji:"💉",name:"Glucarpidase (Voraxaze)",
oneLiner:"Enzyme that cleaves methotrexate into inactive metabolites. For severe MTX toxicity when leucovorin insufficient.",
path:`<ul>
<li>Recombinant bacterial enzyme (carboxypeptidase G2)</li>
<li>Mechanism:
  <ul>
    <li>Cleaves methotrexate → 2,4-diamino-N10-methylpteroic acid (DAMPA) + glutamate</li>
    <li>DAMPA is inactive + not renally cleared</li>
    <li>Rapidly lowers MTX blood levels</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Indications:
  <ul>
    <li>Severe MTX toxicity</li>
    <li>Delayed MTX clearance (renal dysfunction)</li>
    <li>When leucovorin alone is insufficient</li>
  </ul>
</li>
<li>Adjunct — does not replace leucovorin</li>
</ul>`,
hy:["Cleaves MTX to inactive metabolites","For severe MTX toxicity","Adjunct to leucovorin, not replacement"]},

{id:"andexanet",cat:"Antidotes",ck:"ant",emoji:"💉",name:"Andexanet Alpha (AndexXa)",
oneLiner:"<strong>Reverses rivaroxaban + apixaban</strong>. Decoy Factor Xa that binds DOAC → restores endogenous Xa activity.",
path:`<ul>
<li>Recombinant modified <strong>Factor Xa</strong> (catalytically inactive)</li>
<li>Mechanism:
  <ul>
    <li>Binds + sequesters direct Factor Xa inhibitors</li>
    <li>(rivaroxaban, apixaban, edoxaban)</li>
    <li>Releases endogenous Factor Xa → restores coagulation</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Indications:
  <ul>
    <li>Life-threatening bleed on rivaroxaban or apixaban</li>
    <li>Emergent surgery on Factor Xa inhibitor</li>
  </ul>
</li>
<li>Adverse effects:
  <ul>
    <li><strong>Prothrombotic</strong>:
      <ul>
        <li>Ischemic stroke</li>
        <li>MI</li>
        <li>DVT/PE</li>
        <li>Reversal of anticoagulation</li>
      </ul>
    </li>
  </ul>
</li>
</ul>`,
hy:["<strong>Reverses rivaroxaban + apixaban</strong> (Factor Xa inhibitors)","Decoy Xa binds DOACs","<strong>Prothrombotic</strong> — stroke/MI risk","Expensive"]},

{id:"idarucizumab",cat:"Antidotes",ck:"ant",emoji:"💉",name:"Idarucizumab (Praxbind)",
oneLiner:"<strong>Reverses dabigatran</strong>. Humanized monoclonal antibody fragment that binds dabigatran with 350× affinity vs thrombin.",
path:`<ul>
<li>Humanized monoclonal antibody fragment (Fab)</li>
<li>Mechanism:
  <ul>
    <li>Binds dabigatran with ~350× higher affinity than thrombin</li>
    <li>Forms inert complex → excreted</li>
    <li>Restores normal thrombin activity</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Indications:
  <ul>
    <li>Life-threatening bleed on dabigatran</li>
    <li>Emergent surgery on dabigatran</li>
  </ul>
</li>
<li>Onset: minutes</li>
<li>Duration: sufficient for most emergencies (~24 hr)</li>
</ul>`,
hy:["<strong>Reverses dabigatran</strong> (direct thrombin inhibitor)","Binds with 350× thrombin affinity","Monoclonal antibody fragment","Rapid onset"]},

{id:"protamine",cat:"Antidotes",ck:"ant",emoji:"💉",name:"Protamine Sulfate",
oneLiner:"<strong>Heparin reversal</strong>. Cationic protein that electrostatically binds heparin. 1 mg neutralizes ~100 units heparin.",
path:`<ul>
<li>Basic (cationic) protein from fish sperm</li>
<li>Mechanism:
  <ul>
    <li>Heparin = highly anionic polysaccharide</li>
    <li>Protamine's positive charges bind heparin's negative charges</li>
    <li>Inactive complex</li>
  </ul>
</li>
<li>Dose: <strong>1 mg neutralizes ~100 units heparin (90–115 units)</strong></li>
</ul>`,
clin:`<ul>
<li>Indications:
  <ul>
    <li>Heparin overdose with bleeding</li>
    <li>Reversal after cardiac surgery (bypass)</li>
  </ul>
</li>
<li>Partial reversal of LMWH (enoxaparin)
  <ul>
    <li>~60% reversal</li>
  </ul>
</li>
<li>Does NOT reverse fondaparinux</li>
<li>Adverse effects:
  <ul>
    <li>Hypotension</li>
    <li>Anaphylaxis (especially fish allergy, prior vasectomy, NPH insulin users)</li>
    <li>Paradoxical bleeding with excess dose</li>
  </ul>
</li>
</ul>`,
hy:["<strong>1 mg per 100 units heparin</strong>","Electrostatic binding","Partial reversal of LMWH","Does NOT reverse fondaparinux","<strong>Fish allergy + NPH insulin = anaphylaxis risk</strong>"]},

{id:"vitk1",cat:"Antidotes",ck:"ant",emoji:"💉",name:"Vitamin K1 (Phytonadione / Aquamephyton)",
oneLiner:"<strong>Warfarin reversal</strong>. Provides substrate for vitamin K-dependent clotting factor synthesis (II, VII, IX, X, protein C/S).",
path:`<ul>
<li>Fat-soluble vitamin, cofactor for γ-carboxylation of glutamate</li>
<li>Mechanism:
  <ul>
    <li>Warfarin inhibits vitamin K epoxide reductase → depletes active vit K</li>
    <li>Vitamin K1 supplementation bypasses the block</li>
    <li>Restores synthesis of factors II, VII, IX, X, protein C + S</li>
  </ul>
</li>
<li>Routes + onset:
  <ul>
    <li>PO (6–12 hr) — preferred for non-urgent</li>
    <li>IV (slow, 2–6 hr) — urgent (anaphylaxis risk if fast)</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Indications:
  <ul>
    <li>Warfarin toxicity / supratherapeutic INR</li>
    <li>Vitamin K-dependent factor deficiency
      <ul>
        <li>Newborns (give prophylactically to prevent hemorrhagic disease)</li>
        <li>Cholestasis (↓ fat-soluble absorption)</li>
        <li>Chronic antibiotic use (↓ gut flora production)</li>
      </ul>
    </li>
    <li>Long-acting anticoagulant rodenticide (brodifacoum) — requires WEEKS of vit K</li>
  </ul>
</li>
<li>For urgent warfarin reversal with bleeding:
  <ul>
    <li>IV vitamin K1 + <strong>4-factor PCC (Kcentra)</strong> or FFP</li>
    <li>(Vitamin K alone takes hours)</li>
  </ul>
</li>
</ul>`,
hy:["<strong>Warfarin reversal</strong>","Active factors II, VII, IX, X + protein C/S","<strong>Newborn prophylaxis</strong> (hemorrhagic disease)","IV must be given slowly (anaphylaxis)","Emergent reversal: add 4-factor PCC","Superwarfarin requires weeks of K"]},

{id:"succimer",cat:"Antidotes",ck:"ant",emoji:"💉",name:"Succimer / DMSA (Chemet)",
oneLiner:"<strong>Oral lead chelator</strong>. Used for moderate lead levels (45–70) in kids. Safe + oral.",
path:`<ul>
<li>Meso-2,3-dimercaptosuccinic acid (DMSA)</li>
<li>Water-soluble dithiol analog of BAL</li>
<li>Mechanism:
  <ul>
    <li>Chelates heavy metals (especially lead, arsenic, mercury)</li>
    <li>Forms water-soluble complex → renal excretion</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Indications:
  <ul>
    <li><strong>Lead poisoning</strong>:
      <ul>
        <li>Blood lead level 45–70 μg/dL in kids</li>
        <li>Asymptomatic adults &gt;80</li>
      </ul>
    </li>
    <li>Mild-moderate arsenic, mercury poisoning</li>
  </ul>
</li>
<li>Advantages:
  <ul>
    <li><strong>Oral</strong> (outpatient therapy)</li>
    <li>Safer than BAL</li>
    <li>No redistribution to CNS</li>
  </ul>
</li>
<li>Adverse effects:
  <ul>
    <li>GI upset, rash</li>
    <li>Transaminitis</li>
    <li>Rotten-egg breath</li>
  </ul>
</li>
</ul>`,
hy:["<strong>Oral lead chelator</strong>","Kids with lead level 45–70","Safer than BAL (oral + no CNS redistribution)","DMSA analog of BAL"]},

{id:"ca-edta",cat:"Antidotes",ck:"ant",emoji:"💉",name:"Calcium Disodium EDTA",
oneLiner:"<strong>IV lead chelator</strong> for severe lead poisoning. Always give WITH BAL for severe pediatric lead encephalopathy.",
path:`<ul>
<li>Calcium disodium ethylenediaminetetraacetic acid</li>
<li>Mechanism:
  <ul>
    <li>Ca²⁺ in EDTA is displaced by heavy metals (especially lead)</li>
    <li>Forms stable chelate → renal excretion</li>
    <li>Must use CALCIUM EDTA (not sodium EDTA — causes fatal hypocalcemia)</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Indications:
  <ul>
    <li>Severe lead poisoning (level &gt;70 in kids)</li>
    <li>Lead encephalopathy — combine with <strong>BAL first</strong>
      <ul>
        <li>BAL given first to chelate intracellular lead</li>
        <li>Then EDTA for extracellular</li>
        <li>Prevents EDTA redistributing lead from bone to brain</li>
      </ul>
    </li>
  </ul>
</li>
<li>Adverse effects:
  <ul>
    <li>Nephrotoxicity (dose-limiting)</li>
    <li>Hypocalcemia (if wrong formulation used)</li>
  </ul>
</li>
</ul>`,
hy:["<strong>Severe lead poisoning</strong>","Always CALCIUM EDTA (never sodium EDTA)","For encephalopathy: <strong>BAL first, then EDTA</strong>","Nephrotoxic"]},

{id:"bal",cat:"Antidotes",ck:"ant",emoji:"💉",name:"Dimercaprol / BAL (British Anti-Lewisite)",
oneLiner:"<strong>IM chelator</strong> for severe heavy metal poisoning — lead, arsenic, mercury. Painful injections in peanut oil.",
path:`<ul>
<li>Dimercaprol — developed in WWII as antidote to Lewisite (arsenical chemical weapon)</li>
<li>Mechanism:
  <ul>
    <li>Thiol groups bind heavy metals</li>
    <li>Chelate excreted in urine + bile</li>
  </ul>
</li>
<li>Formulation:
  <ul>
    <li>Oil-based IM injection only</li>
    <li>Painful, smells of rotten eggs</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Indications:
  <ul>
    <li>Severe lead poisoning (with EDTA)</li>
    <li>Acute arsenic poisoning</li>
    <li>Mercury poisoning (inorganic)</li>
    <li>Wilson disease (historical)</li>
  </ul>
</li>
<li>Contraindications:
  <ul>
    <li><strong>Peanut allergy</strong> (dissolved in peanut oil)</li>
    <li>Severe hepatic dysfunction</li>
    <li>Organic mercury (methylmercury — redistributes to CNS)</li>
    <li>Iron, cadmium, selenium (forms toxic complexes)</li>
  </ul>
</li>
<li>Adverse effects:
  <ul>
    <li>Painful injection</li>
    <li>Hypertension, tachycardia</li>
    <li>Hemolysis in G6PD deficiency</li>
  </ul>
</li>
</ul>`,
hy:["<strong>IM only</strong> (peanut oil)","For severe Pb/As/Hg","Combined with EDTA for Pb encephalopathy","<strong>Peanut allergy contraindication</strong>","G6PD hemolysis risk"]},

{id:"penicillamine",cat:"Antidotes",ck:"ant",emoji:"💉",name:"Penicillamine",
oneLiner:"Oral chelator. Heavy metals + Wilson disease + cystinuria. <strong>~33% serious adverse effects</strong> — rarely used for lead now.",
path:`<ul>
<li>Thiol-containing amino acid (cysteine derivative)</li>
<li>Mechanism:
  <ul>
    <li>Chelates copper, lead, mercury, zinc</li>
    <li>Forms soluble complex → urinary excretion</li>
    <li>Also reduces cystine formation (cystinuria)</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Indications:
  <ul>
    <li>Wilson disease (copper chelation — first-line)</li>
    <li>Cystinuria (prevents kidney stones)</li>
    <li>Rheumatoid arthritis (historical)</li>
    <li>Lead poisoning (3rd-line due to toxicity)</li>
  </ul>
</li>
<li>Adverse effects (~33% of patients):
  <ul>
    <li>Nephrotoxicity (membranous nephropathy)</li>
    <li>Bone marrow suppression</li>
    <li>Drug-induced lupus / myasthenia gravis / pemphigus</li>
    <li>Skin rashes</li>
    <li>Goodpasture-like syndrome</li>
  </ul>
</li>
</ul>`,
hy:["<strong>~33% serious adverse effects</strong>","First-line for Wilson disease","Also cystinuria","Rarely used for lead now","Induces autoimmune conditions (lupus, MG)"]},

{id:"deferoxamine",cat:"Antidotes",ck:"ant",emoji:"💉",name:"Deferoxamine Mesylate (Desferal)",
oneLiner:"<strong>Iron chelator</strong>. IV/IM for acute iron poisoning. Forms <strong>ferrioxamine</strong> → urinary excretion → 'vin-rose' urine.",
path:`<ul>
<li>Hydroxamic acid chelator from Streptomyces</li>
<li>Mechanism:
  <ul>
    <li>Binds free + ferritin iron (Fe³⁺)</li>
    <li>Forms water-soluble <strong>ferrioxamine</strong> complex</li>
    <li>Renally excreted</li>
  </ul>
</li>
<li>Administered IV or IM</li>
</ul>`,
clin:`<ul>
<li>Indications:
  <ul>
    <li><strong>Acute iron poisoning</strong>
      <ul>
        <li>Kids: prenatal vitamins, iron tablets → fatal dose &lt;5 g</li>
        <li>Stage 1: GI (hematemesis, bloody diarrhea)</li>
        <li>Stage 2: latent ('honeymoon')</li>
        <li>Stage 3: shock + metabolic acidosis + hepatotoxicity</li>
        <li>Stage 4: 2–4 weeks later — pyloric stenosis from gut scarring</li>
      </ul>
    </li>
    <li>Chronic iron overload
      <ul>
        <li>Thalassemia major (chronic transfusions)</li>
      </ul>
    </li>
  </ul>
</li>
<li>Adverse effects:
  <ul>
    <li><strong>'Vin-rose' (pinkish) urine</strong> — ferrioxamine excretion</li>
    <li>Hypotension</li>
    <li>Ocular/ototoxicity (chronic use)</li>
    <li>ARDS</li>
    <li>Yersinia infection risk (Yersinia is siderophilic)</li>
  </ul>
</li>
</ul>`,
hy:["<strong>Iron poisoning antidote</strong>","<strong>'Vin-rose' urine</strong>","Stages: GI → latent → shock → pyloric stenosis","Thalassemia (chronic overload)","Yersinia infection risk"]},

{id:"flumazenil",cat:"Antidotes",ck:"ant",emoji:"💉",name:"Flumazenil (Romazicon)",
oneLiner:"<strong>Benzodiazepine reversal</strong>. Competitive GABA-A antagonist. <strong>Seizure risk in chronic users</strong>.",
path:`<ul>
<li>Competitive antagonist at the benzodiazepine site of GABA-A receptor</li>
<li>Reverses sedation but not amnesia completely</li>
<li>Short half-life (~1 hr) — may require redosing</li>
</ul>`,
clin:`<ul>
<li>Indications:
  <ul>
    <li>Acute benzodiazepine overdose (rare, limited use)</li>
    <li>Reversal of conscious sedation</li>
    <li>Pediatric accidental BZD ingestion</li>
  </ul>
</li>
<li>Contraindications / cautions:
  <ul>
    <li><strong>Chronic BZD users</strong>
      <ul>
        <li>Can precipitate <strong>seizures</strong> (withdrawal)</li>
        <li>Refractory to further BZDs (receptor blocked)</li>
      </ul>
    </li>
    <li>Mixed overdose with TCA or other proconvulsants</li>
    <li>↑ ICP</li>
  </ul>
</li>
</ul>`,
hy:["<strong>Benzodiazepine reversal</strong>","<strong>SEIZURE risk in chronic users</strong>","Rarely used (BZD overdose deaths rare, supportive care preferred)","Short half-life → redose"],
trap:"Giving flumazenil to a mixed overdose (BZD + TCA) can unmask TCA seizures + block the BZDs you'd use to treat them."},

{id:"glucagon",cat:"Antidotes",ck:"ant",emoji:"💉",name:"Glucagon",
oneLiner:"<strong>Antidote for beta-blocker overdose</strong>. Activates adenylate cyclase independently of β-receptors → ↑ cAMP → ↑ HR + contractility.",
path:`<ul>
<li>Endogenous peptide hormone from pancreatic α-cells</li>
<li>Mechanism (for β-blocker toxicity):
  <ul>
    <li>Binds glucagon receptor (Gs-coupled)</li>
    <li>Activates adenylate cyclase <strong>independently of β-receptors</strong></li>
    <li>↑ cAMP → ↑ Ca²⁺ in myocardium</li>
    <li>↑ HR, contractility, conduction</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Indications:
  <ul>
    <li><strong>β-blocker overdose with bradycardia/hypotension</strong></li>
    <li>Also useful in calcium channel blocker overdose</li>
    <li>Food impaction (esophageal relaxation)</li>
    <li>Severe hypoglycemia (endogenous effect)</li>
  </ul>
</li>
<li>Adverse effects:
  <ul>
    <li>Nausea, vomiting</li>
    <li>Hyperglycemia</li>
    <li>Hypokalemia</li>
  </ul>
</li>
</ul>`,
hy:["<strong>Beta-blocker overdose</strong>","Bypasses β-receptor blockade","↑ cAMP via Gs","Also used for CCB overdose + food impaction","Hyperglycemia + vomiting"]},

{id:"calcium",cat:"Antidotes",ck:"ant",emoji:"💉",name:"Calcium Gluconate / Chloride",
oneLiner:"<strong>Antidote for CCB overdose + hydrofluoric acid burns</strong>. Also hyperkalemia, hypocalcemia, Mg toxicity.",
path:`<ul>
<li>IV calcium salts:
  <ul>
    <li>Calcium chloride (higher Ca content — central line preferred)</li>
    <li>Calcium gluconate (peripheral access safe)</li>
  </ul>
</li>
<li>Mechanism:
  <ul>
    <li>↑ extracellular Ca²⁺ overcomes CCB-induced ↓ intracellular Ca</li>
    <li>Restores cardiac contractility + conduction</li>
    <li>For HF acid: binds free fluoride → prevents deep tissue chelation</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Indications:
  <ul>
    <li><strong>Calcium channel blocker overdose</strong></li>
    <li><strong>Hydrofluoric acid (HF) exposure</strong>
      <ul>
        <li>Topical gel, subcutaneous infiltration, or IV</li>
        <li>HF causes fluoride-induced hypocalcemia, hypomagnesemia, cardiac arrest</li>
      </ul>
    </li>
    <li>Hyperkalemia (stabilizes cardiac membrane — doesn't lower K)</li>
    <li>Severe hypocalcemia</li>
    <li>Magnesium toxicity</li>
    <li>β-blocker overdose (adjunct)</li>
  </ul>
</li>
</ul>`,
hy:["<strong>CCB overdose</strong>","<strong>Hydrofluoric acid burns</strong>","Hyperkalemia (membrane stabilizer)","HF acid: topical gel or IV","Cardiac membrane stabilization"]},

{id:"physostigmine",cat:"Antidotes",ck:"ant",emoji:"💉",name:"Physostigmine",
oneLiner:"<strong>Antidote for severe anticholinergic toxicity</strong>. Reversible AChE inhibitor that crosses BBB → reverses central anticholinergic signs.",
path:`<ul>
<li>Tertiary amine AChE inhibitor</li>
<li>Mechanism:
  <ul>
    <li>Reversibly inhibits acetylcholinesterase</li>
    <li>↑ ACh at muscarinic + nicotinic synapses</li>
    <li><strong>Crosses BBB</strong> (vs. neostigmine which doesn't)</li>
    <li>Reverses both peripheral + central anticholinergic effects</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Indications:
  <ul>
    <li>Severe anticholinergic toxicity with:
      <ul>
        <li>Agitation/delirium</li>
        <li>Hallucinations</li>
        <li>Uncontrollable seizure activity</li>
      </ul>
    </li>
    <li>Causes: jimsonweed, Datura, atropine, antipsychotics, antihistamines (diphenhydramine), TCAs (partially)</li>
  </ul>
</li>
<li>Anticholinergic toxidrome:
  <ul>
    <li>"Hot as a hare" (hyperthermia)</li>
    <li>"Dry as a bone" (dry skin/mouth)</li>
    <li>"Red as a beet" (flushed)</li>
    <li>"Blind as a bat" (mydriasis)</li>
    <li>"Mad as a hatter" (delirium)</li>
    <li>"Full as a flask" (urinary retention)</li>
  </ul>
</li>
<li>Contraindications:
  <ul>
    <li><strong>TCA overdose</strong> (may precipitate cardiac arrest, asystole)</li>
  </ul>
</li>
</ul>`,
hy:["<strong>Anticholinergic toxicity antidote</strong>","<strong>Crosses BBB</strong> (vs. neostigmine)","<strong>Hot/dry/red/blind/mad/full</strong>","<strong>Avoid in TCA overdose</strong> (cardiac arrest)","Jimsonweed, antihistamines"]},

{id:"methylene-blue",cat:"Antidotes",ck:"ant",emoji:"💉",name:"Methylene Blue",
oneLiner:"<strong>Antidote for methemoglobinemia</strong>. Reduces Fe³⁺ back to Fe²⁺ in hemoglobin via NADPH-MetHb reductase.",
path:`<ul>
<li>Redox-active dye</li>
<li>Mechanism:
  <ul>
    <li>Acts as cofactor for <strong>NADPH methemoglobin reductase</strong></li>
    <li>Methylene blue → leukomethylene blue (reduced form)</li>
    <li>Leukomethylene blue reduces Fe³⁺ (methemoglobin) → Fe²⁺ (normal Hb)</li>
    <li>Restores O₂-carrying capacity</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Indications:
  <ul>
    <li><strong>Symptomatic methemoglobinemia</strong> (MetHb &gt;20-30% or symptomatic)
      <ul>
        <li>Causes: benzocaine (dental anesthetic), dapsone, nitrates, aniline dyes, sulfonamides</li>
        <li>Classic: <strong>chocolate brown blood</strong>, cyanosis unresponsive to O₂</li>
        <li>Pulse ox reads ~85% regardless of true SaO₂</li>
      </ul>
    </li>
    <li>Urinary tract infection (historical)</li>
    <li>Ifosfamide-induced encephalopathy</li>
  </ul>
</li>
<li>Contraindications:
  <ul>
    <li><strong>G6PD deficiency</strong> (methylene blue requires NADPH → depletes → worsens hemolysis + MetHb)</li>
    <li>Concurrent serotonergic drugs (risk of serotonin syndrome — mild MAO inhibition)</li>
  </ul>
</li>
<li>Adverse effects:
  <ul>
    <li>Blue/green urine</li>
    <li>Paradoxical methemoglobinemia at high doses</li>
  </ul>
</li>
</ul>`,
hy:["<strong>Methemoglobinemia antidote</strong>","<strong>Chocolate brown blood</strong>","<strong>Avoid in G6PD deficiency</strong> (worsens hemolysis)","Benzocaine, dapsone, nitrates are common causes","Blue/green urine","Alternative if G6PD: ascorbic acid"]},

{id:"pyridoxine",cat:"Antidotes",ck:"ant",emoji:"💉",name:"Pyridoxine Hydrochloride (Vitamin B6)",
oneLiner:"<strong>Antidote for INH poisoning</strong> (seizures) + <strong>Gyromitra mushroom (monomethylhydrazine)</strong> poisoning.",
path:`<ul>
<li>Vitamin B6; cofactor in neurotransmitter synthesis (GABA, dopamine, serotonin)</li>
<li>Mechanism:
  <ul>
    <li>Isoniazid (INH) + monomethylhydrazine (MMH) deplete vit B6</li>
    <li>→ ↓ GABA synthesis → seizures</li>
    <li>Pyridoxine replenishes → restores GABA → stops seizures</li>
  </ul>
</li>
<li>Dose for INH: <strong>1g pyridoxine per 1g INH ingested</strong> (empirical if unknown: 5 g IV)</li>
</ul>`,
clin:`<ul>
<li>Indications:
  <ul>
    <li><strong>Isoniazid (INH) overdose</strong>
      <ul>
        <li>Refractory seizures</li>
        <li>Anion gap metabolic acidosis</li>
        <li>Coma</li>
      </ul>
    </li>
    <li><strong>Gyromitra mushroom poisoning</strong> (MMH toxin — false morel)
      <ul>
        <li>Seizures, hemolysis, hepatic necrosis</li>
      </ul>
    </li>
    <li>Ethylene glycol poisoning (adjunct — shunts metabolism away from oxalate)</li>
  </ul>
</li>
<li>Also used for:
  <ul>
    <li>Peripheral neuropathy prevention in TB patients on INH</li>
  </ul>
</li>
</ul>`,
hy:["<strong>INH overdose → refractory seizures</strong>","<strong>Monomethylhydrazine mushroom</strong> (Gyromitra)","Mechanism: restores GABA synthesis","Dose = 1g pyridoxine per 1g INH","Also prophylactic with INH therapy (prevents neuropathy)"]},

{id:"thiamine",cat:"Antidotes",ck:"ant",emoji:"💉",name:"Thiamine (Vitamin B1)",
oneLiner:"<strong>Prevents Wernicke encephalopathy</strong> in alcoholics. Given BEFORE glucose in alcoholics to prevent precipitation.",
path:`<ul>
<li>Vitamin B1 — cofactor for:
  <ul>
    <li>Pyruvate dehydrogenase</li>
    <li>α-ketoglutarate dehydrogenase</li>
    <li>Transketolase</li>
    <li>Branched-chain α-ketoacid dehydrogenase</li>
  </ul>
</li>
<li>Deficiency impairs glucose metabolism → neurologic damage</li>
</ul>`,
clin:`<ul>
<li>Indications:
  <ul>
    <li><strong>Wernicke encephalopathy</strong> prevention + treatment
      <ul>
        <li>Triad: <strong>ophthalmoplegia + ataxia + confusion</strong></li>
      </ul>
    </li>
    <li>Korsakoff psychosis (chronic form)</li>
    <li>Alcoholism</li>
    <li>Hyperemesis gravidarum</li>
    <li>Malnutrition, refeeding syndrome</li>
    <li>Dialysis patients</li>
    <li>Ethylene glycol poisoning (adjunct)</li>
  </ul>
</li>
<li>CRITICAL: <strong>Give thiamine BEFORE glucose</strong> in alcoholics/malnourished
  <ul>
    <li>Glucose without thiamine → precipitates Wernicke</li>
    <li>Mechanism: glucose metabolism consumes any remaining thiamine</li>
  </ul>
</li>
</ul>`,
hy:["<strong>Wernicke triad: ophthalmoplegia + ataxia + confusion</strong>","<strong>Give BEFORE glucose</strong> in alcoholics","Mamillary body hemorrhage (pathology)","Korsakoff = chronic (anterograde amnesia + confabulation)","Banana bag in ED alcoholics"]},

{id:"sodium-bicarb",cat:"Antidotes",ck:"ant",emoji:"💉",name:"Sodium Bicarbonate",
oneLiner:"<strong>Antidote for TCA cardiotoxicity</strong> (QRS widening). Also salicylate toxicity + metabolic acidosis.",
path:`<ul>
<li>Buffer / alkalinizing agent</li>
<li>Mechanisms for TCA toxicity:
  <ul>
    <li><strong>Na+ loading</strong>: overcomes TCA sodium channel blockade → narrows QRS</li>
    <li><strong>Alkalinization</strong>: reduces free (active) TCA fraction (protein binding)</li>
  </ul>
</li>
<li>For salicylates:
  <ul>
    <li>Alkalinizes urine → ion trapping → ↑ excretion</li>
    <li>Alkalinizes blood → shifts salicylate away from CNS</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Indications:
  <ul>
    <li><strong>TCA cardiotoxicity</strong>:
      <ul>
        <li>QRS widening (&gt;100 ms)</li>
        <li>Ventricular arrhythmias</li>
        <li>Hypotension</li>
      </ul>
    </li>
    <li><strong>Salicylate (aspirin) overdose</strong>:
      <ul>
        <li>Respiratory alkalosis + metabolic acidosis (mixed)</li>
        <li>Tinnitus, hyperpnea</li>
        <li>Alkalinize urine to pH &gt;7.5 for ion trapping</li>
      </ul>
    </li>
    <li>Metabolic acidosis (severe)</li>
    <li>Hyperkalemia (transient)</li>
    <li>Cocaine-induced dysrhythmias (Na channel blockade)</li>
  </ul>
</li>
</ul>`,
hy:["<strong>TCA overdose: QRS &gt;100 ms → bicarb</strong>","<strong>Salicylates: alkalinize urine</strong>","Wide-complex tachycardia in TCA","Ion trapping in urine","Mechanism: Na loading + alkalinization"]},

{id:"crofab",cat:"Antivenom / Antitoxin",ck:"avn",emoji:"🐍",name:"CroFab (Crotalidae Polyvalent Immune Fab)",

  <ul>

{id:"anavip",cat:"Antivenom / Antitoxin",ck:"avn",emoji:"🐍",name:"ANAVIP (Crotalidae Immune F(ab')2)",

    <li>Binds + neutralizes venom</li>
    <li>Longer half-life → more durable effect</li>
    <li>Less recurrent venom effects vs CroFab</li>
  </ul>
</li>
</ul>`,

  <ul>
    <li>Crotalid (pit viper) envenomation</li>
  </ul>
</li>
<li>Advantages over CroFab:
  <ul>
    <li>Longer half-life (fewer recurrent effects)</li>

  </ul>
</li>
</ul>`,
hy:["Equine F(ab')2 — longer half-life than CroFab","Less recurrent venom effect","Same indication as CroFab","Horse-derived (serum sickness risk)"]},

{id:"latrodectus",cat:"Antivenom / Antitoxin",ck:"avn",emoji:"🕷️",name:"Antivenin Latrodectus Mactans",
