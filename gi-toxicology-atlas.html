{id:"botulism-antitoxin",cat:"Antivenom / Antitoxin",ck:"avn",emoji:"🐟",name:"Botulism Antitoxin (Trivalent/Heptavalent)",
oneLiner:"<strong>Neutralizes circulating botulinum toxin</strong>. Equine-derived for adults; human BIG for infants. Contact local Health Dept or CDC.",
path:`<ul>
<li>Two products:
  <ul>
    <li><strong>Heptavalent equine antitoxin (HBAT)</strong> — adults (types A–G)</li>
    <li><strong>Botulism Immune Globulin (BIG, BabyBIG)</strong> — human-derived for infants</li>
  </ul>
</li>
<li>Mechanism:
  <ul>
    <li>Binds + neutralizes circulating (unbound) botulinum toxin</li>
    <li>Does NOT reverse already-bound toxin</li>
    <li>Halts progression of paralysis</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Indications:
  <ul>
    <li><strong>Foodborne botulism</strong> (canned foods, fermented seafood)</li>
    <li><strong>Wound botulism</strong> (IV drug users)</li>
    <li><strong>Infant botulism</strong> (honey, soil spores — use BabyBIG)</li>
    <li>Iatrogenic (cosmetic overdose)</li>
  </ul>
</li>
<li>Clinical features of botulism:
  <ul>
    <li><strong>Descending symmetric flaccid paralysis</strong></li>
    <li>Cranial nerves first (4 D's: Diplopia, Dysphagia, Dysarthria, Dyspnea)</li>
    <li>No fever, alert mental status</li>
    <li>Respiratory failure (cause of death)</li>
  </ul>
</li>
<li>Treatment:
  <ul>
    <li>Antitoxin (halts progression)</li>
    <li>Mechanical ventilation (often prolonged — weeks to months)</li>
    <li>Supportive care</li>
  </ul>
</li>
<li>How to obtain:
  <ul>
    <li>CDC Emergency Operations Center or state health department</li>
  </ul>
</li>
</ul>`,
hy:["<strong>HBAT</strong> for adults; <strong>BabyBIG</strong> for infants","Neutralizes circulating toxin only — not bound","Descending symmetric flaccid paralysis","4 D's: Diplopia, Dysphagia, Dysarthria, Dyspnea","Obtain via CDC"]},

// ═══════════════ COMMON TOXINS / POISONS ═══════════════
{id:"acetaminophen",cat:"Common Toxins / Poisons",ck:"tox",emoji:"☠️",name:"Acetaminophen",
oneLiner:"<strong>Delayed hepatotoxicity</strong>. Metabolized to toxic NAPQI via CYP2E1. Antidote: <strong>N-acetylcysteine</strong>.",
path:`<ul>
<li>Analgesic + antipyretic (APAP, paracetamol)</li>
<li>Normal metabolism:
  <ul>
    <li>~90% → glucuronidation + sulfation (safe)</li>
    <li>~5% → CYP2E1 → <strong>NAPQI</strong> (toxic) → neutralized by glutathione</li>
  </ul>
</li>
<li>Overdose mechanism:
  <ul>
    <li>Glutathione depleted → NAPQI accumulates</li>
    <li>NAPQI binds hepatocyte proteins → centrilobular necrosis</li>
  </ul>
</li>
<li>Potentiating factors:
  <ul>
    <li>Chronic alcohol (↑ CYP2E1)</li>
    <li>Fasting/malnutrition (↓ glutathione)</li>
    <li>INH, rifampin</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li><strong>Delayed symptom onset — 4 phases</strong>:
  <ul>
    <li><strong>Stage 1 (0–24h)</strong>: nausea, vomiting, malaise (often asymptomatic)</li>
    <li><strong>Stage 2 (24–72h)</strong>: RUQ pain, ↑ LFTs, ↑ PT/INR (false 'improvement')</li>
    <li><strong>Stage 3 (72–96h)</strong>: peak hepatotoxicity → fulminant hepatic failure, encephalopathy, coagulopathy</li>
    <li><strong>Stage 4 (4 days–2 wks)</strong>: recovery OR death from liver failure</li>
  </ul>
</li>
<li>Toxic dose:
  <ul>
    <li>Adults: &gt;7.5–10 g</li>
    <li>Kids: &gt;150 mg/kg</li>
  </ul>
</li>
</ul>`,
dx:`<ul>
<li>Serum acetaminophen level at 4+ hours post-ingestion</li>
<li><strong>Rumack-Matthew nomogram</strong> to guide NAC therapy</li>
<li>LFTs (AST/ALT ↑↑, can reach thousands)</li>
<li>PT/INR, bilirubin, creatinine</li>
</ul>`,
tx:`<ul>
<li><strong>N-Acetylcysteine (NAC)</strong>:
  <ul>
    <li>Most effective within 8 hours</li>
    <li>Still beneficial up to 24+ hours</li>
  </ul>
</li>
<li>Activated charcoal if within 1 hour</li>
<li>Liver transplant for fulminant failure (King's College criteria)</li>
</ul>`,
hy:["<strong>Delayed onset</strong> (phases)","NAPQI via CYP2E1","<strong>NAC is antidote</strong>","Rumack-Matthew nomogram","Chronic alcoholics + malnourished = higher risk","Centrilobular necrosis"]},

{id:"hf-acid",cat:"Common Toxins / Poisons",ck:"tox",emoji:"☠️",name:"Hydrofluoric Acid (HF)",
oneLiner:"<strong>Caustic with delayed deep-tissue destruction</strong>. Causes <strong>hypocalcemia + hypomagnesemia + hyperkalemia</strong>. Antidote: calcium (topical/IV).",
path:`<ul>
<li>Weak acid but <strong>fluoride is highly reactive</strong></li>
<li>Mechanism:
  <ul>
    <li>Fluoride penetrates deep into tissues (even through skin)</li>
    <li>Binds Ca²⁺ + Mg²⁺ → precipitation</li>
    <li><strong>Hypocalcemia, hypomagnesemia, hyperkalemia</strong></li>
    <li>Arrhythmias + sudden death</li>
  </ul>
</li>
<li>Sources:
  <ul>
    <li>Industrial (rust removers, glass etching)</li>
    <li>Petroleum refining</li>
    <li>Semiconductor manufacturing</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Delayed + progressive:
  <ul>
    <li>Initial: minimal skin changes, severe pain (often hours after exposure)</li>
    <li>Deep tissue + bone destruction</li>
    <li>Systemic: hypocalcemia (tetany, QT prolongation, arrhythmias)</li>
    <li>Hyperkalemia (cardiac arrest)</li>
  </ul>
</li>
<li>Inhalation:
  <ul>
    <li>Delayed pulmonary edema</li>
  </ul>
</li>
<li>Even small surface exposures can be fatal</li>
</ul>`,
tx:`<ul>
<li>Topical:
  <ul>
    <li><strong>Calcium gluconate gel</strong> applied to skin</li>
  </ul>
</li>
<li>Subcutaneous:
  <ul>
    <li>Infiltration of calcium gluconate</li>
  </ul>
</li>
<li>Severe/systemic:
  <ul>
    <li>IV calcium gluconate or calcium chloride</li>
    <li>Mg replacement</li>
    <li>ECG monitoring for arrhythmias</li>
  </ul>
</li>
</ul>`,
hy:["<strong>Delayed deep tissue destruction</strong>","Causes <strong>hypoCa + hypoMg + hyperK</strong>","<strong>Calcium gluconate</strong> (topical gel + IV)","Sudden cardiac death possible from small exposure","Industrial settings, glass etching"]},

{id:"ethylene-glycol",cat:"Common Toxins / Poisons",ck:"tox",emoji:"☠️",name:"Ethylene Glycol",
oneLiner:"<strong>Antifreeze</strong>. Metabolized by ADH to toxic acids. <strong>Anion gap metabolic acidosis + AKI + Ca oxalate crystals</strong>. Antidote: fomepizole.",
path:`<ul>
<li>Sweet-tasting colorless liquid (antifreeze)</li>
<li>Metabolism:
  <ul>
    <li>Ethylene glycol → (ADH) → glycoaldehyde → glycolic acid → <strong>oxalic acid</strong></li>
    <li>Oxalate + calcium → <strong>calcium oxalate crystals</strong></li>
  </ul>
</li>
<li>Tissue damage:
  <ul>
    <li>CNS depression (from parent alcohol)</li>
    <li>Metabolic acidosis (from acid metabolites)</li>
    <li>Renal failure (from Ca oxalate crystal deposition in tubules)</li>
    <li>Hypocalcemia (consumed in oxalate precipitation)</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>3 stages:
  <ul>
    <li><strong>Stage 1 (0–12h)</strong>: CNS — altered mental status, ataxia (appears 'drunk' without ethanol smell)</li>
    <li><strong>Stage 2 (12–24h)</strong>: cardiopulmonary — tachycardia, hypertension, pulmonary edema, cardiac failure</li>
    <li><strong>Stage 3 (24–72h)</strong>: renal — flank pain, AKI, anuria</li>
  </ul>
</li>
<li>Findings:
  <ul>
    <li>Anion gap metabolic acidosis</li>
    <li>Osmolar gap (early)</li>
    <li>Calcium oxalate crystals in urine (envelope-shaped or needle)</li>
    <li>Hypocalcemia</li>
    <li>Urine fluoresces under <strong>Wood's lamp</strong> (fluorescein added to antifreeze)</li>
  </ul>
</li>
</ul>`,
tx:`<ul>
<li><strong>Fomepizole</strong> (first-line) — blocks ADH</li>
<li><strong>Ethanol</strong> (2nd-line) — competes with ADH</li>
<li>Hemodialysis (severe acidosis, AKI, high levels)</li>
<li>Thiamine + pyridoxine (shunt metabolism away from oxalate)</li>
<li>Calcium replacement</li>
<li>Sodium bicarbonate for acidosis</li>
</ul>`,
hy:["<strong>Antifreeze (sweet taste)</strong>","<strong>Calcium oxalate crystals</strong> (envelope/needle shaped)","Anion gap + osmolar gap metabolic acidosis","<strong>AKI + hypocalcemia</strong>","<strong>Wood's lamp fluorescence</strong> (fluorescein in antifreeze)","Fomepizole antidote"]},

{id:"methanol",cat:"Common Toxins / Poisons",ck:"tox",emoji:"☠️",name:"Methanol",
oneLiner:"<strong>Windshield washer fluid / moonshine</strong>. Metabolized to <strong>formic acid → blindness</strong> + <strong>putaminal necrosis</strong>. Antidote: fomepizole.",
path:`<ul>
<li>'Wood alcohol' — methyl alcohol</li>
<li>Metabolism:
  <ul>
    <li>Methanol → (ADH) → formaldehyde → (ALDH) → <strong>formic acid</strong></li>
    <li>Formic acid inhibits cytochrome c oxidase → lactic acidosis</li>
    <li>Specifically toxic to retinal cells + basal ganglia (putamen)</li>
  </ul>
</li>
<li>Sources:
  <ul>
    <li>Windshield washer fluid</li>
    <li>Solid fuel (Sterno)</li>
    <li>Moonshine (improper distillation)</li>
    <li>Paint thinner</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Classic triad after latent period (12–24h):
  <ul>
    <li><strong>Visual disturbance → blindness</strong> ('snowfield' vision, optic disc pallor)</li>
    <li>Anion gap metabolic acidosis</li>
    <li>Abdominal pain</li>
  </ul>
</li>
<li>Severe: coma, seizures, cerebral edema</li>
<li>Imaging: <strong>bilateral putaminal necrosis</strong></li>
</ul>`,
tx:`<ul>
<li><strong>Fomepizole</strong> (first-line) — blocks ADH</li>
<li><strong>Ethanol</strong> (2nd-line)</li>
<li>Hemodialysis (severe)</li>
<li><strong>Folate/folinic acid</strong> — accelerates formic acid metabolism</li>
<li>Sodium bicarbonate for acidosis</li>
</ul>`,
hy:["<strong>Blindness</strong> (formic acid → retinal toxicity)","<strong>Putaminal necrosis</strong> on MRI","Anion gap metabolic acidosis","Fomepizole + folate","Wood alcohol / moonshine / washer fluid"]},

{id:"isoniazid",cat:"Common Toxins / Poisons",ck:"tox",emoji:"☠️",name:"Isoniazid (INH)",
oneLiner:"<strong>Rapid seizures + metabolic acidosis</strong>. Depletes vitamin B6 → ↓ GABA. Antidote: <strong>pyridoxine</strong>.",
path:`<ul>
<li>Anti-tuberculosis drug</li>
<li>Mechanism of toxicity:
  <ul>
    <li>INH depletes <strong>pyridoxine (vitamin B6)</strong></li>
    <li>→ ↓ GABA synthesis</li>
    <li>→ Refractory seizures</li>
    <li>Also inhibits NAD synthesis → lactic acidosis</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Classic triad (rapid onset, 30 min–2 hr):
  <ul>
    <li><strong>Refractory seizures</strong> (not responsive to benzos alone)</li>
    <li><strong>Severe anion gap metabolic acidosis</strong></li>
    <li>Coma</li>
  </ul>
</li>
<li>Other effects:
  <ul>
    <li>Hepatotoxicity (chronic use)</li>
    <li>Peripheral neuropathy (chronic use — why prophylactic pyridoxine given)</li>
    <li>Drug-induced lupus</li>
  </ul>
</li>
</ul>`,
tx:`<ul>
<li><strong>Pyridoxine (vitamin B6)</strong>:
  <ul>
    <li>1 g IV per 1 g INH ingested</li>
    <li>Empirical 5 g IV if dose unknown</li>
    <li>Can repeat until seizures controlled</li>
  </ul>
</li>
<li>Benzodiazepines (adjunct for seizures)</li>
<li>Supportive care, bicarbonate for acidosis</li>
<li>Activated charcoal (early)</li>
</ul>`,
hy:["<strong>Rapid seizures + metabolic acidosis</strong>","<strong>Pyridoxine (B6) is antidote</strong>","Dose: 1g B6 per 1g INH","Refractory to benzos alone","Also causes hepatotoxicity, peripheral neuropathy, lupus-like"]},

{id:"tca",cat:"Common Toxins / Poisons",ck:"tox",emoji:"☠️",name:"Tricyclic Antidepressants (TCAs)",
oneLiner:"<strong>Rapid cardiac + CNS toxicity</strong>. <strong>QRS widening + anticholinergic + seizures</strong>. Antidote: <strong>sodium bicarbonate</strong>.",
path:`<ul>
<li>Multiple mechanism toxicity:
  <ul>
    <li><strong>Na⁺ channel blockade</strong> (cardiac)
      <ul>
        <li>→ QRS widening, arrhythmias</li>
      </ul>
    </li>
    <li><strong>Anticholinergic</strong> (M1 blockade)
      <ul>
        <li>→ Hot/dry/red/blind/mad</li>
      </ul>
    </li>
    <li><strong>α1 blockade</strong>
      <ul>
        <li>→ Hypotension</li>
      </ul>
    </li>
    <li><strong>K⁺ channel blockade</strong>
      <ul>
        <li>→ QT prolongation, torsades</li>
      </ul>
    </li>
    <li>GABA-A antagonism → seizures</li>
    <li>Serotonin + norepinephrine reuptake inhibition (therapeutic)</li>
  </ul>
</li>
<li>Examples:
  <ul>
    <li>Amitriptyline, imipramine, desipramine, nortriptyline, doxepin, clomipramine</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Classic '3 C's' of TCA toxicity:
  <ul>
    <li><strong>Cardiac</strong>: QRS widening (&gt;100 ms), QT prolongation, arrhythmias, hypotension</li>
    <li><strong>Convulsions</strong>: seizures</li>
    <li><strong>Coma</strong> / altered mental status</li>
  </ul>
</li>
<li>Also:
  <ul>
    <li>Anticholinergic toxidrome (dry, warm, flushed, dilated pupils, urinary retention)</li>
    <li>Rightward deviation of QRS axis (R wave in aVR)</li>
  </ul>
</li>
</ul>`,
tx:`<ul>
<li><strong>Sodium bicarbonate</strong>:
  <ul>
    <li>Indication: QRS &gt;100 ms or arrhythmia</li>
    <li>Na loading + alkalinization reverses Na channel blockade</li>
  </ul>
</li>
<li>Benzodiazepines for seizures</li>
<li>IV fluids + vasopressors (norepinephrine) for hypotension</li>
<li>Activated charcoal if early</li>
<li><strong>AVOID physostigmine</strong> (precipitates cardiac arrest)</li>
<li><strong>AVOID class Ia/Ic antiarrhythmics</strong> (worsen Na blockade)</li>
</ul>`,
hy:["<strong>3 C's: Cardiac, Convulsions, Coma</strong>","<strong>QRS &gt;100 ms → give bicarbonate</strong>","Anticholinergic toxidrome","R wave in aVR (axis deviation)","<strong>AVOID physostigmine</strong> (cardiac arrest)"]},

{id:"nicotine",cat:"Common Toxins / Poisons",ck:"tox",emoji:"☠️",name:"Nicotine",
oneLiner:"<strong>Rapid cholinergic toxidrome</strong> from cigarettes, e-liquid, pesticides. Biphasic: stimulation → paralysis. Supportive care.",
path:`<ul>
<li>Nicotinic receptor agonist</li>
<li>Mechanism:
  <ul>
    <li>Initial low dose: stimulates autonomic ganglia + CNS</li>
    <li>High dose: <strong>depolarizing blockade</strong> at nicotinic receptors → paralysis</li>
    <li>Dose-dependent biphasic response</li>
  </ul>
</li>
<li>Sources:
  <ul>
    <li>Tobacco products (cigarettes, chew)</li>
    <li>E-cigarette liquid ingestion (kids — very high risk)</li>
    <li>Nicotine replacement therapy overdose</li>
    <li>Neonicotinoid pesticides</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Early (stimulation):
  <ul>
    <li>Nausea, vomiting</li>
    <li>Tachycardia, hypertension</li>
    <li>Diaphoresis, pallor</li>
    <li>Headache, agitation</li>
  </ul>
</li>
<li>Late (paralysis):
  <ul>
    <li>Bradycardia, hypotension</li>
    <li>Respiratory depression + paralysis</li>
    <li>Seizures</li>
    <li>Coma</li>
  </ul>
</li>
<li>Pediatric e-cig liquid ingestion can be fatal (concentrated)</li>
</ul>`,
tx:`<ul>
<li>Supportive care:
  <ul>
    <li>Airway management</li>
    <li>Atropine (for bradycardia, secretions)</li>
    <li>Benzos for seizures</li>
  </ul>
</li>
<li>Activated charcoal (early)</li>
<li>No specific antidote</li>
</ul>`,
hy:["<strong>Rapid biphasic toxidrome</strong>","E-cig liquid ingestion in kids (high concentration)","Stimulation → paralysis","Similar to organophosphate but shorter-lived","Supportive care"]},

{id:"co",cat:"Common Toxins / Poisons",ck:"tox",emoji:"☠️",name:"Carbon Monoxide (CO)",
oneLiner:"<strong>Inhalation toxin</strong>. Binds Hb → COHb → tissue hypoxia. <strong>Pulse ox falsely normal</strong>. Antidote: 100% O₂ or hyperbaric.",
path:`<ul>
<li>Colorless, odorless gas</li>
<li>Mechanism:
  <ul>
    <li>240× higher affinity for Hb vs O₂</li>
    <li>Forms <strong>carboxyhemoglobin (COHb)</strong></li>
    <li>Left-shifts Hb-O₂ curve (↓ O₂ release)</li>
    <li>Also inhibits cytochrome oxidase (mitochondrial hypoxia)</li>
  </ul>
</li>
<li>Sources:
  <ul>
    <li>Faulty furnaces / heaters (<strong>winter heating</strong>)</li>
    <li>House fires / smoke inhalation</li>
    <li>Gas water heaters</li>
    <li>Running cars in garages (suicide)</li>
    <li>Methylene chloride (paint stripper — metabolized to CO)</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Headache (most common)</li>
<li>Nausea, dizziness, confusion</li>
<li>Loss of consciousness, seizures</li>
<li>Tachycardia, hypotension</li>
<li><strong>Cherry-red skin</strong> (classic but unreliable/late)</li>
<li><strong>Normal pulse oximetry</strong> (measures COHb as oxyhemoglobin)</li>
<li>Delayed neuro sequelae (2–4 weeks):
  <ul>
    <li>Parkinsonism, cognitive deficits, peripheral neuropathy</li>
    <li>Caused by bilateral globus pallidus necrosis</li>
  </ul>
</li>
</ul>`,
dx:`<ul>
<li><strong>Direct COHb measurement</strong> (co-oximetry, arterial or venous)</li>
<li>Pulse ox is FALSELY normal — don't rely on it</li>
<li>ECG: ischemic changes possible</li>
</ul>`,
tx:`<ul>
<li><strong>100% O₂</strong> via non-rebreather (reduces COHb t½ from 5 hr → 1 hr)</li>
<li><strong>Hyperbaric oxygen (HBO)</strong> for:
  <ul>
    <li>COHb &gt;25% (&gt;15% pregnancy)</li>
    <li>Loss of consciousness, seizures</li>
    <li>Neurologic symptoms</li>
    <li>Ischemic ECG changes</li>
    <li>Persistent symptoms despite 100% NRB</li>
    <li>Pregnancy (fetal Hb binds CO more avidly)</li>
  </ul>
</li>
</ul>`,
hy:["<strong>Winter heating / fire</strong>","<strong>Pulse ox falsely normal</strong> → check COHb","100% O₂ → hyperbaric if severe","Pregnancy = lower threshold (fetal Hb)","Delayed neuro sequelae","Cherry-red (unreliable)"]},

{id:"lead",cat:"Common Toxins / Poisons",ck:"tox",emoji:"☠️",name:"Lead",
oneLiner:"<strong>Heavy metal — neuro + heme</strong>. Kids: paint chips, developing brain. <strong>Basophilic stippling + microcytic anemia</strong>. Chelate: DMSA/EDTA/BAL.",
path:`<ul>
<li>Multi-mechanism toxin:
  <ul>
    <li>Inhibits <strong>ALA dehydratase + ferrochelatase</strong> (heme synthesis)
      <ul>
        <li>→ ↑ protoporphyrin, ↑ ALA</li>
        <li>→ <strong>Microcytic hypochromic anemia</strong></li>
      </ul>
    </li>
    <li>Inhibits ribosomal rRNA degradation → <strong>basophilic stippling</strong> in RBCs</li>
    <li>Displaces Ca²⁺ in neurons → encephalopathy</li>
    <li>Nephrotoxicity (Fanconi syndrome)</li>
  </ul>
</li>
<li>Sources:
  <ul>
    <li><strong>Kids</strong>: old paint chips (pre-1978), lead-contaminated water, toys, imported pottery</li>
    <li><strong>Adults</strong>: occupational (battery, smelter, ceramic, stained glass)</li>
    <li>Moonshine (lead piping)</li>
    <li>Hunting ammunition</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Kids:
  <ul>
    <li>Developmental delay, cognitive deficits (IRREVERSIBLE)</li>
    <li>Behavioral problems, ADHD-like</li>
    <li>Abdominal pain, constipation</li>
    <li>Anemia</li>
  </ul>
</li>
<li>Adults:
  <ul>
    <li>Abdominal colic, constipation</li>
    <li>Wrist/foot drop (peripheral neuropathy)</li>
    <li>Anemia, lead lines on teeth/gums (<strong>Burton lines</strong>)</li>
    <li>Renal dysfunction, gout ('saturnine gout')</li>
    <li>Memory loss, headache</li>
  </ul>
</li>
<li>Imaging:
  <ul>
    <li><strong>Lead lines in long bones</strong> (metaphyseal)</li>
    <li>Radiopaque GI contents (ingested chips)</li>
  </ul>
</li>
</ul>`,
dx:`<ul>
<li>Blood lead level (BLL)</li>
<li>Peripheral smear: <strong>basophilic stippling</strong> + microcytic anemia</li>
<li>↑ Free erythrocyte protoporphyrin (FEP)</li>
<li>↑ Urinary ALA (δ-aminolevulinic acid)</li>
<li>Reduced ALA dehydratase activity</li>
</ul>`,
tx:`<ul>
<li>Asymptomatic &lt;45 μg/dL: remove exposure, nutritional support</li>
<li>BLL 45–70 in kids: <strong>Succimer (DMSA)</strong> PO</li>
<li>BLL &gt;70 or encephalopathy:
  <ul>
    <li><strong>BAL first</strong>, then <strong>CaNa₂EDTA</strong></li>
  </ul>
</li>
<li>Remove child from environment (most important)</li>
</ul>`,
hy:["<strong>Basophilic stippling</strong> on blood smear","<strong>Microcytic anemia</strong>","Kids: paint chips, cognitive deficits","Adults: wrist drop, Burton lines","<strong>BAL first, then EDTA</strong> for encephalopathy","DMSA for moderate pediatric","ALA dehydratase + ferrochelatase inhibition"]},

{id:"op-np",cat:"Common Toxins / Poisons",ck:"tox",emoji:"☠️",name:"Organophosphates / Nerve Agents",
oneLiner:"<strong>Cholinergic toxidrome</strong> (DUMBELS / SLUDGE). Pesticides + chemical weapons. Antidotes: <strong>atropine + pralidoxime</strong>.",
path:`<ul>
<li>Mechanism:
  <ul>
    <li><strong>Irreversibly inhibit acetylcholinesterase (AChE)</strong></li>
    <li>Excess ACh at muscarinic + nicotinic synapses</li>
    <li><strong>'Aging'</strong>: covalent AChE-OP bond becomes permanent
      <ul>
        <li>Soman + Novichok: aging in minutes</li>
        <li>Malathion: aging in hours-days</li>
      </ul>
    </li>
  </ul>
</li>
<li>Sources:
  <ul>
    <li>Pesticides (malathion, parathion, diazinon, chlorpyrifos)</li>
    <li>Chemical warfare (sarin, VX, soman, Novichok)</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li><strong>Muscarinic (DUMBELS / SLUDGE)</strong>:
  <ul>
    <li><strong>D</strong>efecation, <strong>U</strong>rination, <strong>M</strong>iosis, <strong>B</strong>ronchorrhea/Bronchospasm, <strong>E</strong>mesis, <strong>L</strong>acrimation, <strong>S</strong>alivation</li>
    <li>Bradycardia, hypotension</li>
  </ul>
</li>
<li><strong>Nicotinic</strong>:
  <ul>
    <li><strong>Fasciculations</strong>, muscle weakness, paralysis</li>
    <li>Hypertension, tachycardia</li>
  </ul>
</li>
<li><strong>CNS</strong>:
  <ul>
    <li>Altered mental status, seizures, coma</li>
  </ul>
</li>
<li>Cause of death: respiratory failure (bronchorrhea + paralysis)</li>
</ul>`,
dx:`<ul>
<li>Clinical (cholinergic toxidrome + exposure)</li>
<li>RBC acetylcholinesterase activity (depressed)</li>
<li>Plasma butyrylcholinesterase (less specific)</li>
</ul>`,
tx:`<ul>
<li><strong>Atropine</strong>: reverses muscarinic effects
  <ul>
    <li>Titrate to drying of secretions (not HR)</li>
    <li>May require huge doses</li>
  </ul>
</li>
<li><strong>Pralidoxime (2-PAM)</strong>: reactivates AChE
  <ul>
    <li>Give before aging</li>
    <li>Reverses nicotinic effects (fasciculations/paralysis)</li>
  </ul>
</li>
<li><strong>Benzodiazepines</strong>: for seizures</li>
<li>Respiratory support / intubation</li>
<li>Decontamination (skin, GI)</li>
</ul>`,
hy:["<strong>Muscarinic: DUMBELS</strong>","<strong>Nicotinic: fasciculations + paralysis</strong>","<strong>Atropine + pralidoxime + benzos</strong>","Pralidoxime before aging","Titrate atropine to secretion dryness","Novichok = fast aging"]},

{id:"digoxin",cat:"Common Toxins / Poisons",ck:"tox",emoji:"☠️",name:"Digoxin",
oneLiner:"<strong>Cardiac glycoside</strong>. Blocks Na/K ATPase. <strong>Yellow-green halos + hyperkalemia + any arrhythmia</strong>. Antidote: Dig-Fab.",
path:`<ul>
<li>Cardiac glycoside (foxglove — Digitalis purpurea)</li>
<li>Mechanism:
  <ul>
    <li>Inhibits cardiac Na/K ATPase</li>
    <li>↑ Intracellular Na → ↓ Na/Ca exchanger activity → ↑ intracellular Ca</li>
    <li>↑ Contractility (inotropy)</li>
    <li>Also ↑ vagal tone → ↓ AV node conduction</li>
    <li>At toxic levels: ectopy + blocks</li>
  </ul>
</li>
<li>Precipitants of toxicity:
  <ul>
    <li><strong>Hypokalemia</strong> (K competes with dig at ATPase — less K = more dig binding)</li>
    <li>Renal failure (digoxin is renally cleared)</li>
    <li>Hypomagnesemia, hypercalcemia</li>
    <li>Drug interactions:
      <ul>
        <li>Amiodarone, verapamil, quinidine, macrolides — ↑ dig levels</li>
      </ul>
    </li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>GI: nausea, vomiting, diarrhea</li>
<li>CNS: confusion, weakness, fatigue</li>
<li><strong>Visual</strong>: <strong>yellow-green halos (xanthopsia)</strong> — Van Gogh painting theory</li>
<li>Cardiac:
  <ul>
    <li>Any arrhythmia possible (especially bidirectional VT)</li>
    <li>Bradyarrhythmias, AV blocks</li>
    <li>Premature contractions</li>
  </ul>
</li>
<li><strong>Hyperkalemia</strong> (blocked Na/K ATPase) — bad prognostic sign</li>
</ul>`,
tx:`<ul>
<li><strong>Digoxin Immune Fab</strong> (Dig-Fab):
  <ul>
    <li>Life-threatening arrhythmia</li>
    <li>K &gt;5.0 with toxicity</li>
    <li>End-organ dysfunction</li>
    <li>Acute ingestion &gt;10 mg adult / &gt;4 mg child</li>
  </ul>
</li>
<li>Correct electrolytes:
  <ul>
    <li>Avoid Ca (worsens toxicity — 'stone heart')</li>
    <li>Repleted K judiciously</li>
    <li>Mg replacement</li>
  </ul>
</li>
<li>Atropine for bradycardia</li>
</ul>`,
hy:["<strong>Yellow-green halos</strong> (Van Gogh)","<strong>Hyperkalemia</strong> = bad sign (block of Na/K ATPase)","<strong>Hypokalemia</strong> PRECIPITATES toxicity","<strong>Dig-Fab</strong> antidote","AVOID calcium (stone heart)","Narrow therapeutic window"]},

{id:"iron",cat:"Common Toxins / Poisons",ck:"tox",emoji:"☠️",name:"Iron (Ferrous Salts)",
oneLiner:"<strong>Peds GI/metabolic toxin</strong>. Iron-containing vitamins = #1 fatal pediatric ingestion historically. Antidote: <strong>deferoxamine</strong>.",
path:`<ul>
<li>Transition metal — free iron is highly reactive</li>
<li>Mechanism:
  <ul>
    <li>Direct corrosive effect on GI mucosa</li>
    <li>Mitochondrial dysfunction → metabolic acidosis</li>
    <li>Free radical damage to hepatocytes + cardiac tissue</li>
    <li>Vasodilation + hypovolemia → shock</li>
  </ul>
</li>
<li>Sources:
  <ul>
    <li>Prenatal vitamins (high-dose iron)</li>
    <li>Adult iron supplements</li>
    <li>Bright colored 'candy-like' tablets attractive to kids</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Five classic stages:
  <ul>
    <li><strong>Stage 1 (0–6h)</strong>: GI — vomiting, bloody diarrhea, abdominal pain</li>
    <li><strong>Stage 2 (6–24h)</strong>: <strong>'Latent/honeymoon'</strong> — apparent improvement (deceptive)</li>
    <li><strong>Stage 3 (6–72h)</strong>: Systemic — shock, metabolic acidosis, coagulopathy, hepatotoxicity</li>
    <li><strong>Stage 4 (2–5 days)</strong>: Hepatic — fulminant liver failure</li>
    <li><strong>Stage 5 (2–8 weeks)</strong>: <strong>Pyloric/intestinal stenosis</strong> from scarring</li>
  </ul>
</li>
<li>Lab findings:
  <ul>
    <li>Anion gap metabolic acidosis</li>
    <li>Hyperglycemia</li>
    <li>Leukocytosis</li>
    <li>↑ serum iron level</li>
  </ul>
</li>
</ul>`,
tx:`<ul>
<li>Supportive care</li>
<li>Bowel decontamination:
  <ul>
    <li><strong>Whole bowel irrigation with PEG</strong> (iron radiopaque on AXR)</li>
    <li>Activated charcoal does NOT bind iron</li>
  </ul>
</li>
<li><strong>Deferoxamine</strong>:
  <ul>
    <li>For serum iron &gt;500 mg/dL, severe symptoms, metabolic acidosis, shock</li>
    <li>'Vin-rose' urine = marker of chelation</li>
  </ul>
</li>
<li>Blood transfusion, liver transplant if fulminant failure</li>
</ul>`,
hy:["<strong>5 stages</strong>: GI → honeymoon → shock/acidosis → liver failure → pyloric stenosis","Iron NOT bound by activated charcoal","<strong>Whole bowel irrigation</strong> for visible tablets","<strong>Deferoxamine</strong> antidote — vin-rose urine","Iron + Yersinia siderophilia"]},

{id:"aspirin",cat:"Common Toxins / Poisons",ck:"tox",emoji:"☠️",name:"Aspirin / Salicylates",
oneLiner:"<strong>Respiratory alkalosis + anion gap metabolic acidosis</strong>. Tinnitus, hyperpnea, hyperthermia. Antidote: alkalinize urine + hemodialysis.",
path:`<ul>
<li>Salicylic acid derivative</li>
<li>Mechanism of toxicity:
  <ul>
    <li><strong>Uncouples oxidative phosphorylation</strong> → ↑ heat, ↑ CO₂</li>
    <li><strong>Directly stimulates respiratory center</strong> → hyperventilation → respiratory alkalosis</li>
    <li>Impairs Krebs cycle → <strong>lactic acidosis</strong></li>
    <li>Ketoacidosis (from accumulated organic acids)</li>
  </ul>
</li>
<li>Sources:
  <ul>
    <li>Aspirin</li>
    <li>Pepto-Bismol (bismuth subsalicylate)</li>
    <li>Topical salicylate (methyl salicylate, oil of wintergreen — very concentrated)</li>
    <li>Alka-Seltzer</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Classic presentation:
  <ul>
    <li><strong>Tinnitus</strong> (early sign)</li>
    <li>Hyperventilation, hyperpnea (Kussmaul)</li>
    <li>Hyperthermia</li>
    <li>Nausea, vomiting</li>
    <li>Altered mental status, seizures (severe)</li>
  </ul>
</li>
<li>ABG:
  <ul>
    <li>Early: <strong>respiratory alkalosis</strong></li>
    <li>Later: mixed <strong>respiratory alkalosis + anion gap metabolic acidosis</strong></li>
    <li>Late: pure anion gap metabolic acidosis (poor prognostic)</li>
  </ul>
</li>
<li>Complications:
  <ul>
    <li>Non-cardiogenic pulmonary edema</li>
    <li>Cerebral edema</li>
    <li>Coagulopathy</li>
  </ul>
</li>
</ul>`,
tx:`<ul>
<li><strong>Sodium bicarbonate</strong>:
  <ul>
    <li>Alkalinize urine (pH &gt;7.5) → <strong>ion trapping</strong> → ↑ renal excretion</li>
    <li>Alkalinize blood → shifts salicylate out of CNS</li>
  </ul>
</li>
<li>IV fluids, glucose</li>
<li><strong>Hemodialysis</strong> for:
  <ul>
    <li>Severe acidosis</li>
    <li>Renal failure</li>
    <li>Altered mental status</li>
    <li>Pulmonary edema</li>
    <li>Level &gt;100 mg/dL acute or &gt;60 chronic</li>
  </ul>
</li>
<li>Activated charcoal (early, multi-dose)</li>
</ul>`,
hy:["<strong>Tinnitus</strong> (early)","<strong>Respiratory alkalosis + anion gap metabolic acidosis</strong>","<strong>Alkalinize urine</strong> for ion trapping","Hemodialysis for severe","Pulmonary + cerebral edema","Oil of wintergreen = highly concentrated"]},

{id:"cold-preps",cat:"Common Toxins / Poisons",ck:"tox",emoji:"☠️",name:"Cough & Cold Preparations",
oneLiner:"Multi-ingredient OTC products. Often contain: <strong>acetaminophen + dextromethorphan + pseudoephedrine + antihistamine</strong>. Overlapping toxicities.",
path:`<ul>
<li>Common combinations:
  <ul>
    <li><strong>Acetaminophen</strong> — hepatotoxicity</li>
    <li><strong>Dextromethorphan</strong> — dissociative, serotonergic</li>
    <li><strong>Pseudoephedrine</strong> — α/β adrenergic (HTN, tachycardia)</li>
    <li><strong>Diphenhydramine / chlorpheniramine</strong> — anticholinergic + antihistamine</li>
    <li>Guaifenesin — expectorant (minimal toxicity)</li>
  </ul>
</li>
<li>Risk factors:
  <ul>
    <li>Inadvertent overdose in kids from multiple products</li>
    <li>Abuse (DXM for hallucinations, pseudoephedrine for meth precursor)</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Depends on dominant ingredient:
  <ul>
    <li>Mixed picture — anticholinergic + sympathomimetic + CNS</li>
    <li>Delayed hepatotoxicity (APAP)</li>
  </ul>
</li>
<li>FDA recommends against OTC cough/cold in kids &lt;6 (inefficacy + toxicity)</li>
</ul>`,
tx:`<ul>
<li>Identify all ingredients</li>
<li>Check APAP level → NAC if indicated</li>
<li>Supportive care based on toxidrome</li>
</ul>`,
hy:["Multi-ingredient = multi-toxidrome","<strong>Check APAP level always</strong>","Kids &lt;6: don't give OTC cough/cold","DXM abuse → dissociation","Pseudoephedrine = meth precursor"]},

{id:"ethanol",cat:"Common Toxins / Poisons",ck:"tox",emoji:"☠️",name:"Ethanol",
oneLiner:"<strong>Most common ingested toxin</strong>. CNS depressant. <strong>Give thiamine before glucose</strong> in chronic alcoholics.",
path:`<ul>
<li>Mechanism:
  <ul>
    <li>GABA-A agonist + NMDA antagonist</li>
    <li>Metabolism: ADH → acetaldehyde → ALDH → acetate</li>
  </ul>
</li>
<li>Unique toxicities:
  <ul>
    <li>Chronic: Wernicke (thiamine def), cirrhosis, cardiomyopathy, pancreatitis</li>
    <li>Acute: CNS depression, hypoglycemia, aspiration</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Acute intoxication:
  <ul>
    <li>Slurred speech, ataxia, nystagmus</li>
    <li>Altered mental status, stupor, coma</li>
    <li>Respiratory depression (severe)</li>
    <li>Hypoglycemia (especially kids, chronic alcoholics)</li>
  </ul>
</li>
<li>Withdrawal:
  <ul>
    <li>Tremor, anxiety (6-24h)</li>
    <li>Seizures (24-48h)</li>
    <li>Delirium tremens (48-96h) — autonomic hyperactivity, hallucinations</li>
  </ul>
</li>
<li>Wernicke-Korsakoff:
  <ul>
    <li>Thiamine deficiency</li>
    <li>Triad: ataxia, ophthalmoplegia, confusion</li>
  </ul>
</li>
</ul>`,
tx:`<ul>
<li>Supportive care, airway protection</li>
<li><strong>Thiamine BEFORE glucose</strong> (chronic alcoholics/malnourished)
  <ul>
    <li>Prevents precipitating Wernicke encephalopathy</li>
  </ul>
</li>
<li>Glucose (if hypoglycemic)</li>
<li>Benzodiazepines for withdrawal</li>
<li>IV fluids</li>
</ul>`,
hy:["<strong>Thiamine BEFORE glucose</strong>","<strong>Wernicke triad</strong>: ataxia, ophthalmoplegia, confusion","Withdrawal: shakes → seizures → DTs","Hypoglycemia risk (kids, chronic)","Fomepizole/ethanol = antidote for methanol/EG (ethanol is ITSELF an antidote here)"]},

{id:"ccb",cat:"Common Toxins / Poisons",ck:"tox",emoji:"☠️",name:"Calcium Channel Blockers (CCBs)",
oneLiner:"<strong>Bradycardia + hypotension + hyperglycemia</strong>. Especially non-dihydropyridines (verapamil, diltiazem). Antidote: Ca, glucagon, insulin/glucose.",
path:`<ul>
<li>Two classes:
  <ul>
    <li><strong>Non-dihydropyridines</strong> (verapamil, diltiazem): cardiac &gt; vascular → bradycardia, AV block</li>
    <li><strong>Dihydropyridines</strong> (nifedipine, amlodipine): vascular &gt; cardiac → hypotension with reflex tachycardia</li>
  </ul>
</li>
<li>Mechanism:
  <ul>
    <li>Block L-type Ca²⁺ channels</li>
    <li>↓ Ca²⁺ entry → ↓ cardiac contractility + ↓ vascular tone</li>
    <li>Also ↓ pancreatic insulin release → <strong>hyperglycemia</strong></li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Bradycardia, AV blocks</li>
<li>Hypotension (often refractory)</li>
<li><strong>Hyperglycemia</strong> (marker of toxicity)</li>
<li>Altered mental status</li>
<li>Cardiogenic shock</li>
</ul>`,
tx:`<ul>
<li><strong>Calcium gluconate / chloride</strong>:
  <ul>
    <li>First-line</li>
    <li>High doses (more than CCB-induced block)</li>
  </ul>
</li>
<li><strong>Glucagon</strong>:
  <ul>
    <li>Bypasses Ca → ↑ cAMP → ↑ contractility</li>
  </ul>
</li>
<li><strong>High-dose insulin + glucose (HIET)</strong>:
  <ul>
    <li>Provides myocardial glucose utilization</li>
    <li>Inotropic effect</li>
  </ul>
</li>
<li>Vasopressors (norepinephrine)</li>
<li>Intralipid (lipid emulsion) for severe cases</li>
<li>Atropine (minimal effect)</li>
<li>Extracorporeal life support (ECMO) in extreme cases</li>
</ul>`,
hy:["<strong>Bradycardia + hypotension + HYPERGLYCEMIA</strong>","Verapamil/diltiazem = cardiotoxic","<strong>Calcium + glucagon + HIET</strong>","Hyperglycemia distinguishes from β-blocker toxicity (β-blockers → hypoglycemia)"]},

{id:"diphenhydramine-tox",cat:"Common Toxins / Poisons",ck:"tox",emoji:"☠️",name:"Diphenhydramine (Anticholinergic Toxidrome)",
oneLiner:"Classic <strong>anticholinergic toxidrome example</strong>. Hot/dry/red/blind/mad/full. Antidote: <strong>physostigmine</strong> (in pure anticholinergic only).",
path:`<ul>
<li>H1 antihistamine with strong anticholinergic activity</li>
<li>Mechanism:
  <ul>
    <li>Blocks muscarinic receptors</li>
    <li>Crosses BBB (first-gen H1)</li>
    <li>Also: Na+ channel blockade (cardiac) at high doses</li>
  </ul>
</li>
<li>Sources:
  <ul>
    <li>Benadryl (allergies)</li>
    <li>Sleep aids (Tylenol PM, ZzzQuil)</li>
    <li>Cold preparations</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Classic <strong>anticholinergic toxidrome</strong>:
  <ul>
    <li><strong>"Hot as a hare"</strong>: hyperthermia</li>
    <li><strong>"Dry as a bone"</strong>: dry skin + mucous membranes</li>
    <li><strong>"Red as a beet"</strong>: flushed</li>
    <li><strong>"Blind as a bat"</strong>: mydriasis, blurred vision</li>
    <li><strong>"Mad as a hatter"</strong>: delirium, hallucinations</li>
    <li><strong>"Full as a flask"</strong>: urinary retention</li>
  </ul>
</li>
<li>Other:
  <ul>
    <li>Tachycardia</li>
    <li>Decreased bowel sounds</li>
    <li>Seizures (high dose)</li>
    <li>Wide-complex dysrhythmias (Na channel blockade)</li>
  </ul>
</li>
</ul>`,
tx:`<ul>
<li>Supportive care</li>
<li>Activated charcoal (early)</li>
<li>Benzos for agitation/seizures</li>
<li><strong>Physostigmine</strong>:
  <ul>
    <li>For pure anticholinergic with severe delirium/seizures</li>
    <li>AVOID if QRS widening (cardiac — Na channel blockade present → asystole risk)</li>
  </ul>
</li>
<li>Sodium bicarbonate for wide-complex rhythms</li>
</ul>`,
hy:["Anticholinergic toxidrome","<strong>'Hot/dry/red/blind/mad/full'</strong>","<strong>Physostigmine</strong> for pure anticholinergic","AVOID physostigmine if QRS wide","Sleep aids contain diphenhydramine"]},

{id:"heroin",cat:"Common Toxins / Poisons",ck:"tox",emoji:"☠️",name:"Heroin / Opioids (Narcotic Toxidrome)",
oneLiner:"<strong>Pinpoint pupils + respiratory depression + decreased LOC</strong>. Antidote: <strong>naloxone</strong>.",
path:`<ul>
<li>Opioid agonists at μ receptor</li>
<li>Heroin = diacetylmorphine → rapid BBB crossing → rapid high</li>
<li>Fentanyl = ~100× more potent than morphine, main cause of overdose deaths</li>
</ul>`,
clin:`<ul>
<li>Classic <strong>opioid toxidrome</strong>:
  <ul>
    <li><strong>Pinpoint pupils (miosis)</strong></li>
    <li><strong>Respiratory depression</strong> (cause of death)</li>
    <li>Decreased LOC / coma</li>
    <li>Hypothermia</li>
    <li>Hyporeflexia</li>
  </ul>
</li>
<li>Complications:
  <ul>
    <li>Aspiration pneumonia</li>
    <li>Non-cardiogenic pulmonary edema</li>
    <li>Hypoxic brain injury</li>
    <li>Cellulitis / abscess / endocarditis (IVDU)</li>
  </ul>
</li>
</ul>`,
tx:`<ul>
<li><strong>Naloxone</strong>:
  <ul>
    <li>IN (most common pre-hospital)</li>
    <li>IV titrate to respiratory effort</li>
    <li>May require repeat doses or drip (esp. for fentanyl, methadone)</li>
  </ul>
</li>
<li>Airway management, BVM ventilation</li>
<li>Monitor for re-sedation</li>
</ul>`,
hy:["<strong>Pinpoint pupils + respiratory depression + ↓LOC</strong>","<strong>Naloxone</strong> antidote","<strong>Fentanyl</strong> = main fatality driver","May require <strong>naloxone drip</strong> for long-acting opioids","Toxidrome: pinpoint, slow, cold"]},

{id:"caffeine",cat:"Common Toxins / Poisons",ck:"tox",emoji:"☠️",name:"Caffeine (Sympathomimetic Toxidrome)",
oneLiner:"<strong>Sympathomimetic toxidrome</strong> example. Tachycardia, HTN, agitation, tremor. Supportive care.",
path:`<ul>
<li>Mechanism:
  <ul>
    <li>Adenosine receptor antagonism (A1, A2)</li>
    <li>Phosphodiesterase inhibition → ↑ cAMP</li>
    <li>Indirect catecholamine release</li>
  </ul>
</li>
<li>Sources:
  <ul>
    <li>Coffee, tea, soft drinks (moderate doses)</li>
    <li>Energy drinks (high concentration)</li>
    <li>Caffeine pills (NoDoz)</li>
    <li>Powdered caffeine (can be lethal)</li>
    <li>Pre-workout supplements</li>
  </ul>
</li>
</ul>`,
clin:`<ul>
<li>Classic <strong>sympathomimetic toxidrome</strong>:
  <ul>
    <li>Tachycardia</li>
    <li>Hypertension</li>
    <li>Diaphoresis</li>
    <li>Mydriasis</li>
    <li>Hyperthermia</li>
    <li>Agitation, tremor, anxiety</li>
  </ul>
</li>
<li>Severe:
  <ul>
    <li>Seizures</li>
    <li>Ventricular arrhythmias</li>
    <li>Hypokalemia, hypophosphatemia</li>
    <li>Rhabdomyolysis</li>
  </ul>
</li>
</ul>`,
tx:`<ul>
<li>Supportive care</li>
<li>Benzodiazepines for agitation + tachycardia</li>

<li>β-blockers for severe tachycardia/HTN (but cautious if coexisting sympathomimetic with α-agonism)</li>

</ul>`,
hy:["<strong>Sympathomimetic toxidrome</strong>","Similar to cocaine/amphetamine but milder","Powdered caffeine can be lethal","Contrast with anticholinergic: anticholinergic has DRY skin; sympathomimetic has DIAPHORESIS"]},

{id:"dabigatran",cat:"Common Toxins / Poisons",ck:"tox",emoji:"☠️",name:"Dabigatran",
oneLiner:"Direct thrombin inhibitor (DOAC). Anticoagulant. Reversed by <strong>idarucizumab</strong>.",
path:`<ul>
<li>Direct thrombin (Factor IIa) inhibitor</li>
<li>Renally cleared (contrast with Xa inhibitors)</li>
<li>Used for: AF stroke prevention, DVT/PE treatment</li>
</ul>`,
clin:`<ul>
<li>Bleeding complications:

const state={currentId:null,learned:new Set(),search:"",collapsed:new Set()};
function wrapContent(s){if(!s)return"";const t=s.trim();if(t.startsWith("<ul>")||t.startsWith("<ol>"))return t;return"<p>"+t+"</p>";}
function groupByCategory(){
  const map={};
  DISEASES.forEach(d=>{
    if(!map[d.cat])map[d.cat]={key:d.ck,emoji:d.emoji,items:[]};
    map[d.cat].items.push(d);
  });
  return map;
}
function getVisibleDiseases(){
  const q=state.search.toLowerCase().trim();
  if(!q)return DISEASES;
  return DISEASES.filter(d=>{
    const hay=(d.name+" "+d.cat+" "+d.oneLiner+" "+(d.path||"")+" "+(d.clin||"")+" "+(d.dx||"")+" "+(d.tx||"")+" "+(d.hy||[]).join(" ")+" "+(d.mn||"")+" "+(d.trap||"")).toLowerCase();
    return hay.includes(q);
  });
}
function renderSidebar(){
  const visible=getVisibleDiseases();
  const visibleIds=new Set(visible.map(d=>d.id));
  const groups=groupByCategory();
  const list=document.getElementById("sbList");
  let html=`<div class="sb-home ${state.currentId===null?"active":""}" onclick="goHome()">🏠 Home</div>`;
  Object.entries(groups).forEach(([cat,info])=>{
    const visibleItems=info.items.filter(d=>visibleIds.has(d.id));
    if(!visibleItems.length)return;
    const collapsed=state.collapsed.has(cat)&&!state.search;
    html+=`<div class="cat-group ${collapsed?"collapsed":""}" data-cat="${cat}"><div class="cat-header" onclick="toggleCat('${cat.replace(/'/g,"\\'")}')"><span class="cat-chevron">▼</span><span>${info.emoji} ${cat}</span><span class="cat-count">${visibleItems.length}</span></div><div class="cat-list">`;
    visibleItems.forEach(d=>{
      const active=state.currentId===d.id;
      const learned=state.learned.has(d.id);
      html+=`<div class="dz-item ${active?"active":""} ${learned?"learned":""}" data-id="${d.id}" onclick="selectDisease('${d.id}')"><span class="dz-check">${learned?"✓":"○"}</span><span class="dz-name">${d.name}</span></div>`;
    });
    html+=`</div></div>`;
  });
  list.innerHTML=html||`<div class="empty" style="padding:30px 14px">No matches.</div>`;
}
function toggleCat(cat){
  if(state.collapsed.has(cat))state.collapsed.delete(cat);
  else state.collapsed.add(cat);
  renderSidebar();
}
function renderHomepage(){
  const content=document.getElementById("content");
  const groups=groupByCategory();
  let catCardsHtml="";
  Object.entries(groups).forEach(([cat,info])=>{
    catCardsHtml+=`<div class="home-cat"><div class="home-cat-title">${info.emoji} ${cat} <span class="home-cat-count">${info.items.length}</span></div><div class="home-dz-list">${info.items.map(d=>{const learned=state.learned.has(d.id);return `<div class="home-dz ${learned?"learned":""}" onclick="selectDisease('${d.id}')"><span class="home-check">${learned?"✓":"○"}</span><span>${d.name}</span></div>`;}).join("")}</div></div>`;
  });
  content.innerHTML=`<div class="content-inner"><div class="home-hero"><div class="home-brand">HoyaDocs · Block 4 GI</div><h1 class="home-title">Welcome to the GI Toxicology Atlas</h1><p class="home-sub">An interactive USMLE Step 1 reference for 69 decontamination agents, antidotes, antivenoms, and common toxins — mechanisms, toxidromes, diagnosis, and treatment.</p><button class="home-start" onclick="selectDisease('activated-charcoal')">Start with Activated Charcoal →</button></div><h2 class="home-section-title">Browse All Agents</h2><p style="font-size:13.5px;color:#6b7b6c;margin-bottom:18px;font-style:italic;">Click any agent to open it. Use the sidebar to search or navigate by category. Use ← → arrow keys to move between agents and Space to mark as learned.</p><div class="home-grid">${catCardsHtml}</div></div>`;
  document.getElementById("content").scrollTo(0,0);
}
function renderContent(){
  if(state.currentId===null){renderHomepage();return;}
  const content=document.getElementById("content");
  const d=DISEASES.find(x=>x.id===state.currentId);
  if(!d){content.innerHTML='<div class="empty">Not found.</div>';return;}
  const learned=state.learned.has(d.id);
  const visible=getVisibleDiseases();
  const idx=visible.findIndex(x=>x.id===d.id);
  const prev=idx>0?visible[idx-1]:null;
  const next=idx<visible.length-1?visible[idx+1]:null;
  content.innerHTML=`<div class="content-inner"><div class="dz-entry"><div class="cat-label"><span class="cat-dot"></span>${d.emoji} ${d.cat}</div><h2 class="dz-title">${d.name}</h2><div class="dz-oneliner">${d.oneLiner}</div>${d.path?`<div class="sec"><h3>🔬 Mechanism / Chemistry</h3>${wrapContent(d.path)}</div>`:""}${d.clin?`<div class="sec"><h3>🩺 Clinical / Toxidrome</h3>${wrapContent(d.clin)}</div>`:""}${d.dx?`<div class="sec"><h3>🔍 Diagnosis / Workup</h3>${wrapContent(d.dx)}</div>`:""}${d.tx?`<div class="sec"><h3>💊 Treatment / Antidote</h3>${wrapContent(d.tx)}</div>`:""}${d.hy?.length?`<div class="callout hy"><h4>⚡ USMLE High-Yield</h4><ul>${d.hy.map(x=>`<li>${x}</li>`).join("")}</ul></div>`:""}${d.mn?`<div class="callout mn"><h4>🧠 Mnemonic</h4>${d.mn}</div>`:""}${d.trap?`<div class="callout trap"><h4>⚠️ Exam Trap</h4>${d.trap}</div>`:""}</div><div class="footer-nav"><button class="nav-btn" onclick="navigate(-1)" ${prev?"":"disabled"}>◀ ${prev?shorten(prev.name,24):"Previous"}<span class="kbd">←</span></button><button class="nav-btn learn ${learned?"learned":""}" onclick="toggleLearned()">${learned?"✓ Learned":"Mark Learned"}<span class="kbd">Space</span></button><button class="nav-btn" onclick="navigate(1)" ${next?"":"disabled"}>${next?shorten(next.name,24):"Next"} ▶<span class="kbd">→</span></button></div></div>`;
  document.getElementById("content").scrollTo(0,0);
}
function shorten(s,n){return s.length>n?s.slice(0,n-1)+"…":s;}
function goHome(){state.currentId=null;renderSidebar();renderContent();closeSidebar();}
function selectDisease(id){
  state.currentId=id;
  const d=DISEASES.find(x=>x.id===id);
  if(d)state.collapsed.delete(d.cat);
  renderSidebar();renderContent();closeSidebar();
  setTimeout(()=>{const el=document.querySelector(`.dz-item[data-id="${id}"]`);if(el)el.scrollIntoView({block:"nearest",behavior:"smooth"});},50);
}
function navigate(dir){
  const visible=getVisibleDiseases();
  if(state.currentId===null){if(dir>0&&visible.length)selectDisease(visible[0].id);return;}
  const idx=visible.findIndex(x=>x.id===state.currentId);
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=visible.length)return;
  selectDisease(visible[newIdx].id);
}
function toggleLearned(){
  if(!state.currentId)return;
  if(state.learned.has(state.currentId))state.learned.delete(state.currentId);
  else state.learned.add(state.currentId);
  renderSidebar();renderContent();updateProgress();
}
function updateProgress(){
  document.getElementById("learnedText").textContent=`${state.learned.size} / ${DISEASES.length}`;
  document.getElementById("progressFill").style.width=(DISEASES.length?state.learned.size/DISEASES.length*100:0)+"%";
}
function toggleSidebar(){
  const open=document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("sbBackdrop").classList.toggle("show",open);
}
function closeSidebar(){if(window.innerWidth<=720){document.getElementById("sidebar").classList.remove("open");document.getElementById("sbBackdrop").classList.remove("show");}}
function exportExcel(){
  let html=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="UTF-8"><style>th{background:#14532d;color:white;padding:8px;font-weight:bold;text-align:left;border:1px solid #0f3a1f}td{padding:6px 8px;border:1px solid #e2e8f0;vertical-align:top}tr:nth-child(even) td{background:#f8fafc}.cat{background:#dcfce7;font-weight:bold}</style></head><body><table><tr><th>#</th><th>Category</th><th>Agent</th><th>One-Liner</th><th>Mechanism/Chemistry</th><th>Clinical/Toxidrome</th><th>Diagnosis/Workup</th><th>Treatment/Antidote</th><th>USMLE High-Yield</th><th>Mnemonic</th><th>Exam Trap</th><th>Learned</th></tr>`;
  DISEASES.forEach((d,i)=>{
    const strip=(s)=>(s||"").replace(/<[^>]+>/g," ").replace(/\s+/g," ").trim();
    html+=`<tr><td>${i+1}</td><td class="cat">${d.cat}</td><td><strong>${d.name}</strong></td><td>${strip(d.oneLiner)}</td><td>${strip(d.path)}</td><td>${strip(d.clin)}</td><td>${strip(d.dx)}</td><td>${strip(d.tx)}</td><td>${(d.hy||[]).map(strip).join(" • ")}</td><td>${strip(d.mn)}</td><td>${strip(d.trap)}</td><td>${state.learned.has(d.id)?"✓":""}</td></tr>`;
  });
  html+=`</table></body></html>`;
  const blob=new Blob(['\ufeff',html],{type:"application/vnd.ms-excel"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download="GI_Toxicology_Study_Guide.xls";a.click();
  URL.revokeObjectURL(url);
}
function printAll(){
  const content=document.getElementById("content");
  const original=content.innerHTML;
  content.innerHTML=`<div class="content-inner">${DISEASES.map(d=>`<div class="dz-entry" style="page-break-after:always;margin-bottom:40px;"><div class="cat-label"><span class="cat-dot"></span>${d.emoji} ${d.cat}</div><h2 class="dz-title">${d.name}</h2><div class="dz-oneliner">${d.oneLiner}</div>${d.path?`<div class="sec"><h3>🔬 Mechanism / Chemistry</h3>${wrapContent(d.path)}</div>`:""}${d.clin?`<div class="sec"><h3>🩺 Clinical / Toxidrome</h3>${wrapContent(d.clin)}</div>`:""}${d.dx?`<div class="sec"><h3>🔍 Diagnosis / Workup</h3>${wrapContent(d.dx)}</div>`:""}${d.tx?`<div class="sec"><h3>💊 Treatment / Antidote</h3>${wrapContent(d.tx)}</div>`:""}${d.hy?.length?`<div class="callout hy"><h4>⚡ USMLE High-Yield</h4><ul>${d.hy.map(x=>`<li>${x}</li>`).join("")}</ul></div>`:""}${d.mn?`<div class="callout mn"><h4>🧠 Mnemonic</h4>${d.mn}</div>`:""}${d.trap?`<div class="callout trap"><h4>⚠️ Exam Trap</h4>${d.trap}</div>`:""}</div>`).join("")}</div>`;
  setTimeout(()=>{window.print();content.innerHTML=original;renderContent();},300);
}
document.getElementById("search").addEventListener("input",(e)=>{state.search=e.target.value;renderSidebar();});
document.getElementById("prevBtn").onclick=()=>navigate(-1);
document.getElementById("nextBtn").onclick=()=>navigate(1);
document.getElementById("printBtn").onclick=printAll;
document.getElementById("excelBtn").onclick=exportExcel;
document.addEventListener("keydown",(e)=>{
  if(e.target.tagName==="INPUT")return;
  if(state.currentId===null&&e.key!=="ArrowRight"&&e.key!=="ArrowDown")return;
  if(e.key==="ArrowLeft"){e.preventDefault();navigate(-1);}
  else if(e.key==="ArrowRight"){e.preventDefault();navigate(1);}
  else if(e.key===" "){e.preventDefault();toggleLearned();}
  else if(e.key==="ArrowDown"||e.key==="ArrowUp"){
    e.preventDefault();
    const visible=getVisibleDiseases();
    const idx=visible.findIndex(x=>x.id===state.currentId);
    const dir=e.key==="ArrowDown"?1:-1;
    const newIdx=idx===-1?0:idx+dir;
    if(newIdx>=0&&newIdx<visible.length)selectDisease(visible[newIdx].id);
  }
  else if(e.key==="Escape"){goHome();}
});
Object.keys(groupByCategory()).forEach(c=>state.collapsed.add(c));
renderSidebar();
renderHomepage();
updateProgress();
</script>
</body>
</html>
