<style>
*{box-sizing:border-box;margin:0;padding:0}

.sb-title:hover{color:#0f3a1f}
.sb-sub{font-size:11px;color:#6b7b6c;margin-top:3px;font-style:italic}
.sb-search{margin-top:10px}

.sb-home.active{background:#14532d;color:white}
.cat-group{margin-bottom:2px}

.cat-header:hover{background:rgba(20,83,45,0.05)}

.dz-item.active .dz-check{color:#fbbf24}

.dz-name{flex:1;min-width:0}

.main-top .meta{font-size:11.5px;color:#6b7b6c;font-style:italic}
.btn{padding:6px 12px;background:white;border:1px solid #d4c9ad;border-radius:4px;font-size:11.5px;font-weight:600;color:#4b5b4c;cursor:pointer;font-family:Georgia,serif;transition:all 0.12s;white-space:nowrap}
.btn:hover{border-color:#14532d;color:#14532d}

.content{flex:1;overflow-y:auto;background:#faf8f3}

.dz-oneliner{font-size:17px;color:#3c4d3d;line-height:1.55;margin-bottom:28px;padding:14px 18px;background:#ede6d6;border-left:3px solid #14532d;border-radius:0 5px 5px 0;font-style:italic;max-width:900px}
.sec{margin-bottom:28px;max-width:900px}

.callout li{margin-bottom:4px}
.callout.hy{background:#fdf4d3;border-left:4px solid #eab308;color:#713f12}
.callout.hy h4,.callout.hy strong{color:#78350f}

.callout.mn h4,.callout.mn strong{color:#9a3412}

.nav-btn{flex:1;padding:11px 14px;background:white;border:1.5px solid #d4c9ad;border-radius:6px;font-size:13px;font-weight:600;color:#4b5b4c;cursor:pointer;font-family:Georgia,serif;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:6px;min-width:0}
.nav-btn:hover{border-color:#14532d;color:#14532d;background:#fffef8}

.nav-btn.learn{flex:0.8;background:#14532d;color:white;border-color:#14532d}

.kbd{display:inline-block;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.25);padding:1px 5px;border-radius:3px;font-family:ui-monospace,Menlo,monospace;font-size:10px;margin-left:4px}
.nav-btn:not(.learn) .kbd{background:#f1f5f9;border-color:#cbd5e1;color:#64748b}
.home-hero{text-align:center;padding:20px 0 26px;border-bottom:1px solid #e6ddc9;margin-bottom:28px}
.home-brand{font-size:12px;font-weight:700;letter-spacing:0.3em;text-transform:uppercase;color:#14532d;opacity:0.65;margin-bottom:10px}
.home-title{font-family:Georgia,serif;font-size:50px;font-weight:700;color:#14532d;letter-spacing:-0.025em;line-height:1.05;margin-bottom:14px}
.home-sub{font-size:17.5px;color:#3c4d3d;font-style:italic;max-width:700px;margin:0 auto 22px;line-height:1.55}
.home-start{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:#14532d;color:white;border:none;border-radius:6px;font-size:14.5px;font-weight:700;cursor:pointer;font-family:Georgia,serif;transition:all 0.15s;text-decoration:none}
.home-start:hover{background:#0f3a1f;transform:translateY(-1px);box-shadow:0 4px 12px rgba(20,83,45,0.25)}
.home-section-title{font-family:Georgia,serif;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#14532d;margin:36px 0 16px;padding-bottom:8px;border-bottom:1.5px solid #d4c9ad}
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:32px}
.home-cat{background:#f3efe7;border:1px solid #e6ddc9;border-radius:8px;padding:14px 16px;transition:all 0.15s}
.home-cat:hover{border-color:#14532d;box-shadow:0 2px 10px rgba(20,83,45,0.08)}
.home-cat-title{font-family:Georgia,serif;font-size:13.5px;font-weight:700;color:#14532d;letter-spacing:0.5px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #d4c9ad;display:flex;align-items:center;gap:6px}
.home-cat-count{margin-left:auto;background:rgba(20,83,45,0.12);font-size:10.5px;padding:1px 7px;border-radius:8px;font-weight:700}
.home-dz-list{display:flex;flex-direction:column;gap:2px}
.home-dz{font-size:13px;color:#3c4d3d;padding:4px 7px;border-radius:4px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.1s;font-family:Georgia,serif;border-left:2px solid transparent}
.home-dz:hover{background:#14532d;color:white;border-left-color:#fbbf24}
.home-dz:hover .home-check{color:#fbbf24}
.home-dz.learned{color:#16a34a}
.home-dz .home-check{font-size:10px;width:10px;flex-shrink:0;color:#b5bbb2}
.home-dz.learned .home-check{color:#16a34a}
.empty{text-align:center;padding:80px 20px;color:#8a9b8b;font-style:italic}
.menu-toggle{display:none;padding:8px 11px;background:#14532d;color:white;border:none;border-radius:4px;font-size:16px;cursor:pointer;line-height:1;order:-1}
@media(max-width:1000px){.content-inner{padding:32px 40px 120px}.footer-nav{padding:20px 40px 20px}}

  body{font-size:14.5px}
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:100;width:270px;max-width:85vw;transform:translateX(-100%);transition:transform 0.3s;box-shadow:0 0 20px rgba(0,0,0,0.15)}
  .sidebar.open{transform:translateX(0)}
  .menu-toggle{display:block}
  .main-top{padding:9px 12px;gap:6px;flex-wrap:nowrap;overflow-x:auto}
  .main-top h1{font-size:14px;flex:1 1 auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
  .main-top .meta{display:none}
  .main-top .btn{padding:5px 9px;font-size:11px}
  .content-inner{padding:20px 18px 140px;max-width:100%}
  .dz-title{font-size:24px}
  .home-title{font-size:30px}
  .home-sub{font-size:15px}
  .home-hero{padding:14px 0 20px;margin-bottom:22px}
  .home-grid{grid-template-columns:1fr;gap:12px}
  .home-section-title{margin-top:24px}
  .dz-oneliner{font-size:15px;padding:11px 14px;margin-bottom:22px}
  .sec{margin-bottom:22px}
  .sec h3{font-size:12px}
  .sec p,.sec ul,.callout{font-size:14px}
  .footer-nav{padding:14px 14px;max-width:100%;gap:6px;flex-wrap:wrap}
  .nav-btn{padding:9px 10px;font-size:12px;min-width:0}
  .nav-btn .kbd{display:none}
  .nav-btn.learn{flex:1 1 100%;order:0;padding:11px 10px}

}
@media(max-width:400px){.main-top .btn{padding:5px 8px;font-size:10.5px}.main-top h1{font-size:13px}.home-title{font-size:26px}}
.sb-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:90}
.sb-backdrop.show{display:block}
@media print{
  body{overflow:visible;background:white;font-size:10.5pt}
  .app{display:block;height:auto}
  .sidebar,.main-top,.footer-nav,.sb-backdrop{display:none!important}
  .main{overflow:visible}
  .content{overflow:visible;background:white}
  .content-inner{max-width:100%;padding:0}
  .dz-entry{page-break-after:always;padding:20px 30px;break-after:page}
  .dz-entry:last-child{page-break-after:auto}
  .callout,.dz-oneliner{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
.sb-list::-webkit-scrollbar,.content::-webkit-scrollbar{width:8px}
.sb-list::-webkit-scrollbar-thumb{background:#d4c9ad;border-radius:4px}
.content::-webkit-scrollbar-thumb{background:#d4c9ad;border-radius:4px}
.sb-list::-webkit-scrollbar-thumb:hover,.content::-webkit-scrollbar-thumb:hover{background:#14532d}
</style>

<body>
<div class="app">
<aside class="sidebar" id="sidebar">
  <div class="sb-top">
    <a class="sb-brand" href="https://hoyadocs.com/Block4-GI/" target="_blank" rel="noopener">HoyaDocs</a>
    <span class="sb-title" onclick="goHome()">GI Anatomy Atlas</span>
    <div class="sb-sub">Lab Practical Prep · Labs 1–4</div>

  </div>

    <span id="learnedText">0 / 0</span>

</aside>

<main class="main">
  <div class="main-top">
    <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Menu">☰</button>
    <h1 onclick="goHome()">GI Anatomy Lab Structures</h1>
    <span class="meta">↑↓ navigate · space = learn</span>
    <button class="btn" id="prevBtn" title="Previous">◀</button>
    <button class="btn" id="nextBtn" title="Next">▶</button>

    <button class="btn excel" id="excelBtn">📊 Excel</button>

<script>
const DISEASES = [
// ═══════════════ OSTEOLOGY & SURFACE ANATOMY ═══════════════
{id:"xiphoid",cat:"Osteology & Surface",ck:"surf",emoji:"🦴",name:"Xiphoid Process",
oneLiner:"Distal cartilaginous tip of sternum. T9 vertebral level. Upper midline landmark of abdomen.",
path:"Small cartilaginous process projecting inferiorly from the body of the sternum. Ossifies with age. Lies at the <strong>T9 vertebral level</strong>.",
clin:"Marks the superior midline of the abdomen. Just below it is the epigastric region.",
dx:"Landmark for CPR chest compressions (compress above it, not on it — can fracture and cause liver laceration).",
hy:["<strong>T9 vertebral level</strong>","Upper midline landmark","Inferior sternal attachment of diaphragm"]},

{id:"costal-margin",cat:"Osteology & Surface",ck:"surf",emoji:"🦴",name:"Costal Margin",
oneLiner:"Inferior edge of the rib cage — costal cartilages of ribs 7–10 + tips of ribs 11, 12. Superior boundary of abdomen.",
path:"Arch formed by the <strong>joined costal cartilages of ribs 7–10</strong>, with the free-floating tips of ribs 11 &amp; 12 forming the lateral extensions.",
clin:"<ul><li>Superior boundary of anterior abdominal wall</li><li>Right costal margin: liver normally just barely palpable below it</li><li>Left costal margin: spleen not normally palpable; if palpable = splenomegaly</li></ul>",
dx:"Murphy's sign: palpate deep below R costal margin as patient inhales → pain + arrest of inspiration = cholecystitis.",
hy:["Ribs 7–10 fused cartilages","Superior boundary of abdomen","Landmark for liver/spleen/GB exam"]},

{id:"pubic-symphysis",cat:"Osteology & Surface",ck:"surf",emoji:"🦴",name:"Pubic Symphysis",
oneLiner:"Cartilaginous joint between the two pubic bones at the anterior midline of the pelvis. Inferior midline landmark.",
path:"Secondary cartilaginous joint (symphysis) uniting the right + left pubic bodies via a fibrocartilaginous disc.",
clin:"Softens in late pregnancy via <strong>relaxin</strong> to allow pelvic widening for childbirth. Can separate (diastasis symphysis pubis) post-partum.",
hy:["Anterior midline of pelvis","Relaxin softens in pregnancy","Lower midline landmark"]},

{id:"pubic-tubercle",cat:"Osteology & Surface",ck:"surf",emoji:"🦴",name:"Pubic Tubercle",
oneLiner:"Small bony prominence on superior pubic ramus ~2.5 cm lateral to pubic symphysis. Medial attachment of the inguinal ligament.",
path:"Prominent tubercle on the superior pubic ramus. Palpable through the skin just lateral to midline at groin.",
clin:"<ul><li>Medial attachment of the <strong>inguinal ligament</strong></li><li>Site where the conjoint tendon inserts</li><li>Inguinal hernia bulges ABOVE + medial to the tubercle; femoral hernia bulges BELOW + lateral</li></ul>",
tx:"On a cadaver, palpate the pubic tubercle first — it's the medial anchor for tracing the inguinal ligament laterally to the ASIS.",
hy:["Medial attachment of inguinal ligament","<strong>Inguinal hernia</strong> above/medial; <strong>femoral hernia</strong> below/lateral","Conjoint tendon insertion"]},

{id:"asis",cat:"Osteology & Surface",ck:"surf",emoji:"🦴",name:"Anterior Superior Iliac Spine (ASIS)",
oneLiner:"Most anterior projection of the iliac crest. Lateral attachment of the inguinal ligament.",
path:"Anterior end of the iliac crest on the ilium. Easily palpable at the anterior pelvic brim.",
clin:"<ul><li>Lateral attachment of the <strong>inguinal ligament</strong></li><li>Attachment of sartorius muscle</li><li>Landmark for <strong>McBurney's point</strong> (1/3 from ASIS to umbilicus — appendicitis)</li><li>Origin of meralgia paresthetica (lateral cutaneous n. of thigh passes just medial to ASIS under the inguinal lig)</li></ul>",
hy:["Lateral anchor of inguinal ligament","<strong>McBurney's point</strong> (1/3 ASIS → umbilicus)","Sartorius origin"]},

{id:"iliac-crest",cat:"Osteology & Surface",ck:"surf",emoji:"🦴",name:"Iliac Crest",
oneLiner:"Superior ridge of the ilium. Where you rest your hands on your hips. Vertebral level <strong>L4</strong>.",
path:"The curved superior border of the ilium, from ASIS anteriorly to PSIS posteriorly. Palpable throughout its length.",
clin:"<ul><li><strong>L4 vertebral level</strong> (aortic bifurcation is just above)</li><li>Landmark for <strong>lumbar puncture</strong> (line between iliac crests = L4 → needle at L3-L4 or L4-L5 interspace to avoid conus)</li><li>Site of <strong>bone marrow biopsy</strong> (posterior iliac crest)</li><li>Origin of quadratus lumborum, transversus abdominis, internal oblique</li></ul>",
hy:["<strong>L4 level</strong> — key for lumbar puncture","Bone marrow biopsy site","Attachment for all 3 flat abdominal muscles"]},

{id:"iliac-tubercle",cat:"Osteology & Surface",ck:"surf",emoji:"🦴",name:"Iliac Tubercle",
oneLiner:"Small lateral bump on the outer lip of the iliac crest, ~5 cm posterior to ASIS. Defines the <strong>transtubercular plane (L5)</strong>.",
path:"A small thickening on the outer lip of the iliac crest, about 5 cm posterior to the ASIS.",
clin:"Marks the <strong>transtubercular plane</strong> — horizontal plane at the L5 vertebral level that serves as the inferior horizontal boundary in the 9-region scheme of the abdomen.",
hy:["L5 vertebral level","Defines transtubercular plane","Do NOT confuse with ASIS"]},

{id:"umbilicus",cat:"Osteology & Surface",ck:"surf",emoji:"🦴",name:"Umbilicus",
oneLiner:"Midline scar from the severed umbilical cord. Usually at the <strong>L3–L4 disc</strong> level. Central dermatome = <strong>T10</strong>.",
path:"Skin scar at anterior midline from fetal umbilical cord. Embryologic 'home' of the round ligament of liver (lig teres) — remnant of the left umbilical vein — which runs in the free edge of the falciform ligament from the umbilicus to the porta hepatis.",
clin:"<ul><li><strong>T10 dermatome</strong> → midgut visceral pain (early appendicitis) refers here</li><li><strong>Aortic bifurcation</strong> lies directly behind (L4 level)</li><li><strong>Caput medusae</strong>: paraumbilical vein recanalization in portal HTN</li><li><strong>Sister Mary Joseph nodule</strong>: periumbilical metastatic nodule from intra-abdominal malignancy (esp. gastric)</li></ul>",
hy:["<strong>T10 dermatome</strong>","L3-L4 disc level","Caput medusae in portal HTN","Sister Mary Joseph nodule"]},

{id:"quadrants",cat:"Osteology & Surface",ck:"surf",emoji:"🎯",name:"Four Abdominal Quadrants",
oneLiner:"Divided by the <strong>median plane</strong> (vertical) + <strong>transumbilical plane</strong> (horizontal). Most common clinical scheme.",
path:"Four quadrants: <strong>RUQ, LUQ, RLQ, LLQ</strong>. Median + transumbilical planes cross at the umbilicus.",
clin:"<ul><li><strong>RUQ</strong>: liver (R lobe), gallbladder, duodenum, head of pancreas, R kidney, hepatic flexure</li><li><strong>LUQ</strong>: stomach, spleen, body/tail of pancreas, L kidney, splenic flexure</li><li><strong>RLQ</strong>: cecum, appendix, R ovary/tube, R ureter, part of ileum — classic appendicitis location</li><li><strong>LLQ</strong>: sigmoid colon, L ovary/tube, L ureter — classic diverticulitis location</li></ul>",
hy:["<strong>Cholecystitis</strong>: RUQ","<strong>Appendicitis</strong>: RLQ (McBurney's)","<strong>Diverticulitis</strong>: LLQ ('left-sided appendicitis')","<strong>Splenic rupture</strong>: LUQ"]},

{id:"regions",cat:"Osteology & Surface",ck:"surf",emoji:"🎯",name:"Nine Abdominal Regions",
oneLiner:"3×3 grid made by two vertical (midclavicular) + two horizontal (subcostal + transtubercular) planes.",
path:"<strong>Top row</strong>: R hypochondriac / epigastric / L hypochondriac. <strong>Middle row</strong>: R lumbar (flank) / umbilical / L lumbar. <strong>Bottom row</strong>: R inguinal (groin) / hypogastric (pubic) / L inguinal.",
clin:"More precise than quadrants for localizing organs + pain referral by gut region: <strong>foregut → epigastric, midgut → umbilical, hindgut → hypogastric</strong>.",

{id:"obturator",cat:"Posterior Wall, Diaphragm & Nerves",ck:"pwn",emoji:"⚡",name:"Obturator Nerve (L2–L4)",
oneLiner:"Medial border of psoas. <strong>Ventral divisions</strong>. Exits through obturator foramen. Medial thigh adductors + skin.",
path:"Formed from <strong>ventral divisions</strong> of L2–L4. Emerges from medial border of psoas, descends through obturator foramen into medial thigh.",
clin:"<ul><li><strong>Motor</strong>: adductor muscles of thigh</li><li><strong>Sensory</strong>: medial thigh skin</li><li><strong>Obturator sign</strong>: pain on internal rotation of flexed hip → pelvic appendicitis irritating obturator internus</li></ul>",
hy:["L2–L4 ventral","Adductors","Obturator sign (pelvic appendix)","Medial thigh sensation"]},

{id:"sympathetic-trunk",cat:"Posterior Wall, Diaphragm & Nerves",ck:"pwn",emoji:"⚡",name:"Sympathetic Trunk (Abdominal)",
oneLiner:"Chain of ganglia medial to psoas on lumbar vertebral bodies. Splanchnic nerves pass THROUGH (no synapse) to prevertebral ganglia.",
path:"Paired ganglionated chains running along the vertebral column. In abdomen: on the lumbar vertebral bodies, medial to psoas. Splanchnic nerves from T5–L2 pass through the trunk without synapsing + synapse at <strong>prevertebral (celiac, SMA, IMA, hypogastric) ganglia</strong> before reaching the gut.",
clin:"<ul><li><strong>Referred pain by embryologic gut region</strong>: Foregut (T5–T9) → epigastric; Midgut (T10–T11) → periumbilical; Hindgut (T12–L2) → hypogastric</li><li>Adrenal medulla = special: receives preganglionic sympathetic fibers directly (no synapse — chromaffin cells = modified postganglionic neurons)</li></ul>",
hy:["Medial to psoas","Splanchnics pass through (no synapse)","Synapse at prevertebral ganglia","Foregut T5-9 / Midgut T10-11 / Hindgut T12-L2"]}
];

const state={currentId:null,learned:new Set(),search:"",collapsed:new Set()};
function groupByCategory(){
  const map={};
  DISEASES.forEach(d=>{
    if(!map[d.cat])map[d.cat]={key:d.ck,emoji:d.emoji,items:[]};
    map[d.cat].items.push(d);
  });
  return map;
}
function getVisibleDiseases(){
  const q=state.search.toLowerCase().trim();
  if(!q)return DISEASES;
  return DISEASES.filter(d=>{
    const hay=(d.name+" "+d.cat+" "+d.oneLiner+" "+(d.path||"")+" "+(d.clin||"")+" "+(d.dx||"")+" "+(d.tx||"")+" "+(d.hy||[]).join(" ")+" "+(d.mn||"")+" "+(d.trap||"")).toLowerCase();
    return hay.includes(q);
  });
}
function renderSidebar(){
  const visible=getVisibleDiseases();
  const visibleIds=new Set(visible.map(d=>d.id));
  const groups=groupByCategory();
  const list=document.getElementById("sbList");
  let html=`<div class="sb-home ${state.currentId===null?"active":""}" onclick="goHome()">🏠 Home</div>`;
  Object.entries(groups).forEach(([cat,info])=>{
    const visibleItems=info.items.filter(d=>visibleIds.has(d.id));
    if(!visibleItems.length)return;
    const collapsed=state.collapsed.has(cat)&&!state.search;
    html+=`<div class="cat-group ${collapsed?"collapsed":""}" data-cat="${cat}"><div class="cat-header" onclick="toggleCat('${cat.replace(/'/g,"\\'")}')"><span class="cat-chevron">▼</span><span>${info.emoji} ${cat}</span><span class="cat-count">${visibleItems.length}</span></div><div class="cat-list">`;
    visibleItems.forEach(d=>{
      const active=state.currentId===d.id;
      const learned=state.learned.has(d.id);
      html+=`<div class="dz-item ${active?"active":""} ${learned?"learned":""}" data-id="${d.id}" onclick="selectDisease('${d.id}')"><span class="dz-check">${learned?"✓":"○"}</span><span class="dz-name">${d.name}</span></div>`;
    });
    html+=`</div></div>`;
  });
  list.innerHTML=html||`<div class="empty" style="padding:30px 14px">No matches.</div>`;
}
function toggleCat(cat){
  if(state.collapsed.has(cat))state.collapsed.delete(cat);
  else state.collapsed.add(cat);
  renderSidebar();
}
function renderHomepage(){
  const content=document.getElementById("content");
  const groups=groupByCategory();
  let catCardsHtml="";
  Object.entries(groups).forEach(([cat,info])=>{
    catCardsHtml+=`<div class="home-cat"><div class="home-cat-title">${info.emoji} ${cat} <span class="home-cat-count">${info.items.length}</span></div><div class="home-dz-list">${info.items.map(d=>{const learned=state.learned.has(d.id);return `<div class="home-dz ${learned?"learned":""}" onclick="selectDisease('${d.id}')"><span class="home-check">${learned?"✓":"○"}</span><span>${d.name}</span></div>`;}).join("")}</div></div>`;
  });
  content.innerHTML=`<div class="content-inner"><div class="home-hero"><div class="home-brand">HoyaDocs · Block 4 GI</div><h1 class="home-title">Welcome to the GI Anatomy Atlas</h1><p class="home-sub">An interactive reference for all 4 GI dissection labs — every structure with anatomy, relations, clinical significance, lab practical tips, and mnemonics.</p><button class="home-start" onclick="selectDisease('xiphoid')">Start with Xiphoid Process →</button></div><h2 class="home-section-title">Browse All Structures</h2><p style="font-size:13.5px;color:#6b7b6c;margin-bottom:18px;font-style:italic;">Click any structure to open it. Use the sidebar to search or navigate by category. Use ← → arrow keys to move between structures and Space to mark as learned.</p><div class="home-grid">${catCardsHtml}</div></div>`;
  document.getElementById("content").scrollTo(0,0);
}
function renderContent(){
  if(state.currentId===null){renderHomepage();return;}
  const content=document.getElementById("content");
  const d=DISEASES.find(x=>x.id===state.currentId);
  if(!d){content.innerHTML='<div class="empty">Not found.</div>';return;}
  const learned=state.learned.has(d.id);
  const visible=getVisibleDiseases();
  const idx=visible.findIndex(x=>x.id===d.id);
  const prev=idx>0?visible[idx-1]:null;
  const next=idx<visible.length-1?visible[idx+1]:null;
  content.innerHTML=`<div class="content-inner"><div class="dz-entry"><div class="cat-label"><span class="cat-dot"></span>${d.emoji} ${d.cat}</div><h2 class="dz-title">${d.name}</h2><div class="dz-oneliner">${d.oneLiner}</div>${d.path?`<div class="sec"><h3>🔬 Anatomy &amp; Description</h3><p>${d.path}</p></div>`:""}${d.clin?`<div class="sec"><h3>🔗 Relations &amp; Connections</h3>${d.clin.trim().startsWith("<ul>")?d.clin:"<p>"+d.clin+"</p>"}</div>`:""}${d.dx?`<div class="sec"><h3>🩺 Clinical Significance</h3><p>${d.dx}</p></div>`:""}${d.tx?`<div class="sec"><h3>🧭 Lab Practical Tip</h3><p>${d.tx}</p></div>`:""}${d.hy?.length?`<div class="callout hy"><h4>⚡ High-Yield</h4><ul>${d.hy.map(x=>`<li>${x}</li>`).join("")}</ul></div>`:""}${d.mn?`<div class="callout mn"><h4>🧠 Mnemonic</h4>${d.mn}</div>`:""}${d.trap?`<div class="callout trap"><h4>⚠️ Exam Trap</h4>${d.trap}</div>`:""}</div><div class="footer-nav"><button class="nav-btn" onclick="navigate(-1)" ${prev?"":"disabled"}>◀ ${prev?shorten(prev.name,24):"Previous"}<span class="kbd">←</span></button><button class="nav-btn learn ${learned?"learned":""}" onclick="toggleLearned()">${learned?"✓ Learned":"Mark Learned"}<span class="kbd">Space</span></button><button class="nav-btn" onclick="navigate(1)" ${next?"":"disabled"}>${next?shorten(next.name,24):"Next"} ▶<span class="kbd">→</span></button></div></div>`;
  document.getElementById("content").scrollTo(0,0);
}
function shorten(s,n){return s.length>n?s.slice(0,n-1)+"…":s;}
function goHome(){state.currentId=null;renderSidebar();renderContent();closeSidebar();}
function selectDisease(id){
  state.currentId=id;
  const d=DISEASES.find(x=>x.id===id);
  if(d)state.collapsed.delete(d.cat);
  renderSidebar();renderContent();closeSidebar();
  setTimeout(()=>{const el=document.querySelector(`.dz-item[data-id="${id}"]`);if(el)el.scrollIntoView({block:"nearest",behavior:"smooth"});},50);
}
function navigate(dir){
  const visible=getVisibleDiseases();
  if(state.currentId===null){if(dir>0&&visible.length)selectDisease(visible[0].id);return;}
  const idx=visible.findIndex(x=>x.id===state.currentId);
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=visible.length)return;
  selectDisease(visible[newIdx].id);
}
function toggleLearned(){
  if(!state.currentId)return;
  if(state.learned.has(state.currentId))state.learned.delete(state.currentId);
  else state.learned.add(state.currentId);
  renderSidebar();renderContent();updateProgress();
}
function updateProgress(){
  document.getElementById("learnedText").textContent=`${state.learned.size} / ${DISEASES.length}`;
  document.getElementById("progressFill").style.width=(DISEASES.length?state.learned.size/DISEASES.length*100:0)+"%";
}
function toggleSidebar(){
  const open=document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("sbBackdrop").classList.toggle("show",open);
}
function closeSidebar(){if(window.innerWidth<=720){document.getElementById("sidebar").classList.remove("open");document.getElementById("sbBackdrop").classList.remove("show");}}
function exportExcel(){
  let html=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="UTF-8"><style>th{background:#14532d;color:white;padding:8px;font-weight:bold;text-align:left;border:1px solid #0f3a1f}td{padding:6px 8px;border:1px solid #e2e8f0;vertical-align:top}tr:nth-child(even) td{background:#f8fafc}.cat{background:#dcfce7;font-weight:bold}</style></head><body><table><tr><th>#</th><th>Category</th><th>Structure</th><th>One-Liner</th><th>Anatomy &amp; Description</th><th>Relations &amp; Connections</th><th>Clinical Significance</th><th>Lab Practical Tip</th><th>High-Yield</th><th>Mnemonic</th><th>Exam Trap</th><th>Learned</th></tr>`;
  DISEASES.forEach((d,i)=>{
    const strip=(s)=>(s||"").replace(/<[^>]+>/g," ").replace(/\s+/g," ").trim();
    html+=`<tr><td>${i+1}</td><td class="cat">${d.cat}</td><td><strong>${d.name}</strong></td><td>${strip(d.oneLiner)}</td><td>${strip(d.path)}</td><td>${strip(d.clin)}</td><td>${strip(d.dx)}</td><td>${strip(d.tx)}</td><td>${(d.hy||[]).map(strip).join(" • ")}</td><td>${strip(d.mn)}</td><td>${strip(d.trap)}</td><td>${state.learned.has(d.id)?"✓":""}</td></tr>`;
  });
  html+=`</table></body></html>`;
  const blob=new Blob(['\ufeff',html],{type:"application/vnd.ms-excel"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download="GI_Anatomy_Lab_Atlas.xls";a.click();
  URL.revokeObjectURL(url);
}
function printAll(){
  const content=document.getElementById("content");
  const original=content.innerHTML;
  content.innerHTML=`<div class="content-inner">${DISEASES.map(d=>`<div class="dz-entry" style="page-break-after:always;margin-bottom:40px;"><div class="cat-label"><span class="cat-dot"></span>${d.emoji} ${d.cat}</div><h2 class="dz-title">${d.name}</h2><div class="dz-oneliner">${d.oneLiner}</div>${d.path?`<div class="sec"><h3>🔬 Anatomy &amp; Description</h3><p>${d.path}</p></div>`:""}${d.clin?`<div class="sec"><h3>🔗 Relations &amp; Connections</h3>${d.clin.trim().startsWith("<ul>")?d.clin:"<p>"+d.clin+"</p>"}</div>`:""}${d.dx?`<div class="sec"><h3>🩺 Clinical Significance</h3><p>${d.dx}</p></div>`:""}${d.tx?`<div class="sec"><h3>🧭 Lab Practical Tip</h3><p>${d.tx}</p></div>`:""}${d.hy?.length?`<div class="callout hy"><h4>⚡ High-Yield</h4><ul>${d.hy.map(x=>`<li>${x}</li>`).join("")}</ul></div>`:""}${d.mn?`<div class="callout mn"><h4>🧠 Mnemonic</h4>${d.mn}</div>`:""}${d.trap?`<div class="callout trap"><h4>⚠️ Exam Trap</h4>${d.trap}</div>`:""}</div>`).join("")}</div>`;
  setTimeout(()=>{window.print();content.innerHTML=original;renderContent();},300);
}
document.getElementById("search").addEventListener("input",(e)=>{state.search=e.target.value;renderSidebar();});
document.getElementById("prevBtn").onclick=()=>navigate(-1);
document.getElementById("nextBtn").onclick=()=>navigate(1);
document.getElementById("printBtn").onclick=printAll;
document.getElementById("excelBtn").onclick=exportExcel;
document.addEventListener("keydown",(e)=>{
  if(e.target.tagName==="INPUT")return;
  if(state.currentId===null&&e.key!=="ArrowRight"&&e.key!=="ArrowDown")return;
  if(e.key==="ArrowLeft"){e.preventDefault();navigate(-1);}
  else if(e.key==="ArrowRight"){e.preventDefault();navigate(1);}
  else if(e.key===" "){e.preventDefault();toggleLearned();}
  else if(e.key==="ArrowDown"||e.key==="ArrowUp"){
    e.preventDefault();
    const visible=getVisibleDiseases();
    const idx=visible.findIndex(x=>x.id===state.currentId);
    const dir=e.key==="ArrowDown"?1:-1;
    const newIdx=idx===-1?0:idx+dir;
    if(newIdx>=0&&newIdx<visible.length)selectDisease(visible[newIdx].id);
  }
  else if(e.key==="Escape"){goHome();}
});
Object.keys(groupByCategory()).forEach(c=>state.collapsed.add(c));
renderSidebar();
renderHomepage();
updateProgress();
</script>
</body>
</html>
