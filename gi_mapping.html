<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HoyaDocs GI &mdash; Resource Coverage Mapping</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ── RESET ───────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter','Segoe UI',Arial,sans-serif;background:#F0F7F4;color:#1A2332;font-size:13px;display:flex;flex-direction:row}

/* ── APP SIDEBAR (matches index.html chrome) ─── */
.app-sidebar{
  width:232px;flex-shrink:0;background:#0d2416;color:#fff;
  height:100vh;display:flex;flex-direction:column;
  padding:28px 18px 24px;overflow-y:auto;
  font-family:'Inter','Segoe UI',Arial,sans-serif;
}
.app-sb-brand{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.app-sb-name{font-size:1.35rem;font-weight:900;color:#fff;letter-spacing:-0.01em;flex:1;text-shadow:0 1px 8px rgba(0,0,0,0.25)}
.app-sb-dark{
  width:28px;height:28px;border-radius:7px;background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;
  font-size:0.82rem;color:rgba(255,255,255,0.7);flex-shrink:0;cursor:pointer;transition:background .14s
}
.app-sb-dark:hover{background:rgba(255,255,255,0.16)}
.app-sb-block{font-size:0.72rem;font-weight:500;color:rgba(255,255,255,0.42);margin-bottom:26px;padding-left:2px}
.app-sb-rule{height:1px;background:rgba(255,255,255,0.09);margin:4px 0 18px}
.app-sb-section-label{font-size:0.62rem;font-weight:700;letter-spacing:0.10em;text-transform:uppercase;color:#fff;margin-bottom:6px;padding:0 8px}
.app-sb-nav{display:flex;flex-direction:column;gap:2px;margin-bottom:20px}
.app-sb-link{
  display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;
  font-size:0.82rem;font-weight:500;color:rgba(255,255,255,0.60);
  text-decoration:none;transition:background .13s,color .13s
}
.app-sb-link:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.92)}
.app-sb-link-icon{
  width:22px;height:22px;border-radius:6px;background:rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:center;font-size:0.82rem;flex-shrink:0
}
.app-sb-icon-teal{background:rgba(20,184,166,0.32)}
.app-sb-icon-green{background:rgba(74,180,120,0.32)}
.app-sb-icon-amber{background:rgba(245,158,11,0.32)}
.app-sb-icon-blue{background:rgba(99,140,220,0.32)}
.app-sb-spacer{flex:1}
.app-sb-feedback{
  display:flex;align-items:center;justify-content:center;gap:7px;
  padding:10px 12px;border-radius:10px;margin-top:12px;
  background:#166534;color:#fff;font-size:0.80rem;font-weight:700;
  text-decoration:none;border:1px solid rgba(255,255,255,0.10);
  transition:opacity .15s,transform .15s
}
.app-sb-feedback:hover{opacity:0.9;transform:translateY(-1px)}

/* Frame that holds the existing topbar + main area */
.app-frame{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}

/* Hide duplicate in-page sidebar (now lives in the chrome) */
.home-sidebar{display:none !important}
.home-layout{grid-template-columns:1fr !important}

@media (max-width:960px){
  body{flex-direction:column}
  .app-sidebar{width:100%;height:auto;flex-direction:row;align-items:center;padding:12px 18px;gap:12px}
  .app-sb-brand{margin-bottom:0;flex:1}
  .app-sb-block,.app-sb-rule,.app-sb-section-label,.app-sb-nav,.app-sb-spacer,.app-sb-feedback{display:none}
}

/* ── TOPBAR ──────────────────────────────────────── */
.topbar{
  background:#1B4332;color:#fff;height:66px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 22px;gap:14px;box-shadow:0 3px 10px rgba(0,0,0,.3);z-index:200
}
.topbar-title{font-size:16px;font-weight:700;white-space:nowrap}
.topbar-sub{font-size:11px;color:#95D5B2;margin-top:2px}
.topbar-right{display:flex;gap:8px;align-items:center;flex-shrink:0}
.search-box{
  padding:7px 16px;border:1px solid #52B788;border-radius:20px;
  background:rgba(255,255,255,.12);color:#fff;font-size:13px;width:210px;outline:none;transition:.2s
}
.search-box::placeholder{color:#74C69D}
.search-box:focus{background:rgba(255,255,255,.2);border-color:#74C69D;width:260px}
.fbtn{
  padding:6px 14px;border-radius:16px;border:1px solid rgba(255,255,255,.25);
  background:transparent;color:rgba(255,255,255,.8);cursor:pointer;font-size:13px;font-weight:500;transition:.15s;white-space:nowrap
}
.fbtn:hover,.fbtn.on{background:rgba(255,255,255,.22);color:#fff;border-color:rgba(255,255,255,.6);font-weight:700}

/* ── MAIN LAYOUT ─────────────────────────────────── */
.main{display:flex;flex:1;overflow:hidden}

/* ── LEFT NAV PANEL ──────────────────────────────── */
.nav-panel{
  width:260px;flex-shrink:0;
  background:#F4FAF7;border-right:2px solid #C8E6D4;
  display:flex;flex-direction:column
}
.nav-group{flex-shrink:0}
.nav-group.hidden{display:none}
.nav-group-hdr{
  padding:9px 14px;font-size:10.5px;font-weight:800;letter-spacing:.9px;
  text-transform:uppercase;color:#fff;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:10;cursor:pointer;user-select:none
}
.nav-group-hdr:hover{filter:brightness(1.12)}
.nav-hdr-right{display:flex;align-items:center;gap:7px}
.nav-chevron{font-size:9px;transition:transform .2s;opacity:.85}
.nav-group.collapsed .nav-chevron{transform:rotate(-90deg)}
.nav-group.collapsed .nav-item{display:none}
.nav-cnt-badge{
  background:rgba(255,255,255,.22);border-radius:10px;
  padding:1px 8px;font-size:10px;font-weight:600
}
.nav-item{
  padding:10px 14px 10px 16px;cursor:pointer;
  border-bottom:1px solid #E0E8F2;transition:background .1s;
  display:flex;align-items:center;gap:10px
}
.nav-item.hidden{display:none}
.nav-item:hover:not(.active){background:rgba(27,67,50,.07)}
.nav-item.active{background:#1B4332}
.nav-item-body{flex:1;min-width:0}
.nav-class-num{font-size:10px;font-weight:700;color:#8ECAAB;margin-bottom:1px}
.nav-item.active .nav-class-num{color:rgba(255,255,255,.55)}
.nav-lec-name{
  font-size:12px;font-weight:600;color:#1B4332;line-height:1.3;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap
}
.nav-item.active .nav-lec-name{color:#fff}
.nav-dr{font-size:10.5px;color:#7A9E8F;margin-top:2px}
.nav-item.active .nav-dr{color:rgba(255,255,255,.6)}
.nav-badges{display:flex;gap:4px;flex-shrink:0;flex-direction:column;align-items:flex-end}
.nav-badge{
  font-size:10px;font-weight:700;padding:2px 7px;border-radius:9px;white-space:nowrap
}
.nav-badge-anki{background:#EDD5FF;color:#6A1B9A}
.nav-badge-uw{background:#D0E8FF;color:#0D47A1}
.nav-item.active .nav-badge-anki{background:rgba(180,120,220,.35);color:#DDB8FF}
.nav-item.active .nav-badge-uw{background:rgba(100,160,220,.35);color:#B8DAFF}
/* per-subject alternating tints */
.nav-group[data-subj="Phys"]  .nav-item:nth-child(even):not(.active){background:#EBF4FF}
.nav-group[data-subj="Anat"]  .nav-item:nth-child(even):not(.active){background:#EEF8EE}
.nav-group[data-subj="Hist"]  .nav-item:nth-child(even):not(.active){background:#F6F0FF}
.nav-group[data-subj="Embr"]  .nav-item:nth-child(even):not(.active){background:#FFF0F5}
.nav-group[data-subj="Path"]  .nav-item:nth-child(even):not(.active){background:#FFF3F2}
.nav-group[data-subj="Pharm"] .nav-item:nth-child(even):not(.active){background:#EEF8EE}
.nav-group[data-subj="Micro"] .nav-item:nth-child(even):not(.active){background:#FFF3E0}
.nav-group[data-subj="DRT"]   .nav-item:nth-child(even):not(.active){background:#EDEFFE}

/* ── RIGHT DETAIL PANEL ──────────────────────────── */
.detail-panel{
  flex:1;overflow-y:auto;background:#fff;
  display:flex;flex-direction:column
}
.detail-empty{
  flex:1;display:flex;align-items:center;justify-content:center;
  color:#A0B0C8;font-size:14px;font-style:italic
}

/* Detail header */
.detail-hdr{
  padding:22px 32px 18px;border-bottom:2px solid #E8F3EE;
  flex-shrink:0
}
.detail-hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.detail-subj-badge{
  padding:4px 12px;border-radius:14px;font-size:11px;font-weight:700
}
.detail-class-lbl{font-size:11px;color:#8ECAAB;font-weight:600}
.detail-title{font-size:20px;font-weight:800;color:#1B4332;line-height:1.25;margin-bottom:5px}
.detail-dr{font-size:13px;color:#4A6B5A;margin-bottom:14px}
.detail-stats{display:flex;gap:12px;flex-wrap:wrap}
.detail-stat{
  display:flex;flex-direction:column;align-items:center;
  padding:10px 20px;border-radius:12px;min-width:100px
}
.detail-stat-anki{background:#F5EEF8;border:1.5px solid #D9B8EA}
.detail-stat-uw  {background:#EEF8F3;border:1.5px solid #B7D9C8}
.detail-stat-sg  {background:#E8F5E9;border:1.5px solid #A5D6A7;cursor:pointer;text-decoration:none;color:inherit}
.detail-stat-sg:hover{background:#C8E6C9;border-color:#388E3C}
.detail-stat-sg .stat-n{color:#2E7D32}
.stat-click{font-size:9px;color:#388E3C;margin-top:2px;letter-spacing:.3px}
.detail-stat-drill{background:#FFF8E1;border:1.5px solid #FFE082;cursor:pointer;text-decoration:none;color:inherit}
.detail-stat-drill:hover{background:#FFF0C2;border-color:#F9A825}
.detail-stat-drill .stat-n{color:#F57F17}
.detail-stat-drill .stat-click{color:#E65100}
.detail-stat-ph{cursor:default}
.stat-n{font-size:26px;font-weight:800;line-height:1}
.detail-stat-anki .stat-n{color:#7B1FA2}
.detail-stat-uw   .stat-n{color:#1a4731}
.stat-lbl{font-size:10px;color:#6B7A8D;margin-top:3px;letter-spacing:.3px}

/* Detail sections */
.detail-sections{padding:20px 32px 32px;flex:1}
.detail-sec-btn{
  display:flex;align-items:center;gap:10px;width:100%;
  padding:13px 18px;margin-bottom:0;
  background:#F5FAF7;border:1.5px solid #C8E6D4;
  border-radius:10px;cursor:pointer;text-align:left;
  transition:.15s;margin-top:12px
}
.detail-sec-btn:first-child{margin-top:0}
.detail-sec-btn:hover{background:#E8F5EE;border-color:#40916C}
.detail-sec-btn.open{
  background:#1B4332;color:#fff;border-color:#1B4332;
  border-radius:10px 10px 0 0;margin-bottom:0
}
.detail-sec-btn .arr{
  font-size:11px;transition:transform .2s;flex-shrink:0;
  opacity:.7
}
.detail-sec-btn.open .arr{transform:rotate(90deg);opacity:1}
.detail-sec-label{font-size:13px;font-weight:700;flex:1}
.detail-sec-hint{font-size:11px;color:#7A9E8F;font-style:italic;flex-shrink:0}
.detail-sec-btn.open .detail-sec-hint{color:rgba(255,255,255,.55)}
.detail-sec-panel{
  display:none;border:1.5px solid #C8E6D4;border-top:none;
  border-radius:0 0 10px 10px;padding:16px 18px;
  background:#F7FBF9;margin-bottom:0
}
.detail-sec-panel.open{display:block}

/* Resources grid inside detail */
.resources-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px
}
.res-group{background:#fff;border-radius:8px;border:1px solid #E4ECF5;overflow:hidden}
.res-group-hdr{padding:7px 12px;font-size:11px;font-weight:700;letter-spacing:.3px;display:flex;align-items:center;gap:6px}
.res-group-hdr .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.res-group-body{padding:8px 10px;display:flex;flex-direction:column;gap:5px}
.res-chip{
  display:flex;flex-direction:column;align-items:stretch;
  padding:6px 10px;border-radius:6px;font-size:11px;font-weight:600;
  border:1px solid transparent;transition:.15s;cursor:pointer;gap:0;text-decoration:none
}
.res-chip:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.12)}
.res-chip .chip-txt{flex:1;line-height:1.3}
.res-chip .chip-cnt{flex-shrink:0;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;background:rgba(0,0,0,.10)}
.chip-row{display:flex;align-items:center;gap:8px}
.chip-sub{font-size:10.5px;margin-top:5px;line-height:1.45;opacity:.88;font-weight:500}
.chip-xref{font-size:10px;margin-top:3px;font-style:italic;opacity:.72;line-height:1.4}
.res-chip.no-link{cursor:default;opacity:.6}
.res-chip.no-link:hover{transform:none;box-shadow:none}
.res-none{font-size:11px;color:#AAB8C8;font-style:italic;padding:6px 10px}

/* LO styles */
.lo-sec-hdr{font-size:11px;font-weight:700;color:#1B4332;margin:8px 0 4px}
.lo-sec-hdr:first-child{margin-top:0}
.lo-item{font-size:11.5px;color:#243D31;padding-left:16px;margin-bottom:4px;position:relative;line-height:1.45}
.lo-item::before{content:"•";position:absolute;left:3px;color:#40916C}

/* UWorld section inside detail */
.uw-qid-section{max-width:680px}
.uw-qid-section-hdr{font-size:12px;font-weight:700;color:#1a4731;margin-bottom:10px}
.uw-qid-copy{
  font-size:13px;color:#1a4731;line-height:1.9;word-break:break-all;
  border:1.5px solid #B7D9C8;border-radius:8px;padding:12px 16px;background:#EEF8F3;
  cursor:text;user-select:text
}
.uw-qid-hint{font-size:11px;color:#8899AA;margin-top:7px;font-style:italic}
.uw-detail-btn{
  margin-top:12px;padding:7px 18px;border-radius:20px;
  border:1.5px solid #1a4731;background:transparent;color:#1a4731;
  font-size:12px;cursor:pointer;font-weight:600;transition:.15s;display:inline-block
}
.uw-detail-btn:hover{background:#1a4731;color:#fff}

/* ── MODALS ──────────────────────────────────────── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;box-shadow:0 10px 50px rgba(0,0,0,.3);max-width:90vw;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;min-width:560px}
.modal-hdr{background:#1B4332;color:#fff;padding:13px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-hdr h3{font-size:13px;font-weight:700}
.modal-cls{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:2px 6px;border-radius:4px;line-height:1}
.modal-print-btn{
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.35);
  color:#fff;font-size:11px;font-weight:700;cursor:pointer;
  padding:5px 12px;border-radius:8px;display:flex;align-items:center;gap:5px;transition:.15s
}
.modal-print-btn:hover{background:rgba(255,255,255,.3)}
.modal-cls:hover{background:rgba(255,255,255,.2)}
.modal-body{flex:1;overflow:auto}
.modal-body iframe{width:100%;height:74vh;border:none}
.modal-body.uw-body{padding:14px}
.uw-tbl-wrap{overflow-x:auto}
.uw-tbl{width:100%;border-collapse:collapse;font-size:12px}
.uw-tbl th{background:#1B4332;color:#fff;padding:8px 12px;text-align:left;font-size:11px;position:sticky;top:0;z-index:10}
.uw-tbl td{padding:7px 12px;border-bottom:1px solid #EEF2F7;vertical-align:top}
.uw-tbl tr:hover td{background:#F2F8F5}
.uw-qid-num{font-weight:800;color:#1a4731;font-size:13px}
.subj-pill{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600;white-space:nowrap}

/* ── ANKI LIST (detail panel) ────────────────────── */
.anki-list{border:1.5px solid #C8E6D4;border-radius:8px;overflow:hidden;margin-bottom:10px}
.anki-list-hdr{
  display:grid;grid-template-columns:1fr 1.4fr 90px 110px;
  padding:7px 14px;background:#E8F5EE;
  font-size:10.5px;font-weight:700;color:#2D4A3E;letter-spacing:.3px;
  border-bottom:1.5px solid #C8E6D4
}
.anki-row{
  display:grid;grid-template-columns:1fr 1.4fr 90px 110px;
  padding:9px 14px;align-items:center;
  border-bottom:1px solid #E8F3EE;transition:background .1s
}
.anki-row:last-child{border-bottom:none}
.anki-row:nth-child(even){background:#F5FAF7}
.anki-row:hover{background:#E8F5EE}
.anki-res-cell{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:#1B4332}
.anki-res-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.anki-section-cell{font-size:11.5px;color:#2D4A3E}
.anki-count-cell{font-size:12px;font-weight:700;color:#7B1FA2}
.anki-open-btn{
  padding:5px 10px;border-radius:14px;border:1.5px solid #7B1FA2;
  background:transparent;color:#7B1FA2;font-size:11px;font-weight:600;
  cursor:pointer;transition:.15s;white-space:nowrap
}
.anki-open-btn:hover{background:#7B1FA2;color:#fff}
.anki-no-link{font-size:11px;color:#C0CBDA;font-style:italic}
.anki-hint{font-size:10.5px;color:#8899AA;font-style:italic;margin-top:6px}
.anki-none{font-size:12px;color:#A0B0C8;font-style:italic;padding:10px 0}

/* ── 3RD PARTY RESOURCE TABLE ──────────────────────── */
.tp-table{width:100%;border-collapse:collapse;font-size:11.5px}
.tp-table th{
  background:#1B4332;color:#fff;font-size:10.5px;font-weight:700;
  padding:6px 10px;text-align:left;letter-spacing:.03em}
.tp-table td{
  padding:7px 10px;border-bottom:1px solid #E8F0EC;vertical-align:top;line-height:1.45}
.tp-table tr:last-child td{border-bottom:none}
.tp-table tr:hover td{background:#F5FAF7}
.tp-res-name{display:flex;align-items:center;gap:6px;font-weight:700;white-space:nowrap}
.tp-res-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tp-section{font-weight:600;color:#1A2332}
.tp-subch{font-size:10.5px;color:#3D6B52;margin-top:3px;line-height:1.5}
.tp-notes{font-size:10.5px;color:#5A7A6A;font-style:italic;line-height:1.45}
.tp-none{font-size:11px;color:#AAB8C8;font-style:italic;padding:6px 2px}

/* ── HOME NAV BUTTON ─────────────────────────────── */
.nav-home-btn{
  padding:11px 14px;font-size:10.5px;font-weight:800;letter-spacing:.9px;
  text-transform:uppercase;color:#1B4332;background:#F4FAF7;
  display:flex;align-items:center;gap:9px;
  cursor:pointer;user-select:none;flex-shrink:0;
  border:3px solid #1B4332;border-radius:0;transition:.15s
}
.nav-home-btn:hover{background:#E4EDF8}
.nav-home-btn.active{background:#1B4332;color:#fff}
.nav-home-icon{font-size:14px;opacity:.85}
.nav-home-label{flex:1}

/* ── HOME PAGE ───────────────────────────────────── */
.home-page{padding:28px 32px;max-width:none;width:100%}
.home-eyebrow{font-size:0.68rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#64748b;margin-bottom:16px}
.home-title{font-size:clamp(2.4rem,5vw,4.2rem);font-weight:900;letter-spacing:-0.045em;color:#0f172a;line-height:0.98;margin-bottom:20px;font-family:'Inter','Segoe UI',Arial,sans-serif}
.home-title em{font-style:normal;color:#166534}
.home-sub{font-size:0.97rem;color:#334155;line-height:1.7;margin-bottom:22px;max-width:720px}
.home-hero{margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid #e2e8f0}
.home-stat-row{display:flex;gap:16px;margin-bottom:30px;flex-wrap:wrap;max-width:1000px}
.home-stat-card{
  flex:1;min-width:140px;padding:18px 22px;border-radius:14px;
  display:flex;flex-direction:column;text-decoration:none;transition:.15s
}
a.home-stat-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.12)}
a.home-stat-card:hover .home-stat-n{text-decoration:underline}
.home-stat-card-blue  {background:#EEF8F3;border:1.5px solid #B7D9C8}
.home-stat-card-purple{background:#F5EEF8;border:1.5px solid #D9B8EA}

/* ── UTILS ───────────────────────────────────────── */
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function totalAnki(cls) {
  let t = 0;
  RES_ORDER.forEach(r => { if (cls[r]) cls[r].forEach(ch => { t += (ch.count||0); }); });
  return t;
}

/* ── BUILD RESOURCE GROUP ────────────────────────── */
function buildResGroup(res, chips) {
  const st = RS[res];
  if (!chips || !chips.length) {
    return `<div class="res-group">
      <div class="res-group-hdr" style="background:${st.bg}20;border-bottom:1px solid ${st.bg}">
        <div class="dot" style="background:${st.dot}"></div>${st.hdr}
      </div>
      <div class="res-none">Not covered</div>
    </div>`;
  }
  const chipsHtml = chips.map(ch => {
    const hasLink = !!ch.html;
    const cls2 = hasLink ? 'res-chip' : 'res-chip no-link';
    const ankiUrl = ch.html || '';
    const oc   = hasLink ? `onclick="openAnki('${ankiUrl}','${esc(ch.section)}')"` : '';
    const subHtml  = ch.subchapters ? `<div class="chip-sub">${esc(ch.subchapters)}</div>` : '';
    const xrefHtml = ch.xref       ? `<div class="chip-xref">${esc(ch.xref)}</div>`       : '';
    return `<div class="${cls2}" style="background:${st.bg};color:${st.c};border-color:${st.c}44" ${oc}>
      <div class="chip-row"><span class="chip-txt">${esc(ch.section)}</span><span class="chip-cnt">${ch.count}</span></div>
      ${subHtml}${xrefHtml}
    </div>`;
  }).join('');
  return `<div class="res-group">
    <div class="res-group-hdr" style="background:${st.bg};border-bottom:1px solid ${st.c}30">
      <div class="dot" style="background:${st.dot}"></div>${st.hdr}
    </div>
    <div class="res-group-body">${chipsHtml}</div>
  </div>`;
}

/* ── BUILD LO CONTENT ────────────────────────────── */
function buildLOContent(los) {
  if (!los || !los.length) return '';
  return los.map(sec => {
    const h = sec.header ? `<div class="lo-sec-hdr">${esc(sec.header)}</div>` : '';
    return h + sec.items.map(i=>`<div class="lo-item">${esc(i)}</div>`).join('');
  }).join('');
}

/* ── BUILD UWORLD QID CONTENT ────────────────────── */
function buildUWContent(cls) {
  if (!cls.uworld_qids.length) return '';
  const qidList = cls.uworld_qids.map(q=>q.qid).join(', ');
  return `<div class="uw-qid-section">
    <div class="uw-qid-section-hdr">Copy &amp; paste all QIDs into UWorld to build a custom test:</div>
    <div class="uw-qid-copy">${qidList}</div>
    <div class="uw-qid-hint">&#128161; Select all text above, then paste into UWorld &rarr; Create Custom Test</div>
    <button class="uw-detail-btn" onclick="openUW(${cls.class})">View Full Details (Topic / Subject / Repeats) &rarr;</button>
    <div style="margin-top:12px">
      <a class="feedback-btn-sm" href="https://forms.gle/spz5TRQfjjc7kbQh6" target="_blank">&#128203;&nbsp; Suggest a QID change or addition</a>
    </div>
  </div>`;
}

function buildNavItem(cls, idx) {

/* ── BUILD 3RD PARTY TABLE ───────────────────────────────── */
function build3rdPartySection(cls) {
  const rows = [];
  RES_ORDER.forEach(r => {
    const st = RS[r];
    const chips = cls[r];
    if (!chips || !chips.length) return;
    chips.forEach(ch => {
      rows.push({ res: st.hdr, dot: st.dot, section: ch.section,
                  subchapters: ch.subchapters || '', xref: ch.xref || '' });
    });
  });
  if (!rows.length) return `<div class="tp-none">No 3rd party resources mapped for this lecture.</div>`;
  const bodyHtml = rows.map(r => {
    const subHtml  = r.subchapters
      ? `<div class="tp-subch">${esc(r.subchapters)}</div>` : '';
    const notesHtml = r.xref
      ? `<div class="tp-notes">${esc(r.xref)}</div>` : '—';
    return `<tr>
      <td><div class="tp-res-name"><div class="tp-res-dot" style="background:${r.dot}"></div>${esc(r.res)}</div></td>
      <td><span class="tp-section">${esc(r.section)}</span>${subHtml}</td>
      <td>${notesHtml}</td>
    </tr>`;
  }).join('');
  return `<table class="tp-table">
    <thead><tr><th>Resource</th><th>Section / Chapter / Subchapter</th><th>Notes</th></tr></thead>
    <tbody>${bodyHtml}</tbody>
  </table>`;
}

/* ── BUILD ANKI LIST (replaces chip grid) ────────────── */
function buildAnkiList(cls) {
  const rows = [];
  RES_ORDER.forEach(r => {
    const st = RS[r];
    const chips = cls[r];
    if (!chips || !chips.length) return;
    chips.forEach(ch => {
      rows.push({resName: st.hdr, section: ch.section, count: ch.count, html: ch.html, dot: st.dot});
    });
  });
  if (!rows.length) return `<div class="anki-none">No Anki resources mapped for this lecture.</div>`;
  const rowsHtml = rows.map(r => {
    const _url = r.html || '';
    return `
    <div class="anki-row">
      <div class="anki-res-cell">
        <div class="anki-res-dot" style="background:${r.dot}"></div>
        ${esc(r.resName)}
      </div>
      <div class="anki-section-cell">${esc(r.section)}</div>
      <div class="anki-count-cell">${r.count} cards</div>
      <div>
        ${r.html
          ? `<button class="anki-open-btn" onclick="openAnki('${_url}','${esc(r.resName)} &mdash; ${esc(r.section)}')">Open ${r.count} cards &rarr;</button>`
          : `<span class="anki-no-link">No file</span>`}
      </div>
    </div>`;
  }).join('');
  return `
    <div class="anki-list">
      <div class="anki-list-hdr">
        <div>Resource</div><div>Section / Chapter</div><div>Cards</div><div></div>
      </div>
      ${rowsHtml}
    </div>
    <div class="anki-hint">&#9432; &ldquo;Open cards&rdquo; opens the full chapter deck &mdash; individual lecture filtering coming soon.</div>`;
}

        .reduce((sum, r) => sum + (cls[r]||[]).reduce((s, c) => s + (c.count||0), 0), 0);
      const ankiColor = ankiTotal > 0 ? '#7B1FA2' : '#C0CBDA';
      const ankiBg    = ankiTotal > 0 ? '#F5EEF8' : 'transparent';
      cells += '<td class="cov-cell" style="font-size:11px;font-weight:700;color:'+ankiColor+';background:'+ankiBg+'" title="'+ankiTotal+' ANKing cards available">'+(ankiTotal > 0 ? ankiTotal.toLocaleString() : '&mdash;')+'</td>';
      const uwCount = (cls.uworld_qids||[]).length;
      const uwColor = uwCount > 0 ? '#1a4731' : '#C0CBDA';
      const uwBg    = uwCount > 0 ? '#EEF8F3' : 'transparent';
      cells += '<td class="cov-cell" style="font-size:11px;font-weight:700;color:'+uwColor+';background:'+uwBg+'" title="'+uwCount+' UWorld QID'+(uwCount!==1?'s':'')+' mapped">'+(uwCount > 0 ? uwCount : '&mdash;')+'</td>';
      matrixRows += '<tr class="cov-lec-row">'+cells+'</tr>';
    });
  });

  return '<div class="home-page">'
    + '<section class="home-hero">'
    +   '<p class="home-eyebrow">HoyaDocs &middot; GI</p>'
    +   '<h1 class="home-title">Resource Coverage <em>Mapping.</em></h1>'
    +   '<p class="home-sub">A complete mapping of in-house GI lectures to third-party Step 1 resources and UWorld QIDs. Click any lecture name to open it in the Resource Hub.</p>'
    + '</section>'
    + '<div class="home-layout">'

    // ── LEFT SIDEBAR ──
    + '<div class="home-sidebar">'
    +   '<a class="ref-file-card" href="https://forms.gle/spz5TRQfjjc7kbQh6" target="_blank" style="background:#FFF8E1;border-color:#FFCC80;justify-content:center;gap:6px">'
    +     '<div class="ref-file-icon" style="font-size:16px">&#128203;</div>'
    +     '<div class="ref-file-body"><div class="ref-file-name" style="color:#E65100">Suggest a Change</div><div class="ref-file-type" style="color:#BF360C">QID additions &amp; corrections</div></div>'
    +   '</a>'
    +   '<div class="sidebar-title" style="margin-top:6px">&#128196; Mapping Files</div>'
    +   '<a class="ref-file-card" href="./HoyaDocs_Resource_Mapping.xlsx" target="_blank">'
    +     '<div class="ref-file-icon">&#128202;</div>'
    +     '<div class="ref-file-body"><div class="ref-file-name">3rd Party Resource Matrix</div><div class="ref-file-type">Excel &middot; All Resources</div></div>'
    +   '</a>'
    +   '<a class="ref-file-card" href="./HoyaDocs-UWorld-QID-Mapping.xlsx" target="_blank">'
    +     '<div class="ref-file-icon">&#128202;</div>'
    +     '<div class="ref-file-body"><div class="ref-file-name">UWorld Lecture Mapping</div><div class="ref-file-type">Excel &middot; QID Mapping</div></div>'
    +   '</a>'
    + '</div>'

    // ── MAIN CONTENT ──
    + '<div class="home-content">'
    + '<div style="background:#F0F7F4;border:1.5px solid #C8E6D4;border-radius:10px;padding:12px 16px;font-size:11.5px;color:#243D31;line-height:1.65;margin-bottom:12px">'
    +   '<div style="font-size:12.5px;font-weight:800;color:#1B4332;margin-bottom:6px">&#128218; How to Use This Matrix</div>'
    +   '<div style="display:grid;grid-template-columns:1fr 1fr;gap:2px 16px">'
    +     '<div>&#8599;&nbsp;<strong>Click a resource name</strong> in the legend to open the HoyaDocs Resource Mapping spreadsheet.</div>'
    +     '<div>&#9632;&nbsp;<strong>Click a colored cell</strong> to see which chapter covers that lecture, then jump to it in the Resource Hub.</div>'
    +     '<div>&#128218;&nbsp;<strong>Click a lecture name</strong> in the left column to open its full resource view in the Resource Hub.</div>'
    +     '<div>&#9651;&nbsp;<strong>ANKing</strong> column = total ANKing cards across all resources &nbsp;|&nbsp; <strong>UW</strong> column = UWorld QIDs mapped to that lecture.</div>'
    +   '</div>'
    + '</div>'
    + '<div style="margin-bottom:12px">'
    +   '<div style="font-size:12.5px;font-weight:800;color:#1B4332;margin-bottom:7px">&#128200; Legend</div>'
    +   '<div style="display:flex;flex-wrap:wrap;gap:6px 14px">'+legend+'</div>'
    +   '<div class="cov-legend-hint" style="margin-top:7px;font-size:10.5px">&#8599;&nbsp;Click a resource label to open the HoyaDocs Resource Mapping spreadsheet</div>'
    + '</div>'
    + '<div class="coverage-wrap" style="margin-top:10px">'
    +   '<table class="coverage-table">'
    +     '<thead class="cov-res-hdr"><tr>'+hdrCells+'</tr></thead>'
    +     '<tbody>'+matrixRows+'</tbody>'
    +   '</table>'
    + '</div>'

    + '</div>'  // close home-content
    + '</div>'  // close home-layout
    + '</div>';  // close home-page
}
function selectHome() {
  if (currentIdx >= 0) {
    const prev = document.getElementById('nav-'+currentIdx);
    if (prev) prev.classList.remove('active');
  }
  currentIdx = -1;
  document.querySelectorAll('.nav-home-btn').forEach(b => b.classList.add('active'));
  document.getElementById('detailPanel').innerHTML = buildHome();
}

function selectLecture(idx) {
  document.querySelectorAll('.nav-home-btn').forEach(b => b.classList.remove('active'));
  if (currentIdx >= 0) {
    const prev = document.getElementById('nav-'+currentIdx);
    if (prev) prev.classList.remove('active');
  }
  const navItem = document.getElementById('nav-'+idx);
  if (navItem) { navItem.classList.add('active'); navItem.scrollIntoView({block:'nearest'}); }
  currentIdx = idx;
  document.getElementById('detailPanel').innerHTML = buildDetail(DATA[idx]);
}

/* ── TOGGLE NAV GROUP (collapse/expand subject) ─────── */
function toggleNavGroup(subj) {
  const grp = document.querySelector(`.nav-group[data-subj="${subj}"]`);
  if (grp) grp.classList.toggle('collapsed');
}

/* ── TOGGLE SECTION PANEL ────────────────────────── */
function toggleSec(btn, id) {
  btn.classList.toggle('open');
  const panel = document.getElementById(id);
  if (panel) panel.classList.toggle('open');
}

/* ── RENDER NAV ──────────────────────────────────── */
function render() {
  const nav = document.getElementById('navPanel');
  const grouped = {};
  DATA.forEach((cls, idx) => {
    if (!grouped[cls.subject]) grouped[cls.subject] = [];
    grouped[cls.subject].push({cls, idx});
  });
  let html = '<div class="nav-home-btn" onclick="selectHome()"><span class="nav-home-icon">&#8962;</span><span class="nav-home-label">Home</span></div>';
  SUBJ_ORDER.forEach(subj => {
    if (!grouped[subj]) return;
    const sb = SIDEBAR[subj];
    const n  = grouped[subj].length;
    html += `<div class="nav-group collapsed" data-subj="${subj}">
      <div class="nav-group-hdr" style="background:${sb}" onclick="toggleNavGroup('${subj}')">
        ${SUBJ_LABELS[subj]}
        <div class="nav-hdr-right">
          <span class="nav-cnt-badge">${n}</span>
          <span class="nav-chevron">&#9660;</span>
        </div>
      </div>`;
    grouped[subj].forEach(({cls, idx}) => { html += buildNavItem(cls, idx); });
    html += `</div>`;
  });
  nav.innerHTML = html;
  selectHome();
}

/* ── FILTER ──────────────────────────────────────── */
function doFilter() { sTerm = document.getElementById('srch').value.toLowerCase(); applyFilter(); }
function fS(s, btn) {
  aSubj = s;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  applyFilter();
}
function applyFilter() {
  document.querySelectorAll('.nav-item').forEach(item => {
    const ok = (aSubj==='all' || item.dataset.subj===aSubj)
            && (!sTerm || item.dataset.srch.includes(sTerm));
    item.classList.toggle('hidden', !ok);
  });
  document.querySelectorAll('.nav-group').forEach(grp => {
    grp.classList.toggle('hidden', grp.querySelectorAll('.nav-item:not(.hidden)').length===0);
  });
}

/* ── MODALS ──────────────────────────────────────── */
function openAnki(url, title) {
  document.getElementById('ankiTitle').textContent = title;
  document.getElementById('ankiFrame').src = url;
  const dlBtn = document.getElementById('ankiDl');
  if (dlBtn) {
    const gdMatch = url.match(/\/file\/d\/([^\/]+)\//);
    if (gdMatch) {
      dlBtn.href = 'https://drive.google.com/uc?export=download&id=' + gdMatch[1];
      dlBtn.removeAttribute('download');
      dlBtn.target = '_blank';
      dlBtn.style.display = 'inline-block';
    } else if (url.endsWith('.pdf')) {
      dlBtn.href = url;
      dlBtn.download = url.split('/').pop();
      dlBtn.style.display = 'inline-block';
    } else {
      dlBtn.style.display = 'none';
    }
  }
  document.getElementById('ankiOv').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function openUW(cn) {
  const cls = DATA.find(d=>d.class===cn);
  if (!cls) return;
  document.getElementById('uwTitle').textContent = 'UWorld QIDs — Class '+(cls.classLabel||cn)+': '+cls.lecture+' ('+cls.uworld_qids.length+' QIDs)';
  const tbody = document.getElementById('uwBody');
  if (!cls.uworld_qids.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#999;padding:20px">No UWorld QIDs mapped.</td></tr>';
  } else {
    tbody.innerHTML = cls.uworld_qids.map(q => {
      const [bg,co] = SPC[q.subject]||['#eee','#555'];
      return `<tr>
        <td class="uw-qid-num">${q.qid}</td>
        <td>${esc(q.topic)}</td>
        <td><span class="subj-pill" style="background:${bg};color:${co}">${esc(q.subject.replace(/ \(.*\)/,''))}</span></td>
        <td style="text-align:center">${q.repeats!==''&&q.repeats!==undefined?q.repeats:'—'}</td>
        <td style="font-size:11px;color:#6B7A8D;line-height:1.8">${(q.lectures||'').split(',').map(l=>l.trim()).filter(Boolean).map(esc).join('<br>')}</td>
      </tr>`;
    }).join('');
  }
  document.getElementById('uwOv').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeM(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
  if (id==='ankiOv') document.getElementById('ankiFrame').src='';
}
document.addEventListener('keydown', e => {
  if (e.key==='Escape') { closeM('ankiOv'); closeM('uwOv'); }
  if (e.key==='ArrowDown' && currentIdx < DATA.length-1) {
    const next = currentIdx+1;
    if (!document.getElementById('nav-'+next)?.classList.contains('hidden')) selectLecture(next);
  }
  if (e.key==='ArrowUp' && currentIdx > 0) {
    const prev = currentIdx-1;
    if (!document.getElementById('nav-'+prev)?.classList.contains('hidden')) selectLecture(prev);
  }
});

/* ── HOME PAGE OVERRIDES ─────────────────────────── */

// Override render: on the home page just populate #homeContent
function render() {
  const el = document.getElementById('homeContent');
  if (el) el.innerHTML = buildHome();
}


render();

/* ── HOW TO USE TOGGLE ───────────────────────────── */
function printAnki() {
  const frame = document.getElementById('ankiFrame');
  if (!frame || !frame.contentWindow) return;
  try {
    frame.contentWindow.focus();
    frame.contentWindow.print();
  } catch(e) {
    // Fallback: open in new tab for printing
    window.open(frame.src, '_blank');
  }
}


function toggleHowto() {
  const el = document.getElementById('navHowto');
  if (el) el.classList.toggle('open');
}

/* ── COV CELL POPUP ──────────────────────────────── */
function showCovTip(e, resName, chapter, idx) {
  e.stopPropagation();
  const tip = document.getElementById('covTip');
  document.getElementById('covTipRes').textContent = resName;
  document.getElementById('covTipChapter').textContent = chapter;
  const btn = document.getElementById('covTipBtn');
  btn.onclick = function() { closeCovTip(); selectLecture(idx); };
  const x = Math.min(e.clientX + 12, window.innerWidth - 300);
  const y = Math.min(e.clientY + 12, window.innerHeight - 150);
  tip.style.left = x + 'px';
  tip.style.top  = y + 'px';
  tip.classList.add('open');
}
function closeCovTip() {
  const tip = document.getElementById('covTip');
  if (tip) tip.classList.remove('open');
}
document.addEventListener('click', function(e) {
  const tip = document.getElementById('covTip');
  if (tip && tip.classList.contains('open') && !tip.contains(e.target)) {
    tip.classList.remove('open');
  }
});

function toggleMobNav() {
  const nav = document.querySelector('.nav-panel');
  const ov  = document.getElementById('mobOverlay');
  const open = nav.classList.toggle('mob-open');
  if (ov) ov.classList.toggle('open', open);
}
function closeMobNav() {
  const nav = document.querySelector('.nav-panel');
  const ov  = document.getElementById('mobOverlay');
  if (nav) nav.classList.remove('mob-open');
  if (ov)  ov.classList.remove('open');
}
</script>
